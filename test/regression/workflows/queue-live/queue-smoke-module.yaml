kind: module
name: queue-smoke-module
description: Minimal module used by the live queue regression.

params:
  - name: target
    required: true

steps:
  - name: write-marker
    type: bash
    command: |
      mkdir -p {{Output}}/regression
      cat > {{Output}}/regression/queue-smoke.json <<'EOF'
      {"workflow":"queue-smoke-module","target":"{{Target}}"}
      EOF

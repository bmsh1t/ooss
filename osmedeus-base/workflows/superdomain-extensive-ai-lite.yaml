# =============================================================================
# SUPERDOMAIN EXTENSIVE - Lite AI Workflow
# =============================================================================
# 
# 精简版 - 只保留核心 AI 功能，适合日常使用
# 特点：
# - AI 模块从 7 个精简到 2 个
# - 移除实战价值有限的模块（attack-chain, path-planning, pre-scan）
# - 报告可视化（Mermaid 图表）
# - 漏洞管理（SQLite 去重）
#
# Usage:
#   osmedeus run -f superdomain-extensive-ai-lite -t example.com
# =============================================================================

kind: flow
name: superdomain-extensive-ai-lite
description: Ultimate reconnaissance - lite version with only core AI features
tags: "recon, domain, extensive, lite, ai, optimized"

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  # ===========================================================
  # 全局范围限制参数
  # ===========================================================
  - name: globalTimeout
    type: string
    default: "6h"
  - name: maxSubdomains
    type: integer
    default: 50000
  - name: maxUrls
    type: integer
    default: 100000
  - name: rateLimit
    type: integer
    default: 150

  # ===========================================================
  # AI 智能分析配置 (精简版)
  # ===========================================================
  - name: enableLlmAnalysis
    type: bool
    default: true
    description: "Enable AI vulnerability validation and analysis"
  - name: enableAiDecision
    type: bool
    default: true
    description: "Enable application of AI-generated decision artifacts and scan parameters"
  # enableVulnValidation 是 do-ai-vuln-validation fragment 内部使用的参数名
  - name: enableVulnValidation
    type: bool
    default: true
    description: "Alias for enableLlmAnalysis used by vuln-validation fragment"
  - name: enableIntelligentAnalysis
    type: bool
    default: true
    description: "Enable AI intelligent analysis coordinator"
  - name: enableSemanticSearch
    type: bool
    default: false
    description: "Enable semantic search through vectorkb-backed retrieval"
  - name: includeKnowledgeBase
    type: bool
    default: true
    description: "Include local/shared vector knowledge during semantic search"
  - name: enablePostVulnSemanticSearch
    type: bool
    default: true
    description: "Run a second semantic search after vuln-suite to refine exploitation context"
  - name: enableKnowledgeLearning
    type: bool
    default: true
    description: "Write scan findings back into the local knowledge base"
  - name: enableLlmCodeReview
    type: bool
    default: false
    description: "Enable AI code review"
  - name: enableRetestPlanning
    type: bool
    default: true
    description: "Generate an actionable retest plan from AI findings"
  - name: enableOperatorQueue
    type: bool
    default: true
    description: "Generate a practical operator task queue for manual follow-up"
  - name: enableCampaignHandoff
    type: bool
    default: true
    description: "Generate a structured handoff package for campaign/deep-scan execution"
  - name: enableCampaignCreate
    type: bool
    default: false
    description: "Create a queued campaign directly from the AI handoff"
  - name: enableRetestQueue
    type: bool
    default: false
    description: "Queue AI-selected retest targets into worker queue"
  - name: enableTargetedRescan
    type: bool
    default: true
    description: "Run targeted nuclei rescans against AI-selected follow-up targets"
  - name: enablePostFollowupCoordination
    type: bool
    default: true
    description: "Aggregate follow-up execution outputs into a final reusable decision package"
  - name: knowledgeWorkspace
    default: "{{TargetSpace}}"
  - name: sharedKnowledgeWorkspace
    default: ""
  - name: globalKnowledgeWorkspace
    default: "global"
  - name: retestFlow
    default: "web-analysis"
  - name: retestWorkflowKind
    default: "flow"
  - name: retestPriority
    default: "high"
  - name: campaignWorkflow
    default: "{{retestFlow}}"
  - name: campaignWorkflowKind
    default: "{{retestWorkflowKind}}"
  - name: campaignPriority
    default: "{{retestPriority}}"
  - name: campaignDeepScanWorkflow
    default: ""
  - name: campaignDeepScanWorkflowKind
    default: "flow"
  - name: campaignAutoDeepScan
    type: bool
    default: false
  - name: campaignHighRiskSeverities
    default: "critical,high"

  # ===========================================================
  # 扫描配置
  # ===========================================================
  - name: enableWafAwareScan
    type: bool
    default: true
  - name: wafRateLimit
    type: integer
    default: 20
  - name: nucleiThreads
    type: integer
    default: 10
  - name: nucleiRateLimit
    type: integer
    default: 30
  - name: nucleiTimeout
    type: string
    default: "8h"
  - name: nucleiSeverity
    type: string
    default: "critical,high,medium"

  # ===========================================================
  # 输出文件路径
  # ===========================================================
  - name: subdomainFile
    default: "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"
  - name: resolvedFile
    default: "{{Output}}/probing/resolved-{{TargetSpace}}.txt"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"
  - name: vulnDir
    default: "{{Output}}/vulnscan"
  - name: retestPlanOutput
    default: "{{Output}}/ai-analysis/retest-plan-{{TargetSpace}}.json"
  - name: operatorQueueOutput
    default: "{{Output}}/ai-analysis/operator-queue-{{TargetSpace}}.json"
  - name: campaignHandoffOutput
    default: "{{Output}}/ai-analysis/campaign-handoff-{{TargetSpace}}.json"
  - name: campaignCreateOutput
    default: "{{Output}}/ai-analysis/campaign-create-{{TargetSpace}}.json"
  - name: followupDecisionOutput
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"

  # ===========================================================
  # 上一轮 follow-up 回灌参数
  # 这些参数由共享的 AI follow-up fragments 消费，即使 lite 没有 pre-scan，
  # 也必须与 optimized / stable / hybrid 保持同一份契约，避免 queue/resume 链路断掉。
  # ===========================================================
  - name: previous_followup_targets
    default: ""
  - name: previous_followup_priority_targets
    default: ""
  - name: previous_followup_focus_areas
    default: ""
  - name: previous_followup_manual_first_targets
    default: ""
  - name: previous_followup_high_confidence_targets
    default: ""
  - name: previous_followup_reasoning
    default: ""
  - name: previous_followup_scan_profile
    default: ""
  - name: previous_followup_severity
    default: ""
  - name: previous_followup_priority_mode
    default: ""
  - name: previous_followup_confidence_level
    default: ""
  - name: previous_followup_next_phase
    default: ""
  - name: previous_followup_reuse_sources
    default: ""
  - name: previous_followup_resume_suppressed_actions
    default: ""
  - name: previous_followup_reused_actions
    default: ""
  - name: previous_followup_skipped_duplicate_actions
    default: ""
  - name: previous_followup_manual_followup_needed
    default: ""
  - name: previous_followup_campaign_followup_recommended
    default: ""
  - name: previous_followup_queue_followup_effective
    default: ""
  - name: previous_followup_escalation_score
    default: ""
  - name: previous_followup_campaign_create_status
    default: ""
  - name: previous_followup_campaign_create_id
    default: ""
  - name: previous_followup_campaign_create_queued_runs
    default: ""
  - name: previous_followup_manual_first_targets_list
    default: ""
  - name: previous_followup_high_confidence_targets_list
    default: ""
  - name: previous_followup_combined_targets_list
    default: ""

# -----------------------------------------------------------------------------
# MODULES SECTION
# -----------------------------------------------------------------------------
modules:
  # ===========================================================================
  # Phase 1: OSINT & Subdomain
  # ===========================================================================
  - name: osint
    path: common/01-osint.yaml

  - name: subdomain
    path: common/02-subdomain.yaml
    depends_on: [osint]

  # ===========================================================================
  # Phase 2: DNS Resolution
  # ===========================================================================
  - name: dns-resolve
    path: common/03-dns-resolve.yaml
    depends_on: [subdomain]

  # ===========================================================================
  # Phase 3: HTTP Probing
  # ===========================================================================
  - name: http-probe
    path: common/04-http-probe.yaml
    depends_on: [dns-resolve]

  # ===========================================================================
  # Phase 4: Fingerprinting & Web Crawl
  # ===========================================================================
  - name: fingerprint
    path: common/05-fingerprint.yaml
    depends_on: [http-probe]

  - name: web-crawl
    path: common/06-web-crawl.yaml
    depends_on: [http-probe]

  # ===========================================================================
  # Phase 5: Content Analysis
  # ===========================================================================
  - name: content-analysis
    path: common/07-content-analysis.yaml
    depends_on: [http-probe, web-crawl]

  # ===========================================================================
  # Phase 6: Service Scan & Backup
  # ===========================================================================
  - name: service-scan
    path: common/08-service-scan.yaml
    depends_on: [dns-resolve, http-probe]

  - name: scan-backup
    path: common/scan-backup.yaml
    depends_on: [http-probe, web-crawl]

  - name: scan-content
    path: common/scan-content.yaml
    depends_on: [http-probe, content-analysis, scan-backup]

  # ===========================================================================
  # Phase 7: Vulnerability Scan
  # ===========================================================================
  - name: vuln-suite
    path: common/09-vuln-suite.yaml
    depends_on: [content-analysis, http-probe, dns-resolve, scan-content]

  # ===========================================================================
  # Phase 8: AI 精简分析 (只保留核心)
  # ===========================================================================
  # 核心 AI 模块：
  # - ai-semantic-search / ai-post-vuln-semantic-search: 轻量消费知识库与向量检索
  # - ai-vuln-validation: 验证漏洞，识别假阳性
  # - ai-intelligent-analysis: 汇总结果，生成决策
  # - ai-apply-decision: 应用决策配置
  # - ai-retest/operator/campaign: 轻闭环，便于后续人工或批量执行
  # - ai-targeted-rescan: 对确认目标深扫（轻量，闭环必要）

  - name: ai-semantic-search
    path: fragments/do-ai-semantic-search.yaml
    depends_on: [fingerprint]
    pre_condition: "{{enableSemanticSearch}}"
    params:
      semanticIndexDir: "{{Output}}/ai-analysis/semantic-index-early"
      searchResultsOutput: "{{Output}}/ai-analysis/semantic-search-early-{{TargetSpace}}.json"
      agentResultsOutput: "{{Output}}/ai-analysis/semantic-agent-results-early-{{TargetSpace}}.json"
      embeddingsOutput: "{{Output}}/ai-analysis/semantic-embeddings-early-{{TargetSpace}}.json"
      semanticHighlightsOutput: "{{Output}}/ai-analysis/semantic-highlights-early-{{TargetSpace}}.json"
      semanticPriorityTargetsOutput: "{{Output}}/ai-analysis/semantic-priority-targets-early-{{TargetSpace}}.txt"
      semanticPriorityVulnsOutput: "{{Output}}/ai-analysis/semantic-priority-vulns-early-{{TargetSpace}}.json"
      vectorSearchResultsOutput: "{{Output}}/ai-analysis/vector-search-results-early-{{TargetSpace}}.json"
      vectorKnowledgeSearchOutput: "{{Output}}/ai-analysis/vector-kb-search-results-early-{{TargetSpace}}.json"
      knowledgeSearchOutput: "{{Output}}/ai-analysis/knowledge-search-results-early-{{TargetSpace}}.json"
      knowledgeWorkspace: "{{knowledgeWorkspace}}"
      sharedKnowledgeWorkspace: "{{sharedKnowledgeWorkspace}}"
      globalKnowledgeWorkspace: "{{globalKnowledgeWorkspace}}"
      includeKnowledgeBase: "{{includeKnowledgeBase}}"
      searchStage: "early"
      searchQuery: "Admin panels, authentication flows, high-value endpoints, exposed services, and tech-specific exploitation ideas"

  - name: ai-vuln-validation
    path: fragments/do-ai-vuln-validation.yaml
    depends_on: [vuln-suite]
    pre_condition: "{{enableVulnValidation}}"

  - name: ai-post-vuln-semantic-search
    path: fragments/do-ai-semantic-search.yaml
    depends_on: [vuln-suite]
    pre_condition: "{{enablePostVulnSemanticSearch}}"
    params:
      semanticIndexDir: "{{Output}}/ai-analysis/semantic-index-post-vuln"
      searchResultsOutput: "{{Output}}/ai-analysis/semantic-search-post-vuln-{{TargetSpace}}.json"
      agentResultsOutput: "{{Output}}/ai-analysis/semantic-agent-results-post-vuln-{{TargetSpace}}.json"
      embeddingsOutput: "{{Output}}/ai-analysis/semantic-embeddings-post-vuln-{{TargetSpace}}.json"
      semanticHighlightsOutput: "{{Output}}/ai-analysis/semantic-highlights-post-vuln-{{TargetSpace}}.json"
      semanticPriorityTargetsOutput: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
      semanticPriorityVulnsOutput: "{{Output}}/ai-analysis/semantic-priority-vulns-post-vuln-{{TargetSpace}}.json"
      vectorSearchResultsOutput: "{{Output}}/ai-analysis/vector-search-results-post-vuln-{{TargetSpace}}.json"
      vectorKnowledgeSearchOutput: "{{Output}}/ai-analysis/vector-kb-search-results-post-vuln-{{TargetSpace}}.json"
      knowledgeSearchOutput: "{{Output}}/ai-analysis/knowledge-search-results-post-vuln-{{TargetSpace}}.json"
      knowledgeWorkspace: "{{knowledgeWorkspace}}"
      sharedKnowledgeWorkspace: "{{sharedKnowledgeWorkspace}}"
      globalKnowledgeWorkspace: "{{globalKnowledgeWorkspace}}"
      includeKnowledgeBase: "{{includeKnowledgeBase}}"
      searchStage: "post-vuln"
      searchQuery: "Confirmed findings, exploit chains, auth bypass, pivot paths, retest payloads, and post-validation exploitation guidance"

  - name: ai-intelligent-analysis
    path: fragments/do-ai-intelligent-analysis.yaml
    depends_on: [ai-vuln-validation, ai-semantic-search, ai-post-vuln-semantic-search]
    pre_condition: '{{enableLlmAnalysis}} && ("{{enableIntelligentAnalysis}}" == "" || "{{enableIntelligentAnalysis}}" == "true")'
    params:
      semanticSearchFile: "{{Output}}/ai-analysis/semantic-search-post-vuln-{{TargetSpace}}.json"
      semanticHighlightsFile: "{{Output}}/ai-analysis/semantic-highlights-post-vuln-{{TargetSpace}}.json"
      initialSemanticSearchFile: "{{Output}}/ai-analysis/semantic-search-early-{{TargetSpace}}.json"
      initialSemanticHighlightsFile: "{{Output}}/ai-analysis/semantic-highlights-early-{{TargetSpace}}.json"
      semanticPriorityTargetsFile: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
      knowledgeSearchFile: "{{Output}}/ai-analysis/knowledge-search-results-post-vuln-{{TargetSpace}}.json"
      initialKnowledgeSearchFile: "{{Output}}/ai-analysis/knowledge-search-results-early-{{TargetSpace}}.json"
      vectorKnowledgeSearchFile: "{{Output}}/ai-analysis/vector-kb-search-results-post-vuln-{{TargetSpace}}.json"
      initialVectorKnowledgeSearchFile: "{{Output}}/ai-analysis/vector-kb-search-results-early-{{TargetSpace}}.json"

  # AI 决策应用 - 将决策配置写入环境
  - name: ai-apply-decision
    path: fragments/do-ai-apply-decision.yaml
    depends_on: [ai-intelligent-analysis]
    pre_condition: '{{enableLlmAnalysis}} && ("{{enableAiDecision}}" == "" || "{{enableAiDecision}}" == "true")'

  # ===========================================================================
  # Phase 9: Code Review (可选)
  # ===========================================================================
  - name: ai-code-review
    path: fragments/do-ai-code-review-acp.yaml
    depends_on: [vuln-suite]
    pre_condition: "{{enableLlmCodeReview}}"

  # ===========================================================================
  # Phase 10: AI 定向二次扫描 (基于 AI 决策结果，轻量但必要)
  # ===========================================================================
  - name: ai-decision-semantic-search
    path: fragments/do-ai-semantic-search.yaml
    depends_on: [ai-apply-decision]
    pre_condition: "{{enableLlmAnalysis}}"
    params:
      semanticIndexDir: "{{Output}}/ai-analysis/semantic-index-decision-followup"
      searchResultsOutput: "{{Output}}/ai-analysis/semantic-search-decision-followup-{{TargetSpace}}.json"
      agentResultsOutput: "{{Output}}/ai-analysis/semantic-agent-results-decision-followup-{{TargetSpace}}.json"
      embeddingsOutput: "{{Output}}/ai-analysis/semantic-embeddings-decision-followup-{{TargetSpace}}.json"
      semanticHighlightsOutput: "{{Output}}/ai-analysis/semantic-highlights-decision-followup-{{TargetSpace}}.json"
      semanticPriorityTargetsOutput: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"
      semanticPriorityVulnsOutput: "{{Output}}/ai-analysis/semantic-priority-vulns-decision-followup-{{TargetSpace}}.json"
      vectorSearchResultsOutput: "{{Output}}/ai-analysis/vector-search-results-decision-followup-{{TargetSpace}}.json"
      vectorKnowledgeSearchOutput: "{{Output}}/ai-analysis/vector-kb-search-results-decision-followup-{{TargetSpace}}.json"
      knowledgeSearchOutput: "{{Output}}/ai-analysis/knowledge-search-results-decision-followup-{{TargetSpace}}.json"
      semanticPriorityTargetsInput: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
      knowledgeWorkspace: "{{knowledgeWorkspace}}"
      sharedKnowledgeWorkspace: "{{sharedKnowledgeWorkspace}}"
      globalKnowledgeWorkspace: "{{globalKnowledgeWorkspace}}"
      includeKnowledgeBase: "{{includeKnowledgeBase}}"
      searchStage: "decision-followup"
      searchQuery: "Applied AI decision, prioritized retest targets, operator queue tasks, campaign handoff, targeted rescan guidance, and manual exploitation follow-up"

  - name: ai-retest-planning
    path: fragments/do-ai-retest-planning.yaml
    depends_on: [ai-apply-decision, ai-vuln-validation, ai-decision-semantic-search]
    pre_condition: "{{enableRetestPlanning}}"
    params:
      retestPlanOutput: "{{retestPlanOutput}}"
      retestFlow: "{{retestFlow}}"
      retestPriority: "{{retestPriority}}"
      semanticSearchFile: "{{Output}}/ai-analysis/semantic-search-decision-followup-{{TargetSpace}}.json"
      knowledgeSearchFile: "{{Output}}/ai-analysis/knowledge-search-results-decision-followup-{{TargetSpace}}.json"
      vectorKnowledgeSearchFile: "{{Output}}/ai-analysis/vector-kb-search-results-decision-followup-{{TargetSpace}}.json"

  - name: ai-operator-queue
    path: fragments/do-ai-operator-queue.yaml
    depends_on: [ai-retest-planning, ai-apply-decision, ai-decision-semantic-search]
    pre_condition: "{{enableOperatorQueue}}"
    params:
      operatorQueueOutput: "{{operatorQueueOutput}}"
      semanticSearchFile: "{{Output}}/ai-analysis/semantic-search-decision-followup-{{TargetSpace}}.json"

  - name: ai-campaign-handoff
    path: fragments/do-ai-campaign-handoff.yaml
    depends_on: [ai-retest-planning, ai-operator-queue, ai-apply-decision, ai-decision-semantic-search]
    pre_condition: "{{enableCampaignHandoff}}"
    params:
      campaignHandoffOutput: "{{campaignHandoffOutput}}"
      campaignCreateOutput: "{{campaignCreateOutput}}"
      retestPlanOutput: "{{retestPlanOutput}}"
      operatorQueueOutput: "{{operatorQueueOutput}}"
      semanticPriorityTargetsFile: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"
      retestFlow: "{{retestFlow}}"
      retestPriority: "{{retestPriority}}"
      knowledgeWorkspace: "{{knowledgeWorkspace}}"
      enableCampaignCreate: "{{enableCampaignCreate}}"
      campaignWorkflow: "{{campaignWorkflow}}"
      campaignWorkflowKind: "{{campaignWorkflowKind}}"
      campaignPriority: "{{campaignPriority}}"
      campaignDeepScanWorkflow: "{{campaignDeepScanWorkflow}}"
      campaignDeepScanWorkflowKind: "{{campaignDeepScanWorkflowKind}}"
      campaignAutoDeepScan: "{{campaignAutoDeepScan}}"
      campaignHighRiskSeverities: "{{campaignHighRiskSeverities}}"

  - name: ai-targeted-rescan
    path: fragments/do-ai-targeted-rescan.yaml
    depends_on: [ai-apply-decision, ai-retest-planning, ai-operator-queue, ai-decision-semantic-search]
    pre_condition: "{{enableTargetedRescan}}"
    params:
      semanticPriorityTargetsFile: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"

  - name: ai-retest-queue
    path: fragments/do-ai-retest-queue.yaml
    depends_on: [ai-retest-planning, ai-campaign-handoff]
    pre_condition: "{{enableRetestQueue}}"
    params:
      retestFlow: "{{retestFlow}}"
      retestWorkflowKind: "{{retestWorkflowKind}}"
      retestPriority: "{{retestPriority}}"
      knowledgeWorkspace: "{{knowledgeWorkspace}}"

  - name: ai-post-followup-coordination
    path: fragments/do-ai-post-followup-coordination.yaml
    depends_on: [ai-targeted-rescan, ai-campaign-handoff, ai-retest-queue]
    pre_condition: "{{enablePostFollowupCoordination}}"
    params:
      followupDecisionOutput: "{{followupDecisionOutput}}"
      semanticPriorityTargetsFile: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"

  # ===========================================================================
  # Phase 11: Report (增强版 - 可视化)
  # ===========================================================================
  - name: report
    path: common/10-report-enhanced.yaml
    depends_on: [vuln-suite, ai-intelligent-analysis, ai-code-review, ai-post-followup-coordination]
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 12: Knowledge Auto-Learning
  # ===========================================================================
  - name: ai-knowledge-autolearn
    path: fragments/do-ai-knowledge-autolearn.yaml
    depends_on: [report]
    pre_condition: "{{enableKnowledgeLearning}}"
    params:
      knowledgeWorkspace: "{{knowledgeWorkspace}}"

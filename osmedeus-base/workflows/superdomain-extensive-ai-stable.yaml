# =============================================================================
# SUPERDOMAIN EXTENSIVE - Ultimate Reconnaissance Workflow (Stable)
# =============================================================================
# 
# 稳定版本 - 使用 agent-acp (flowcli) 进行 AI 分析
# 特点：优先使用 agent-acp(flowcli) 以提升稳定性
#
# Usage:
#   osmedeus run -f superdomain-extensive-stable -t example.com
# =============================================================================

kind: flow
name: superdomain-extensive-stable
description: Ultimate reconnaissance - stable version using agent-acp for all AI analysis
tags: "recon, domain, extensive, full, vuln, osint, super, ai, stable"

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  # ===========================================================
  # 全局范围限制参数
  # ===========================================================
  - name: globalTimeout
    type: string
    default: "6h"
    description: "Maximum total workflow execution time"
  
  - name: maxSubdomains
    type: integer
    default: 50000
  - name: maxUrls
    type: integer
    default: 100000
  - name: rateLimit
    type: integer
    default: 150

  # ===========================================================
  # AI 智能分析配置 (agent-acp 版本)
  # ===========================================================
  - name: enableLlmAnalysis
    type: bool
    default: true
    description: "Enable AI-powered vulnerability analysis"
  - name: enablePreScanDecision
    type: bool
    default: true
    description: "Enable AI pre-scan decision making"
  - name: enableSemanticSearch
    type: bool
    default: true
    description: "Enable semantic search RAG"
  - name: enableWafBypass
    type: bool
    default: false
    description: "Enable real-time WAF bypass"
  - name: enableLlmCodeReview
    type: bool
    default: false
    description: "Enable AI code review"
  - name: enableLlmReport
    type: bool
    default: false
    description: "Enable AI report generation"
  - name: enableVulnValidation
    type: bool
    default: true
    description: "Enable AI vulnerability validation"
  - name: enableAttackChain
    type: bool
    default: true
    description: "Enable AI attack chain analysis"
  - name: enablePathPlanning
    type: bool
    default: true
    description: "Enable AI attack path planning"
  - name: enableKnowledgeLearning
    type: bool
    default: true
    description: "Write scan findings back into the local knowledge base"

  # ===========================================================
  # Agent-ACP 配置 (flowcli 调用配置)
  # ===========================================================
  - name: agentTimeout
    type: string
    default: "30m"
    description: "Timeout for agent-acp calls"
  - name: agentRetry
    type: integer
    default: 3
    description: "Number of retries on failure"

  # ===========================================================
  # 规避检测与 WAF 感知配置
  # ===========================================================
  - name: enableWafAwareScan
    type: bool
    default: true
  - name: wafRateLimit
    type: integer
    default: 20
  - name: wafRequestDelay
    type: string
    default: "2s"

  # ===========================================================
  # 扫描并发与速率控制
  # ===========================================================
  - name: nucleiThreads
    type: integer
    default: 10
  - name: nucleiRateLimit
    type: integer
    default: 30
  - name: nucleiTimeout
    type: string
    default: "8h"
  - name: nucleiSeverity
    type: string
    default: "critical,high,medium"

  # ===========================================================
  # 输出文件路径
  # ===========================================================
  - name: subdomainFile
    default: "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"
  - name: resolvedFile
    default: "{{Output}}/probing/resolved-{{TargetSpace}}.txt"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"
  - name: vulnDir
    default: "{{Output}}/vulnscan"

# -----------------------------------------------------------------------------
# MODULES SECTION
# -----------------------------------------------------------------------------
modules:
  # ===========================================================================
  # Phase 1: OSINT & Subdomain (并行)
  # ===========================================================================
  - name: osint
    path: common/01-osint.yaml

  - name: subdomain
    path: common/02-subdomain.yaml
    depends_on: [osint]

  # ===========================================================================
  # Phase 2: DNS Resolution
  # ===========================================================================
  - name: dns-resolve
    path: common/03-dns-resolve.yaml
    depends_on: [subdomain]

  # ===========================================================================
  # Phase 3: HTTP Probing
  # ===========================================================================
  - name: http-probe
    path: common/04-http-probe.yaml
    depends_on: [dns-resolve]

  # ===========================================================================
  # Phase 4: Fingerprinting & Web Crawl (并行)
  # ===========================================================================
  - name: fingerprint
    path: common/05-fingerprint.yaml
    depends_on: [http-probe]

  - name: web-crawl
    path: common/06-web-crawl.yaml
    depends_on: [http-probe]

  # ===========================================================================
  # Phase 5: Content Analysis
  # ===========================================================================
  - name: content-analysis
    path: common/07-content-analysis.yaml
    depends_on: [http-probe, web-crawl]

  # ===========================================================================
  # Phase 6: Service Scan & Backup
  # ===========================================================================
  - name: service-scan
    path: common/08-service-scan.yaml
    depends_on: [dns-resolve, http-probe]

  - name: scan-backup
    path: common/scan-backup.yaml
    depends_on: [http-probe, web-crawl]

  - name: scan-content
    path: common/scan-content.yaml
    depends_on: [http-probe, content-analysis, scan-backup]

  # ===========================================================================
  # Phase 7: Vulnerability Scan (先执行，确保 AI 分析有数据可用)
  # ===========================================================================
  - name: vuln-suite
    path: common/09-vuln-suite.yaml
    depends_on: [content-analysis, http-probe, dns-resolve, scan-content]

  # ===========================================================================
  # Phase 8: AI 预处理 (并行，依赖较早阶段数据，不阻塞 vuln-suite)
  # ===========================================================================

  # AI 技能库 - 在指纹识别后立即加载，为后续所有 AI 模块提供知识支撑
  - name: ai-skills-loader
    path: fragments/do-skills-system.yaml
    depends_on: [fingerprint]
    params:
      vulnTypes: "sql-injection,xss-testing,ssrf-testing,command-injection-testing,rce-testing,api-security"
    pre_condition: "{{enableLlmAnalysis}}"

  # AI 预扫描决策 - agent-acp 版本 (尽早产出优先级列表)
  - name: ai-pre-scan-decision
    path: fragments/do-ai-pre-scan-decision-acp.yaml
    depends_on: [subdomain, dns-resolve]
    pre_condition: "{{enablePreScanDecision}}"

  # AI 语义搜索 - 依赖指纹识别结果（需要 tech stack 数据）
  - name: ai-semantic-search
    path: fragments/do-ai-semantic-search.yaml
    depends_on: [fingerprint]
    pre_condition: "{{enableSemanticSearch}}"
    params:
      searchQuery: "SQL injection, XSS, RCE vulnerabilities and misconfigurations"

  # AI 实时 WAF 规避 - agent-acp 版本
  - name: ai-waf-bypass
    path: fragments/do-ai-waf-bypass-acp.yaml
    depends_on: [http-probe, fingerprint]
    pre_condition: "{{enableWafBypass}}"

  # ===========================================================================
  # Phase 9: AI 深度分析 (依赖 vuln-suite 输出)
  # ===========================================================================

  # AI 漏洞验证 - 依赖 vuln-suite 扫描结果 + skills 知识库
  - name: ai-vuln-validation
    path: fragments/do-ai-vuln-validation-acp.yaml
    depends_on: [vuln-suite, ai-skills-loader]
    pre_condition: "{{enableVulnValidation}}"

  # AI 攻击链分析 - 依赖 ai-vuln-validation 输出（确保使用验证后数据）
  - name: ai-attack-chain
    path: fragments/do-ai-attack-chain-acp.yaml
    depends_on: [ai-vuln-validation]
    pre_condition: "{{enableAttackChain}}"

  # AI 攻击链可视化 - 依赖攻击链分析输出
  - name: ai-attack-chain-viz
    path: fragments/do-attack-chain-visualization.yaml
    depends_on: [ai-attack-chain]
    pre_condition: "{{enableAttackChain}}"

  # AI 攻击路径规划 - 依赖攻击链分析输出
  - name: ai-path-planning
    path: fragments/do-ai-path-planning-acp.yaml
    depends_on: [ai-attack-chain]
    pre_condition: "{{enablePathPlanning}}"

  # AI 协调器 - 汇总所有 AI 分析结果，生成决策配置
  - name: ai-intelligent-analysis
    path: fragments/do-ai-intelligent-analysis.yaml
    depends_on: [ai-vuln-validation, ai-attack-chain, ai-path-planning, ai-semantic-search, ai-skills-loader]
    pre_condition: "{{enableLlmAnalysis}}"

  # AI 决策应用 - 将 intelligent-analysis 产出的决策配置写入环境
  - name: ai-apply-decision
    path: fragments/do-ai-apply-decision.yaml
    depends_on: [ai-intelligent-analysis]
    pre_condition: "{{enableLlmAnalysis}}"

  # ===========================================================================
  # Phase 10: Code Review
  # ===========================================================================
  - name: ai-code-review
    path: fragments/do-ai-code-review-acp.yaml
    depends_on: [vuln-suite]
    pre_condition: "{{enableLlmCodeReview}}"

  # ===========================================================================
  # Phase 11: AI 定向二次扫描 (基于 AI 决策结果)
  # ===========================================================================
  - name: ai-targeted-rescan
    path: fragments/do-ai-targeted-rescan.yaml
    depends_on: [ai-apply-decision]
    pre_condition: "{{enableLlmAnalysis}}"

  # ===========================================================================
  # Phase 12: Final Report
  # ===========================================================================
  - name: report
    path: common/10-report.yaml
    depends_on: [vuln-suite, ai-intelligent-analysis, ai-code-review, ai-targeted-rescan]
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 13: Knowledge Auto-Learning
  # ===========================================================================
  - name: ai-knowledge-autolearn
    path: fragments/do-ai-knowledge-autolearn.yaml
    depends_on: [report]
    pre_condition: "{{enableKnowledgeLearning}}"

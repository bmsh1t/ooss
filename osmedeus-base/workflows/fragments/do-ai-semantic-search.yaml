# =============================================================================
# AI 语义搜索模块 - 支持向量化和 API 调用
# =============================================================================
# 功能：
# - 调用外部 embeddings API (如 jina.ai) 进行向量化
# - 基于向量相似度搜索
# - 跨目标知识共享
# - 支持自然语言查询
# - 结果传递到后续 AI 模块
# =============================================================================

kind: module
name: ai-semantic-search
description: AI-powered semantic search with vector embeddings support

params:
  - name: semanticIndexDir
    default: "{{Output}}/ai-analysis/semantic-index"
  - name: searchResultsOutput
    default: "{{Output}}/ai-analysis/semantic-search-results-{{TargetSpace}}.json"
  - name: agentResultsOutput
    default: "{{Output}}/ai-analysis/semantic-agent-results-{{TargetSpace}}.json"
  - name: embeddingsOutput
    default: "{{Output}}/ai-analysis/semantic-embeddings-{{TargetSpace}}.json"
  - name: semanticHighlightsOutput
    default: "{{Output}}/ai-analysis/semantic-highlights-{{TargetSpace}}.json"
  - name: semanticPriorityTargetsOutput
    default: "{{Output}}/ai-analysis/semantic-priority-targets-{{TargetSpace}}.txt"
  - name: semanticPriorityVulnsOutput
    default: "{{Output}}/ai-analysis/semantic-priority-vulns-{{TargetSpace}}.json"
  - name: vectorSearchResultsOutput
    default: "{{Output}}/ai-analysis/vector-search-results-{{TargetSpace}}.json"
  - name: vectorKnowledgeSearchOutput
    default: "{{Output}}/ai-analysis/vector-kb-search-results-{{TargetSpace}}.json"
  - name: knowledgeSearchOutput
    default: "{{Output}}/ai-analysis/knowledge-search-results-{{TargetSpace}}.json"
  - name: skillsDir
    default: "{{OsmedeusBase}}/skills"
  - name: nucleiFile
    default: "{{Output}}/vulnscan/nuclei-jsonl-{{TargetSpace}}.txt"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"
  - name: subdomainFile
    default: "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"
  - name: appliedDecisionFile
    default: "{{Output}}/ai-analysis/applied-ai-decision-{{TargetSpace}}.json"
  - name: previousFollowupDecisionFile
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"
  - name: previous_followup_targets
    default: ""
  - name: previous_followup_priority_targets
    default: ""
  - name: previous_followup_focus_areas
    default: ""
  - name: previous_followup_manual_first_targets
    default: ""
  - name: previous_followup_high_confidence_targets
    default: ""
  - name: previous_followup_reasoning
    default: ""
  - name: previous_followup_scan_profile
    default: ""
  - name: previous_followup_severity
    default: ""
  - name: previous_followup_priority_mode
    default: ""
  - name: previous_followup_confidence_level
    default: ""
  - name: previous_followup_next_phase
    default: ""
  - name: previous_followup_reuse_sources
    default: ""
  - name: previous_followup_manual_followup_needed
    default: ""
  - name: previous_followup_campaign_followup_recommended
    default: ""
  - name: previous_followup_queue_followup_effective
    default: ""
  - name: previous_followup_escalation_score
    default: ""
  - name: previous_followup_campaign_create_status
    default: ""
  - name: previous_followup_campaign_create_id
    default: ""
  - name: previous_followup_campaign_create_queued_runs
    default: ""
  - name: confirmedUrlsFile
    default: "{{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt"
  - name: entryPointsFile
    default: "{{Output}}/ai-analysis/entry-points-{{TargetSpace}}.txt"
  - name: bestPathTargetsFile
    default: "{{Output}}/ai-analysis/best-path-targets-{{TargetSpace}}.txt"
  - name: semanticPriorityTargetsInput
    default: "{{Output}}/ai-analysis/semantic-priority-targets-{{TargetSpace}}.txt"
  - name: fallbackSemanticPriorityTargetsInput
    default: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"
  - name: secondFallbackSemanticPriorityTargetsInput
    default: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
  - name: thirdFallbackSemanticPriorityTargetsInput
    default: "{{Output}}/ai-analysis/semantic-priority-targets-early-{{TargetSpace}}.txt"
  - name: knowledgeWorkspace
    default: "{{TargetSpace}}"
  - name: sharedKnowledgeWorkspace
    default: ""
  - name: globalKnowledgeWorkspace
    default: "global"
  - name: knowledgeIndexFile
    default: "{{semanticIndexDir}}/knowledge-index.txt"
  - name: vectorCorpusFile
    default: "{{semanticIndexDir}}/vector-corpus.txt"
  - name: vectorEmbeddingsInput
    default: "{{semanticIndexDir}}/vector-embed-input.txt"
  - name: resolvedSearchQueryOutput
    default: "{{semanticIndexDir}}/resolved-search-query.txt"
  - name: searchQueryContextOutput
    default: "{{semanticIndexDir}}/resolved-search-query-context.json"
  - name: searchStage
    default: "auto"

  # Embeddings API 配置
  - name: enableSemanticSearch
    type: bool
    default: true
  - name: useVectorSearch
    type: bool
    default: true
    description: "Use vectorkb semantic retrieval"
  
  # Optional vectorkb provider/model overrides.
  - name: embeddingsProvider
    type: string
    default: ""
    description: "Optional provider override; empty uses knowledge_vector.default_provider"
  - name: embeddingsModel
    type: string
    default: ""
    description: "Optional model override; empty uses knowledge_vector.default_model"
  
  - name: indexExistingData
    type: bool
    default: true
    description: "Index existing scan data for semantic search"
  - name: includeKnowledgeBase
    type: bool
    default: true
    description: "Include imported and learned knowledge-base chunks in semantic search"
  - name: useVectorKnowledgeDB
    type: bool
    default: true
    description: "Prefer direct search against vector-kb.sqlite before keyword fallback"
  - name: maxKnowledgeChunks
    type: integer
    default: 200
    description: "Maximum knowledge chunks exported into the vector corpus"
  - name: maxSearchResults
    type: integer
    default: 10
  - name: minRelevanceScore
    type: float
    default: 0.7
    description: "Minimum relevance score for filtering results"
  - name: searchQuery
    type: string
    default: "SQL injection vulnerabilities"
    description: "Semantic search query (supports natural language)"

steps:
  - name: prepare-semantic-index
    type: function
    pre_condition: "{{enableSemanticSearch}}"
    log: "Preparing semantic search index"
    functions:
      - 'create_folder("{{semanticIndexDir}}")'
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'log_info("Starting semantic search for {{Target}}")'

  - name: load-embeddings-config
    type: function
    pre_condition: "{{enableSemanticSearch}} && {{useVectorSearch}}"
    log: "Loading embeddings configuration"
    functions:
      - 'log_info("Embeddings provider override: {{embeddingsProvider}}")'
      - 'log_info("Embeddings model override: {{embeddingsModel}}")'
      - 'log_info("Semantic vector retrieval uses kb vector search with optional provider/model overrides")'

  - name: check-semantic-data
    type: bash
    pre_condition: "{{enableSemanticSearch}}"
    command: |
      echo "[INFO] [Semantic Search] Checking data availability..."
      
      # 检查索引数据
      HTTP_COUNT=0
      SUBDOMAIN_COUNT=0
      FINGERPRINT_SIZE=0
      
      if [ -f "{{httpFile}}" ]; then
        HTTP_COUNT=$(wc -l < "{{httpFile}}" 2>/dev/null || echo 0)
      fi
      if [ -f "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt" ]; then
        SUBDOMAIN_COUNT=$(wc -l < "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt" 2>/dev/null || echo 0)
      fi
      if [ -f "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl" ]; then
        FINGERPRINT_SIZE=$(wc -c < "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl" 2>/dev/null || echo 0)
      fi
      
      echo "[INFO] [Semantic Search] Data check: http=$HTTP_COUNT, subdomains=$SUBDOMAIN_COUNT, fingerprint=$FINGERPRINT_SIZE bytes"
      
      # 如果数据太少，给出警告但继续执行
      if [ "$HTTP_COUNT" -lt 10 ]; then
        echo "[WARN] [Semantic Search] Low HTTP count ($HTTP_COUNT), semantic search may have limited results"
      fi

  - name: resolve-search-query
    type: bash
    pre_condition: "{{enableSemanticSearch}}"
    command: |
      mkdir -p {{semanticIndexDir}}

      BASE_QUERY="{{searchQuery}}"
      STAGE="{{searchStage}}"
      OUTPUT_HINT="{{searchResultsOutput}}"
      NUCLEI_COUNT=$(wc -l < "{{nucleiFile}}" 2>/dev/null || echo 0)

      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      sanitize_hint_text() {
        printf '%s' "$1" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//' | cut -c1-120
      }

      normalize_int() {
        value="$1"
        case "$value" in
          ''|*[!0-9]*)
            echo 0
            ;;
          *)
            echo "$value"
            ;;
        esac
      }

      normalize_bool() {
        value=$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')
        case "$value" in
          1|true|yes|y|on)
            echo true
            ;;
          *)
            echo false
            ;;
        esac
      }

      csv_or_json_to_array() {
        value="$1"
        if [ -z "$value" ]; then
          echo '[]'
        elif printf '%s' "$value" | jq -e 'type == "array"' >/dev/null 2>&1; then
          printf '%s' "$value"
        else
          printf '%s' "$value" | jq -R 'split(",") | reduce .[] as $item ([]; ($item | gsub("^\\s+|\\s+$"; "")) as $normalized | if ($normalized != "" and (index($normalized) == null)) then . + [$normalized] else . end)'
        fi
      }

      ACTIVE_SEMANTIC_PRIORITY_INPUT="{{semanticPriorityTargetsInput}}"
      for candidate in "{{semanticPriorityTargetsInput}}" "{{fallbackSemanticPriorityTargetsInput}}" "{{secondFallbackSemanticPriorityTargetsInput}}" "{{thirdFallbackSemanticPriorityTargetsInput}}"; do
        [ -n "$candidate" ] || continue
        if text_has_lines "$candidate"; then
          ACTIVE_SEMANTIC_PRIORITY_INPUT="$candidate"
          break
        fi
      done

      if [ "$STAGE" = "auto" ] || [ -z "$STAGE" ]; then
        case "$OUTPUT_HINT" in
          *decision-followup*|*decision*)
            STAGE="decision-followup"
            ;;
          *post-vuln*)
            STAGE="post-vuln"
            ;;
          *early*)
            STAGE="early"
            ;;
          *)
            if [ "$NUCLEI_COUNT" -gt 20 ] 2>/dev/null; then
              STAGE="post-vuln"
            else
              STAGE="early"
            fi
            ;;
        esac
      fi

      PREV_AVAILABLE=false
      PREV_SOURCE_KIND="none"
      PREV_TARGET_COUNT=0
      PREV_PRIORITY_COUNT=0
      PREV_FOCUS_COUNT=0
      PREV_MANUAL_COUNT=0
      PREV_HIGH_CONFIDENCE_COUNT=0
      PREV_REASONING=""
      PREV_REASONING_HINT=""
      PREV_SCAN_PROFILE=""
      PREV_SEVERITY=""
      PREV_PRIORITY_MODE=""
      PREV_CONFIDENCE_LEVEL=""
      PREV_NEXT_PHASE=""
      PREV_REUSE_SOURCES_JSON='[]'
      PREV_MANUAL_FOLLOWUP_NEEDED=false
      PREV_CAMPAIGN_FOLLOWUP_RECOMMENDED=false
      PREV_QUEUE_FOLLOWUP_EFFECTIVE=false
      PREV_ESCALATION_SCORE=0
      PREV_CAMPAIGN_CREATE_STATUS=""
      PREV_CAMPAIGN_CREATE_ID=""
      PREV_CAMPAIGN_CREATE_QUEUED_RUNS=0

      if [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
        PREV_AVAILABLE=true
        PREV_SOURCE_KIND="decision-file"
        PREV_TARGET_COUNT=$(jq -r '[((.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_critical_targets // []) + (.seed_targets.rescan_high_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.rescan_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_PRIORITY_COUNT=$(jq -r '[((.seed_targets.priority_targets // .refined_targets.priority_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_FOCUS_COUNT=$(jq -r '[((.seed_targets.focus_areas // .refined_targets.focus_areas // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_MANUAL_COUNT=$(jq -r '[((.seed_targets.manual_first_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_HIGH_CONFIDENCE_COUNT=$(jq -r '[((.seed_targets.high_confidence_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_REASONING=$(jq -r '.seed_focus.reasoning // .base_decision.reasoning // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_SCAN_PROFILE=$(jq -r '.seed_focus.scan_profile // .base_decision.profile // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_SEVERITY=$(jq -r '.seed_focus.severity // .base_decision.severity // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_PRIORITY_MODE=$(jq -r '.seed_focus.priority_mode // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CONFIDENCE_LEVEL=$(jq -r '.seed_focus.confidence_level // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_NEXT_PHASE=$(jq -r '.seed_focus.next_phase // .execution_feedback.next_phase // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_REUSE_SOURCES_JSON=$(jq -c '.seed_focus.reuse_sources // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_MANUAL_FOLLOWUP_NEEDED=$(jq -r '.seed_focus.manual_followup_needed // .execution_feedback.manual_followup_needed // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_CAMPAIGN_FOLLOWUP_RECOMMENDED=$(jq -r '.seed_focus.campaign_followup_recommended // .execution_feedback.campaign_followup_recommended // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_QUEUE_FOLLOWUP_EFFECTIVE=$(jq -r '.seed_focus.queue_followup_effective // .execution_feedback.queue_followup_effective // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_ESCALATION_SCORE=$(jq -r '.seed_focus.signal_scores.escalation_score // 0' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_CAMPAIGN_CREATE_STATUS=$(jq -r '.followup_summary.campaign_create_status // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CAMPAIGN_CREATE_ID=$(jq -r '.followup_summary.campaign_create_id // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.followup_summary.campaign_create_queued_runs // 0' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
      else
        PREV_PARAM_TARGET_COUNT=$(normalize_int "{{previous_followup_targets}}")
        PREV_PARAM_PRIORITY_COUNT=$(normalize_int "{{previous_followup_priority_targets}}")
        PREV_PARAM_FOCUS_COUNT=$(normalize_int "{{previous_followup_focus_areas}}")
        PREV_PARAM_MANUAL_COUNT=$(normalize_int "{{previous_followup_manual_first_targets}}")
        PREV_PARAM_HIGH_CONFIDENCE_COUNT=$(normalize_int "{{previous_followup_high_confidence_targets}}")
        PREV_PARAM_REASONING="{{previous_followup_reasoning}}"
        PREV_PARAM_SCAN_PROFILE="{{previous_followup_scan_profile}}"
        PREV_PARAM_SEVERITY="{{previous_followup_severity}}"
        PREV_PARAM_PRIORITY_MODE="{{previous_followup_priority_mode}}"
        PREV_PARAM_CONFIDENCE_LEVEL="{{previous_followup_confidence_level}}"
        PREV_PARAM_NEXT_PHASE="{{previous_followup_next_phase}}"
        PREV_PARAM_REUSE_SOURCES_JSON=$(csv_or_json_to_array "{{previous_followup_reuse_sources}}")
        PREV_PARAM_MANUAL_FOLLOWUP_NEEDED=$(normalize_bool "{{previous_followup_manual_followup_needed}}")
        PREV_PARAM_CAMPAIGN_FOLLOWUP_RECOMMENDED=$(normalize_bool "{{previous_followup_campaign_followup_recommended}}")
        PREV_PARAM_QUEUE_FOLLOWUP_EFFECTIVE=$(normalize_bool "{{previous_followup_queue_followup_effective}}")
        PREV_PARAM_ESCALATION_SCORE=$(normalize_int "{{previous_followup_escalation_score}}")
        PREV_PARAM_CAMPAIGN_CREATE_STATUS="{{previous_followup_campaign_create_status}}"
        PREV_PARAM_CAMPAIGN_CREATE_ID="{{previous_followup_campaign_create_id}}"
        PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS=$(normalize_int "{{previous_followup_campaign_create_queued_runs}}")

        if [ "$PREV_PARAM_TARGET_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_PRIORITY_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_FOCUS_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_MANUAL_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_HIGH_CONFIDENCE_COUNT" -gt 0 ] 2>/dev/null \
          || [ -n "$PREV_PARAM_REASONING" ] \
          || [ -n "$PREV_PARAM_SCAN_PROFILE" ] \
          || [ -n "$PREV_PARAM_SEVERITY" ] \
          || [ -n "$PREV_PARAM_PRIORITY_MODE" ] \
          || [ -n "$PREV_PARAM_CONFIDENCE_LEVEL" ] \
          || [ -n "$PREV_PARAM_NEXT_PHASE" ] \
          || [ "$PREV_PARAM_MANUAL_FOLLOWUP_NEEDED" = "true" ] \
          || [ "$PREV_PARAM_CAMPAIGN_FOLLOWUP_RECOMMENDED" = "true" ] \
          || [ "$PREV_PARAM_QUEUE_FOLLOWUP_EFFECTIVE" = "true" ] \
          || [ "$PREV_PARAM_ESCALATION_SCORE" -gt 0 ] 2>/dev/null \
          || [ -n "$PREV_PARAM_CAMPAIGN_CREATE_STATUS" ] \
          || [ -n "$PREV_PARAM_CAMPAIGN_CREATE_ID" ] \
          || [ "$PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS" -gt 0 ] 2>/dev/null; then
          PREV_AVAILABLE=true
          PREV_SOURCE_KIND="queue-params"
          PREV_TARGET_COUNT="$PREV_PARAM_TARGET_COUNT"
          PREV_PRIORITY_COUNT="$PREV_PARAM_PRIORITY_COUNT"
          PREV_FOCUS_COUNT="$PREV_PARAM_FOCUS_COUNT"
          PREV_MANUAL_COUNT="$PREV_PARAM_MANUAL_COUNT"
          PREV_HIGH_CONFIDENCE_COUNT="$PREV_PARAM_HIGH_CONFIDENCE_COUNT"
          PREV_REASONING="$PREV_PARAM_REASONING"
          PREV_SCAN_PROFILE="$PREV_PARAM_SCAN_PROFILE"
          PREV_SEVERITY="$PREV_PARAM_SEVERITY"
          PREV_PRIORITY_MODE="$PREV_PARAM_PRIORITY_MODE"
          PREV_CONFIDENCE_LEVEL="$PREV_PARAM_CONFIDENCE_LEVEL"
          PREV_NEXT_PHASE="$PREV_PARAM_NEXT_PHASE"
          PREV_REUSE_SOURCES_JSON="$PREV_PARAM_REUSE_SOURCES_JSON"
          PREV_MANUAL_FOLLOWUP_NEEDED="$PREV_PARAM_MANUAL_FOLLOWUP_NEEDED"
          PREV_CAMPAIGN_FOLLOWUP_RECOMMENDED="$PREV_PARAM_CAMPAIGN_FOLLOWUP_RECOMMENDED"
          PREV_QUEUE_FOLLOWUP_EFFECTIVE="$PREV_PARAM_QUEUE_FOLLOWUP_EFFECTIVE"
          PREV_ESCALATION_SCORE="$PREV_PARAM_ESCALATION_SCORE"
          PREV_CAMPAIGN_CREATE_STATUS="$PREV_PARAM_CAMPAIGN_CREATE_STATUS"
          PREV_CAMPAIGN_CREATE_ID="$PREV_PARAM_CAMPAIGN_CREATE_ID"
          PREV_CAMPAIGN_CREATE_QUEUED_RUNS="$PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS"
        fi
      fi

      PREV_REASONING_HINT=$(sanitize_hint_text "$PREV_REASONING")

      tech_hints() {
        [ -f "{{fingerprintFile}}" ] || return 0
        jq -r '(.tech[]?, .technologies[]?, .techs[]?, .webserver?, .server?, .framework?, .title?) // empty' "{{fingerprintFile}}" 2>/dev/null \
          | awk 'NF {print tolower($0)}' \
          | sed 's/[^a-z0-9.+#_-]/ /g' \
          | awk 'NF {print}' \
          | awk '!seen[$0]++' \
          | head -8 \
          | jq -R -s 'split("\n") | map(select(length > 0)) | join(", ")' -r
      }

      interesting_targets() {
        {
          [ -f "{{appliedDecisionFile}}" ] && jq -r '.targets.focus_areas[]?, .targets.priority_targets[]?, .targets.rescan_targets[]?' "{{appliedDecisionFile}}" 2>/dev/null || true
          if [ -f "{{previousFollowupDecisionFile}}" ]; then
            jq -r '.seed_targets.focus_areas[]?, .seed_targets.priority_targets[]?, .seed_targets.rescan_targets[]?, .seed_targets.manual_first_targets[]?, .seed_targets.high_confidence_targets[]?, .seed_targets.rescan_critical_targets[]?, .seed_targets.rescan_high_targets[]?, .seed_targets.confirmed_targets[]?, .seed_targets.semantic_targets[]?' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.refined_targets.focus_areas[]?, .refined_targets.priority_targets[]?' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
          fi
          [ -f "{{confirmedUrlsFile}}" ] && head -20 "{{confirmedUrlsFile}}" 2>/dev/null || true
          [ -f "{{entryPointsFile}}" ] && head -15 "{{entryPointsFile}}" 2>/dev/null || true
          [ -f "{{bestPathTargetsFile}}" ] && head -15 "{{bestPathTargetsFile}}" 2>/dev/null || true
          [ -f "$ACTIVE_SEMANTIC_PRIORITY_INPUT" ] && head -15 "$ACTIVE_SEMANTIC_PRIORITY_INPUT" 2>/dev/null || true
          [ -f "{{httpFile}}" ] && grep -E 'admin|login|signin|auth|oauth|sso|jwt|api|graphql|swagger|openapi|upload|import|export|file|redirect|callback|webhook|ws' "{{httpFile}}" 2>/dev/null | head -20 || true
          [ -f "{{subdomainFile}}" ] && grep -E 'admin|api|auth|internal|dev|staging|gateway|graphql|vpn|sso' "{{subdomainFile}}" 2>/dev/null | head -15 || true
        } | awk 'NF && !seen[$0]++' | head -12 | jq -R -s 'split("\n") | map(select(length > 0)) | join(", ")' -r
      }

      focus_terms() {
        {
          [ -f "{{appliedDecisionFile}}" ] && jq -r '.targets.focus_areas[]?, .targets.priority_targets[]?' "{{appliedDecisionFile}}" 2>/dev/null || true
          if [ -f "{{previousFollowupDecisionFile}}" ]; then
            jq -r '.seed_targets.focus_areas[]?, .seed_targets.priority_targets[]?, .seed_targets.manual_first_targets[]?, .seed_targets.high_confidence_targets[]?, .seed_targets.semantic_targets[]?' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.refined_targets.focus_areas[]?, .refined_targets.priority_targets[]?' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
          fi
          if [ "$PREV_AVAILABLE" = "true" ]; then
            [ -n "$PREV_NEXT_PHASE" ] && printf '%s\n' "$PREV_NEXT_PHASE"
            [ -n "$PREV_PRIORITY_MODE" ] && printf '%s\n' "$PREV_PRIORITY_MODE"
            [ -n "$PREV_CONFIDENCE_LEVEL" ] && printf '%s\n' "$PREV_CONFIDENCE_LEVEL"
            [ -n "$PREV_REASONING_HINT" ] && printf '%s\n' "$PREV_REASONING_HINT"
          fi
        } | awk 'NF && !seen[$0]++' \
          | head -8 \
          | jq -R -s 'split("\n") | map(select(length > 0)) | join(", ")' -r
      }

      decision_directives() {
        {
          [ -f "{{appliedDecisionFile}}" ] && jq -r '
            [
              .scan.profile // empty,
              .scan.severity // empty,
              (if .directives.use_ai_guided_nuclei == true then "ai-guided-nuclei" else empty end),
              (if .directives.use_focus_targets == true then "focus-targets" else empty end),
              (if .directives.use_rescan_targets == true then "rescan-targets" else empty end),
              (if .directives.enable_manual_followup == true then "manual-followup" else empty end)
            ] | .[]
          ' "{{appliedDecisionFile}}" 2>/dev/null || true
          if [ "$PREV_AVAILABLE" = "true" ]; then
            [ -n "$PREV_SCAN_PROFILE" ] && printf '%s\n' "$PREV_SCAN_PROFILE"
            [ -n "$PREV_SEVERITY" ] && printf '%s\n' "$PREV_SEVERITY"
            [ -n "$PREV_NEXT_PHASE" ] && printf '%s\n' "$PREV_NEXT_PHASE"
            [ -n "$PREV_PRIORITY_MODE" ] && printf '%s\n' "$PREV_PRIORITY_MODE"
            [ -n "$PREV_CONFIDENCE_LEVEL" ] && printf '%s\n' "$PREV_CONFIDENCE_LEVEL"
            [ "$PREV_SOURCE_KIND" != "none" ] && printf '%s\n' "previous-followup-$PREV_SOURCE_KIND"
            [ "$PREV_TARGET_COUNT" -gt 0 ] 2>/dev/null && printf '%s\n' "followup-targets-$PREV_TARGET_COUNT"
            [ "$PREV_PRIORITY_COUNT" -gt 0 ] 2>/dev/null && printf '%s\n' "followup-priority-$PREV_PRIORITY_COUNT"
            [ "$PREV_FOCUS_COUNT" -gt 0 ] 2>/dev/null && printf '%s\n' "followup-focus-$PREV_FOCUS_COUNT"
            [ "$PREV_MANUAL_COUNT" -gt 0 ] 2>/dev/null && printf '%s\n' "manual-first-targets-$PREV_MANUAL_COUNT"
            [ "$PREV_HIGH_CONFIDENCE_COUNT" -gt 0 ] 2>/dev/null && printf '%s\n' "high-confidence-targets-$PREV_HIGH_CONFIDENCE_COUNT"
            printf '%s\n' "$PREV_REUSE_SOURCES_JSON" | jq -r '.[]? | select(. != null and . != "") | "reuse-" + tostring' 2>/dev/null || true
            [ "${PREV_ESCALATION_SCORE:-0}" -gt 0 ] 2>/dev/null && printf '%s\n' "escalation-$PREV_ESCALATION_SCORE"
            [ "$PREV_MANUAL_FOLLOWUP_NEEDED" = "true" ] && printf '%s\n' "manual-followup"
            [ "$PREV_CAMPAIGN_FOLLOWUP_RECOMMENDED" = "true" ] && printf '%s\n' "campaign-followup"
            [ "$PREV_QUEUE_FOLLOWUP_EFFECTIVE" = "true" ] && printf '%s\n' "queue-followup"
            [ -n "$PREV_CAMPAIGN_CREATE_STATUS" ] && printf '%s\n' "campaign-create-$PREV_CAMPAIGN_CREATE_STATUS"
            [ "$PREV_CAMPAIGN_CREATE_QUEUED_RUNS" -gt 0 ] 2>/dev/null && printf '%s\n' "campaign-queued-runs-$PREV_CAMPAIGN_CREATE_QUEUED_RUNS"
          fi
        } | awk 'NF && !seen[$0]++' \
          | jq -R -s 'split("\n") | map(select(length > 0)) | join(", ")' -r
      }

      TECH_HINTS=$(tech_hints)
      TARGET_HINTS=$(interesting_targets)
      FOCUS_HINTS=$(focus_terms)
      DECISION_HINTS=$(decision_directives)

      case "$STAGE" in
        post-vuln)
          RESOLVED_QUERY="confirmed findings, exploit chain, auth bypass, privilege escalation, idor, file upload, token/session abuse, manual exploitation, retest payloads, evidence capture, campaign handoff"
          ;;
        decision-followup)
          RESOLVED_QUERY="applied ai decision, prioritized retest targets, operator queue tasks, campaign handoff, targeted rescan guidance, manual exploitation, auth bypass, privilege escalation, idor, file upload, business logic abuse, evidence capture"
          ;;
        *)
          RESOLVED_QUERY="admin panels, authentication flows, high-value endpoints, exposed services, api routes, graphql, swagger, file handling, business logic entry points, tech-specific exploitation ideas"
          ;;
      esac

      if [ -n "$BASE_QUERY" ]; then
        RESOLVED_QUERY="$BASE_QUERY | $RESOLVED_QUERY"
      fi
      if [ -n "$TECH_HINTS" ]; then
        RESOLVED_QUERY="$RESOLVED_QUERY | technologies: $TECH_HINTS"
      fi
      if [ -n "$DECISION_HINTS" ]; then
        RESOLVED_QUERY="$RESOLVED_QUERY | decision: $DECISION_HINTS"
      fi
      if [ -n "$PREV_REASONING_HINT" ]; then
        RESOLVED_QUERY="$RESOLVED_QUERY | previous reasoning: $PREV_REASONING_HINT"
      fi
      if [ -n "$FOCUS_HINTS" ]; then
        RESOLVED_QUERY="$RESOLVED_QUERY | ai focus: $FOCUS_HINTS"
      fi
      if [ -n "$TARGET_HINTS" ]; then
        RESOLVED_QUERY="$RESOLVED_QUERY | candidate targets: $TARGET_HINTS"
      fi

      RESOLVED_QUERY=$(printf '%s' "$RESOLVED_QUERY" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
      QUERY_LENGTH=$(printf '%s' "$RESOLVED_QUERY" | wc -c | tr -d ' ')
      if [ "${QUERY_LENGTH:-0}" -gt 900 ] 2>/dev/null; then
        RESOLVED_QUERY=$(printf '%s' "$RESOLVED_QUERY" | cut -c1-900)
      fi

      printf '%s\n' "$RESOLVED_QUERY" > "{{resolvedSearchQueryOutput}}"

      jq -n \
        --arg stage "$STAGE" \
        --arg base_query "$BASE_QUERY" \
        --arg resolved_query "$RESOLVED_QUERY" \
        --arg technologies "$TECH_HINTS" \
        --arg decision_hints "$DECISION_HINTS" \
        --arg candidate_targets "$TARGET_HINTS" \
        --arg focus_targets "$FOCUS_HINTS" \
        --argjson previous_followup_available "$PREV_AVAILABLE" \
        --arg previous_followup_source_kind "$PREV_SOURCE_KIND" \
        --argjson previous_followup_targets "$PREV_TARGET_COUNT" \
        --argjson previous_followup_priority_targets "$PREV_PRIORITY_COUNT" \
        --argjson previous_followup_focus_areas "$PREV_FOCUS_COUNT" \
        --argjson previous_followup_manual_first_targets "$PREV_MANUAL_COUNT" \
        --argjson previous_followup_high_confidence_targets "$PREV_HIGH_CONFIDENCE_COUNT" \
        --arg previous_followup_reasoning "$PREV_REASONING" \
        --arg previous_followup_scan_profile "$PREV_SCAN_PROFILE" \
        --arg previous_followup_severity "$PREV_SEVERITY" \
        --arg previous_followup_priority_mode "$PREV_PRIORITY_MODE" \
        --arg previous_followup_confidence_level "$PREV_CONFIDENCE_LEVEL" \
        --arg previous_followup_next_phase "$PREV_NEXT_PHASE" \
        --argjson previous_followup_reuse_sources "$PREV_REUSE_SOURCES_JSON" \
        --argjson previous_followup_manual_followup_needed "$PREV_MANUAL_FOLLOWUP_NEEDED" \
        --argjson previous_followup_campaign_followup_recommended "$PREV_CAMPAIGN_FOLLOWUP_RECOMMENDED" \
        --argjson previous_followup_queue_followup_effective "$PREV_QUEUE_FOLLOWUP_EFFECTIVE" \
        --argjson previous_followup_escalation_score "$PREV_ESCALATION_SCORE" \
        --arg previous_followup_campaign_create_status "$PREV_CAMPAIGN_CREATE_STATUS" \
        --arg previous_followup_campaign_create_id "$PREV_CAMPAIGN_CREATE_ID" \
        --argjson previous_followup_campaign_create_queued_runs "$PREV_CAMPAIGN_CREATE_QUEUED_RUNS" \
        --argjson nuclei_count "$NUCLEI_COUNT" \
        '{
          stage: $stage,
          base_query: $base_query,
          resolved_query: $resolved_query,
          technologies: (if $technologies == "" then [] else ($technologies | split(", ") | map(select(length > 0))) end),
          decision_hints: (if $decision_hints == "" then [] else ($decision_hints | split(", ") | map(select(length > 0))) end),
          candidate_targets: (if $candidate_targets == "" then [] else ($candidate_targets | split(", ") | map(select(length > 0))) end),
          focus_targets: (if $focus_targets == "" then [] else ($focus_targets | split(", ") | map(select(length > 0))) end),
          previous_followup_available: $previous_followup_available,
          previous_followup_source_kind: $previous_followup_source_kind,
          previous_followup_targets: $previous_followup_targets,
          previous_followup_priority_targets: $previous_followup_priority_targets,
          previous_followup_focus_areas: $previous_followup_focus_areas,
          previous_followup_manual_first_targets: $previous_followup_manual_first_targets,
          previous_followup_high_confidence_targets: $previous_followup_high_confidence_targets,
          previous_followup_reasoning: $previous_followup_reasoning,
          previous_followup_scan_profile: $previous_followup_scan_profile,
          previous_followup_severity: $previous_followup_severity,
          previous_followup_priority_mode: $previous_followup_priority_mode,
          previous_followup_confidence_level: $previous_followup_confidence_level,
          previous_followup_next_phase: $previous_followup_next_phase,
          previous_followup_reuse_sources: $previous_followup_reuse_sources,
          previous_followup_manual_followup_needed: $previous_followup_manual_followup_needed,
          previous_followup_campaign_followup_recommended: $previous_followup_campaign_followup_recommended,
          previous_followup_queue_followup_effective: $previous_followup_queue_followup_effective,
          previous_followup_escalation_score: $previous_followup_escalation_score,
          previous_followup_campaign_create_status: $previous_followup_campaign_create_status,
          previous_followup_campaign_create_id: $previous_followup_campaign_create_id,
          previous_followup_campaign_create_queued_runs: $previous_followup_campaign_create_queued_runs,
          nuclei_count: $nuclei_count
        }' > "{{searchQueryContextOutput}}"

      echo "[Semantic] Query stage: $STAGE"
      echo "[Semantic] Resolved query: $RESOLVED_QUERY"

  - name: export-knowledge-corpus
    type: bash
    pre_condition: "{{enableSemanticSearch}} && {{includeKnowledgeBase}}"
    command: |
      mkdir -p {{semanticIndexDir}}
      mkdir -p "{{semanticIndexDir}}/logs"
      : > "{{knowledgeIndexFile}}"

      OSM_BIN=$(command -v osmedeus 2>/dev/null || true)
      if [ -z "$OSM_BIN" ] && [ -x "/root/.local/bin/osmedeus" ]; then
        OSM_BIN="/root/.local/bin/osmedeus"
      fi

      if [ -z "$OSM_BIN" ]; then
        echo "[Semantic] osmedeus binary not found, skipping knowledge corpus export"
        exit 0
      fi

      PRIMARY_WORKSPACE="{{knowledgeWorkspace}}"
      SHARED_WORKSPACE="{{sharedKnowledgeWorkspace}}"
      GLOBAL_WORKSPACE="{{globalKnowledgeWorkspace}}"
      PRIMARY_TMP="{{semanticIndexDir}}/.knowledge-primary.txt"
      SHARED_TMP="{{semanticIndexDir}}/.knowledge-shared.txt"
      GLOBAL_TMP="{{semanticIndexDir}}/.knowledge-global.txt"
      PRIMARY_LOG="{{semanticIndexDir}}/logs/semantic-kb-export-primary.log"
      SHARED_LOG="{{semanticIndexDir}}/logs/semantic-kb-export-shared.log"
      GLOBAL_LOG="{{semanticIndexDir}}/logs/semantic-kb-export-global.log"
      : > "$PRIMARY_TMP"
      : > "$SHARED_TMP"
      : > "$GLOBAL_TMP"
      : > "$PRIMARY_LOG"
      : > "$SHARED_LOG"
      : > "$GLOBAL_LOG"

      "$OSM_BIN" kb export \
        -w "$PRIMARY_WORKSPACE" \
        --limit {{maxKnowledgeChunks}} \
        --output "$PRIMARY_TMP" >"$PRIMARY_LOG" 2>&1 || true

      if [ -n "$SHARED_WORKSPACE" ] && [ "$SHARED_WORKSPACE" != "$PRIMARY_WORKSPACE" ]; then
        "$OSM_BIN" kb export \
          -w "$SHARED_WORKSPACE" \
          --limit {{maxKnowledgeChunks}} \
          --output "$SHARED_TMP" >"$SHARED_LOG" 2>&1 || true
      fi

      if [ -n "$GLOBAL_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$PRIMARY_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$SHARED_WORKSPACE" ]; then
        "$OSM_BIN" kb export \
          -w "$GLOBAL_WORKSPACE" \
          --limit {{maxKnowledgeChunks}} \
          --output "$GLOBAL_TMP" >"$GLOBAL_LOG" 2>&1 || true
      fi

      cat "$PRIMARY_TMP" "$SHARED_TMP" "$GLOBAL_TMP" 2>/dev/null | awk 'NF && !seen[$0]++' > "{{knowledgeIndexFile}}" || true

      KB_LINES=$(wc -l < "{{knowledgeIndexFile}}" 2>/dev/null || echo 0)
      echo "[Semantic] Knowledge corpus exported: $KB_LINES chunks"

  - name: search-knowledge-db
    type: bash
    pre_condition: "{{enableSemanticSearch}} && {{includeKnowledgeBase}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      mkdir -p "{{semanticIndexDir}}/logs"
      QUERY_FILE="{{resolvedSearchQueryOutput}}"
      RESOLVED_QUERY="{{searchQuery}}"
      if [ -f "$QUERY_FILE" ] && [ -s "$QUERY_FILE" ]; then
        RESOLVED_QUERY=$(tr '\n' ' ' < "$QUERY_FILE" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
      fi
      echo '[]' > "{{knowledgeSearchOutput}}"
      echo '[]' > "{{vectorKnowledgeSearchOutput}}"
      jq -n --arg query "$RESOLVED_QUERY" '{status:"success",query:$query,provider:"config-default",total_results:0,results:[]}' > "{{vectorSearchResultsOutput}}"

      OSM_BIN=$(command -v osmedeus 2>/dev/null || true)
      if [ -z "$OSM_BIN" ] && [ -x "/root/.local/bin/osmedeus" ]; then
        OSM_BIN="/root/.local/bin/osmedeus"
      fi

      if [ -z "$OSM_BIN" ]; then
        echo "[Semantic] osmedeus binary not found, skipping knowledge DB search"
        exit 0
      fi

      PRIMARY_WORKSPACE="{{knowledgeWorkspace}}"
      SHARED_WORKSPACE="{{sharedKnowledgeWorkspace}}"
      GLOBAL_WORKSPACE="{{globalKnowledgeWorkspace}}"
      PRIMARY_VECTOR_JSON="{{semanticIndexDir}}/.knowledge-vector-primary.json"
      SHARED_VECTOR_JSON="{{semanticIndexDir}}/.knowledge-vector-shared.json"
      GLOBAL_VECTOR_JSON="{{semanticIndexDir}}/.knowledge-vector-global.json"
      PRIMARY_JSON="{{semanticIndexDir}}/.knowledge-search-primary.json"
      SHARED_JSON="{{semanticIndexDir}}/.knowledge-search-shared.json"
      GLOBAL_JSON="{{semanticIndexDir}}/.knowledge-search-global.json"
      PRIMARY_VECTOR_LOG="{{semanticIndexDir}}/logs/semantic-kb-vector-search-primary.log"
      SHARED_VECTOR_LOG="{{semanticIndexDir}}/logs/semantic-kb-vector-search-shared.log"
      GLOBAL_VECTOR_LOG="{{semanticIndexDir}}/logs/semantic-kb-vector-search-global.log"
      PRIMARY_SEARCH_LOG="{{semanticIndexDir}}/logs/semantic-kb-search-primary.log"
      SHARED_SEARCH_LOG="{{semanticIndexDir}}/logs/semantic-kb-search-shared.log"
      GLOBAL_SEARCH_LOG="{{semanticIndexDir}}/logs/semantic-kb-search-global.log"
      VECTOR_PROVIDER="{{embeddingsProvider}}"
      VECTOR_MODEL="{{embeddingsModel}}"
      VECTOR_PROVIDER_LABEL="$VECTOR_PROVIDER"
      if [ -z "$VECTOR_PROVIDER_LABEL" ]; then
        VECTOR_PROVIDER_LABEL="config-default"
      fi
      : > "$PRIMARY_VECTOR_LOG"
      : > "$SHARED_VECTOR_LOG"
      : > "$GLOBAL_VECTOR_LOG"
      : > "$PRIMARY_SEARCH_LOG"
      : > "$SHARED_SEARCH_LOG"
      : > "$GLOBAL_SEARCH_LOG"
      KB_MIN_CONFIDENCE="0.60"
      KB_ALLOW_FALSE_POSITIVE="false"
      if printf '%s' "$RESOLVED_QUERY" | tr '[:upper:]' '[:lower:]' | grep -Eq 'false[[:space:]-]*positive|误报|noise'; then
        KB_ALLOW_FALSE_POSITIVE="true"
      fi

      run_vector_search() {
        workspace="$1"
        output_file="$2"
        log_file="$3"
        set -- "$OSM_BIN" --json kb vector search \
          -w "$workspace" \
          --query "$RESOLVED_QUERY" \
          --limit {{maxSearchResults}}
        if [ -n "$KB_MIN_CONFIDENCE" ]; then
          set -- "$@" --min-confidence "$KB_MIN_CONFIDENCE"
        fi
        if [ "$KB_ALLOW_FALSE_POSITIVE" != "true" ]; then
          set -- "$@" --exclude-sample-type false_positive
        fi
        if [ -n "$VECTOR_PROVIDER" ]; then
          set -- "$@" --provider "$VECTOR_PROVIDER"
        fi
        if [ -n "$VECTOR_MODEL" ]; then
          set -- "$@" --model "$VECTOR_MODEL"
        fi
        "$@" > "$output_file" 2>"$log_file" || echo '[]' > "$output_file"
      }

      run_keyword_search() {
        workspace="$1"
        output_file="$2"
        log_file="$3"
        set -- "$OSM_BIN" --json kb search \
          -w "$workspace" \
          --query "$RESOLVED_QUERY" \
          --limit {{maxSearchResults}}
        if [ -n "$KB_MIN_CONFIDENCE" ]; then
          set -- "$@" --min-confidence "$KB_MIN_CONFIDENCE"
        fi
        if [ "$KB_ALLOW_FALSE_POSITIVE" != "true" ]; then
          set -- "$@" --exclude-sample-type false_positive
        fi
        "$@" > "$output_file" 2>"$log_file" || echo '[]' > "$output_file"
      }

      echo '[]' > "$PRIMARY_VECTOR_JSON"
      echo '[]' > "$SHARED_VECTOR_JSON"
      echo '[]' > "$GLOBAL_VECTOR_JSON"
      if [ "{{useVectorKnowledgeDB}}" = "true" ]; then
        run_vector_search "$PRIMARY_WORKSPACE" "$PRIMARY_VECTOR_JSON" "$PRIMARY_VECTOR_LOG"

        if [ -n "$SHARED_WORKSPACE" ] && [ "$SHARED_WORKSPACE" != "$PRIMARY_WORKSPACE" ]; then
          run_vector_search "$SHARED_WORKSPACE" "$SHARED_VECTOR_JSON" "$SHARED_VECTOR_LOG"
        fi

        if [ -n "$GLOBAL_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$PRIMARY_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$SHARED_WORKSPACE" ]; then
          run_vector_search "$GLOBAL_WORKSPACE" "$GLOBAL_VECTOR_JSON" "$GLOBAL_VECTOR_LOG"
        fi
      fi

      jq -s --argjson max_results {{maxSearchResults}} '
        add
        | map(
            if type == "object" then (.source = (.source // "vector_kb")) else {"content": tostring, "source": "vector_kb"} end
          )
        | unique_by((.chunk_id // .id // .source_path // .title // .content // tostring))
        | sort_by(-(.relevance_score // .score // 0))
        | .[:$max_results]
      ' "$PRIMARY_VECTOR_JSON" "$SHARED_VECTOR_JSON" "$GLOBAL_VECTOR_JSON" > "{{vectorKnowledgeSearchOutput}}" 2>/dev/null || echo '[]' > "{{vectorKnowledgeSearchOutput}}"

      run_keyword_search "$PRIMARY_WORKSPACE" "$PRIMARY_JSON" "$PRIMARY_SEARCH_LOG"

      echo '[]' > "$SHARED_JSON"
      echo '[]' > "$GLOBAL_JSON"
      if [ -n "$SHARED_WORKSPACE" ] && [ "$SHARED_WORKSPACE" != "$PRIMARY_WORKSPACE" ]; then
        run_keyword_search "$SHARED_WORKSPACE" "$SHARED_JSON" "$SHARED_SEARCH_LOG"
      fi

      if [ -n "$GLOBAL_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$PRIMARY_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$SHARED_WORKSPACE" ]; then
        run_keyword_search "$GLOBAL_WORKSPACE" "$GLOBAL_JSON" "$GLOBAL_SEARCH_LOG"
      fi

      jq -s --argjson max_results {{maxSearchResults}} '
        add
        | map(
            if type == "object" then (.source = (.source // "knowledge_keyword"))
            else {"content": tostring, "source": "knowledge_keyword"}
            end
          )
        | map(
            .workspace = (.workspace // .metadata.workspace // "unknown")
          )
        | unique_by((.chunk_id // .id // .content // tostring))
        | sort_by(-(.relevance_score // .score // 0))
        | .[:$max_results]
      ' "$PRIMARY_JSON" "$SHARED_JSON" "$GLOBAL_JSON" > "{{knowledgeSearchOutput}}" 2>/dev/null || echo '[]' > "{{knowledgeSearchOutput}}"

      jq -s --argjson max_results {{maxSearchResults}} '
        add
        | map(
            if type == "object" then .
            else {"content": tostring}
            end
          )
        | map(
            .workspace = (.workspace // .metadata.workspace // "unknown")
          )
        | unique_by((.chunk_id // .id // .source_path // .title // .content // tostring))
        | sort_by(-(.relevance_score // .score // 0))
        | .[:$max_results]
      ' "{{vectorKnowledgeSearchOutput}}" "{{knowledgeSearchOutput}}" > "{{knowledgeSearchOutput}}.tmp" 2>/dev/null || cp "{{knowledgeSearchOutput}}" "{{knowledgeSearchOutput}}.tmp"
      mv "{{knowledgeSearchOutput}}.tmp" "{{knowledgeSearchOutput}}"

      VKB_HITS=$(jq 'length' "{{vectorKnowledgeSearchOutput}}" 2>/dev/null || echo 0)
      KB_HITS=$(jq 'length' "{{knowledgeSearchOutput}}" 2>/dev/null || echo 0)

      jq -n \
        --arg query "$RESOLVED_QUERY" \
        --arg provider "$VECTOR_PROVIDER_LABEL" \
        --slurpfile hits "{{vectorKnowledgeSearchOutput}}" '
        {
          status: "success",
          query: $query,
          provider: $provider,
          total_results: ($hits[0] | length),
          results: (
            $hits[0]
            | map({
                type: (.type // "vector_match"),
                content: (.content // .snippet // ""),
                relevance_score: (.relevance_score // .score // 0),
                source: (.source // "vector_kb"),
                title: (.title // ""),
                workspace: (.workspace // ""),
                source_path: (.source_path // ""),
                snippet: (.snippet // .content // "")
              })
          )
        }' > "{{vectorSearchResultsOutput}}" 2>/dev/null || jq -n --arg query "$RESOLVED_QUERY" '{status:"success",query:$query,provider:"config-default",total_results:0,results:[]}' > "{{vectorSearchResultsOutput}}"

      echo "[Semantic] Vector KB hits: $VKB_HITS"
      echo "[Semantic] Knowledge DB merged hits: $KB_HITS"

  - name: index-scan-data
    type: bash
    pre_condition: "{{enableSemanticSearch}} && {{indexExistingData}}"
    command: |
      set +e
      mkdir -p {{semanticIndexDir}}
      
      echo "=== Semantic Search Index ===" > {{semanticIndexDir}}/index.log
      echo "Created: $(date)" >> {{semanticIndexDir}}/index.log
      
      # 索引子域名（最早可用）
      echo "=== Indexing subdomains ===" >> {{semanticIndexDir}}/index.log
      : > {{semanticIndexDir}}/subdomains-index.txt
      if [ -f "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt" ]; then
        cat "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt" >> {{semanticIndexDir}}/subdomains-index.txt 2>/dev/null || true
      fi
      
      # 索引技术栈数据
      echo "=== Indexing tech stack ===" >> {{semanticIndexDir}}/index.log
      : > {{semanticIndexDir}}/tech-index.txt
      if [ -f "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl" ]; then
        cat "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl" >> {{semanticIndexDir}}/tech-index.txt 2>/dev/null || true
      fi
      
      # 索引 HTTP 探测结果
      echo "=== Indexing HTTP results ===" >> {{semanticIndexDir}}/index.log
      : > {{semanticIndexDir}}/http-index.txt
      if [ -f "{{httpFile}}" ]; then
        cat "{{httpFile}}" >> {{semanticIndexDir}}/http-index.txt 2>/dev/null || true
      fi
      
      # 索引 JS 端点
      echo "=== Indexing JS endpoints ===" >> {{semanticIndexDir}}/index.log
      : > {{semanticIndexDir}}/endpoints-index.txt
      if [ -f "{{Output}}/content-analysis/js-endpoints-{{TargetSpace}}.txt" ]; then
        cat "{{Output}}/content-analysis/js-endpoints-{{TargetSpace}}.txt" >> {{semanticIndexDir}}/endpoints-index.txt 2>/dev/null || true
      fi
      
      # 索引漏洞数据（可能是空的，因为与 vuln-suite 并行执行）
      echo "=== Indexing vulnerabilities ===" >> {{semanticIndexDir}}/index.log
      : > {{semanticIndexDir}}/vulns-index.txt
      INDEXED_VULNS=0
      for f in {{Output}}/vulnscan/nuclei-*.txt {{Output}}/vuln-scan-suite/*.txt; do
        if [ -f "$f" ]; then
          fsize=$(wc -c < "$f" 2>/dev/null || echo 0)
          if [ "$fsize" -gt 100 ]; then
            echo "Indexing: $f ($fsize bytes)" >> {{semanticIndexDir}}/index.log
            cat "$f" >> {{semanticIndexDir}}/vulns-index.txt 2>/dev/null || true
            INDEXED_VULNS=$((INDEXED_VULNS + 1))
          fi
        fi
      done
      
      # 创建索引元数据
      SUBDOMAINS_COUNT=$(wc -l < {{semanticIndexDir}}/subdomains-index.txt 2>/dev/null || echo 0)
      TECH_COUNT=$(wc -l < {{semanticIndexDir}}/tech-index.txt 2>/dev/null || echo 0)
      HTTP_COUNT=$(wc -l < {{semanticIndexDir}}/http-index.txt 2>/dev/null || echo 0)
      ENDPOINTS_COUNT=$(wc -l < {{semanticIndexDir}}/endpoints-index.txt 2>/dev/null || echo 0)
      VULNS_COUNT=$(wc -l < {{semanticIndexDir}}/vulns-index.txt 2>/dev/null || echo 0)
      
      cat > {{semanticIndexDir}}/metadata.json << EOF
      {
        "target": "{{Target}}",
        "indexed_at": "$(date -Iseconds 2>/dev/null || echo 'unknown')",
        "subdomains_count": $SUBDOMAINS_COUNT,
        "tech_count": $TECH_COUNT,
        "http_count": $HTTP_COUNT,
        "endpoints_count": $ENDPOINTS_COUNT,
        "vulns_count": $VULNS_COUNT,
        "vuln_files_indexed": $INDEXED_VULNS,
        "note": "vulns may be incomplete if scanned in parallel with vuln-suite"
      }
      EOF
      
      echo "[Semantic] Index created: subdomains=$SUBDOMAINS_COUNT, tech=$TECH_COUNT, http=$HTTP_COUNT, vulns=$VULNS_COUNT"
      
      # 如果漏洞数据太少，标记可能需要后续更新
      if [ "$VULNS_COUNT" -lt 10 ]; then
        echo "[INFO] [Semantic Search] Low vuln count, consider re-running after vuln-suite completes"
      fi
      
      exit 0

  - name: build-vector-corpus
    type: bash
    pre_condition: "{{enableSemanticSearch}}"
    command: |
      mkdir -p {{semanticIndexDir}}
      : > "{{vectorCorpusFile}}"

      append_prefixed() {
        source_file="$1"
        prefix="$2"
        [ -f "$source_file" ] || return 0
        awk -v p="$prefix" 'NF { gsub(/\r/, ""); print p $0 }' "$source_file" >> "{{vectorCorpusFile}}"
      }

      append_raw() {
        source_file="$1"
        [ -f "$source_file" ] || return 0
        awk 'NF { gsub(/\r/, ""); print }' "$source_file" >> "{{vectorCorpusFile}}"
      }

      append_prefixed "{{semanticIndexDir}}/vulns-index.txt" "[scan:vulns] "
      append_prefixed "{{semanticIndexDir}}/tech-index.txt" "[scan:tech] "
      append_prefixed "{{semanticIndexDir}}/subdomains-index.txt" "[scan:subdomains] "
      append_prefixed "{{semanticIndexDir}}/http-index.txt" "[scan:http] "
      append_prefixed "{{semanticIndexDir}}/endpoints-index.txt" "[scan:endpoints] "
      append_raw "{{knowledgeIndexFile}}"

      awk 'NF && !seen[$0]++' "{{vectorCorpusFile}}" > "{{vectorCorpusFile}}.tmp" && mv "{{vectorCorpusFile}}.tmp" "{{vectorCorpusFile}}"

      CORPUS_LINES=$(wc -l < "{{vectorCorpusFile}}" 2>/dev/null || echo 0)
      echo "[Semantic] Vector corpus prepared: $CORPUS_LINES lines"

  - name: semantic-search-agent
    type: agent
    pre_condition: "{{enableSemanticSearch}}"
    max_iterations: 5
    timeout: 600
    on_error:
      - action: continue
    system_prompt: |
      你是一个渗透测试语义搜索专家。
      你的任务是在给定的数据中进行语义搜索和分析。

      工作方式：
      1. 先使用 read_lines 工具读取指定的索引文件
      2. 理解数据内容
      3. 根据用户查询进行语义匹配
      4. 在结束前使用 save_content 工具把最终 JSON 保存到指定文件
      5. 返回结构化的 JSON 结果

      输出格式：
      - 必须返回有效的 JSON
      - 如果没有数据，返回空结果数组
      - 每个结果要包含 type, content, relevance_score, source
      - 特别关注 critical/high 级别的内容
    query: |
      请先读取 {{resolvedSearchQueryOutput}}，获取本次阶段化检索查询。
      再读取 {{searchQueryContextOutput}}，理解当前是 early 还是 post-vuln 阶段，以及重点目标/技术线索。

      然后在以下数据中搜索与 resolved query 相关的内容。

      首先读取以下索引文件：
      1. {{semanticIndexDir}}/vulns-index.txt - 漏洞数据
      2. {{semanticIndexDir}}/tech-index.txt - 技术栈
      3. {{semanticIndexDir}}/subdomains-index.txt - 子域名
      4. {{semanticIndexDir}}/http-index.txt - HTTP 端点
      5. {{knowledgeIndexFile}} - 已导入/自动学习的知识库 chunks
      6. {{vectorSearchResultsOutput}} - 基于 embeddings 计算出的向量召回结果
      7. {{knowledgeSearchOutput}} - 知识库数据库直接检索结果

      默认兜底查询：{{searchQuery}}

      要求：
      - 如果第 6 个文件存在且有内容，优先使用其中的向量召回结果作为候选
      - 如果第 7 个文件存在且有命中，把它作为高价值上下文
      - 如果索引文件存在且有内容，进行语义分析
      - 如果没有数据，返回 {"error": "no_data", "results": [], "total_results": 0}
      - 按 relevance_score 降序排序
      - 在最终回答前，调用 save_content 将 JSON 保存到 {{agentResultsOutput}}
      - 只输出 JSON，不要有其他文字
    agent_tools:
      - preset: read_file
      - preset: read_lines
      - preset: file_exists
      - preset: save_content

  - name: save-search-results
    type: bash
    pre_condition: "{{enableSemanticSearch}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      INDEX_DIR="{{semanticIndexDir}}"
      AGENT_RESULTS_FILE="{{agentResultsOutput}}"
      VECTOR_RESULTS_FILE="{{vectorSearchResultsOutput}}"
      QUERY_FILE="{{resolvedSearchQueryOutput}}"
      RESOLVED_QUERY="{{searchQuery}}"
      if [ -f "$QUERY_FILE" ] && [ -s "$QUERY_FILE" ]; then
        RESOLVED_QUERY=$(tr '\n' ' ' < "$QUERY_FILE" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
      fi
      AGENT_CLEAN_FILE="{{Output}}/ai-analysis/.semantic-agent-clean-{{TargetSpace}}.json"
      VECTOR_CLEAN_FILE="{{Output}}/ai-analysis/.semantic-vector-clean-{{TargetSpace}}.json"
      KB_CLEAN_FILE="{{Output}}/ai-analysis/.semantic-kb-clean-{{TargetSpace}}.json"
      SCAN_LINES_FILE="{{Output}}/ai-analysis/.semantic-scan-lines-{{TargetSpace}}.txt"
      SCAN_CLEAN_FILE="{{Output}}/ai-analysis/.semantic-scan-clean-{{TargetSpace}}.json"
      
      # 收集统计数据
      VULNS_LINES=$(wc -l < "$INDEX_DIR/vulns-index.txt" 2>/dev/null || echo 0)
      TECH_LINES=$(wc -l < "$INDEX_DIR/tech-index.txt" 2>/dev/null || echo 0)
      SUBDOMAIN_LINES=$(wc -l < "$INDEX_DIR/subdomains-index.txt" 2>/dev/null || echo 0)
      HTTP_LINES=$(wc -l < "$INDEX_DIR/http-index.txt" 2>/dev/null || echo 0)
      KB_LINES=$(wc -l < "{{knowledgeIndexFile}}" 2>/dev/null || echo 0)
      VECTOR_COUNT=$(jq -r '.total_results // 0' "$VECTOR_RESULTS_FILE" 2>/dev/null || echo 0)
      KB_SEARCH_COUNT=$(jq 'length' "{{knowledgeSearchOutput}}" 2>/dev/null || echo 0)
      
      echo "[Semantic] Index stats: vulns=$VULNS_LINES, tech=$TECH_LINES, subdomains=$SUBDOMAIN_LINES, http=$HTTP_LINES, knowledge=$KB_LINES, vector=$VECTOR_COUNT, kb_search=$KB_SEARCH_COUNT"
      
      # 构建基础结果（保证单一合法 JSON）
      jq -n \
        --arg query "$RESOLVED_QUERY" \
        --arg ts "$(date -Iseconds)" \
        --arg provider "${VECTOR_PROVIDER_LABEL:-config-default}" \
        --argjson vulns "$VULNS_LINES" \
        --argjson tech "$TECH_LINES" \
        --argjson subdomains "$SUBDOMAIN_LINES" \
        --argjson http "$HTTP_LINES" \
        --argjson knowledge "$KB_LINES" \
        --argjson vector_count "$VECTOR_COUNT" \
        --argjson kb_search_count "$KB_SEARCH_COUNT" \
        '{
          query: $query,
          timestamp: $ts,
          source: "llm_agent",
          vector_search_used: ($vector_count > 0),
          provider: $provider,
          index_stats: {
            vulns: $vulns,
            tech: $tech,
            subdomains: $subdomains,
            http: $http,
            knowledge: $knowledge,
            vector_candidates: $vector_count,
            knowledge_search_hits: $kb_search_count
          },
          results: [],
          highlights: {
            critical_findings: [],
            immediate_actions: [],
            affected_systems: []
          },
          insights: [],
          recommendations: [],
          status: "pending"
        }' > {{searchResultsOutput}}
      
      # 检查索引数据是否为空
      if [ "$VULNS_LINES" -eq 0 ] && [ "$TECH_LINES" -eq 0 ] && [ "$SUBDOMAIN_LINES" -eq 0 ] && [ "$KB_LINES" -eq 0 ]; then
        echo "[Semantic] WARNING: All index files are empty! Search results will be limited."
        echo "[Semantic] This is expected if vuln-suite hasn't completed yet."
        jq -n \
          --arg query "$RESOLVED_QUERY" \
          --arg ts "$(date -Iseconds)" \
          '{
            query: $query,
            timestamp: $ts,
            status: "no_index_data",
            message: "索引数据为空，请确保 vuln-suite 已完成执行",
            index_stats: {
              vulns: 0,
              tech: 0,
              subdomains: 0,
              http: 0,
              knowledge: 0,
              vector_candidates: 0,
              knowledge_search_hits: 0
            },
            results: [],
            highlights: {
              critical_findings: [],
              immediate_actions: [],
              affected_systems: []
            },
            insights: ["索引数据为空，无法进行语义搜索"],
            recommendations: ["等待 vuln-suite 完成后再执行语义搜索"]
          }' > {{searchResultsOutput}}
        exit 0
      fi

      extract_json_file() {
        src="$1"
        dst="$2"
        : > "$dst"
        [ -f "$src" ] || return 0
        awk '
          BEGIN { capture = 0 }
          /^[[:space:]]*```json[[:space:]]*$/ { capture = 1; next }
          capture && /^[[:space:]]*```[[:space:]]*$/ { exit }
          capture { print }
        ' "$src" > "$dst"
        if [ ! -s "$dst" ] && jq empty "$src" >/dev/null 2>&1; then
          cp "$src" "$dst"
        fi
      }

      AGENT_STATUS="missing"
      extract_json_file "$AGENT_RESULTS_FILE" "$AGENT_CLEAN_FILE"
      if [ -s "$AGENT_CLEAN_FILE" ] && jq empty "$AGENT_CLEAN_FILE" >/dev/null 2>&1; then
        AGENT_STATUS="valid"
      else
        echo '{"results":[],"highlights":{"critical_findings":[],"immediate_actions":[],"affected_systems":[]},"insights":[],"recommendations":[]}' > "$AGENT_CLEAN_FILE"
        if [ -s "$AGENT_RESULTS_FILE" ]; then
          AGENT_STATUS="invalid_json"
        fi
      fi

      if [ -f "$VECTOR_RESULTS_FILE" ] && jq empty "$VECTOR_RESULTS_FILE" >/dev/null 2>&1; then
        cp "$VECTOR_RESULTS_FILE" "$VECTOR_CLEAN_FILE"
      else
        echo '{"results":[],"total_results":0}' > "$VECTOR_CLEAN_FILE"
      fi

      if [ -f "{{knowledgeSearchOutput}}" ] && jq empty "{{knowledgeSearchOutput}}" >/dev/null 2>&1; then
        cp "{{knowledgeSearchOutput}}" "$KB_CLEAN_FILE"
      else
        echo '[]' > "$KB_CLEAN_FILE"
      fi

      : > "$SCAN_LINES_FILE"
      for f in "$INDEX_DIR/vulns-index.txt" "$INDEX_DIR/http-index.txt" "$INDEX_DIR/endpoints-index.txt" "$INDEX_DIR/subdomains-index.txt"; do
        if [ -f "$f" ]; then
          head -40 "$f" 2>/dev/null >> "$SCAN_LINES_FILE" || true
        fi
      done
      awk 'NF && !seen[$0]++' "$SCAN_LINES_FILE" > "$SCAN_LINES_FILE.tmp" && mv "$SCAN_LINES_FILE.tmp" "$SCAN_LINES_FILE"
      jq -R -s 'split("\n") | map(select(length > 0) | {content: ., source: "scan_index"})' "$SCAN_LINES_FILE" > "$SCAN_CLEAN_FILE" 2>/dev/null || echo '[]' > "$SCAN_CLEAN_FILE"

      export OSM_SEMANTIC_TS="$(date -Iseconds)"
      export OSM_SEMANTIC_QUERY="$RESOLVED_QUERY"
      export OSM_SEMANTIC_AGENT_STATUS="$AGENT_STATUS"
      export OSM_SEMANTIC_VULNS="$VULNS_LINES"
      export OSM_SEMANTIC_TECH="$TECH_LINES"
      export OSM_SEMANTIC_SUBDOMAINS="$SUBDOMAIN_LINES"
      export OSM_SEMANTIC_HTTP="$HTTP_LINES"
      export OSM_SEMANTIC_KNOWLEDGE="$KB_LINES"
      export OSM_SEMANTIC_VECTOR_COUNT="$VECTOR_COUNT"
      export OSM_SEMANTIC_KB_SEARCH_COUNT="$KB_SEARCH_COUNT"

      python3 << 'PY'
      import json
      import os
      import re
      from pathlib import Path

      search_output = Path("{{searchResultsOutput}}")
      query = os.environ.get("OSM_SEMANTIC_QUERY", "{{searchQuery}}")
      ts = os.environ.get("OSM_SEMANTIC_TS", "")
      provider = "{{embeddingsProvider}}".strip() or "config-default"
      agent_status = os.environ.get("OSM_SEMANTIC_AGENT_STATUS", "missing")
      max_results = int("{{maxSearchResults}}")

      def load_json(path_str, default):
          path = Path(path_str)
          if not path.exists():
              return default
          try:
              return json.loads(path.read_text(encoding="utf-8"))
          except Exception:
              return default

      agent = load_json("{{Output}}/ai-analysis/.semantic-agent-clean-{{TargetSpace}}.json", {"results": [], "highlights": {}, "insights": [], "recommendations": []})
      vector = load_json("{{Output}}/ai-analysis/.semantic-vector-clean-{{TargetSpace}}.json", {"results": [], "total_results": 0})
      kb = load_json("{{Output}}/ai-analysis/.semantic-kb-clean-{{TargetSpace}}.json", [])
      scan = load_json("{{Output}}/ai-analysis/.semantic-scan-clean-{{TargetSpace}}.json", [])

      def textify(value):
          text = str(value if value is not None else "")
          return re.sub(r"\s+", " ", text).strip()

      def default_score(source_type):
          return {
              "llm_agent": 0.78,
              "knowledge_base": 0.72,
              "vector_search": 0.68,
              "scan_index": 0.42,
          }.get(source_type, 0.42)

      def pick_target(item, text):
          for key in ("target", "url", "host", "endpoint", "matched-at", "matched_at"):
              value = item.get(key)
              if value:
                  return str(value)
          match = re.search(r"https?://[^\s\"]+", text)
          return match.group(0) if match else ""

      def pick_category(text):
          lowered = text.lower()
          if re.search(r"admin|dashboard|backoffice|manage", lowered):
              return "admin_surface"
          if re.search(r"login|auth|signin|session|oauth|sso|jwt", lowered):
              return "auth_surface"
          if re.search(r"graphql|swagger|openapi|api|endpoint", lowered):
              return "api_surface"
          if re.search(r"idor|authorization|authz|permission|privilege|role|tenant", lowered):
              return "business_logic"
          if re.search(r"upload|import|export|download|backup|file", lowered):
              return "file_data_surface"
          if re.search(r"sql|ssti|rce|ssrf|xss|takeover|secret|cve|critical", lowered):
              return "vulnerability_context"
          return "general"

      def pick_severity(item, text):
          direct = textify(item.get("severity") or item.get("severity_hint")).lower()
          if direct:
              return direct
          lowered = text.lower()
          if re.search(r"critical|rce|takeover|admin access|secret", lowered):
              return "critical"
          if re.search(r"high|login|auth|admin|graphql|swagger|sql|ssrf|ssti|upload|idor", lowered):
              return "high"
          if re.search(r"medium|token|session|api|endpoint", lowered):
              return "medium"
          return "info"

      def pick_action(category, text):
          lowered = text.lower()
          if category == "auth_surface":
              return "auth_review"
          if category == "admin_surface":
              return "admin_review"
          if category == "api_surface":
              return "api_probe"
          if category == "business_logic":
              return "logic_verify"
          if re.search(r"sql|ssti|rce|ssrf|xss|takeover|secret", lowered):
              return "exploit_verify"
          return "investigate"

      def normalize(item, source_type):
          if not isinstance(item, dict):
              item = {"content": str(item)}
          text = textify(item.get("content") or item.get("snippet") or item.get("text") or item.get("finding") or item.get("title") or item)
          target = pick_target(item, text)
          category = pick_category(text)
          severity = pick_severity(item, text)
          score_raw = item.get("relevance_score", item.get("score", item.get("similarity", default_score(source_type))))
          try:
              score = float(score_raw)
          except Exception:
              score = default_score(source_type)
          return {
              "type": item.get("type") or category,
              "content": text[:800],
              "source": item.get("source") or source_type,
              "source_type": source_type,
              "relevance_score": score,
              "target": target,
              "category": category,
              "severity_hint": severity,
              "action_type": pick_action(category, text),
              "title": item.get("title"),
              "workspace": item.get("workspace") or ((item.get("metadata") or {}).get("workspace") if isinstance(item.get("metadata"), dict) else None),
          }

      def unique_keep_order(values):
          seen = set()
          result = []
          for value in values:
              if value in seen:
                  continue
              seen.add(value)
              result.append(value)
          return result

      def normalize_target_key(target):
          target = textify(target).lower()
          if not target:
              return ""
          target = re.sub(r"^https?://", "", target)
          target = target.split("#", 1)[0]
          target = target.split("?", 1)[0]
          return target.rstrip("/")

      def content_fingerprint(item):
          title = textify(item.get("title"))
          content = textify(item.get("content"))[:220]
          target = normalize_target_key(item.get("target"))
          if target:
              return f"{target}|{content}"
          return f"{title}|{content}"

      def source_priority(source_type):
          return {
              "llm_agent": 0.14,
              "knowledge_base": 0.10,
              "vector_search": 0.08,
              "scan_index": 0.02,
          }.get(source_type, 0.0)

      def severity_boost(severity):
          return {
              "critical": 0.16,
              "high": 0.10,
              "medium": 0.05,
              "info": 0.0,
          }.get((severity or "info").lower(), 0.0)

      def category_boost(category):
          return {
              "auth_surface": 0.12,
              "admin_surface": 0.11,
              "api_surface": 0.09,
              "business_logic": 0.12,
              "file_data_surface": 0.07,
              "vulnerability_context": 0.08,
              "general": 0.0,
          }.get(category or "general", 0.0)

      agent_results = [normalize(item, "llm_agent") for item in agent.get("results", [])]
      vector_results = [normalize(item, "vector_search") for item in vector.get("results", [])]
      kb_results = [normalize(item, "knowledge_base") for item in kb]
      scan_results = [normalize(item, "scan_index") for item in scan]

      all_items = agent_results + vector_results + kb_results + scan_results
      target_source_map = {}
      content_source_map = {}
      for item in all_items:
          tkey = normalize_target_key(item.get("target"))
          ckey = content_fingerprint(item)
          source = item.get("source_type") or "unknown"
          if tkey:
              target_source_map.setdefault(tkey, set()).add(source)
          content_source_map.setdefault(ckey, set()).add(source)

      for item in all_items:
          tkey = normalize_target_key(item.get("target"))
          ckey = content_fingerprint(item)
          corroboration = len(content_source_map.get(ckey, set()))
          target_corroboration = len(target_source_map.get(tkey, set())) if tkey else 0
          boost = source_priority(item.get("source_type"))
          boost += severity_boost(item.get("severity_hint"))
          boost += category_boost(item.get("category"))
          if corroboration >= 2:
              boost += 0.12
          if corroboration >= 3:
              boost += 0.08
          if target_corroboration >= 2:
              boost += 0.10
          if target_corroboration >= 3:
              boost += 0.06
          item["corroboration"] = corroboration
          item["target_corroboration"] = target_corroboration
          item["rank_score"] = round(float(item.get("relevance_score", 0)) + boost, 4)

      combined = []
      seen = set()
      for item in sorted(all_items, key=lambda it: (it.get("rank_score", 0), it.get("relevance_score", 0)), reverse=True):
          if not item.get("content") and not item.get("target"):
              continue
          key = f'{item.get("target", "")}|{item.get("content", "")}'
          if key in seen:
              continue
          seen.add(key)
          combined.append(item)
          if len(combined) >= max_results:
              break

      priority_targets = unique_keep_order([
          item["target"]
          for item in combined
          if item.get("target")
          and (
              item.get("severity_hint") in {"critical", "high"}
              or item.get("category") in {"auth_surface", "admin_surface", "api_surface", "business_logic"}
          )
      ])[:25]

      critical_findings = unique_keep_order(
          [item.get("target") or item.get("content") for item in combined if item.get("severity_hint") in {"critical", "high"}]
          + [str(v) for v in ((agent.get("highlights") or {}).get("critical_findings") or [])]
      )[:8]

      immediate_actions = unique_keep_order(
          [f'[{item.get("action_type", "investigate")}] {(item.get("target") or item.get("content", ""))[:140]}' for item in combined]
          + [str(v) for v in ((agent.get("highlights") or {}).get("immediate_actions") or [])]
      )[:8]

      affected_systems = unique_keep_order(
          [item.get("target") for item in combined if item.get("target")]
          + [str(v) for v in ((agent.get("highlights") or {}).get("affected_systems") or [])]
      )[:12]

      insights = unique_keep_order(
          [str(v) for v in (agent.get("insights") or [])]
          + (["向量召回结果已纳入语义搜索结果"] if (vector.get("total_results") or 0) > 0 else [])
          + (["工作区知识库命中已纳入实战上下文"] if kb else [])
      )[:8]

      recommendations = unique_keep_order(
          [str(v) for v in (agent.get("recommendations") or [])]
          + (["优先复测 priority_targets 中的认证、后台、API 与业务逻辑入口"] if priority_targets else ["当前未识别出明确高价值目标，建议人工复核原始索引结果"])
      )[:8]

      payload = {
          "query": query,
          "timestamp": ts,
          "source": (
              "merged_llm_vector_knowledge"
              if agent_status == "valid" and agent.get("results")
              else ("vector_knowledge_fallback" if ((vector.get("total_results") or 0) > 0 or len(kb) > 0) else "scan_index_fallback")
          ),
          "vector_search_used": (vector.get("total_results") or 0) > 0,
          "knowledge_search_used": len(kb) > 0,
          "provider": provider,
          "status": ("completed" if agent_status == "valid" else "fallback_completed") if combined else ("no_results" if agent_status == "valid" else "fallback_no_results"),
          "total_results": len(combined),
          "index_stats": {
              "vulns": int(os.environ.get("OSM_SEMANTIC_VULNS", "0") or "0"),
              "tech": int(os.environ.get("OSM_SEMANTIC_TECH", "0") or "0"),
              "subdomains": int(os.environ.get("OSM_SEMANTIC_SUBDOMAINS", "0") or "0"),
              "http": int(os.environ.get("OSM_SEMANTIC_HTTP", "0") or "0"),
              "knowledge": int(os.environ.get("OSM_SEMANTIC_KNOWLEDGE", "0") or "0"),
              "vector_candidates": int(os.environ.get("OSM_SEMANTIC_VECTOR_COUNT", "0") or "0"),
              "knowledge_search_hits": int(os.environ.get("OSM_SEMANTIC_KB_SEARCH_COUNT", "0") or "0"),
          },
          "results": combined,
          "highlights": {
              "critical_findings": critical_findings,
              "immediate_actions": immediate_actions,
              "affected_systems": affected_systems,
              "priority_targets": priority_targets,
          },
          "priority_targets": priority_targets,
          "insights": insights,
          "recommendations": recommendations,
      }

      search_output.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
      PY
      
      # 最终验证
      if jq empty {{searchResultsOutput}} 2>/dev/null; then
        echo "[Semantic] Results saved successfully"
      else
        echo "[Semantic] WARNING: Final JSON invalid, recreating..."
        echo '{"status": "error", "results": [], "error": "JSON validation failed"}' > {{searchResultsOutput}}
      fi

      # 同步写入 highlights 结果文件，供下游模块稳定读取
      jq '.highlights // {"critical_findings":[],"immediate_actions":[],"affected_systems":[]}' {{searchResultsOutput}} > {{semanticHighlightsOutput}} 2>/dev/null || echo '{"critical_findings":[],"immediate_actions":[],"affected_systems":[]}' > {{semanticHighlightsOutput}}

  - name: knowledge-base-search
    type: bash
    pre_condition: "{{enableSemanticSearch}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      SKILLS_DIR="{{skillsDir}}"
      KB_OUTPUT="{{Output}}/ai-analysis/knowledge-base-results.md"
      SKILLS_COMBINED="{{Output}}/ai-analysis/skills-combined.md"
      KNOWLEDGE_JSON="{{knowledgeSearchOutput}}"
      VECTOR_JSON="{{vectorSearchResultsOutput}}"
      VECTOR_KB_JSON="{{vectorKnowledgeSearchOutput}}"
      echo "[Knowledge Base] Searching security knowledge..."

      strip_frontmatter() {
        awk '
          NR == 1 && $0 == "---" { in_fm = 1; next }
          in_fm && $0 == "---" { in_fm = 0; next }
          !in_fm { print }
        ' "$1"
      }

      append_skill() {
        skill_id="$1"
        title="$2"
        skill_file="$SKILLS_DIR/$skill_id/SKILL.md"

        [ -f "$skill_file" ] || return 0

        echo "## $title" >> "$KB_OUTPUT"
        echo "" >> "$KB_OUTPUT"
        strip_frontmatter "$skill_file" >> "$KB_OUTPUT"
        echo "" >> "$KB_OUTPUT"
        echo "---" >> "$KB_OUTPUT"
        echo "" >> "$KB_OUTPUT"

        echo "## $title" >> "$SKILLS_COMBINED"
        echo "" >> "$SKILLS_COMBINED"
        strip_frontmatter "$skill_file" >> "$SKILLS_COMBINED"
        echo "" >> "$SKILLS_COMBINED"
      }
      
      # 检测漏洞类型
      VULN_TYPES_FOUND=""
      if [ -f "{{nucleiFile}}" ]; then
        if grep -Eqi "sql([ -]?injection)?|sqli|union([[:space:]]+all)?[[:space:]]+select|boolean-based|time-based|database error" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND sql-injection,"
        fi
        if grep -qi "xss\|cross.*site\|scripting" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND xss-testing,"
        fi
        if grep -Eqi "ssrf|server.?side request forgery|metadata service" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND ssrf-testing,"
        fi
        if grep -Eqi "command injection|cmdi|shell injection|os command" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND command-injection-testing,"
        fi
        if grep -Eqi "rce|remote.*code|code.*execution|remote command execution|arbitrary command execution" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND rce-testing,"
        fi
        if grep -qi "csrf\|request.*forg" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND csrf-testing,"
        fi
        if grep -qi "upload\|file.*upload" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND file-upload-testing,"
        fi
        if grep -qi "idor\|direct.*object\|authoriz" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND idor-testing,"
        fi
        if grep -qi "xxe\|xml.*entity\|external.*entity" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND xxe-testing,"
        fi
        if grep -qi "ldap" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND ldap-injection-testing,"
        fi
        if grep -Eqi "graphql|openapi|swagger|rest api|api endpoint" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND api-security,"
        fi
      fi
      
      echo "[Knowledge Base] Vulnerability types detected: $VULN_TYPES_FOUND"
      
      # 默认加载的技能
      if [ -z "$VULN_TYPES_FOUND" ]; then
        VULN_TYPES_FOUND="sql-injection,xss-testing,ssrf-testing,command-injection-testing,rce-testing,csrf-testing,file-upload-testing,idor-testing,xxe-testing,api-security,ldap-injection-testing"
      fi
      
      # 生成知识库搜索结果
      echo "# Security Knowledge Base Results" > "$KB_OUTPUT"
      echo "" >> "$KB_OUTPUT"
      echo "Target: {{Target}}" >> "$KB_OUTPUT"
      echo "Generated: $(date '+%Y-%m-%d %H:%M:%S')" >> "$KB_OUTPUT"
      echo "" >> "$KB_OUTPUT"
      echo "---" >> "$KB_OUTPUT"
      echo "" >> "$KB_OUTPUT"

      echo "## Workspace Knowledge Hits" >> "$KB_OUTPUT"
      echo "" >> "$KB_OUTPUT"
      if jq empty "$KNOWLEDGE_JSON" 2>/dev/null; then
        HIT_COUNT=$(jq 'length' "$KNOWLEDGE_JSON" 2>/dev/null || echo 0)
        if [ "$HIT_COUNT" -gt 0 ]; then
          jq -r '.[] | "- [" + (((.relevance_score // .score) // 0) | tostring) + "] " + (.source // "knowledge") + " :: " + (.title // "untitled") + " :: " + (.snippet // "")' "$KNOWLEDGE_JSON" >> "$KB_OUTPUT" 2>/dev/null || true
        else
          echo "No direct knowledge-base hits." >> "$KB_OUTPUT"
        fi
      else
        echo "Knowledge search output unavailable." >> "$KB_OUTPUT"
      fi
      echo "" >> "$KB_OUTPUT"

      echo "## Direct Vector KB Hits" >> "$KB_OUTPUT"
      echo "" >> "$KB_OUTPUT"
      if jq empty "$VECTOR_KB_JSON" 2>/dev/null; then
        VKB_HITS=$(jq 'length' "$VECTOR_KB_JSON" 2>/dev/null || echo 0)
        if [ "$VKB_HITS" -gt 0 ]; then
          jq -r '.[] | "- [" + (((.relevance_score // .score) // 0) | tostring) + "] " + (.title // "untitled") + " :: " + (.snippet // "")' "$VECTOR_KB_JSON" >> "$KB_OUTPUT" 2>/dev/null || true
        else
          echo "No direct vector-kb hits." >> "$KB_OUTPUT"
        fi
      else
        echo "Vector KB search output unavailable." >> "$KB_OUTPUT"
      fi
      echo "" >> "$KB_OUTPUT"

      echo "## Vector Recall Candidates" >> "$KB_OUTPUT"
      echo "" >> "$KB_OUTPUT"
      if jq empty "$VECTOR_JSON" 2>/dev/null; then
        VECTOR_HITS=$(jq '.total_results // 0' "$VECTOR_JSON" 2>/dev/null || echo 0)
        if [ "$VECTOR_HITS" -gt 0 ]; then
          jq -r '.results[] | "- [" + ((.relevance_score // 0) | tostring) + "] " + (.source // "unknown") + " :: " + (.content // "")' "$VECTOR_JSON" >> "$KB_OUTPUT" 2>/dev/null || true
        else
          echo "No vector recall candidates." >> "$KB_OUTPUT"
        fi
      else
        echo "Vector search output unavailable." >> "$KB_OUTPUT"
      fi
      echo "" >> "$KB_OUTPUT"

      echo "## Exported Knowledge Corpus Preview" >> "$KB_OUTPUT"
      echo "" >> "$KB_OUTPUT"
      if [ -f "{{knowledgeIndexFile}}" ]; then
        head -20 "{{knowledgeIndexFile}}" | sed 's/^/- /' >> "$KB_OUTPUT" 2>/dev/null || true
      else
        echo "Knowledge corpus not exported." >> "$KB_OUTPUT"
      fi
      echo "" >> "$KB_OUTPUT"
      
      # 生成技能组合文件
      echo "# Security Testing Skills Library" > "$SKILLS_COMBINED"
      echo "" >> "$SKILLS_COMBINED"
      echo "Target: {{Target}}" >> "$SKILLS_COMBINED"
      echo "Generated: $(date '+%Y-%m-%d %H:%M:%S')" >> "$SKILLS_COMBINED"
      echo "" >> "$SKILLS_COMBINED"
      
      # 根据检测到的漏洞类型加载对应技能
      for skill_type in $(printf '%s' "$VULN_TYPES_FOUND" | tr ',' '\n' | sed '/^$/d' | sort -u); do
        case $skill_type in
          sql-injection|sql-injection-testing)
            append_skill "sql-injection" "SQL Injection Testing"
            ;;
          xss|xss-testing)
            append_skill "xss-testing" "XSS Testing"
            ;;
          ssrf|ssrf-testing)
            append_skill "ssrf-testing" "SSRF Testing"
            ;;
          command-injection|command-injection-testing)
            append_skill "command-injection-testing" "Command Injection Testing"
            ;;
          rce|rce-testing|remote-code-execution)
            append_skill "rce-testing" "Remote Code Execution Testing"
            ;;
          csrf|csrf-testing)
            append_skill "csrf-testing" "CSRF Testing"
            ;;
          file-upload|file-upload-testing)
            append_skill "file-upload-testing" "File Upload Testing"
            ;;
          idor|idor-testing)
            append_skill "idor-testing" "IDOR Testing"
            ;;
          xxe|xxe-testing)
            append_skill "xxe-testing" "XXE Testing"
            ;;
          ldap|ldap-injection|ldap-injection-testing)
            append_skill "ldap-injection-testing" "LDAP Injection Testing"
            ;;
          api|api-security|api-security-testing)
            append_skill "api-security" "API Security Testing"
            ;;
        esac
      done
      
      KB_LINES=$(wc -l < "$KB_OUTPUT" 2>/dev/null || echo 0)
      SKILLS_LINES=$(wc -l < "$SKILLS_COMBINED" 2>/dev/null || echo 0)
      echo "[Knowledge Base] Results saved: $KB_OUTPUT ($KB_LINES lines)"
      echo "[Knowledge Base] Skills library: $SKILLS_COMBINED ($SKILLS_LINES lines)"

  - name: extract-semantic-highlights
    type: bash
    pre_condition: "{{enableSemanticSearch}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      
      # 提取高危发现供 vuln-validation 使用
      if [ -f "{{searchResultsOutput}}" ]; then
        # 提取 critical findings
        jq -r '.highlights.critical_findings[] // empty' {{searchResultsOutput}} 2>/dev/null > {{Output}}/ai-analysis/semantic-critical-findings.txt || true
        
        # 提取 immediate actions
        jq -r '.highlights.immediate_actions[] // empty' {{searchResultsOutput}} 2>/dev/null > {{Output}}/ai-analysis/semantic-immediate-actions.txt || true
        
        # 提取受影响的系统
        jq -r '.highlights.affected_systems[] // empty' {{searchResultsOutput}} 2>/dev/null > {{Output}}/ai-analysis/semantic-affected-systems.txt || true
        
        jq -r '.priority_targets[]? // empty' {{searchResultsOutput}} 2>/dev/null > {{semanticPriorityTargetsOutput}} || true

        jq '[
          .results[]?
          | select(
              (.severity_hint == "critical") or (.severity_hint == "high")
              or (.category == "auth_surface")
              or (.category == "admin_surface")
              or (.category == "api_surface")
              or (.category == "business_logic")
            )
          | {
              target: (.target // ""),
              content,
              source,
              source_type,
              severity_hint,
              category,
              action_type,
              relevance_score
            }
        ]' {{searchResultsOutput}} 2>/dev/null > {{semanticPriorityVulnsOutput}} || echo '[]' > {{semanticPriorityVulnsOutput}}
        
        CRITICAL_COUNT=$(wc -l < {{Output}}/ai-analysis/semantic-critical-findings.txt 2>/dev/null || echo 0)
        PRIORITY_COUNT=$(wc -l < {{semanticPriorityTargetsOutput}} 2>/dev/null || echo 0)
        echo "[Semantic] Extracted $CRITICAL_COUNT critical findings and $PRIORITY_COUNT priority targets for downstream modules"
      fi

  - name: log-semantic-complete
    type: function
    pre_condition: "{{enableSemanticSearch}}"
    functions:
      - 'log_info("AI Semantic search completed for {{Target}}")'
      - 'log_info("Semantic results saved to: {{searchResultsOutput}}")'
      - 'log_info("Highlights for downstream: {{semanticHighlightsOutput}}")'

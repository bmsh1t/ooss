# =============================================================================
# AI 语义搜索模块 - 支持向量化和 API 调用
# =============================================================================
# 功能：
# - 调用外部 embeddings API (如 jina.ai) 进行向量化
# - 基于向量相似度搜索
# - 跨目标知识共享
# - 支持自然语言查询
# - 结果传递到后续 AI 模块
# =============================================================================

kind: module
name: ai-semantic-search
description: AI-powered semantic search with vector embeddings support

params:
  - name: semanticIndexDir
    default: "{{Output}}/ai-analysis/semantic-index"
  - name: searchResultsOutput
    default: "{{Output}}/ai-analysis/semantic-search-results-{{TargetSpace}}.json"
  - name: agentResultsOutput
    default: "{{Output}}/ai-analysis/semantic-agent-results-{{TargetSpace}}.json"
  - name: embeddingsOutput
    default: "{{Output}}/ai-analysis/semantic-embeddings-{{TargetSpace}}.json"
  - name: semanticHighlightsOutput
    default: "{{Output}}/ai-analysis/semantic-highlights-{{TargetSpace}}.json"
  - name: skillsDir
    default: "{{OsmedeusBase}}/skills"
  - name: nucleiFile
    default: "{{Output}}/vulnscan/nuclei-jsonl-{{TargetSpace}}.txt"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"

  # Embeddings API 配置
  - name: enableSemanticSearch
    type: bool
    default: true
  - name: useVectorSearch
    type: bool
    default: true
    description: "Use vector embeddings for semantic search (requires API key)"
  
  # Embeddings Provider 配置 - 支持多 provider
  - name: embeddingsProvider
    type: string
    default: "jina"
    description: "Embeddings provider: jina, openai"
  
  # Jina AI (默认)
  - name: jinaApiUrl
    type: string
    default: "https://api.jina.ai/v1/embeddings"
  - name: jinaModel
    type: string
    default: "jina-embeddings-v5-text-small"
  - name: jinaApiKey
    type: string
    default: ""
  
  # OpenAI
  - name: openaiApiUrl
    type: string
    default: "https://api.openai.com/v1/embeddings"
  - name: openaiModel
    type: string
    default: "text-embedding-3-small"
  - name: openaiApiKey
    type: string
    default: ""
  
  - name: indexExistingData
    type: bool
    default: true
    description: "Index existing scan data for semantic search"
  - name: maxSearchResults
    type: integer
    default: 10
  - name: minRelevanceScore
    type: float
    default: 0.7
    description: "Minimum relevance score for filtering results"
  - name: searchQuery
    type: string
    default: "SQL injection vulnerabilities"
    description: "Semantic search query (supports natural language)"

steps:
  - name: prepare-semantic-index
    type: function
    pre_condition: "{{enableSemanticSearch}}"
    log: "Preparing semantic search index"
    functions:
      - 'create_folder("{{semanticIndexDir}}")'
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'log_info("Starting semantic search for {{Target}}")'

  - name: load-embeddings-config
    type: function
    pre_condition: "{{enableSemanticSearch}} && {{useVectorSearch}}"
    log: "Loading embeddings configuration"
    functions:
      - 'log_info("Embeddings provider: {{embeddingsProvider}}")'
      - 'log_info("JINA_API_KEY set: no")'
      - 'log_info("OPENAI_API_KEY set: no")'

  - name: check-semantic-data
    type: bash
    pre_condition: "{{enableSemanticSearch}}"
    command: |
      echo "[INFO] [Semantic Search] Checking data availability..."
      
      # 检查索引数据
      HTTP_COUNT=0
      SUBDOMAIN_COUNT=0
      FINGERPRINT_SIZE=0
      
      if [ -f "{{httpFile}}" ]; then
        HTTP_COUNT=$(wc -l < "{{httpFile}}" 2>/dev/null || echo 0)
      fi
      if [ -f "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt" ]; then
        SUBDOMAIN_COUNT=$(wc -l < "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt" 2>/dev/null || echo 0)
      fi
      if [ -f "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl" ]; then
        FINGERPRINT_SIZE=$(wc -c < "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl" 2>/dev/null || echo 0)
      fi
      
      echo "[INFO] [Semantic Search] Data check: http=$HTTP_COUNT, subdomains=$SUBDOMAIN_COUNT, fingerprint=$FINGERPRINT_SIZE bytes"
      
      # 如果数据太少，给出警告但继续执行
      if [ "$HTTP_COUNT" -lt 10 ]; then
        echo "[WARN] [Semantic Search] Low HTTP count ($HTTP_COUNT), semantic search may have limited results"
      fi

  - name: index-scan-data
    type: bash
    pre_condition: "{{enableSemanticSearch}} && {{indexExistingData}}"
    command: |
      set +e
      mkdir -p {{semanticIndexDir}}
      
      echo "=== Semantic Search Index ===" > {{semanticIndexDir}}/index.log
      echo "Created: $(date)" >> {{semanticIndexDir}}/index.log
      
      # 索引子域名（最早可用）
      echo "=== Indexing subdomains ===" >> {{semanticIndexDir}}/index.log
      : > {{semanticIndexDir}}/subdomains-index.txt
      if [ -f "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt" ]; then
        cat "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt" >> {{semanticIndexDir}}/subdomains-index.txt 2>/dev/null || true
      fi
      
      # 索引技术栈数据
      echo "=== Indexing tech stack ===" >> {{semanticIndexDir}}/index.log
      : > {{semanticIndexDir}}/tech-index.txt
      if [ -f "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl" ]; then
        cat "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl" >> {{semanticIndexDir}}/tech-index.txt 2>/dev/null || true
      fi
      
      # 索引 HTTP 探测结果
      echo "=== Indexing HTTP results ===" >> {{semanticIndexDir}}/index.log
      : > {{semanticIndexDir}}/http-index.txt
      if [ -f "{{httpFile}}" ]; then
        cat "{{httpFile}}" >> {{semanticIndexDir}}/http-index.txt 2>/dev/null || true
      fi
      
      # 索引 JS 端点
      echo "=== Indexing JS endpoints ===" >> {{semanticIndexDir}}/index.log
      : > {{semanticIndexDir}}/endpoints-index.txt
      if [ -f "{{Output}}/content-analysis/js-endpoints-{{TargetSpace}}.txt" ]; then
        cat "{{Output}}/content-analysis/js-endpoints-{{TargetSpace}}.txt" >> {{semanticIndexDir}}/endpoints-index.txt 2>/dev/null || true
      fi
      
      # 索引漏洞数据（可能是空的，因为与 vuln-suite 并行执行）
      echo "=== Indexing vulnerabilities ===" >> {{semanticIndexDir}}/index.log
      : > {{semanticIndexDir}}/vulns-index.txt
      INDEXED_VULNS=0
      for f in {{Output}}/vulnscan/nuclei-*.txt {{Output}}/vuln-scan-suite/*.txt; do
        if [ -f "$f" ]; then
          fsize=$(wc -c < "$f" 2>/dev/null || echo 0)
          if [ "$fsize" -gt 100 ]; then
            echo "Indexing: $f ($fsize bytes)" >> {{semanticIndexDir}}/index.log
            cat "$f" >> {{semanticIndexDir}}/vulns-index.txt 2>/dev/null || true
            INDEXED_VULNS=$((INDEXED_VULNS + 1))
          fi
        fi
      done
      
      # 创建索引元数据
      SUBDOMAINS_COUNT=$(wc -l < {{semanticIndexDir}}/subdomains-index.txt 2>/dev/null || echo 0)
      TECH_COUNT=$(wc -l < {{semanticIndexDir}}/tech-index.txt 2>/dev/null || echo 0)
      HTTP_COUNT=$(wc -l < {{semanticIndexDir}}/http-index.txt 2>/dev/null || echo 0)
      ENDPOINTS_COUNT=$(wc -l < {{semanticIndexDir}}/endpoints-index.txt 2>/dev/null || echo 0)
      VULNS_COUNT=$(wc -l < {{semanticIndexDir}}/vulns-index.txt 2>/dev/null || echo 0)
      
      cat > {{semanticIndexDir}}/metadata.json << EOF
      {
        "target": "{{Target}}",
        "indexed_at": "$(date -Iseconds 2>/dev/null || echo 'unknown')",
        "subdomains_count": $SUBDOMAINS_COUNT,
        "tech_count": $TECH_COUNT,
        "http_count": $HTTP_COUNT,
        "endpoints_count": $ENDPOINTS_COUNT,
        "vulns_count": $VULNS_COUNT,
        "vuln_files_indexed": $INDEXED_VULNS,
        "note": "vulns may be incomplete if scanned in parallel with vuln-suite"
      }
      EOF
      
      echo "[Semantic] Index created: subdomains=$SUBDOMAINS_COUNT, tech=$TECH_COUNT, http=$HTTP_COUNT, vulns=$VULNS_COUNT"
      
      # 如果漏洞数据太少，标记可能需要后续更新
      if [ "$VULNS_COUNT" -lt 10 ]; then
        echo "[INFO] [Semantic Search] Low vuln count, consider re-running after vuln-suite completes"
      fi
      
      exit 0

  - name: generate-data-embeddings
    type: bash
    pre_condition: "{{enableSemanticSearch}} && {{useVectorSearch}} && file_exists('{{semanticIndexDir}}/vulns-index.txt')"
    timeout: 300s
    command: |
      mkdir -p {{Output}}/ai-analysis
      
      # 根据 provider 选择配置
      PROVIDER="{{embeddingsProvider}}"
      API_URL=""
      MODEL=""
      API_KEY=""
      
      case "$PROVIDER" in
        jina)
          API_URL="{{jinaApiUrl}}"
          MODEL="{{jinaModel}}"
          API_KEY="{{jinaApiKey}}"
          [ -z "$API_KEY" ] && API_KEY="${JINA_API_KEY:-}"
          ;;
        openai)
          API_URL="{{openaiApiUrl}}"
          MODEL="{{openaiModel}}"
          API_KEY="{{openaiApiKey}}"
          [ -z "$API_KEY" ] && API_KEY="${OPENAI_API_KEY:-}"
          ;;
        *)
          echo "[Semantic] Unknown provider: $PROVIDER"
          exit 0
          ;;
      esac
      
      # 检查 API key - 确保不是占位符或空值
      # 过滤掉常见的占位符格式
      API_KEY_ACTUAL="$API_KEY"
      if [ -z "$API_KEY_ACTUAL" ] || \
         [ "$API_KEY_ACTUAL" = "your-api-key-here" ] || \
         [ "$API_KEY_ACTUAL" = "sk-" ]; then
        echo "[Semantic] API key not configured for $PROVIDER, skipping vector embeddings"
        echo "[Semantic] Please set JINA_API_KEY or OPENAI_API_KEY environment variable"
        exit 0
      fi
      
      echo "[Semantic] Using provider: $PROVIDER, URL: $API_URL, Model: $MODEL"
      
      # 准备数据 - 每行作为一个 embedding 单位
      DATA=$(cat {{semanticIndexDir}}/vulns-index.txt 2>/dev/null | head -100 | jq -R -s -c 'split("\n") | map(select(length > 0))')
      
      if [ -z "$DATA" ] || [ "$DATA" = "[]" ]; then
        echo "[Semantic] No data to embed"
        exit 0
      fi
      
      # 调用 API 生成 embeddings
      RESPONSE=$(curl -s -X POST "$API_URL" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $API_KEY" \
        -d "{
          \"model\": \"$MODEL\",
          \"input\": $DATA
        }" 2>/dev/null)
      
      if echo "$RESPONSE" | jq empty 2>/dev/null; then
        echo "$RESPONSE" > {{embeddingsOutput}}
        EMBEDDING_COUNT=$(echo "$RESPONSE" | jq '.data | length' 2>/dev/null || echo 0)
        echo "[Semantic] Generated $EMBEDDING_COUNT embeddings with $PROVIDER"
      else
        echo "[Semantic] Failed to generate embeddings"
        echo '{"error": "api_error", "data": []}' > {{embeddingsOutput}}
      fi

  - name: generate-query-embedding
    type: bash
    pre_condition: "{{enableSemanticSearch}} && {{useVectorSearch}}"
    timeout: 30s
    command: |
      mkdir -p {{Output}}/ai-analysis
      
      # 根据 provider 选择配置
      PROVIDER="{{embeddingsProvider}}"
      API_URL=""
      MODEL=""
      API_KEY=""
      
      case "$PROVIDER" in
        jina)
          API_URL="{{jinaApiUrl}}"
          MODEL="{{jinaModel}}"
          API_KEY="{{jinaApiKey}}"
          [ -z "$API_KEY" ] && API_KEY="${JINA_API_KEY:-}"
          ;;
        openai)
          API_URL="{{openaiApiUrl}}"
          MODEL="{{openaiModel}}"
          API_KEY="{{openaiApiKey}}"
          [ -z "$API_KEY" ] && API_KEY="${OPENAI_API_KEY:-}"
          ;;
        *)
          echo "[Semantic] Unknown provider: $PROVIDER"
          exit 0
          ;;
      esac
      
      # 检查 API key - 确保不是占位符或空值
      API_KEY_ACTUAL="$API_KEY"
      if [ -z "$API_KEY_ACTUAL" ] || \
         [ "$API_KEY_ACTUAL" = "your-api-key-here" ] || \
         [ "$API_KEY_ACTUAL" = "sk-" ]; then
        echo "[Semantic] API key not configured for $PROVIDER, will use LLM-based search"
        exit 0
      fi
      
      echo "[Semantic] Generating query embedding with $PROVIDER"
      
      # 调用 API 生成查询向量
      RESPONSE=$(curl -s -X POST "$API_URL" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $API_KEY" \
        -d "{
          \"model\": \"$MODEL\",
          \"input\": [\"{{searchQuery}}\"]
        }" 2>/dev/null)
      
      if echo "$RESPONSE" | jq empty 2>/dev/null; then
        echo "$RESPONSE" > {{Output}}/ai-analysis/query-embedding-{{TargetSpace}}.json
        echo "[Semantic] Query embedding generated"
      else
        echo "[Semantic] Failed to generate query embedding"
      fi

  - name: semantic-search-agent
    type: agent
    pre_condition: "{{enableSemanticSearch}}"
    max_iterations: 5
    timeout: 600
    on_error:
      - action: continue
    system_prompt: |
      你是一个渗透测试语义搜索专家。
      你的任务是在给定的数据中进行语义搜索和分析。

      工作方式：
      1. 先使用 read_lines 工具读取指定的索引文件
      2. 理解数据内容
      3. 根据用户查询进行语义匹配
      4. 在结束前使用 save_content 工具把最终 JSON 保存到指定文件
      5. 返回结构化的 JSON 结果

      输出格式：
      - 必须返回有效的 JSON
      - 如果没有数据，返回空结果数组
      - 每个结果要包含 type, content, relevance_score, source
      - 特别关注 critical/high 级别的内容
    query: |
      请在以下数据中搜索与 "{{searchQuery}}" 相关的内容。

      首先读取以下索引文件：
      1. {{semanticIndexDir}}/vulns-index.txt - 漏洞数据
      2. {{semanticIndexDir}}/tech-index.txt - 技术栈
      3. {{semanticIndexDir}}/subdomains-index.txt - 子域名
      4. {{semanticIndexDir}}/http-index.txt - HTTP 端点

      搜索查询：{{searchQuery}}

      要求：
      - 如果索引文件存在且有内容，进行语义分析
      - 如果没有数据，返回 {"error": "no_data", "results": [], "total_results": 0}
      - 按 relevance_score 降序排序
      - 在最终回答前，调用 save_content 将 JSON 保存到 {{agentResultsOutput}}
      - 只输出 JSON，不要有其他文字
    agent_tools:
      - preset: read_file
      - preset: read_lines
      - preset: file_exists
      - preset: save_content

  - name: save-search-results
    type: bash
    pre_condition: "{{enableSemanticSearch}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      cd {{Output}}/ai-analysis
      AGENT_RESULTS_FILE="{{agentResultsOutput}}"
      
      # 收集统计数据
      VULNS_LINES=$(wc -l < semantic-index/vulns-index.txt 2>/dev/null || echo 0)
      TECH_LINES=$(wc -l < semantic-index/tech-index.txt 2>/dev/null || echo 0)
      SUBDOMAIN_LINES=$(wc -l < semantic-index/subdomains-index.txt 2>/dev/null || echo 0)
      HTTP_LINES=$(wc -l < semantic-index/http-index.txt 2>/dev/null || echo 0)
      
      echo "[Semantic] Index stats: vulns=$VULNS_LINES, tech=$TECH_LINES, subdomains=$SUBDOMAIN_LINES, http=$HTTP_LINES"
      
      # 构建基础结果（保证单一合法 JSON）
      jq -n \
        --arg query "{{searchQuery}}" \
        --arg ts "$(date -Iseconds)" \
        --arg provider "{{embeddingsProvider}}" \
        --argjson vulns "$VULNS_LINES" \
        --argjson tech "$TECH_LINES" \
        --argjson subdomains "$SUBDOMAIN_LINES" \
        --argjson http "$HTTP_LINES" \
        '{
          query: $query,
          timestamp: $ts,
          source: "llm_agent",
          vector_search_used: false,
          provider: $provider,
          index_stats: {
            vulns: $vulns,
            tech: $tech,
            subdomains: $subdomains,
            http: $http
          },
          results: [],
          highlights: {
            critical_findings: [],
            immediate_actions: [],
            affected_systems: []
          },
          insights: [],
          recommendations: [],
          status: "pending"
        }' > {{searchResultsOutput}}
      
      # 检查索引数据是否为空
      if [ "$VULNS_LINES" -eq 0 ] && [ "$TECH_LINES" -eq 0 ] && [ "$SUBDOMAIN_LINES" -eq 0 ]; then
        echo "[Semantic] WARNING: All index files are empty! Search results will be limited."
        echo "[Semantic] This is expected if vuln-suite hasn't completed yet."
        jq -n \
          --arg query "{{searchQuery}}" \
          --arg ts "$(date -Iseconds)" \
          '{
            query: $query,
            timestamp: $ts,
            status: "no_index_data",
            message: "索引数据为空，请确保 vuln-suite 已完成执行",
            index_stats: {
              vulns: 0,
              tech: 0,
              subdomains: 0,
              http: 0
            },
            results: [],
            highlights: {
              critical_findings: [],
              immediate_actions: [],
              affected_systems: []
            },
            insights: ["索引数据为空，无法进行语义搜索"],
            recommendations: ["等待 vuln-suite 完成后再执行语义搜索"]
          }' > {{searchResultsOutput}}
        exit 0
      fi
      
      # 尝试合并 LLM agent 返回的结果
      if [ -s "$AGENT_RESULTS_FILE" ]; then
        echo "[Semantic] Processing LLM agent results..."
        
        # 清理 markdown 代码块
        CLEANED=$(cat "$AGENT_RESULTS_FILE" | sed 's/```json//g; s/```//g; s/^[[:space:]]*//; s/[[:space:]]*$//')
        
        # 验证是否为有效 JSON
        if echo "$CLEANED" | jq empty 2>/dev/null; then
          echo "[Semantic] Valid JSON from agent, merging..."
          
          # 提取关键字段
          TOTAL=$(echo "$CLEANED" | jq -r '.total_results // 0' 2>/dev/null)
          INSIGHTS=$(echo "$CLEANED" | jq -r '.insights // [] | join(", ")' 2>/dev/null)
          RECS=$(echo "$CLEANED" | jq -r '.recommendations // [] | join(", ")' 2>/dev/null)
          
          # 更新结果
          if [ "$TOTAL" -gt 0 ]; then
            echo "$CLEANED" | jq --arg insights "$INSIGHTS" --arg recs "$RECS" \
              '.insights = [$insights] | .recommendations = [$recs] | .status = "completed"' > {{searchResultsOutput}}
            echo "[Semantic] Search completed with $TOTAL results"
          else
            echo "[Semantic] Agent returned no results"
            jq '.status = "no_results" | .message = "LLM 未找到相关结果"' {{searchResultsOutput}} > {{searchResultsOutput}}.tmp && mv {{searchResultsOutput}}.tmp {{searchResultsOutput}}
          fi
        else
          echo "[Semantic] WARNING: Agent returned invalid JSON, using default results"
          jq '.status = "invalid_json" | .message = "LLM 输出格式错误"' {{searchResultsOutput}} > {{searchResultsOutput}}.tmp && mv {{searchResultsOutput}}.tmp {{searchResultsOutput}}
        fi
      else
        echo "[Semantic] No results from LLM agent"
        jq '.status = "no_agent_output" | .message = "Agent 未返回有效结果"' {{searchResultsOutput}} > {{searchResultsOutput}}.tmp && mv {{searchResultsOutput}}.tmp {{searchResultsOutput}}
      fi
      
      # 最终验证
      if jq empty {{searchResultsOutput}} 2>/dev/null; then
        echo "[Semantic] Results saved successfully"
      else
        echo "[Semantic] WARNING: Final JSON invalid, recreating..."
        echo '{"status": "error", "results": [], "error": "JSON validation failed"}' > {{searchResultsOutput}}
      fi

      # 同步写入 highlights 结果文件，供下游模块稳定读取
      jq '.highlights // {"critical_findings":[],"immediate_actions":[],"affected_systems":[]}' {{searchResultsOutput}} > {{semanticHighlightsOutput}} 2>/dev/null || echo '{"critical_findings":[],"immediate_actions":[],"affected_systems":[]}' > {{semanticHighlightsOutput}}

  - name: knowledge-base-search
    type: bash
    pre_condition: "{{enableSemanticSearch}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      SKILLS_DIR="{{skillsDir}}"
      KB_OUTPUT="{{Output}}/ai-analysis/knowledge-base-results.md"
      SKILLS_COMBINED="{{Output}}/ai-analysis/skills-combined.md"
      echo "[Knowledge Base] Searching security knowledge..."

      strip_frontmatter() {
        awk '
          NR == 1 && $0 == "---" { in_fm = 1; next }
          in_fm && $0 == "---" { in_fm = 0; next }
          !in_fm { print }
        ' "$1"
      }

      append_skill() {
        local skill_id="$1"
        local title="$2"
        local skill_file="$SKILLS_DIR/$skill_id/SKILL.md"

        [ -f "$skill_file" ] || return 0

        echo "## $title" >> "$KB_OUTPUT"
        echo "" >> "$KB_OUTPUT"
        strip_frontmatter "$skill_file" >> "$KB_OUTPUT"
        echo "" >> "$KB_OUTPUT"
        echo "---" >> "$KB_OUTPUT"
        echo "" >> "$KB_OUTPUT"

        echo "## $title" >> "$SKILLS_COMBINED"
        echo "" >> "$SKILLS_COMBINED"
        strip_frontmatter "$skill_file" >> "$SKILLS_COMBINED"
        echo "" >> "$SKILLS_COMBINED"
      }
      
      # 检测漏洞类型
      VULN_TYPES_FOUND=""
      if [ -f "{{nucleiFile}}" ]; then
        if grep -Eqi "sql([ -]?injection)?|sqli|union([[:space:]]+all)?[[:space:]]+select|boolean-based|time-based|database error" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND sql-injection,"
        fi
        if grep -qi "xss\|cross.*site\|scripting" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND xss-testing,"
        fi
        if grep -Eqi "ssrf|server.?side request forgery|metadata service" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND ssrf-testing,"
        fi
        if grep -Eqi "command injection|cmdi|shell injection|os command" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND command-injection-testing,"
        fi
        if grep -Eqi "rce|remote.*code|code.*execution|remote command execution|arbitrary command execution" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND rce-testing,"
        fi
        if grep -qi "csrf\|request.*forg" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND csrf-testing,"
        fi
        if grep -qi "upload\|file.*upload" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND file-upload-testing,"
        fi
        if grep -qi "idor\|direct.*object\|authoriz" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND idor-testing,"
        fi
        if grep -qi "xxe\|xml.*entity\|external.*entity" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND xxe-testing,"
        fi
        if grep -qi "ldap" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND ldap-injection-testing,"
        fi
        if grep -Eqi "graphql|openapi|swagger|rest api|api endpoint" "{{nucleiFile}}" 2>/dev/null; then
          VULN_TYPES_FOUND="$VULN_TYPES_FOUND api-security,"
        fi
      fi
      
      echo "[Knowledge Base] Vulnerability types detected: $VULN_TYPES_FOUND"
      
      # 默认加载的技能
      if [ -z "$VULN_TYPES_FOUND" ]; then
        VULN_TYPES_FOUND="sql-injection,xss-testing,ssrf-testing,command-injection-testing,rce-testing,csrf-testing,file-upload-testing,idor-testing,xxe-testing,api-security,ldap-injection-testing"
      fi
      
      # 生成知识库搜索结果
      echo "# Security Knowledge Base Results" > "$KB_OUTPUT"
      echo "" >> "$KB_OUTPUT"
      echo "Target: {{Target}}" >> "$KB_OUTPUT"
      echo "Generated: $(date '+%Y-%m-%d %H:%M:%S')" >> "$KB_OUTPUT"
      echo "" >> "$KB_OUTPUT"
      echo "---" >> "$KB_OUTPUT"
      echo "" >> "$KB_OUTPUT"
      
      # 生成技能组合文件
      echo "# Security Testing Skills Library" > "$SKILLS_COMBINED"
      echo "" >> "$SKILLS_COMBINED"
      echo "Target: {{Target}}" >> "$SKILLS_COMBINED"
      echo "Generated: $(date '+%Y-%m-%d %H:%M:%S')" >> "$SKILLS_COMBINED"
      echo "" >> "$SKILLS_COMBINED"
      
      # 根据检测到的漏洞类型加载对应技能
      for skill_type in $(printf '%s' "$VULN_TYPES_FOUND" | tr ',' '\n' | sed '/^$/d' | sort -u); do
        case $skill_type in
          sql-injection|sql-injection-testing)
            append_skill "sql-injection" "SQL Injection Testing"
            ;;
          xss|xss-testing)
            append_skill "xss-testing" "XSS Testing"
            ;;
          ssrf|ssrf-testing)
            append_skill "ssrf-testing" "SSRF Testing"
            ;;
          command-injection|command-injection-testing)
            append_skill "command-injection-testing" "Command Injection Testing"
            ;;
          rce|rce-testing|remote-code-execution)
            append_skill "rce-testing" "Remote Code Execution Testing"
            ;;
          csrf|csrf-testing)
            append_skill "csrf-testing" "CSRF Testing"
            ;;
          file-upload|file-upload-testing)
            append_skill "file-upload-testing" "File Upload Testing"
            ;;
          idor|idor-testing)
            append_skill "idor-testing" "IDOR Testing"
            ;;
          xxe|xxe-testing)
            append_skill "xxe-testing" "XXE Testing"
            ;;
          ldap|ldap-injection|ldap-injection-testing)
            append_skill "ldap-injection-testing" "LDAP Injection Testing"
            ;;
          api|api-security|api-security-testing)
            append_skill "api-security" "API Security Testing"
            ;;
        esac
      done
      
      KB_LINES=$(wc -l < "$KB_OUTPUT" 2>/dev/null || echo 0)
      SKILLS_LINES=$(wc -l < "$SKILLS_COMBINED" 2>/dev/null || echo 0)
      echo "[Knowledge Base] Results saved: $KB_OUTPUT ($KB_LINES lines)"
      echo "[Knowledge Base] Skills library: $SKILLS_COMBINED ($SKILLS_LINES lines)"

  - name: extract-semantic-highlights
    type: bash
    pre_condition: "{{enableSemanticSearch}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      
      # 提取高危发现供 vuln-validation 使用
      if [ -f "{{searchResultsOutput}}" ]; then
        # 提取 critical findings
        jq -r '.highlights.critical_findings[] // empty' {{searchResultsOutput}} 2>/dev/null > {{Output}}/ai-analysis/semantic-critical-findings.txt || true
        
        # 提取 immediate actions
        jq -r '.highlights.immediate_actions[] // empty' {{searchResultsOutput}} 2>/dev/null > {{Output}}/ai-analysis/semantic-immediate-actions.txt || true
        
        # 提取受影响的系统
        jq -r '.highlights.affected_systems[] // empty' {{searchResultsOutput}} 2>/dev/null > {{Output}}/ai-analysis/semantic-affected-systems.txt || true
        
        # 生成结构化的漏洞关注列表（用于 vuln-validation）
        jq -r '[.results[] | select(.severity == "critical" or .severity == "high") | {content, source, severity}]' {{searchResultsOutput}} 2>/dev/null > {{Output}}/ai-analysis/semantic-priority-vulns.json || true
        
        CRITICAL_COUNT=$(wc -l < {{Output}}/ai-analysis/semantic-critical-findings.txt 2>/dev/null || echo 0)
        echo "[Semantic] Extracted $CRITICAL_COUNT critical findings for downstream modules"
      fi

  - name: log-semantic-complete
    type: function
    pre_condition: "{{enableSemanticSearch}}"
    functions:
      - 'log_info("AI Semantic search completed for {{Target}}")'
      - 'log_info("Semantic results saved to: {{searchResultsOutput}}")'
      - 'log_info("Highlights for downstream: {{semanticHighlightsOutput}}")'

kind: module
name: ai-operator-queue
description: Turn AI findings into a practical operator queue for manual exploitation and verification

params:
  - name: operatorQueueOutput
    default: "{{Output}}/ai-analysis/operator-queue-{{TargetSpace}}.json"
  - name: operatorQueueMd
    default: "{{Output}}/ai-analysis/operator-queue-{{TargetSpace}}.md"
  - name: operatorQueueTargetsFile
    default: "{{Output}}/ai-analysis/operator-queue-targets-{{TargetSpace}}.txt"

  - name: vulnValidationFile
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: attackChainFile
    default: "{{Output}}/ai-analysis/attack-chain-{{TargetSpace}}.json"
  - name: pathPlanningFile
    default: "{{Output}}/ai-analysis/path-planning-{{TargetSpace}}.json"
  - name: semanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-decision-followup-{{TargetSpace}}.json"
  - name: fallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-post-vuln-{{TargetSpace}}.json"
  - name: secondFallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-early-{{TargetSpace}}.json"
  - name: retestPlanOutput
    default: "{{Output}}/ai-analysis/retest-plan-{{TargetSpace}}.json"
  - name: aiDecisionFile
    default: "{{Output}}/ai-analysis/ai-decision-{{TargetSpace}}.json"
  - name: appliedDecisionFile
    default: "{{Output}}/ai-analysis/applied-ai-decision-{{TargetSpace}}.json"
  - name: resumeContextFile
    default: "{{Output}}/ai-analysis/resume-context-{{TargetSpace}}.json"
  - name: previousFollowupDecisionFile
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"
  - name: previous_followup_targets
    default: ""
  - name: previous_followup_priority_mode
    default: ""
  - name: previous_followup_confidence_level
    default: ""
  - name: previous_followup_combined_targets_list
    default: ""

  - name: enableOperatorQueue
    type: bool
    default: true

steps:
  - name: prepare-operator-queue
    type: function
    pre_condition: "{{enableOperatorQueue}}"
    functions:
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'create_folder("{{Output}}/ai-analysis/.input")'
      - 'log_info("Preparing AI operator queue for {{Target}}")'

  - name: build-operator-context
    type: bash
    pre_condition: "{{enableOperatorQueue}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/.input

      normalize_int() {
        value="$1"
        case "$value" in
          ''|*[!0-9]*)
            echo 0
            ;;
          *)
            echo "$value"
            ;;
        esac
      }

      csv_or_json_to_array() {
        value="$1"
        if [ -z "$value" ]; then
          echo '[]'
        elif printf '%s' "$value" | jq -e 'type == "array"' >/dev/null 2>&1; then
          printf '%s' "$value"
        else
          printf '%s' "$value" | jq -R 'split(",") | reduce .[] as $item ([]; ($item | gsub("^\\s+|\\s+$"; "")) as $normalized | if ($normalized != "" and (index($normalized) == null)) then . + [$normalized] else . end)'
        fi
      }

      semantic_hits() {
        file="$1"
        [ -f "$file" ] || return 1
        jq empty "$file" >/dev/null 2>&1 || return 1
        hits=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$file" 2>/dev/null || echo 0)
        [ "${hits:-0}" -gt 0 ] 2>/dev/null
      }

      semantic_target_count() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          jq -r '[.results[]?.target | select(. != null and . != "")] | unique | length' "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      ACTIVE_SEMANTIC_FILE="{{semanticSearchFile}}"
      for candidate in "{{semanticSearchFile}}" "{{fallbackSemanticSearchFile}}" "{{secondFallbackSemanticSearchFile}}"; do
        [ -n "$candidate" ] || continue
        if semantic_hits "$candidate"; then
          ACTIVE_SEMANTIC_FILE="$candidate"
          break
        fi
      done

      ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
      DECISION_SOURCE_KIND="none"
      DECISION_FOCUS_JSON='[]'
      DECISION_PRIORITY_JSON='[]'
      DECISION_RESCAN_JSON='[]'
      DECISION_TARGET_COUNT=0
      if [ -f "{{appliedDecisionFile}}" ] && jq empty "{{appliedDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{appliedDecisionFile}}"
        DECISION_SOURCE_KIND="applied-ai-decision"
      elif [ -f "{{aiDecisionFile}}" ] && jq empty "{{aiDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
        DECISION_SOURCE_KIND="ai-decision"
      fi
      if [ "$DECISION_SOURCE_KIND" != "none" ] && [ -f "$ACTIVE_DECISION_FILE" ] && jq empty "$ACTIVE_DECISION_FILE" 2>/dev/null; then
        DECISION_FOCUS_JSON=$(jq -c '.targets.focus_areas // .focus_areas // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_PRIORITY_JSON=$(jq -c '.targets.priority_targets // .priority_targets // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_RESCAN_JSON=$(jq -c '.targets.rescan_targets // .rescan_targets // .priority_targets // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_TARGET_COUNT=$(jq -nr \
          --argjson focus "$DECISION_FOCUS_JSON" \
          --argjson priority "$DECISION_PRIORITY_JSON" \
          --argjson rescan "$DECISION_RESCAN_JSON" \
          '($focus + $priority + $rescan) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' 2>/dev/null || echo 0)
      fi

      VULN_COUNT=$(jq -r '.confirmed_real // .validation_summary.confirmed_real // 0' "{{vulnValidationFile}}" 2>/dev/null || echo 0)
      CHAIN_COUNT=$(jq -r '.attack_chain_summary.total_chains // 0' "{{attackChainFile}}" 2>/dev/null || echo 0)
      PHASE_COUNT=$(jq -r '.plan_summary.total_phases // 0' "{{pathPlanningFile}}" 2>/dev/null || echo 0)
      RETEST_COUNT=$(jq -r '[((.targets[]? | if type == "object" then .target else . end)), ((.automation_queue[]? | if type == "object" then .target else . end))] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{retestPlanOutput}}" 2>/dev/null || echo 0)
      SEMANTIC_COUNT=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$ACTIVE_SEMANTIC_FILE" 2>/dev/null || echo 0)
      SEMANTIC_TARGET_COUNT=$(semantic_target_count "$ACTIVE_SEMANTIC_FILE")
      PREV_FOLLOWUP_TARGETS=0
      PREV_SOURCE_KIND="none"
      PREV_PRIORITY_MODE=""
      PREV_CONFIDENCE_LEVEL=""
      PREV_QUEUE_EFFECTIVE=false
      PREV_MANUAL_TARGETS_JSON='[]'
      PREV_HIGH_CONFIDENCE_TARGETS_JSON='[]'
      PREV_COMBINED_TARGETS_JSON='[]'
      if [ -f "{{resumeContextFile}}" ] \
        && jq -e '(.scan_profile? != null) and (.severity? != null) and ((.followup_decision_source? != null) or (.refined_targets? != null) or (.seed_targets? != null))' "{{resumeContextFile}}" >/dev/null 2>&1; then
        PREV_SOURCE_KIND="resume-context"
        PREV_FOLLOWUP_TARGETS=$(jq -r '[((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.refined_targets.priority_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.rescan_targets // []) + (.seed_targets.confirmed_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{resumeContextFile}}" 2>/dev/null || echo 0)
        PREV_PRIORITY_MODE=$(jq -r '.priority_mode // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_CONFIDENCE_LEVEL=$(jq -r '.confidence_level // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_QUEUE_EFFECTIVE=$(jq -r 'if .queue_followup_effective != null then .queue_followup_effective elif .followup_summary.queue_followup_effective != null then .followup_summary.queue_followup_effective else ((.followup_summary.retest_queued_targets // 0) > 0) end' "{{resumeContextFile}}" 2>/dev/null || echo false)
        PREV_MANUAL_TARGETS_JSON=$(jq -c '.seed_targets.manual_first_targets // []' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_HIGH_CONFIDENCE_TARGETS_JSON=$(jq -c '.seed_targets.high_confidence_targets // []' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_COMBINED_TARGETS_JSON=$(jq -c '((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.refined_targets.priority_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.rescan_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
      elif [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
        PREV_SOURCE_KIND="decision-file"
        PREV_FOLLOWUP_TARGETS=$(jq -r '[((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.rescan_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_PRIORITY_MODE=$(jq -r '.seed_focus.priority_mode // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CONFIDENCE_LEVEL=$(jq -r '.seed_focus.confidence_level // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_QUEUE_EFFECTIVE=$(jq -r '.seed_focus.queue_followup_effective // .execution_feedback.queue_followup_effective // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_MANUAL_TARGETS_JSON=$(jq -c '.seed_targets.manual_first_targets // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_HIGH_CONFIDENCE_TARGETS_JSON=$(jq -c '.seed_targets.high_confidence_targets // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_COMBINED_TARGETS_JSON=$(jq -c '((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.rescan_targets // []) + (.seed_targets.semantic_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
      else
        PREV_COMBINED_TARGETS_JSON=$(csv_or_json_to_array "{{previous_followup_combined_targets_list}}")
        PREV_FOLLOWUP_TARGETS=$(normalize_int "{{previous_followup_targets}}")
        if [ "$PREV_FOLLOWUP_TARGETS" -eq 0 ] 2>/dev/null; then
          PREV_FOLLOWUP_TARGETS=$(printf '%s\n' "$PREV_COMBINED_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)
        fi
        PREV_SOURCE_KIND="queued-params"
        PREV_PRIORITY_MODE="{{previous_followup_priority_mode}}"
        PREV_CONFIDENCE_LEVEL="{{previous_followup_confidence_level}}"
      fi

      jq -n \
        --arg target "{{Target}}" \
        --arg vuln_file "{{vulnValidationFile}}" \
        --arg attack_chain_file "{{attackChainFile}}" \
        --arg path_planning_file "{{pathPlanningFile}}" \
        --arg semantic_file "$ACTIVE_SEMANTIC_FILE" \
        --arg retest_file "{{retestPlanOutput}}" \
        --arg decision_file "{{aiDecisionFile}}" \
        --arg applied_decision_file "{{appliedDecisionFile}}" \
        --arg active_decision_file "$ACTIVE_DECISION_FILE" \
        --arg previous_followup_file "{{previousFollowupDecisionFile}}" \
        --argjson vuln_count "$VULN_COUNT" \
        --argjson chain_count "$CHAIN_COUNT" \
        --argjson phase_count "$PHASE_COUNT" \
        --argjson retest_count "$RETEST_COUNT" \
        --argjson semantic_count "$SEMANTIC_COUNT" \
        --argjson semantic_target_count "$SEMANTIC_TARGET_COUNT" \
        --arg decision_source_kind "$DECISION_SOURCE_KIND" \
        --argjson decision_target_count "$DECISION_TARGET_COUNT" \
        --argjson decision_focus_targets "$DECISION_FOCUS_JSON" \
        --argjson decision_priority_targets "$DECISION_PRIORITY_JSON" \
        --argjson decision_rescan_targets "$DECISION_RESCAN_JSON" \
        --argjson previous_followup_targets "$PREV_FOLLOWUP_TARGETS" \
        --arg previous_followup_source_kind "$PREV_SOURCE_KIND" \
        --arg previous_followup_priority_mode "$PREV_PRIORITY_MODE" \
        --arg previous_followup_confidence_level "$PREV_CONFIDENCE_LEVEL" \
        --argjson previous_followup_queue_followup_effective "$PREV_QUEUE_EFFECTIVE" \
        --argjson previous_followup_manual_targets "$PREV_MANUAL_TARGETS_JSON" \
        --argjson previous_followup_high_confidence_targets "$PREV_HIGH_CONFIDENCE_TARGETS_JSON" \
        --argjson previous_followup_targets_list "$PREV_COMBINED_TARGETS_JSON" \
        '{
          target: $target,
          files: {
            vuln_validation: $vuln_file,
            attack_chain: $attack_chain_file,
            path_planning: $path_planning_file,
            semantic_search: $semantic_file,
            retest_plan: $retest_file,
            ai_decision: $decision_file,
            applied_ai_decision: $applied_decision_file,
            active_ai_decision: $active_decision_file,
            previous_followup: $previous_followup_file
          },
          counts: {
            confirmed_vulns: $vuln_count,
            attack_chains: $chain_count,
            execution_phases: $phase_count,
            retest_targets: $retest_count,
            semantic_results: $semantic_count,
            semantic_targets: $semantic_target_count,
            decision_targets: $decision_target_count,
            previous_followup_targets: $previous_followup_targets
          },
          decision: {
            source_kind: $decision_source_kind,
            focus_targets: $decision_focus_targets,
            priority_targets: $decision_priority_targets,
            rescan_targets: $decision_rescan_targets
          },
          previous_followup: {
            source_kind: $previous_followup_source_kind,
            priority_mode: $previous_followup_priority_mode,
            confidence_level: $previous_followup_confidence_level,
            queue_followup_effective: $previous_followup_queue_followup_effective,
            manual_first_targets_list: $previous_followup_manual_targets,
            high_confidence_targets_list: $previous_followup_high_confidence_targets,
            targets_list: $previous_followup_targets_list
          }
        }' > {{Output}}/ai-analysis/.input/operator-queue-context.json

      if [ "$VULN_COUNT" -eq 0 ] && [ "$CHAIN_COUNT" -eq 0 ] && [ "$RETEST_COUNT" -eq 0 ] && [ "$SEMANTIC_TARGET_COUNT" -eq 0 ] && [ "$DECISION_TARGET_COUNT" -eq 0 ] && [ "$PREV_FOLLOWUP_TARGETS" -eq 0 ]; then
        echo "SKIP_AI=true" > {{Output}}/ai-analysis/.operator-queue-skip
      else
        rm -f {{Output}}/ai-analysis/.operator-queue-skip 2>/dev/null || true
      fi

  - name: ai-generate-operator-queue
    type: agent
    pre_condition: '{{enableOperatorQueue}} && !file_exists("{{Output}}/ai-analysis/.operator-queue-skip")'
    max_iterations: 4
    timeout: 600
    on_error:
      - action: continue
    system_prompt: |
      你是一个红队现场负责人，把扫描与 AI 分析结果整理成操作员任务队列。

      输出要求：
      1. 先写简短分析，说明为什么这些任务值得手工跟进
      2. 然后输出 JSON 代码块

      JSON 格式：
      ```json
      {
        "summary": {
          "total_tasks": 2,
          "p1_tasks": 1,
          "p2_tasks": 1
        },
        "focus_targets": ["https://api.example.com/login"],
        "tasks": [
          {
            "id": "op-1",
            "priority": "P1",
            "target": "https://api.example.com/login",
            "title": "验证认证绕过",
            "reason": "确认漏洞 + 攻击链入口",
            "procedure": "按路径规划中的 phase 1 开始验证",
            "expected_outcome": "确认是否可拿到管理会话",
            "evidence": ["confirmed vuln", "attack chain"]
          }
        ]
      }
      ```

      约束：
      - target 必须是具体 URL、主机或服务
      - 任务要偏人工验证、权限提升、横向移动、鉴权边界、业务逻辑验证
      - 如果 ai decision / applied decision 的 focus_areas、priority_targets、rescan_targets 指向 auth、admin、api、file、business 入口，应优先生成 P1/P2 任务
      - 优先输出 P1/P2，不要堆无意义低优先级条目
    query: |
      为 {{Target}} 生成 operator queue。

      先读取 {{Output}}/ai-analysis/.input/operator-queue-context.json。
      然后按需读取里面列出的文件，结合 vuln validation、attack chain、path planning、semantic search、retest plan 和 ai decision 生成操作员任务队列。
      优先消费 active_ai_decision / applied_ai_decision 中的 focus_areas、priority_targets、rescan_targets，把它们转成真正可执行的 P1/P2 跟进任务。

      最终输出：
      1. 简短分析
      2. JSON 代码块
    agent_tools:
      - preset: read_file
      - preset: file_exists
      - preset: save_content
    exports:
      operator_queue_raw: "{{agent_content}}"

  - name: persist-operator-queue-raw
    type: function
    pre_condition: "{{enableOperatorQueue}}"
    functions:
      - 'save_content(typeof operator_queue_raw !== "undefined" ? operator_queue_raw : "", "{{Output}}/ai-analysis/.operator-queue-raw-{{TargetSpace}}.txt")'

  - name: save-operator-queue
    type: bash
    pre_condition: "{{enableOperatorQueue}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      csv_or_json_to_array() {
        value="$1"
        if [ -z "$value" ]; then
          echo '[]'
        elif printf '%s' "$value" | jq -e 'type == "array"' >/dev/null 2>&1; then
          printf '%s' "$value"
        else
          printf '%s' "$value" | jq -R 'split(",") | reduce .[] as $item ([]; ($item | gsub("^\\s+|\\s+$"; "")) as $normalized | if ($normalized != "" and (index($normalized) == null)) then . + [$normalized] else . end)'
        fi
      }

      extract_semantic_targets() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          jq -r '.results[]?.target // empty' "$file" 2>/dev/null | awk 'NF && !seen[$0]++' || true
        fi
      }

      if [ -f "{{Output}}/ai-analysis/.operator-queue-skip" ]; then
        echo '{"summary":{"total_tasks":0,"p1_tasks":0,"p2_tasks":0},"focus_targets":[],"tasks":[]}' > {{operatorQueueOutput}}
        exit 0
      fi

      ACTIVE_SEMANTIC_FILE="{{semanticSearchFile}}"
      for candidate in "{{semanticSearchFile}}" "{{fallbackSemanticSearchFile}}" "{{secondFallbackSemanticSearchFile}}"; do
        [ -n "$candidate" ] || continue
        if [ -f "$candidate" ] && jq empty "$candidate" >/dev/null 2>&1; then
          hits=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$candidate" 2>/dev/null || echo 0)
          if [ "${hits:-0}" -gt 0 ] 2>/dev/null; then
            ACTIVE_SEMANTIC_FILE="$candidate"
            break
          fi
        fi
      done

      ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
      DECISION_SOURCE_KIND="none"
      DECISION_FOCUS_JSON='[]'
      DECISION_PRIORITY_JSON='[]'
      DECISION_RESCAN_JSON='[]'
      PREV_SOURCE_KIND="none"
      PREV_PRIORITY_MODE=""
      PREV_CONFIDENCE_LEVEL=""
      PREV_QUEUE_EFFECTIVE=false
      PREV_MANUAL_TARGETS_JSON='[]'
      PREV_HIGH_CONFIDENCE_TARGETS_JSON='[]'
      PREV_COMBINED_TARGETS_JSON='[]'
      if [ -f "{{appliedDecisionFile}}" ] && jq empty "{{appliedDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{appliedDecisionFile}}"
        DECISION_SOURCE_KIND="applied-ai-decision"
      elif [ -f "{{aiDecisionFile}}" ] && jq empty "{{aiDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
        DECISION_SOURCE_KIND="ai-decision"
      fi
      if [ "$DECISION_SOURCE_KIND" != "none" ] && [ -f "$ACTIVE_DECISION_FILE" ] && jq empty "$ACTIVE_DECISION_FILE" 2>/dev/null; then
        DECISION_FOCUS_JSON=$(jq -c '.targets.focus_areas // .focus_areas // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_PRIORITY_JSON=$(jq -c '.targets.priority_targets // .priority_targets // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_RESCAN_JSON=$(jq -c '.targets.rescan_targets // .rescan_targets // .priority_targets // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
      fi
      DECISION_TARGET_COUNT=$(jq -nr \
        --argjson focus "$DECISION_FOCUS_JSON" \
        --argjson priority "$DECISION_PRIORITY_JSON" \
        --argjson rescan "$DECISION_RESCAN_JSON" \
        '($focus + $priority + $rescan) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' 2>/dev/null || echo 0)

      RAW_FILE="{{Output}}/ai-analysis/.operator-queue-raw-{{TargetSpace}}.txt"
      JSON_FILE="{{Output}}/ai-analysis/.operator-queue-json-{{TargetSpace}}.json"
      FALLBACK_TARGETS="{{Output}}/ai-analysis/.operator-queue-fallback-targets-{{TargetSpace}}.txt"
      [ -f "$RAW_FILE" ] || : > "$RAW_FILE"

      awk '
        BEGIN { capture = 0 }
        /^[[:space:]]*```json[[:space:]]*$/ { capture = 1; next }
        capture && /^[[:space:]]*```[[:space:]]*$/ { exit }
        capture { print }
      ' "$RAW_FILE" > "$JSON_FILE"

      if [ ! -s "$JSON_FILE" ]; then
        sed -n '/^[[:space:]]*{/,/^[[:space:]]*}[[:space:]]*$/p' "$RAW_FILE" > "$JSON_FILE"
      fi

      if [ -f "{{resumeContextFile}}" ] \
        && jq -e '(.scan_profile? != null) and (.severity? != null) and ((.followup_decision_source? != null) or (.refined_targets? != null) or (.seed_targets? != null))' "{{resumeContextFile}}" >/dev/null 2>&1; then
        PREV_SOURCE_KIND="resume-context"
        PREV_PRIORITY_MODE=$(jq -r '.priority_mode // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_CONFIDENCE_LEVEL=$(jq -r '.confidence_level // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_QUEUE_EFFECTIVE=$(jq -r 'if .queue_followup_effective != null then .queue_followup_effective elif .followup_summary.queue_followup_effective != null then .followup_summary.queue_followup_effective else ((.followup_summary.retest_queued_targets // 0) > 0) end' "{{resumeContextFile}}" 2>/dev/null || echo false)
        PREV_MANUAL_TARGETS_JSON=$(jq -c '.seed_targets.manual_first_targets // []' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_HIGH_CONFIDENCE_TARGETS_JSON=$(jq -c '.seed_targets.high_confidence_targets // []' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_COMBINED_TARGETS_JSON=$(jq -c '((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.refined_targets.priority_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.rescan_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
      elif [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
        PREV_SOURCE_KIND="decision-file"
        PREV_PRIORITY_MODE=$(jq -r '.seed_focus.priority_mode // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CONFIDENCE_LEVEL=$(jq -r '.seed_focus.confidence_level // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_QUEUE_EFFECTIVE=$(jq -r '.seed_focus.queue_followup_effective // .execution_feedback.queue_followup_effective // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_MANUAL_TARGETS_JSON=$(jq -c '.seed_targets.manual_first_targets // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_HIGH_CONFIDENCE_TARGETS_JSON=$(jq -c '.seed_targets.high_confidence_targets // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_COMBINED_TARGETS_JSON=$(jq -c '((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.rescan_targets // []) + (.seed_targets.semantic_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
      elif [ -n "{{previous_followup_combined_targets_list}}" ]; then
        PREV_SOURCE_KIND="queued-params"
        PREV_PRIORITY_MODE="{{previous_followup_priority_mode}}"
        PREV_CONFIDENCE_LEVEL="{{previous_followup_confidence_level}}"
        PREV_COMBINED_TARGETS_JSON=$(csv_or_json_to_array "{{previous_followup_combined_targets_list}}")
      fi

      if [ -s "$JSON_FILE" ] && jq empty "$JSON_FILE" 2>/dev/null; then
        jq \
          --arg decision_source_kind "$DECISION_SOURCE_KIND" \
          --argjson decision_target_count "$DECISION_TARGET_COUNT" \
          --argjson decision_focus_targets "$DECISION_FOCUS_JSON" \
          --argjson decision_priority_targets "$DECISION_PRIORITY_JSON" \
          --argjson decision_rescan_targets "$DECISION_RESCAN_JSON" \
          --arg previous_followup_source_kind "$PREV_SOURCE_KIND" \
          --arg previous_followup_priority_mode "$PREV_PRIORITY_MODE" \
          --arg previous_followup_confidence_level "$PREV_CONFIDENCE_LEVEL" \
          --argjson previous_followup_queue_followup_effective "$PREV_QUEUE_EFFECTIVE" \
          --argjson previous_followup_manual_targets "$PREV_MANUAL_TARGETS_JSON" \
          --argjson previous_followup_high_confidence_targets "$PREV_HIGH_CONFIDENCE_TARGETS_JSON" \
          --argjson previous_followup_targets_list "$PREV_COMBINED_TARGETS_JSON" \
          '
          def unique_list($items):
            reduce ($items[]? | .[]?) as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end);
          def target_in($arr; $value):
            (($arr | index($value)) != null);
          .summary = ((.summary // {}) + {
            total_tasks: (.summary.total_tasks // ([.tasks[]?] | length)),
            p1_tasks: (.summary.p1_tasks // 0),
            p2_tasks: (.summary.p2_tasks // 0),
            decision_source_kind: $decision_source_kind,
            decision_target_count: $decision_target_count,
            previous_followup_source_kind: $previous_followup_source_kind,
            previous_priority_mode: $previous_followup_priority_mode,
            previous_confidence_level: $previous_followup_confidence_level,
            previous_queue_followup_effective: $previous_followup_queue_followup_effective
          })
          | .focus_targets = (
              if $previous_followup_source_kind == "resume-context" and $previous_followup_priority_mode == "manual-first" then
                unique_list([$previous_followup_manual_targets, $previous_followup_high_confidence_targets, (.focus_targets // []), $decision_focus_targets, $decision_priority_targets, $decision_rescan_targets, $previous_followup_targets_list])
              else
                unique_list([(.focus_targets // []), $decision_focus_targets, $decision_priority_targets, $decision_rescan_targets])
              end
            )
          | .tasks = (
              (
                if $previous_followup_source_kind == "resume-context" and $previous_followup_priority_mode == "manual-first" then
                  [
                    ($previous_followup_manual_targets + $previous_followup_high_confidence_targets)[]? | {
                      id: "",
                      priority: "P1",
                      target: .,
                      title: "Resume manual-first follow-up",
                      reason: "resume-context manual-first target",
                      procedure: "Validate exploitability, authorization boundary, business logic abuse, and pivot potential manually",
                      expected_outcome: "Confirm whether the target can be exploited or chained further",
                      evidence: ["resume_context", "manual_first"]
                    }
                  ] + (.tasks // [])
                else
                  (.tasks // [])
                end
              )
              | reduce .[] as $item ([]; if ((map(.target // "") | index($item.target // "")) == null) then . + [$item] else . end)
              | map(
                  .priority = (
                    if target_in($previous_followup_manual_targets; .target) then "P1"
                    elif target_in($previous_followup_high_confidence_targets; .target) and ((.priority // "") == "" or .priority == "P2" or .priority == "P3") then "P1"
                    else (.priority // "P2")
                    end
                  )
                )
            )
        ' "$JSON_FILE" > {{operatorQueueOutput}}
      else
        if [ "$DECISION_TARGET_COUNT" -gt 0 ] 2>/dev/null; then
          {
            printf '%s\n' "$DECISION_FOCUS_JSON" | jq -r '.[]? // empty' 2>/dev/null
            printf '%s\n' "$DECISION_PRIORITY_JSON" | jq -r '.[]? // empty' 2>/dev/null
            printf '%s\n' "$DECISION_RESCAN_JSON" | jq -r '.[]? // empty' 2>/dev/null
          } | awk 'NF && !seen[$0]++' > "$FALLBACK_TARGETS" || true
        elif [ -f "{{retestPlanOutput}}" ] && jq empty "{{retestPlanOutput}}" 2>/dev/null; then
          jq -r '[.targets[]?.target, .automation_queue[]?.target] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | .[]' "{{retestPlanOutput}}" 2>/dev/null > "$FALLBACK_TARGETS" || true
        else
          : > "$FALLBACK_TARGETS"
        fi
        if [ "$PREV_SOURCE_KIND" = "resume-context" ]; then
          if [ "$PREV_PRIORITY_MODE" = "manual-first" ]; then
            {
              printf '%s\n' "$PREV_MANUAL_TARGETS_JSON" | jq -r '.[]? // empty' 2>/dev/null
              printf '%s\n' "$PREV_HIGH_CONFIDENCE_TARGETS_JSON" | jq -r '.[]? // empty' 2>/dev/null
              printf '%s\n' "$PREV_COMBINED_TARGETS_JSON" | jq -r '.[]? // empty' 2>/dev/null
              cat "$FALLBACK_TARGETS" 2>/dev/null || true
            } | awk 'NF && !seen[$0]++' > "$FALLBACK_TARGETS.tmp" 2>/dev/null && mv "$FALLBACK_TARGETS.tmp" "$FALLBACK_TARGETS" || true
          else
            printf '%s\n' "$PREV_COMBINED_TARGETS_JSON" | jq -r '.[]? // empty' 2>/dev/null >> "$FALLBACK_TARGETS" || true
            awk 'NF && !seen[$0]++' "$FALLBACK_TARGETS" > "$FALLBACK_TARGETS.tmp" 2>/dev/null && mv "$FALLBACK_TARGETS.tmp" "$FALLBACK_TARGETS" || true
          fi
        elif [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
          jq -r '((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.rescan_targets // []))[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$FALLBACK_TARGETS" || true
          awk 'NF && !seen[$0]++' "$FALLBACK_TARGETS" > "$FALLBACK_TARGETS.tmp" 2>/dev/null && mv "$FALLBACK_TARGETS.tmp" "$FALLBACK_TARGETS" || true
        elif [ -n "{{previous_followup_combined_targets_list}}" ]; then
          printf '%s\n' "$(csv_or_json_to_array "{{previous_followup_combined_targets_list}}")" | jq -r '.[]? // empty' 2>/dev/null >> "$FALLBACK_TARGETS" || true
          awk 'NF && !seen[$0]++' "$FALLBACK_TARGETS" > "$FALLBACK_TARGETS.tmp" 2>/dev/null && mv "$FALLBACK_TARGETS.tmp" "$FALLBACK_TARGETS" || true
        fi
        if [ ! -s "$FALLBACK_TARGETS" ]; then
          extract_semantic_targets "$ACTIVE_SEMANTIC_FILE" > "$FALLBACK_TARGETS" 2>/dev/null || true
        fi

        FALLBACK_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' "$FALLBACK_TARGETS" 2>/dev/null || echo '[]')
        jq -n \
          --argjson fallback_targets "$FALLBACK_JSON" \
          '{
            summary: {
              total_tasks: ($fallback_targets | length),
              p1_tasks: ([$fallback_targets[0:3][]] | length),
              p2_tasks: (if ($fallback_targets | length) > 3 then (($fallback_targets | length) - 3) else 0 end)
            },
            focus_targets: $fallback_targets,
            tasks: [
              range(0; ($fallback_targets | length)) as $i | {
                id: ("op-" + (($i + 1) | tostring)),
                priority: (if $i < 3 then "P1" else "P2" end),
                target: $fallback_targets[$i],
                title: "Manual validation follow-up",
                reason: "fallback task derived from ai decision / retest plan / semantic targets",
                procedure: "Validate exploitability, authorization boundary, business logic abuse, and pivot potential manually",
                expected_outcome: "Confirm whether the target can be exploited or chained further",
                evidence: ["ai_decision", "semantic_search", "fallback_generation"]
              }
            ]
          }' > {{operatorQueueOutput}}
      fi

      jq \
        --arg decision_source_kind "$DECISION_SOURCE_KIND" \
        --argjson decision_target_count "$DECISION_TARGET_COUNT" \
        --argjson decision_focus_targets "$DECISION_FOCUS_JSON" \
        --argjson decision_priority_targets "$DECISION_PRIORITY_JSON" \
        --argjson decision_rescan_targets "$DECISION_RESCAN_JSON" \
        --arg previous_followup_source_kind "$PREV_SOURCE_KIND" \
        --arg previous_followup_priority_mode "$PREV_PRIORITY_MODE" \
        --arg previous_followup_confidence_level "$PREV_CONFIDENCE_LEVEL" \
        --argjson previous_followup_queue_followup_effective "$PREV_QUEUE_EFFECTIVE" \
        --argjson previous_followup_manual_targets "$PREV_MANUAL_TARGETS_JSON" \
        --argjson previous_followup_high_confidence_targets "$PREV_HIGH_CONFIDENCE_TARGETS_JSON" \
        --argjson previous_followup_targets_list "$PREV_COMBINED_TARGETS_JSON" \
        '
        def unique_list($items):
          reduce ($items[]? | .[]?) as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end);
        def target_in($arr; $value):
          (($arr | index($value)) != null);
        .summary = ((.summary // {}) + {
          total_tasks: (.summary.total_tasks // ([.tasks[]?] | length)),
          p1_tasks: (.summary.p1_tasks // 0),
          p2_tasks: (.summary.p2_tasks // 0),
          decision_source_kind: $decision_source_kind,
          decision_target_count: $decision_target_count,
          previous_followup_source_kind: $previous_followup_source_kind,
          previous_priority_mode: $previous_followup_priority_mode,
          previous_confidence_level: $previous_followup_confidence_level,
          previous_queue_followup_effective: $previous_followup_queue_followup_effective
        })
        | .focus_targets = (
            if $previous_followup_source_kind == "resume-context" and $previous_followup_priority_mode == "manual-first" then
              unique_list([$previous_followup_manual_targets, $previous_followup_high_confidence_targets, (.focus_targets // []), $decision_focus_targets, $decision_priority_targets, $decision_rescan_targets, $previous_followup_targets_list])
            else
              unique_list([(.focus_targets // []), $decision_focus_targets, $decision_priority_targets, $decision_rescan_targets])
            end
          )
        | .tasks = (
            (
              if $previous_followup_source_kind == "resume-context" and $previous_followup_priority_mode == "manual-first" then
                [
                  ($previous_followup_manual_targets + $previous_followup_high_confidence_targets)[]? | {
                    id: "",
                    priority: "P1",
                    target: .,
                    title: "Resume manual-first follow-up",
                    reason: "resume-context manual-first target",
                    procedure: "Validate exploitability, authorization boundary, business logic abuse, and pivot potential manually",
                    expected_outcome: "Confirm whether the target can be exploited or chained further",
                    evidence: ["resume_context", "manual_first"]
                  }
                ] + (.tasks // [])
              else
                (.tasks // [])
              end
            )
            | reduce .[] as $item ([]; if ((map(.target // "") | index($item.target // "")) == null) then . + [$item] else . end)
            | map(
                .priority = (
                  if target_in($previous_followup_manual_targets; .target) then "P1"
                  elif target_in($previous_followup_high_confidence_targets; .target) and ((.priority // "") == "" or .priority == "P2" or .priority == "P3") then "P1"
                  else (.priority // "P2")
                  end
                )
              )
          )
      ' {{operatorQueueOutput}} > {{operatorQueueOutput}}.tmp 2>/dev/null && mv {{operatorQueueOutput}}.tmp {{operatorQueueOutput}} || true

      rm -f "$RAW_FILE" "$JSON_FILE" "$FALLBACK_TARGETS" 2>/dev/null || true

  - name: extract-operator-targets
    type: bash
    pre_condition: "{{enableOperatorQueue}}"
    command: |
      jq -r '
        [
          .focus_targets[]?,
          .tasks[]?.target
        ] | map(select(. != null and . != "")) | .[]
      ' {{operatorQueueOutput}} 2>/dev/null | awk 'NF && !seen[$0]++' > {{operatorQueueTargetsFile}} || true

      P1_COUNT=$(jq -r '[.tasks[]? | select(.priority == "P1")] | length' {{operatorQueueOutput}} 2>/dev/null || echo 0)
      P2_COUNT=$(jq -r '[.tasks[]? | select(.priority == "P2")] | length' {{operatorQueueOutput}} 2>/dev/null || echo 0)
      TOTAL_COUNT=$(jq -r '[.tasks[]?] | length' {{operatorQueueOutput}} 2>/dev/null || echo 0)

      jq \
        --argjson total "$TOTAL_COUNT" \
        --argjson p1 "$P1_COUNT" \
        --argjson p2 "$P2_COUNT" \
        '.summary.total_tasks = $total | .summary.p1_tasks = $p1 | .summary.p2_tasks = $p2' \
        {{operatorQueueOutput}} > {{operatorQueueOutput}}.tmp 2>/dev/null && mv {{operatorQueueOutput}}.tmp {{operatorQueueOutput}} || true

  - name: render-operator-queue-markdown
    type: bash
    pre_condition: "{{enableOperatorQueue}}"
    command: |
      {
        echo "# AI Operator Queue"
        echo "## 目标: {{Target}}"
        echo ""
        jq -r '.summary | "- Total tasks: \(.total_tasks // 0)\n- P1: \(.p1_tasks // 0)\n- P2: \(.p2_tasks // 0)"' {{operatorQueueOutput}} 2>/dev/null || true
        echo ""
        echo "## Focus Targets"
        jq -r '.focus_targets[]? | "- \(.)"' {{operatorQueueOutput}} 2>/dev/null || echo "- none"
        echo ""
        echo "## Tasks"
        jq -r '.tasks[]? | "- [\(.priority // "P2")] \(.title // "task") :: \(.target // "unknown") :: \(.reason // "n/a")"' {{operatorQueueOutput}} 2>/dev/null || echo "- none"
      } > {{operatorQueueMd}}

  - name: log-operator-queue-complete
    type: function
    pre_condition: "{{enableOperatorQueue}}"
    functions:
      - 'log_info("AI operator queue completed for {{Target}}")'

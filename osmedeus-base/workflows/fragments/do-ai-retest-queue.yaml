        echo ""
        set -- \
          "$OSM_BIN" worker queue new "$WORKFLOW_FLAG" "{{retestFlow}}" \
          -T "$ACTIVE_TARGET_FILE" \
          -p "knowledgeWorkspace={{knowledgeWorkspace}}" \
          -p "campaign_stage=retest" \
          -p "campaign_source_target={{Target}}" \
          -p "retest_priority={{retestPriority}}"
        if [ "$PREVIOUS_FOLLOWUP_TARGETS" -gt 0 ] 2>/dev/null; then
          set -- "$@" -p "previous_followup_targets=$PREVIOUS_FOLLOWUP_TARGETS"
        fi
        if [ "$PREVIOUS_PRIORITY_TARGETS" -gt 0 ] 2>/dev/null; then
          set -- "$@" -p "previous_followup_priority_targets=$PREVIOUS_PRIORITY_TARGETS"
        fi
        if [ "$PREVIOUS_FOCUS_AREAS" -gt 0 ] 2>/dev/null; then
          set -- "$@" -p "previous_followup_focus_areas=$PREVIOUS_FOCUS_AREAS"
        fi
        if [ "$PREVIOUS_MANUAL_FIRST_TARGETS" -gt 0 ] 2>/dev/null; then
          set -- "$@" -p "previous_followup_manual_first_targets=$PREVIOUS_MANUAL_FIRST_TARGETS"
        fi
        if [ "$PREVIOUS_HIGH_CONFIDENCE_TARGETS" -gt 0 ] 2>/dev/null; then
          set -- "$@" -p "previous_followup_high_confidence_targets=$PREVIOUS_HIGH_CONFIDENCE_TARGETS"
        fi
        if [ -n "$PREVIOUS_MANUAL_TARGETS_LIST" ]; then
          set -- "$@" -p "previous_followup_manual_first_targets_list=$PREVIOUS_MANUAL_TARGETS_LIST"
        fi
        if [ -n "$PREVIOUS_HIGH_CONFIDENCE_TARGETS_LIST" ]; then
          set -- "$@" -p "previous_followup_high_confidence_targets_list=$PREVIOUS_HIGH_CONFIDENCE_TARGETS_LIST"
        fi
        if [ -n "$PREVIOUS_COMBINED_TARGETS_LIST" ]; then
          set -- "$@" -p "previous_followup_combined_targets_list=$PREVIOUS_COMBINED_TARGETS_LIST"
        fi
        if [ -n "$PREVIOUS_REASONING" ]; then
          set -- "$@" -p "previous_followup_reasoning=$PREVIOUS_REASONING"
        fi
        if [ -n "$PREVIOUS_SCAN_PROFILE" ]; then
          set -- "$@" -p "previous_followup_scan_profile=$PREVIOUS_SCAN_PROFILE"
        fi
        if [ -n "$PREVIOUS_SEVERITY" ]; then
          set -- "$@" -p "previous_followup_severity=$PREVIOUS_SEVERITY"
        fi
        if [ -n "$PREVIOUS_PRIORITY_MODE" ]; then
          set -- "$@" -p "previous_followup_priority_mode=$PREVIOUS_PRIORITY_MODE"
        fi
        if [ -n "$PREVIOUS_CONFIDENCE_LEVEL" ]; then
          set -- "$@" -p "previous_followup_confidence_level=$PREVIOUS_CONFIDENCE_LEVEL"
        fi
        if [ -n "$PREVIOUS_NEXT_PHASE" ]; then
          set -- "$@" -p "previous_followup_next_phase=$PREVIOUS_NEXT_PHASE"
        fi
        if [ -n "$PREVIOUS_REUSE_SOURCES" ]; then
          set -- "$@" -p "previous_followup_reuse_sources=$PREVIOUS_REUSE_SOURCES"
        fi
        set -- "$@" -p "previous_followup_manual_followup_needed=$PREVIOUS_MANUAL_FOLLOWUP_NEEDED"
        set -- "$@" -p "previous_followup_campaign_followup_recommended=$PREVIOUS_CAMPAIGN_FOLLOWUP_RECOMMENDED"
        set -- "$@" -p "previous_followup_queue_followup_effective=$PREVIOUS_QUEUE_FOLLOWUP_EFFECTIVE"
        if [ "$PREVIOUS_ESCALATION_SCORE" -gt 0 ] 2>/dev/null; then
          set -- "$@" -p "previous_followup_escalation_score=$PREVIOUS_ESCALATION_SCORE"
        fi
        if [ -n "$PREVIOUS_CAMPAIGN_CREATE_STATUS" ]; then
          set -- "$@" -p "previous_followup_campaign_create_status=$PREVIOUS_CAMPAIGN_CREATE_STATUS"
        fi
        if [ -n "$PREVIOUS_CAMPAIGN_CREATE_ID" ]; then
          set -- "$@" -p "previous_followup_campaign_create_id=$PREVIOUS_CAMPAIGN_CREATE_ID"
        fi
        if [ "$PREVIOUS_CAMPAIGN_CREATE_QUEUED_RUNS" -gt 0 ] 2>/dev/null; then
          set -- "$@" -p "previous_followup_campaign_create_queued_runs=$PREVIOUS_CAMPAIGN_CREATE_QUEUED_RUNS"
        fi
        "$@"
      } > "{{retestQueueLog}}" 2>&1
      STATUS=$?

      if [ "$STATUS" -eq 0 ]; then
        jq -n \
          --arg workflow "{{retestFlow}}" \
          --arg kind "{{retestWorkflowKind}}" \
          --arg priority "{{retestPriority}}" \
          --arg target_file "$ACTIVE_TARGET_FILE" \
          --arg target_source "$TARGET_SOURCE" \
          --arg previous_reasoning "$PREVIOUS_REASONING" \
          --arg previous_scan_profile "$PREVIOUS_SCAN_PROFILE" \
          --arg previous_severity "$PREVIOUS_SEVERITY" \
          --arg previous_priority_mode "$PREVIOUS_PRIORITY_MODE" \
          --arg previous_confidence_level "$PREVIOUS_CONFIDENCE_LEVEL" \
          --arg previous_next_phase "$PREVIOUS_NEXT_PHASE" \
          --arg previous_campaign_create_status "$PREVIOUS_CAMPAIGN_CREATE_STATUS" \
          --arg previous_campaign_create_id "$PREVIOUS_CAMPAIGN_CREATE_ID" \
          --argjson previous_priority_targets "$PREVIOUS_PRIORITY_TARGETS" \
          --argjson previous_focus_areas "$PREVIOUS_FOCUS_AREAS" \
          --argjson previous_manual_first_targets "$PREVIOUS_MANUAL_FIRST_TARGETS" \
          --argjson previous_high_confidence_targets "$PREVIOUS_HIGH_CONFIDENCE_TARGETS" \
          --argjson previous_manual_first_targets_list "$PREVIOUS_MANUAL_TARGETS_JSON" \
          --argjson previous_high_confidence_targets_list "$PREVIOUS_HIGH_CONFIDENCE_TARGETS_JSON" \
          --argjson previous_combined_targets_list "$PREVIOUS_COMBINED_TARGETS_JSON" \
          --argjson previous_reuse_sources "$PREVIOUS_REUSE_SOURCES_JSON" \
          --argjson previous_manual_followup_needed "$PREVIOUS_MANUAL_FOLLOWUP_NEEDED" \
          --argjson previous_campaign_followup_recommended "$PREVIOUS_CAMPAIGN_FOLLOWUP_RECOMMENDED" \
          --argjson previous_queue_followup_effective "$PREVIOUS_QUEUE_FOLLOWUP_EFFECTIVE" \
          --argjson previous_escalation_score "$PREVIOUS_ESCALATION_SCORE" \
          --argjson previous_campaign_create_queued_runs "$PREVIOUS_CAMPAIGN_CREATE_QUEUED_RUNS" \
          --arg log_file "{{retestQueueLog}}" \
          --argjson queued_targets "$TARGET_COUNT" \
          --argjson previous_followup_targets "$PREVIOUS_FOLLOWUP_TARGETS" \
          '{
            status: "queued",
            workflow: $workflow,
            workflow_kind: $kind,
            priority: $priority,
            target_file: $target_file,
            target_source: $target_source,
            log_file: $log_file,
            queued_targets: $queued_targets,
            previous_followup_targets: $previous_followup_targets,
            previous_priority_targets: $previous_priority_targets,
            previous_focus_areas: $previous_focus_areas,
            previous_manual_first_targets: $previous_manual_first_targets,
            previous_high_confidence_targets: $previous_high_confidence_targets,
            previous_manual_first_targets_list: $previous_manual_first_targets_list,
            previous_high_confidence_targets_list: $previous_high_confidence_targets_list,
            previous_combined_targets_list: $previous_combined_targets_list,
            previous_reasoning: $previous_reasoning,
            previous_scan_profile: $previous_scan_profile,
            previous_severity: $previous_severity,
            previous_priority_mode: $previous_priority_mode,
            previous_confidence_level: $previous_confidence_level,
            previous_next_phase: $previous_next_phase,
            previous_reuse_sources: $previous_reuse_sources,
            previous_manual_followup_needed: $previous_manual_followup_needed,
            previous_campaign_followup_recommended: $previous_campaign_followup_recommended,
            previous_queue_followup_effective: $previous_queue_followup_effective,
            previous_escalation_score: $previous_escalation_score,
            previous_campaign_create_status: $previous_campaign_create_status,
            previous_campaign_create_id: $previous_campaign_create_id,
            previous_campaign_create_queued_runs: $previous_campaign_create_queued_runs
          }' > "{{retestQueueSummary}}"
      else
        jq -n \
          --arg workflow "{{retestFlow}}" \
          --arg kind "{{retestWorkflowKind}}" \
          --arg target_file "$ACTIVE_TARGET_FILE" \
          --arg target_source "$TARGET_SOURCE" \
          --arg previous_reasoning "$PREVIOUS_REASONING" \
          --arg previous_scan_profile "$PREVIOUS_SCAN_PROFILE" \
          --arg previous_severity "$PREVIOUS_SEVERITY" \
          --arg previous_priority_mode "$PREVIOUS_PRIORITY_MODE" \
          --arg previous_confidence_level "$PREVIOUS_CONFIDENCE_LEVEL" \
          --arg previous_next_phase "$PREVIOUS_NEXT_PHASE" \
          --arg previous_campaign_create_status "$PREVIOUS_CAMPAIGN_CREATE_STATUS" \
          --arg previous_campaign_create_id "$PREVIOUS_CAMPAIGN_CREATE_ID" \
          --argjson previous_priority_targets "$PREVIOUS_PRIORITY_TARGETS" \
          --argjson previous_focus_areas "$PREVIOUS_FOCUS_AREAS" \
          --argjson previous_manual_first_targets "$PREVIOUS_MANUAL_FIRST_TARGETS" \
          --argjson previous_high_confidence_targets "$PREVIOUS_HIGH_CONFIDENCE_TARGETS" \
          --argjson previous_manual_first_targets_list "$PREVIOUS_MANUAL_TARGETS_JSON" \
          --argjson previous_high_confidence_targets_list "$PREVIOUS_HIGH_CONFIDENCE_TARGETS_JSON" \
          --argjson previous_combined_targets_list "$PREVIOUS_COMBINED_TARGETS_JSON" \
          --argjson previous_reuse_sources "$PREVIOUS_REUSE_SOURCES_JSON" \
          --argjson previous_manual_followup_needed "$PREVIOUS_MANUAL_FOLLOWUP_NEEDED" \
          --argjson previous_campaign_followup_recommended "$PREVIOUS_CAMPAIGN_FOLLOWUP_RECOMMENDED" \
          --argjson previous_queue_followup_effective "$PREVIOUS_QUEUE_FOLLOWUP_EFFECTIVE" \
          --argjson previous_escalation_score "$PREVIOUS_ESCALATION_SCORE" \
          --argjson previous_campaign_create_queued_runs "$PREVIOUS_CAMPAIGN_CREATE_QUEUED_RUNS" \
          --arg log_file "{{retestQueueLog}}" \
          --argjson queued_targets 0 \
          --argjson previous_followup_targets "$PREVIOUS_FOLLOWUP_TARGETS" \
          '{
            status: "failed",
            workflow: $workflow,
            workflow_kind: $kind,
            target_file: $target_file,
            target_source: $target_source,
            log_file: $log_file,
            queued_targets: $queued_targets,
            previous_followup_targets: $previous_followup_targets,
            previous_priority_targets: $previous_priority_targets,
            previous_focus_areas: $previous_focus_areas,
            previous_manual_first_targets: $previous_manual_first_targets,
            previous_high_confidence_targets: $previous_high_confidence_targets,
            previous_manual_first_targets_list: $previous_manual_first_targets_list,
            previous_high_confidence_targets_list: $previous_high_confidence_targets_list,
            previous_combined_targets_list: $previous_combined_targets_list,
            previous_reasoning: $previous_reasoning,
            previous_scan_profile: $previous_scan_profile,
            previous_severity: $previous_severity,
            previous_priority_mode: $previous_priority_mode,
            previous_confidence_level: $previous_confidence_level,
            previous_next_phase: $previous_next_phase,
            previous_reuse_sources: $previous_reuse_sources,
            previous_manual_followup_needed: $previous_manual_followup_needed,
            previous_campaign_followup_recommended: $previous_campaign_followup_recommended,
            previous_queue_followup_effective: $previous_queue_followup_effective,
            previous_escalation_score: $previous_escalation_score,
            previous_campaign_create_status: $previous_campaign_create_status,
            previous_campaign_create_id: $previous_campaign_create_id,
            previous_campaign_create_queued_runs: $previous_campaign_create_queued_runs
          }' > "{{retestQueueSummary}}"
      fi

  - name: log-retest-queue-complete
    type: function
    pre_condition: "{{enableRetestQueue}}"
    functions:
      - 'log_info("AI retest queue step completed for {{Target}}")'

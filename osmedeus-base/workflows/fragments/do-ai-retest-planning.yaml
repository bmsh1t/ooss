kind: module
name: ai-retest-planning
description: Build an actionable retest plan from validated findings, attack chains, and semantic context

params:
  - name: retestPlanOutput
    default: "{{Output}}/ai-analysis/retest-plan-{{TargetSpace}}.json"
  - name: retestPlanMd
    default: "{{Output}}/ai-analysis/retest-plan-{{TargetSpace}}.md"
  - name: retestTargetsFile
    default: "{{Output}}/ai-analysis/retest-targets-{{TargetSpace}}.txt"

  - name: vulnValidationFile
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: attackChainFile
    default: "{{Output}}/ai-analysis/attack-chain-{{TargetSpace}}.json"
  - name: pathPlanningFile
    default: "{{Output}}/ai-analysis/path-planning-{{TargetSpace}}.json"
  - name: semanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-decision-followup-{{TargetSpace}}.json"
  - name: fallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-post-vuln-{{TargetSpace}}.json"
  - name: secondFallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-early-{{TargetSpace}}.json"
  - name: knowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-decision-followup-{{TargetSpace}}.json"
  - name: fallbackKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-post-vuln-{{TargetSpace}}.json"
  - name: secondFallbackKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-early-{{TargetSpace}}.json"
  - name: vectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-decision-followup-{{TargetSpace}}.json"
  - name: fallbackVectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-post-vuln-{{TargetSpace}}.json"
  - name: secondFallbackVectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-early-{{TargetSpace}}.json"
  - name: confirmedUrlsFile
    default: "{{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt"
  - name: entryPointsFile
    default: "{{Output}}/ai-analysis/entry-points-{{TargetSpace}}.txt"
  - name: bestPathTargetsFile
    default: "{{Output}}/ai-analysis/best-path-targets-{{TargetSpace}}.txt"
  - name: aiDecisionFile
    default: "{{Output}}/ai-analysis/ai-decision-{{TargetSpace}}.json"
  - name: appliedDecisionFile
    default: "{{Output}}/ai-analysis/applied-ai-decision-{{TargetSpace}}.json"
  - name: resumeContextFile
    default: "{{Output}}/ai-analysis/resume-context-{{TargetSpace}}.json"
  - name: previousFollowupDecisionFile
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"
  - name: previous_followup_targets
    default: ""
  - name: previous_followup_priority_targets
    default: ""
  - name: previous_followup_focus_areas
    default: ""
  - name: previous_followup_manual_first_targets
    default: ""
  - name: previous_followup_high_confidence_targets
    default: ""
  - name: previous_followup_reasoning
    default: ""
  - name: previous_followup_scan_profile
    default: ""
  - name: previous_followup_severity
    default: ""
  - name: previous_followup_priority_mode
    default: ""
  - name: previous_followup_confidence_level
    default: ""
  - name: previous_followup_next_phase
    default: ""
  - name: previous_followup_reuse_sources
    default: ""
  - name: previous_followup_manual_followup_needed
    default: ""
  - name: previous_followup_campaign_followup_recommended
    default: ""
  - name: previous_followup_queue_followup_effective
    default: ""
  - name: previous_followup_escalation_score
    default: ""
  - name: previous_followup_campaign_create_status
    default: ""
  - name: previous_followup_campaign_create_id
    default: ""
  - name: previous_followup_campaign_create_queued_runs
    default: ""
  - name: previous_followup_manual_first_targets_list
    default: ""
  - name: previous_followup_high_confidence_targets_list
    default: ""
  - name: previous_followup_combined_targets_list
    default: ""

  - name: retestFlow
    default: "web-analysis"
  - name: retestPriority
    default: "high"
  - name: enableRetestPlanning
    type: bool
    default: true

steps:
  - name: prepare-retest-planning
    type: function
    pre_condition: "{{enableRetestPlanning}}"
    functions:
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'create_folder("{{Output}}/ai-analysis/.input")'
      - 'log_info("Preparing AI retest planning for {{Target}}")'

  - name: build-retest-context
    type: bash
    pre_condition: "{{enableRetestPlanning}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/.input

      normalize_int() {
        value="$1"
        case "$value" in
          ''|*[!0-9]*)
            echo 0
            ;;
          *)
            echo "$value"
            ;;
        esac
      }

      normalize_bool() {
        value=$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')
        case "$value" in
          1|true|yes|y|on)
            echo true
            ;;
          *)
            echo false
            ;;
        esac
      }

      csv_or_json_to_array() {
        value="$1"
        if [ -z "$value" ]; then
          echo '[]'
        elif printf '%s' "$value" | jq -e 'type == "array"' >/dev/null 2>&1; then
          printf '%s' "$value"
        else
          printf '%s' "$value" | jq -R 'split(",") | reduce .[] as $item ([]; ($item | gsub("^\\s+|\\s+$"; "")) as $normalized | if ($normalized != "" and (index($normalized) == null)) then . + [$normalized] else . end)'
        fi
      }

      semantic_hits() {
        file="$1"
        [ -f "$file" ] || return 1
        jq empty "$file" >/dev/null 2>&1 || return 1
        hits=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$file" 2>/dev/null || echo 0)
        [ "${hits:-0}" -gt 0 ] 2>/dev/null
      }

      semantic_target_count() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          jq -r '[.results[]?.target | select(. != null and . != "")] | unique | length' "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      list_hits() {
        file="$1"
        [ -f "$file" ] || return 1
        jq empty "$file" >/dev/null 2>&1 || return 1
        hits=$(jq -r 'length // 0' "$file" 2>/dev/null || echo 0)
        [ "${hits:-0}" -gt 0 ] 2>/dev/null
      }

      pick_semantic_file() {
        for candidate in "{{semanticSearchFile}}" "{{fallbackSemanticSearchFile}}" "{{secondFallbackSemanticSearchFile}}"; do
          [ -n "$candidate" ] || continue
          if semantic_hits "$candidate"; then
            printf '%s\n' "$candidate"
            return 0
          fi
        done
        printf '%s\n' "{{semanticSearchFile}}"
      }

      pick_list_file() {
        primary="$1"
        fallback="$2"
        second="$3"
        for candidate in "$primary" "$fallback" "$second"; do
          [ -n "$candidate" ] || continue
          if list_hits "$candidate"; then
            printf '%s\n' "$candidate"
            return 0
          fi
        done
        printf '%s\n' "$primary"
      }

      ACTIVE_SEMANTIC_FILE=$(pick_semantic_file)
      ACTIVE_KNOWLEDGE_FILE=$(pick_list_file "{{knowledgeSearchFile}}" "{{fallbackKnowledgeSearchFile}}" "{{secondFallbackKnowledgeSearchFile}}")
      ACTIVE_VECTOR_KNOWLEDGE_FILE=$(pick_list_file "{{vectorKnowledgeSearchFile}}" "{{fallbackVectorKnowledgeSearchFile}}" "{{secondFallbackVectorKnowledgeSearchFile}}")
      ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
      DECISION_SOURCE_KIND="none"
      DECISION_FOCUS_JSON='[]'
      DECISION_PRIORITY_JSON='[]'
      DECISION_RESCAN_JSON='[]'
      DECISION_TARGETS_JSON='[]'
      DECISION_TARGET_COUNT=0

      if [ -f "{{appliedDecisionFile}}" ] && jq empty "{{appliedDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{appliedDecisionFile}}"
        DECISION_SOURCE_KIND="applied-ai-decision"
      elif [ -f "{{aiDecisionFile}}" ] && jq empty "{{aiDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
        DECISION_SOURCE_KIND="ai-decision"
      fi

      if [ "$DECISION_SOURCE_KIND" != "none" ] && [ -f "$ACTIVE_DECISION_FILE" ] && jq empty "$ACTIVE_DECISION_FILE" 2>/dev/null; then
        DECISION_FOCUS_JSON=$(jq -c '.targets.focus_areas // .focus_areas // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_PRIORITY_JSON=$(jq -c '.targets.priority_targets // .priority_targets // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_RESCAN_JSON=$(jq -c '.targets.rescan_targets // .rescan_targets // .priority_targets // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_TARGETS_JSON=$(jq -cn \
          --argjson focus "$DECISION_FOCUS_JSON" \
          --argjson priority "$DECISION_PRIORITY_JSON" \
          --argjson rescan "$DECISION_RESCAN_JSON" \
          '($focus + $priority + $rescan) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' 2>/dev/null || echo '[]')
        DECISION_TARGET_COUNT=$(printf '%s\n' "$DECISION_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)
      fi

      count_lines_safe() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      CONFIRMED_COUNT=$(count_lines_safe "{{confirmedUrlsFile}}")
      ENTRY_COUNT=$(count_lines_safe "{{entryPointsFile}}")
      BEST_COUNT=$(count_lines_safe "{{bestPathTargetsFile}}")
      PREV_FOLLOWUP_TARGETS=0
      PREV_SOURCE_KIND="none"
      PREV_PRIORITY_MODE=""
      PREV_CONFIDENCE_LEVEL=""
      PREV_NEXT_PHASE=""
      PREV_REUSE_SOURCES_JSON='[]'
      PREV_MANUAL_NEEDED=false
      PREV_CAMPAIGN_RECOMMENDED=false
      PREV_QUEUE_EFFECTIVE=false
      PREV_ESCALATION_SCORE=0
      PREV_MANUAL_FIRST_COUNT=0
      PREV_HIGH_CONFIDENCE_COUNT=0
      PREV_MANUAL_TARGETS_JSON='[]'
      PREV_HIGH_CONFIDENCE_TARGETS_JSON='[]'
      PREV_COMBINED_TARGETS_JSON='[]'
      PREV_CAMPAIGN_CREATE_STATUS=""
      PREV_CAMPAIGN_CREATE_ID=""
      PREV_CAMPAIGN_CREATE_QUEUED_RUNS=0
      SEMANTIC_COUNT=0
      KNOWLEDGE_COUNT=0
      VECTOR_KNOWLEDGE_COUNT=0
      SEMANTIC_TARGET_COUNT=0
      if [ -f "$ACTIVE_SEMANTIC_FILE" ] && jq empty "$ACTIVE_SEMANTIC_FILE" 2>/dev/null; then
        SEMANTIC_COUNT=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$ACTIVE_SEMANTIC_FILE" 2>/dev/null || echo 0)
        SEMANTIC_TARGET_COUNT=$(semantic_target_count "$ACTIVE_SEMANTIC_FILE")
      fi
      if [ -f "$ACTIVE_KNOWLEDGE_FILE" ] && jq empty "$ACTIVE_KNOWLEDGE_FILE" 2>/dev/null; then
        KNOWLEDGE_COUNT=$(jq -r 'length' "$ACTIVE_KNOWLEDGE_FILE" 2>/dev/null || echo 0)
      fi
      if [ -f "$ACTIVE_VECTOR_KNOWLEDGE_FILE" ] && jq empty "$ACTIVE_VECTOR_KNOWLEDGE_FILE" 2>/dev/null; then
        VECTOR_KNOWLEDGE_COUNT=$(jq -r 'length' "$ACTIVE_VECTOR_KNOWLEDGE_FILE" 2>/dev/null || echo 0)
      fi
      if [ -f "{{resumeContextFile}}" ] \
        && jq -e '(.scan_profile? != null) and (.severity? != null) and ((.followup_decision_source? != null) or (.refined_targets? != null) or (.seed_targets? != null))' "{{resumeContextFile}}" >/dev/null 2>&1; then
        PREV_SOURCE_KIND="resume-context"
        PREV_FOLLOWUP_TARGETS=$(jq -r '[((.refined_targets.priority_targets // []) + (.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.rescan_targets // []) + (.seed_targets.confirmed_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{resumeContextFile}}" 2>/dev/null || echo 0)
        PREV_PRIORITY_MODE=$(jq -r '.priority_mode // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_CONFIDENCE_LEVEL=$(jq -r '.confidence_level // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_NEXT_PHASE=$(jq -r '.next_phase // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_REUSE_SOURCES_JSON=$(jq -c '.reuse_sources // []' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_MANUAL_NEEDED=$(jq -r 'if .manual_followup_needed != null then .manual_followup_needed elif .followup_summary.manual_followup_needed != null then .followup_summary.manual_followup_needed else ((.followup_summary.operator_tasks // 0) > 0 or (.followup_summary.rescan_critical // 0) > 0 or (.followup_summary.rescan_high // 0) > 0) end' "{{resumeContextFile}}" 2>/dev/null || echo false)
        PREV_CAMPAIGN_RECOMMENDED=$(jq -r 'if .campaign_followup_recommended != null then .campaign_followup_recommended elif .followup_summary.campaign_followup_recommended != null then .followup_summary.campaign_followup_recommended else ((.followup_summary.campaign_ready // false) == true and (.followup_summary.campaign_targets // 0) > 0) end' "{{resumeContextFile}}" 2>/dev/null || echo false)
        PREV_QUEUE_EFFECTIVE=$(jq -r 'if .queue_followup_effective != null then .queue_followup_effective elif .followup_summary.queue_followup_effective != null then .followup_summary.queue_followup_effective else ((.followup_summary.retest_queued_targets // 0) > 0) end' "{{resumeContextFile}}" 2>/dev/null || echo false)
        PREV_ESCALATION_SCORE=$(jq -r '.signal_scores.escalation_score // 0' "{{resumeContextFile}}" 2>/dev/null || echo 0)
        PREV_MANUAL_FIRST_COUNT=$(jq -r '[((.seed_targets.manual_first_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{resumeContextFile}}" 2>/dev/null || echo 0)
        PREV_HIGH_CONFIDENCE_COUNT=$(jq -r '[((.seed_targets.high_confidence_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{resumeContextFile}}" 2>/dev/null || echo 0)
        PREV_MANUAL_TARGETS_JSON=$(jq -c '.seed_targets.manual_first_targets // []' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_HIGH_CONFIDENCE_TARGETS_JSON=$(jq -c '.seed_targets.high_confidence_targets // []' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_COMBINED_TARGETS_JSON=$(jq -c '((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.refined_targets.priority_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.rescan_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.semantic_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_CAMPAIGN_CREATE_STATUS=$(jq -r '.campaign_create.status // .followup_summary.campaign_create_status // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_CAMPAIGN_CREATE_ID=$(jq -r '.campaign_create.campaign_id // .followup_summary.campaign_create_id // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.campaign_create.queued_runs // .followup_summary.campaign_create_queued_runs // 0' "{{resumeContextFile}}" 2>/dev/null || echo 0)
      elif [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
        PREV_SOURCE_KIND="decision-file"
        PREV_FOLLOWUP_TARGETS=$(jq -r '[((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_targets // []) + (.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.confirmed_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_PRIORITY_MODE=$(jq -r '.seed_focus.priority_mode // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CONFIDENCE_LEVEL=$(jq -r '.seed_focus.confidence_level // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_NEXT_PHASE=$(jq -r '.seed_focus.next_phase // .execution_feedback.next_phase // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_REUSE_SOURCES_JSON=$(jq -c '.seed_focus.reuse_sources // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_MANUAL_NEEDED=$(jq -r '.seed_focus.manual_followup_needed // .execution_feedback.manual_followup_needed // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_CAMPAIGN_RECOMMENDED=$(jq -r '.seed_focus.campaign_followup_recommended // .execution_feedback.campaign_followup_recommended // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_QUEUE_EFFECTIVE=$(jq -r '.seed_focus.queue_followup_effective // .execution_feedback.queue_followup_effective // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_ESCALATION_SCORE=$(jq -r '.seed_focus.signal_scores.escalation_score // 0' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_MANUAL_FIRST_COUNT=$(jq -r '[((.seed_targets.manual_first_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_HIGH_CONFIDENCE_COUNT=$(jq -r '[((.seed_targets.high_confidence_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_MANUAL_TARGETS_JSON=$(jq -c '.seed_targets.manual_first_targets // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_HIGH_CONFIDENCE_TARGETS_JSON=$(jq -c '.seed_targets.high_confidence_targets // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_COMBINED_TARGETS_JSON=$(jq -c '((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_targets // []) + (.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.semantic_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_CAMPAIGN_CREATE_STATUS=$(jq -r '.followup_summary.campaign_create_status // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CAMPAIGN_CREATE_ID=$(jq -r '.followup_summary.campaign_create_id // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.followup_summary.campaign_create_queued_runs // 0' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
      else
        PREV_PARAM_MANUAL_TARGETS_JSON=$(csv_or_json_to_array "{{previous_followup_manual_first_targets_list}}")
        PREV_PARAM_HIGH_CONFIDENCE_TARGETS_JSON=$(csv_or_json_to_array "{{previous_followup_high_confidence_targets_list}}")
        PREV_PARAM_COMBINED_TARGETS_JSON=$(csv_or_json_to_array "{{previous_followup_combined_targets_list}}")
        PREV_PARAM_TARGET_COUNT=$(normalize_int "{{previous_followup_targets}}")
        PREV_PARAM_MANUAL_COUNT=$(normalize_int "{{previous_followup_manual_first_targets}}")
        PREV_PARAM_HIGH_CONFIDENCE_COUNT=$(normalize_int "{{previous_followup_high_confidence_targets}}")
        PREV_PARAM_PRIORITY_MODE="{{previous_followup_priority_mode}}"
        PREV_PARAM_CONFIDENCE_LEVEL="{{previous_followup_confidence_level}}"
        PREV_PARAM_NEXT_PHASE="{{previous_followup_next_phase}}"
        PREV_PARAM_REUSE_SOURCES_JSON=$(csv_or_json_to_array "{{previous_followup_reuse_sources}}")
        PREV_PARAM_MANUAL_NEEDED=$(normalize_bool "{{previous_followup_manual_followup_needed}}")
        PREV_PARAM_CAMPAIGN_RECOMMENDED=$(normalize_bool "{{previous_followup_campaign_followup_recommended}}")
        PREV_PARAM_QUEUE_EFFECTIVE=$(normalize_bool "{{previous_followup_queue_followup_effective}}")
        PREV_PARAM_ESCALATION_SCORE=$(normalize_int "{{previous_followup_escalation_score}}")
        PREV_PARAM_CAMPAIGN_CREATE_STATUS="{{previous_followup_campaign_create_status}}"
        PREV_PARAM_CAMPAIGN_CREATE_ID="{{previous_followup_campaign_create_id}}"
        PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS=$(normalize_int "{{previous_followup_campaign_create_queued_runs}}")

        PREV_PARAM_COMBINED_COUNT=$(printf '%s\n' "$PREV_PARAM_COMBINED_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)
        PREV_PARAM_MANUAL_JSON_COUNT=$(printf '%s\n' "$PREV_PARAM_MANUAL_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)
        PREV_PARAM_HIGH_JSON_COUNT=$(printf '%s\n' "$PREV_PARAM_HIGH_CONFIDENCE_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)

        if [ "$PREV_PARAM_TARGET_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_COMBINED_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_MANUAL_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_HIGH_CONFIDENCE_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_MANUAL_JSON_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_HIGH_JSON_COUNT" -gt 0 ] 2>/dev/null \
          || [ -n "$PREV_PARAM_PRIORITY_MODE" ] \
          || [ -n "$PREV_PARAM_CONFIDENCE_LEVEL" ] \
          || [ -n "$PREV_PARAM_NEXT_PHASE" ] \
          || [ "$PREV_PARAM_MANUAL_NEEDED" = "true" ] \
          || [ "$PREV_PARAM_CAMPAIGN_RECOMMENDED" = "true" ] \
          || [ "$PREV_PARAM_QUEUE_EFFECTIVE" = "true" ] \
          || [ "$PREV_PARAM_ESCALATION_SCORE" -gt 0 ] 2>/dev/null \
          || [ -n "$PREV_PARAM_CAMPAIGN_CREATE_STATUS" ] \
          || [ -n "$PREV_PARAM_CAMPAIGN_CREATE_ID" ] \
          || [ "$PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS" -gt 0 ] 2>/dev/null; then
          PREV_FOLLOWUP_TARGETS="$PREV_PARAM_TARGET_COUNT"
          PREV_SOURCE_KIND="queued-params"
          if [ "$PREV_FOLLOWUP_TARGETS" -eq 0 ] 2>/dev/null; then
            PREV_FOLLOWUP_TARGETS="$PREV_PARAM_COMBINED_COUNT"
          fi
          PREV_PRIORITY_MODE="$PREV_PARAM_PRIORITY_MODE"
          PREV_CONFIDENCE_LEVEL="$PREV_PARAM_CONFIDENCE_LEVEL"
          PREV_NEXT_PHASE="$PREV_PARAM_NEXT_PHASE"
          PREV_REUSE_SOURCES_JSON="$PREV_PARAM_REUSE_SOURCES_JSON"
          PREV_MANUAL_NEEDED="$PREV_PARAM_MANUAL_NEEDED"
          PREV_CAMPAIGN_RECOMMENDED="$PREV_PARAM_CAMPAIGN_RECOMMENDED"
          PREV_QUEUE_EFFECTIVE="$PREV_PARAM_QUEUE_EFFECTIVE"
          PREV_ESCALATION_SCORE="$PREV_PARAM_ESCALATION_SCORE"
          PREV_MANUAL_FIRST_COUNT="$PREV_PARAM_MANUAL_COUNT"
          if [ "$PREV_MANUAL_FIRST_COUNT" -eq 0 ] 2>/dev/null; then
            PREV_MANUAL_FIRST_COUNT="$PREV_PARAM_MANUAL_JSON_COUNT"
          fi
          PREV_HIGH_CONFIDENCE_COUNT="$PREV_PARAM_HIGH_CONFIDENCE_COUNT"
          if [ "$PREV_HIGH_CONFIDENCE_COUNT" -eq 0 ] 2>/dev/null; then
            PREV_HIGH_CONFIDENCE_COUNT="$PREV_PARAM_HIGH_JSON_COUNT"
          fi
          PREV_MANUAL_TARGETS_JSON="$PREV_PARAM_MANUAL_TARGETS_JSON"
          PREV_HIGH_CONFIDENCE_TARGETS_JSON="$PREV_PARAM_HIGH_CONFIDENCE_TARGETS_JSON"
          PREV_COMBINED_TARGETS_JSON="$PREV_PARAM_COMBINED_TARGETS_JSON"
          PREV_CAMPAIGN_CREATE_STATUS="$PREV_PARAM_CAMPAIGN_CREATE_STATUS"
          PREV_CAMPAIGN_CREATE_ID="$PREV_PARAM_CAMPAIGN_CREATE_ID"
          PREV_CAMPAIGN_CREATE_QUEUED_RUNS="$PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS"
        fi
      fi

      jq -n \
        --arg target "{{Target}}" \
        --arg retest_flow "{{retestFlow}}" \
        --arg priority "{{retestPriority}}" \
        --arg vuln_file "{{vulnValidationFile}}" \
        --arg attack_chain_file "{{attackChainFile}}" \
        --arg path_planning_file "{{pathPlanningFile}}" \
        --arg semantic_file "$ACTIVE_SEMANTIC_FILE" \
        --arg knowledge_file "$ACTIVE_KNOWLEDGE_FILE" \
        --arg vector_knowledge_file "$ACTIVE_VECTOR_KNOWLEDGE_FILE" \
        --arg decision_file "{{aiDecisionFile}}" \
        --arg applied_decision_file "{{appliedDecisionFile}}" \
        --arg active_decision_file "$ACTIVE_DECISION_FILE" \
        --arg previous_followup_file "{{previousFollowupDecisionFile}}" \
        --arg confirmed_file "{{confirmedUrlsFile}}" \
        --arg entry_points_file "{{entryPointsFile}}" \
        --arg best_targets_file "{{bestPathTargetsFile}}" \
        --argjson confirmed_count "$CONFIRMED_COUNT" \
        --argjson entry_count "$ENTRY_COUNT" \
        --argjson best_count "$BEST_COUNT" \
        --arg decision_source_kind "$DECISION_SOURCE_KIND" \
        --argjson decision_target_count "$DECISION_TARGET_COUNT" \
        --argjson decision_focus_targets "$DECISION_FOCUS_JSON" \
        --argjson decision_priority_targets "$DECISION_PRIORITY_JSON" \
        --argjson decision_rescan_targets "$DECISION_RESCAN_JSON" \
        --argjson previous_followup_targets "$PREV_FOLLOWUP_TARGETS" \
        --arg previous_followup_source_kind "$PREV_SOURCE_KIND" \
        --arg previous_followup_priority_mode "$PREV_PRIORITY_MODE" \
        --arg previous_followup_confidence_level "$PREV_CONFIDENCE_LEVEL" \
        --arg previous_followup_next_phase "$PREV_NEXT_PHASE" \
        --arg previous_followup_campaign_create_status "$PREV_CAMPAIGN_CREATE_STATUS" \
        --arg previous_followup_campaign_create_id "$PREV_CAMPAIGN_CREATE_ID" \
        --argjson previous_followup_reuse_sources "$PREV_REUSE_SOURCES_JSON" \
        --argjson previous_followup_manual_followup_needed "$PREV_MANUAL_NEEDED" \
        --argjson previous_followup_campaign_followup_recommended "$PREV_CAMPAIGN_RECOMMENDED" \
        --argjson previous_followup_queue_followup_effective "$PREV_QUEUE_EFFECTIVE" \
        --argjson previous_followup_escalation_score "$PREV_ESCALATION_SCORE" \
        --argjson previous_followup_manual_first_targets "$PREV_MANUAL_FIRST_COUNT" \
        --argjson previous_followup_high_confidence_targets "$PREV_HIGH_CONFIDENCE_COUNT" \
        --argjson previous_followup_manual_first_targets_list "$PREV_MANUAL_TARGETS_JSON" \
        --argjson previous_followup_high_confidence_targets_list "$PREV_HIGH_CONFIDENCE_TARGETS_JSON" \
        --argjson previous_followup_combined_targets_list "$PREV_COMBINED_TARGETS_JSON" \
        --argjson previous_followup_campaign_create_queued_runs "$PREV_CAMPAIGN_CREATE_QUEUED_RUNS" \
        --argjson semantic_count "$SEMANTIC_COUNT" \
        --argjson semantic_target_count "$SEMANTIC_TARGET_COUNT" \
        --argjson knowledge_count "$KNOWLEDGE_COUNT" \
        --argjson vector_knowledge_count "$VECTOR_KNOWLEDGE_COUNT" \
        '{
          target: $target,
          retest_flow: $retest_flow,
          priority: $priority,
          files: {
            vuln_validation: $vuln_file,
            attack_chain: $attack_chain_file,
            path_planning: $path_planning_file,
            semantic_search: $semantic_file,
            knowledge_search: $knowledge_file,
            vector_knowledge_search: $vector_knowledge_file,
            ai_decision: $decision_file,
            applied_ai_decision: $applied_decision_file,
            active_ai_decision: $active_decision_file,
            previous_followup: $previous_followup_file,
            confirmed_urls: $confirmed_file,
            entry_points: $entry_points_file,
            best_targets: $best_targets_file
          },
          counts: {
            confirmed_urls: $confirmed_count,
            attack_chain_entry_points: $entry_count,
            best_path_targets: $best_count,
            decision_targets: $decision_target_count,
            previous_followup_targets: $previous_followup_targets,
            previous_followup_manual_first_targets: $previous_followup_manual_first_targets,
            previous_followup_high_confidence_targets: $previous_followup_high_confidence_targets,
            previous_followup_escalation_score: $previous_followup_escalation_score,
            previous_followup_campaign_create_queued_runs: $previous_followup_campaign_create_queued_runs,
            semantic_results: $semantic_count,
            semantic_targets: $semantic_target_count,
            knowledge_hits: $knowledge_count,
            vector_knowledge_hits: $vector_knowledge_count
          },
          decision: {
            source_kind: $decision_source_kind,
            focus_targets: $decision_focus_targets,
            priority_targets: $decision_priority_targets,
            rescan_targets: $decision_rescan_targets
          },
          previous_followup: {
            source_kind: $previous_followup_source_kind,
            priority_mode: $previous_followup_priority_mode,
            confidence_level: $previous_followup_confidence_level,
            next_phase: $previous_followup_next_phase,
            reuse_sources: $previous_followup_reuse_sources,
            manual_followup_needed: $previous_followup_manual_followup_needed,
            campaign_followup_recommended: $previous_followup_campaign_followup_recommended,
            queue_followup_effective: $previous_followup_queue_followup_effective,
            escalation_score: $previous_followup_escalation_score,
            manual_first_targets: $previous_followup_manual_first_targets,
            high_confidence_targets: $previous_followup_high_confidence_targets,
            manual_first_targets_list: $previous_followup_manual_first_targets_list,
            high_confidence_targets_list: $previous_followup_high_confidence_targets_list,
            combined_targets_list: $previous_followup_combined_targets_list,
            campaign_create_status: $previous_followup_campaign_create_status,
            campaign_create_id: $previous_followup_campaign_create_id,
            campaign_create_queued_runs: $previous_followup_campaign_create_queued_runs
          }
        }' > {{Output}}/ai-analysis/.input/retest-context.json

      if [ "$CONFIRMED_COUNT" -eq 0 ] && [ "$ENTRY_COUNT" -eq 0 ] && [ "$BEST_COUNT" -eq 0 ] && [ "$DECISION_TARGET_COUNT" -eq 0 ] && [ "$SEMANTIC_TARGET_COUNT" -eq 0 ] && [ "$PREV_FOLLOWUP_TARGETS" -eq 0 ]; then
        echo "[Retest] No actionable targets found, using fallback plan"
        echo "SKIP_AI=true" > {{Output}}/ai-analysis/.retest-plan-skip
      else
        rm -f {{Output}}/ai-analysis/.retest-plan-skip 2>/dev/null || true
      fi

  - name: ai-generate-retest-plan
    type: agent
    pre_condition: '{{enableRetestPlanning}} && !file_exists("{{Output}}/ai-analysis/.retest-plan-skip")'
    max_iterations: 4
    timeout: 600
    on_error:
      - action: continue
    system_prompt: |
      你是一个实战渗透测试负责人，要把扫描结果转成可执行的复测计划。

      输出要求：
      1. 先写简短分析，说明为什么这些目标值得复测
      2. 然后输出一个 JSON 代码块

      JSON 格式：
      ```json
      {
        "summary": {
          "recommended_flow": "web-analysis",
          "priority": "high",
          "total_targets": 2,
          "objective": "复测已确认漏洞并验证可利用链"
        },
        "targets": [
          {
            "target": "https://api.example.com/login",
            "priority": "P1",
            "reason": "已确认注入点，且属于攻击链入口",
            "retest_actions": ["重复验证", "补充 payload", "权限边界检查"],
            "recommended_modules": ["nuclei", "httpx"],
            "workflow": "web-analysis"
          }
        ],
        "manual_checks": [
          {
            "title": "认证绕过",
            "target": "https://api.example.com/login",
            "reason": "高价值认证面"
          }
        ],
        "automation_queue": [
          {
            "workflow": "web-analysis",
            "target": "https://api.example.com/login",
            "priority": "high",
            "reason": "confirmed + chain entry"
          }
        ]
      }
      ```

      约束：
      - target 字段必须是具体 URL 或主机
      - 只输出和当前数据直接相关的条目
      - 优先选择 confirmed URL、攻击链入口和最佳路径目标
    query: |
      为 {{Target}} 生成复测计划。

      先读取 {{Output}}/ai-analysis/.input/retest-context.json 获取上下文。
      然后按需读取里面列出的文件，结合 validated findings、attack chain、path planning、semantic search、knowledge hits、vector knowledge hits 和 ai decision，输出复测计划。
      优先消费 active_ai_decision / applied_ai_decision 中的 focus_areas、priority_targets、rescan_targets，把这些目标转成低噪音、可复现的复测条目。

      优先级原则：
      - validated finding + attack chain entry + semantic/knowledge 多次命中的目标，排最前
      - 认证、后台、API、文件处理、业务逻辑入口优先
      - 如果 previous_followup.priority_mode=manual-first 或 manual_followup_needed=true，优先把相关目标放进 targets/manual_checks
      - 如果 previous_followup.queue_followup_effective=true，减少重复噪音，优先补充新证据和仍未闭环的关键点
      - 如果 previous_followup.campaign_followup_recommended=true，保留适合批量推进的 automation_queue 条目，但不要压过 manual-first 目标
      - previous_followup.reuse_sources 表示哪些来源在上一轮已证明有效，应优先消费这些线索
      - 计划要偏低噪音、可复现、适合真实复测，不要堆无意义动作

      最终输出：
      1. 简短分析
      2. JSON 代码块
    agent_tools:
      - preset: read_file
      - preset: file_exists
      - preset: save_content
    exports:
      retest_plan_raw: "{{agent_content}}"

  - name: persist-retest-plan-raw
    type: function
    pre_condition: "{{enableRetestPlanning}}"
    functions:
      - 'save_content(typeof retest_plan_raw !== "undefined" ? retest_plan_raw : "", "{{Output}}/ai-analysis/.retest-plan-raw-{{TargetSpace}}.txt")'

  - name: save-retest-plan
    type: bash
    pre_condition: "{{enableRetestPlanning}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      normalize_int() {
        value="$1"
        case "$value" in
          ''|*[!0-9]*)
            echo 0
            ;;
          *)
            echo "$value"
            ;;
        esac
      }

      normalize_bool() {
        value=$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')
        case "$value" in
          1|true|yes|y|on)
            echo true
            ;;
          *)
            echo false
            ;;
        esac
      }

      csv_or_json_to_array() {
        value="$1"
        if [ -z "$value" ]; then
          echo '[]'
        elif printf '%s' "$value" | jq -e 'type == "array"' >/dev/null 2>&1; then
          printf '%s' "$value"
        else
          printf '%s' "$value" | jq -R 'split(",") | reduce .[] as $item ([]; ($item | gsub("^\\s+|\\s+$"; "")) as $normalized | if ($normalized != "" and (index($normalized) == null)) then . + [$normalized] else . end)'
        fi
      }

      extract_semantic_targets() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          jq -r '.results[]?.target // empty' "$file" 2>/dev/null | awk 'NF && !seen[$0]++' || true
        fi
      }

      PREV_PRIORITY_MODE=""
      PREV_SOURCE_KIND="none"
      PREV_CONFIDENCE_LEVEL=""
      PREV_NEXT_PHASE=""
      PREV_REUSE_SOURCES_JSON='[]'
      PREV_MANUAL_NEEDED=false
      PREV_CAMPAIGN_RECOMMENDED=false
      PREV_QUEUE_EFFECTIVE=false
      PREV_ESCALATION_SCORE=0
      PREV_MANUAL_TARGETS_JSON='[]'
      PREV_HIGH_CONFIDENCE_TARGETS_JSON='[]'
      PREV_COMBINED_TARGETS_JSON='[]'
      PREV_CAMPAIGN_CREATE_STATUS=""
      PREV_CAMPAIGN_CREATE_ID=""
      PREV_CAMPAIGN_CREATE_QUEUED_RUNS=0
      ACTIVE_SEMANTIC_FILE="{{semanticSearchFile}}"
      for candidate in "{{semanticSearchFile}}" "{{fallbackSemanticSearchFile}}" "{{secondFallbackSemanticSearchFile}}"; do
        [ -n "$candidate" ] || continue
        if [ -f "$candidate" ] && jq empty "$candidate" >/dev/null 2>&1; then
          hits=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$candidate" 2>/dev/null || echo 0)
          if [ "${hits:-0}" -gt 0 ] 2>/dev/null; then
            ACTIVE_SEMANTIC_FILE="$candidate"
            break
          fi
        fi
      done

      ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
      DECISION_SOURCE_KIND="none"
      DECISION_FOCUS_JSON='[]'
      DECISION_PRIORITY_JSON='[]'
      DECISION_RESCAN_JSON='[]'
      DECISION_TARGETS_JSON='[]'
      DECISION_TARGET_COUNT=0
      if [ -f "{{appliedDecisionFile}}" ] && jq empty "{{appliedDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{appliedDecisionFile}}"
        DECISION_SOURCE_KIND="applied-ai-decision"
      elif [ -f "{{aiDecisionFile}}" ] && jq empty "{{aiDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
        DECISION_SOURCE_KIND="ai-decision"
      fi
      if [ "$DECISION_SOURCE_KIND" != "none" ] && [ -f "$ACTIVE_DECISION_FILE" ] && jq empty "$ACTIVE_DECISION_FILE" 2>/dev/null; then
        DECISION_FOCUS_JSON=$(jq -c '.targets.focus_areas // .focus_areas // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_PRIORITY_JSON=$(jq -c '.targets.priority_targets // .priority_targets // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_RESCAN_JSON=$(jq -c '.targets.rescan_targets // .rescan_targets // .priority_targets // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        DECISION_TARGETS_JSON=$(jq -cn \
          --argjson focus "$DECISION_FOCUS_JSON" \
          --argjson priority "$DECISION_PRIORITY_JSON" \
          --argjson rescan "$DECISION_RESCAN_JSON" \
          '($focus + $priority + $rescan) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' 2>/dev/null || echo '[]')
        DECISION_TARGET_COUNT=$(printf '%s\n' "$DECISION_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)
      fi

      if [ -f "{{resumeContextFile}}" ] \
        && jq -e '(.scan_profile? != null) and (.severity? != null) and ((.followup_decision_source? != null) or (.refined_targets? != null) or (.seed_targets? != null))' "{{resumeContextFile}}" >/dev/null 2>&1; then
        PREV_SOURCE_KIND="resume-context"
        PREV_PRIORITY_MODE=$(jq -r '.priority_mode // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_CONFIDENCE_LEVEL=$(jq -r '.confidence_level // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_NEXT_PHASE=$(jq -r '.next_phase // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_REUSE_SOURCES_JSON=$(jq -c '.reuse_sources // []' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_MANUAL_NEEDED=$(jq -r 'if .manual_followup_needed != null then .manual_followup_needed elif .followup_summary.manual_followup_needed != null then .followup_summary.manual_followup_needed else ((.followup_summary.operator_tasks // 0) > 0 or (.followup_summary.rescan_critical // 0) > 0 or (.followup_summary.rescan_high // 0) > 0) end' "{{resumeContextFile}}" 2>/dev/null || echo false)
        PREV_CAMPAIGN_RECOMMENDED=$(jq -r 'if .campaign_followup_recommended != null then .campaign_followup_recommended elif .followup_summary.campaign_followup_recommended != null then .followup_summary.campaign_followup_recommended else ((.followup_summary.campaign_ready // false) == true and (.followup_summary.campaign_targets // 0) > 0) end' "{{resumeContextFile}}" 2>/dev/null || echo false)
        PREV_QUEUE_EFFECTIVE=$(jq -r 'if .queue_followup_effective != null then .queue_followup_effective elif .followup_summary.queue_followup_effective != null then .followup_summary.queue_followup_effective else ((.followup_summary.retest_queued_targets // 0) > 0) end' "{{resumeContextFile}}" 2>/dev/null || echo false)
        PREV_ESCALATION_SCORE=$(jq -r '.signal_scores.escalation_score // 0' "{{resumeContextFile}}" 2>/dev/null || echo 0)
        PREV_MANUAL_TARGETS_JSON=$(jq -c '.seed_targets.manual_first_targets // []' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_HIGH_CONFIDENCE_TARGETS_JSON=$(jq -c '.seed_targets.high_confidence_targets // []' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_COMBINED_TARGETS_JSON=$(jq -c '((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.refined_targets.priority_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.rescan_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.semantic_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{resumeContextFile}}" 2>/dev/null || echo '[]')
        PREV_CAMPAIGN_CREATE_STATUS=$(jq -r '.campaign_create.status // .followup_summary.campaign_create_status // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_CAMPAIGN_CREATE_ID=$(jq -r '.campaign_create.campaign_id // .followup_summary.campaign_create_id // ""' "{{resumeContextFile}}" 2>/dev/null || echo "")
        PREV_CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.campaign_create.queued_runs // .followup_summary.campaign_create_queued_runs // 0' "{{resumeContextFile}}" 2>/dev/null || echo 0)
      elif [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
        PREV_SOURCE_KIND="decision-file"
        PREV_PRIORITY_MODE=$(jq -r '.seed_focus.priority_mode // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CONFIDENCE_LEVEL=$(jq -r '.seed_focus.confidence_level // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_NEXT_PHASE=$(jq -r '.seed_focus.next_phase // .execution_feedback.next_phase // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_REUSE_SOURCES_JSON=$(jq -c '.seed_focus.reuse_sources // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_MANUAL_NEEDED=$(jq -r '.seed_focus.manual_followup_needed // .execution_feedback.manual_followup_needed // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_CAMPAIGN_RECOMMENDED=$(jq -r '.seed_focus.campaign_followup_recommended // .execution_feedback.campaign_followup_recommended // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_QUEUE_EFFECTIVE=$(jq -r '.seed_focus.queue_followup_effective // .execution_feedback.queue_followup_effective // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_ESCALATION_SCORE=$(jq -r '.seed_focus.signal_scores.escalation_score // 0' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_MANUAL_TARGETS_JSON=$(jq -c '.seed_targets.manual_first_targets // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_HIGH_CONFIDENCE_TARGETS_JSON=$(jq -c '.seed_targets.high_confidence_targets // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_COMBINED_TARGETS_JSON=$(jq -c '((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_targets // []) + (.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.semantic_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_CAMPAIGN_CREATE_STATUS=$(jq -r '.followup_summary.campaign_create_status // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CAMPAIGN_CREATE_ID=$(jq -r '.followup_summary.campaign_create_id // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.followup_summary.campaign_create_queued_runs // 0' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
      else
        PREV_PARAM_MANUAL_TARGETS_JSON=$(csv_or_json_to_array "{{previous_followup_manual_first_targets_list}}")
        PREV_PARAM_HIGH_CONFIDENCE_TARGETS_JSON=$(csv_or_json_to_array "{{previous_followup_high_confidence_targets_list}}")
        PREV_PARAM_COMBINED_TARGETS_JSON=$(csv_or_json_to_array "{{previous_followup_combined_targets_list}}")
        PREV_PARAM_PRIORITY_MODE="{{previous_followup_priority_mode}}"
        PREV_PARAM_CONFIDENCE_LEVEL="{{previous_followup_confidence_level}}"
        PREV_PARAM_NEXT_PHASE="{{previous_followup_next_phase}}"
        PREV_PARAM_REUSE_SOURCES_JSON=$(csv_or_json_to_array "{{previous_followup_reuse_sources}}")
        PREV_PARAM_MANUAL_NEEDED=$(normalize_bool "{{previous_followup_manual_followup_needed}}")
        PREV_PARAM_CAMPAIGN_RECOMMENDED=$(normalize_bool "{{previous_followup_campaign_followup_recommended}}")
        PREV_PARAM_QUEUE_EFFECTIVE=$(normalize_bool "{{previous_followup_queue_followup_effective}}")
        PREV_PARAM_ESCALATION_SCORE=$(normalize_int "{{previous_followup_escalation_score}}")
        PREV_PARAM_CAMPAIGN_CREATE_STATUS="{{previous_followup_campaign_create_status}}"
        PREV_PARAM_CAMPAIGN_CREATE_ID="{{previous_followup_campaign_create_id}}"
        PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS=$(normalize_int "{{previous_followup_campaign_create_queued_runs}}")

        PREV_PARAM_MANUAL_COUNT=$(printf '%s\n' "$PREV_PARAM_MANUAL_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)
        PREV_PARAM_HIGH_COUNT=$(printf '%s\n' "$PREV_PARAM_HIGH_CONFIDENCE_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)
        PREV_PARAM_COMBINED_COUNT=$(printf '%s\n' "$PREV_PARAM_COMBINED_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)

        if [ "$PREV_PARAM_MANUAL_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_HIGH_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_COMBINED_COUNT" -gt 0 ] 2>/dev/null \
          || [ -n "$PREV_PARAM_PRIORITY_MODE" ] \
          || [ -n "$PREV_PARAM_CONFIDENCE_LEVEL" ] \
          || [ -n "$PREV_PARAM_NEXT_PHASE" ] \
          || [ "$PREV_PARAM_MANUAL_NEEDED" = "true" ] \
          || [ "$PREV_PARAM_CAMPAIGN_RECOMMENDED" = "true" ] \
          || [ "$PREV_PARAM_QUEUE_EFFECTIVE" = "true" ] \
          || [ "$PREV_PARAM_ESCALATION_SCORE" -gt 0 ] 2>/dev/null \
          || [ -n "$PREV_PARAM_CAMPAIGN_CREATE_STATUS" ] \
          || [ -n "$PREV_PARAM_CAMPAIGN_CREATE_ID" ] \
          || [ "$PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS" -gt 0 ] 2>/dev/null; then
          PREV_PRIORITY_MODE="$PREV_PARAM_PRIORITY_MODE"
          PREV_SOURCE_KIND="queued-params"
          PREV_CONFIDENCE_LEVEL="$PREV_PARAM_CONFIDENCE_LEVEL"
          PREV_NEXT_PHASE="$PREV_PARAM_NEXT_PHASE"
          PREV_REUSE_SOURCES_JSON="$PREV_PARAM_REUSE_SOURCES_JSON"
          PREV_MANUAL_NEEDED="$PREV_PARAM_MANUAL_NEEDED"
          PREV_CAMPAIGN_RECOMMENDED="$PREV_PARAM_CAMPAIGN_RECOMMENDED"
          PREV_QUEUE_EFFECTIVE="$PREV_PARAM_QUEUE_EFFECTIVE"
          PREV_ESCALATION_SCORE="$PREV_PARAM_ESCALATION_SCORE"
          PREV_MANUAL_TARGETS_JSON="$PREV_PARAM_MANUAL_TARGETS_JSON"
          PREV_HIGH_CONFIDENCE_TARGETS_JSON="$PREV_PARAM_HIGH_CONFIDENCE_TARGETS_JSON"
          PREV_COMBINED_TARGETS_JSON="$PREV_PARAM_COMBINED_TARGETS_JSON"
          PREV_CAMPAIGN_CREATE_STATUS="$PREV_PARAM_CAMPAIGN_CREATE_STATUS"
          PREV_CAMPAIGN_CREATE_ID="$PREV_PARAM_CAMPAIGN_CREATE_ID"
          PREV_CAMPAIGN_CREATE_QUEUED_RUNS="$PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS"
        fi
      fi

      if [ -f "{{Output}}/ai-analysis/.retest-plan-skip" ]; then
        jq -n \
          --arg recommended_flow "{{retestFlow}}" \
          --arg priority "{{retestPriority}}" \
          '{
            summary: {
              recommended_flow: $recommended_flow,
              priority: $priority,
              total_targets: 0,
              objective: "No actionable retest targets"
            },
            targets: [],
            manual_checks: [],
            automation_queue: []
          }' > {{retestPlanOutput}}
        exit 0
      fi

      RAW_FILE="{{Output}}/ai-analysis/.retest-plan-raw-{{TargetSpace}}.txt"
      JSON_FILE="{{Output}}/ai-analysis/.retest-plan-json-{{TargetSpace}}.json"
      FALLBACK_TARGETS="{{Output}}/ai-analysis/.retest-plan-fallback-targets-{{TargetSpace}}.txt"
      [ -f "$RAW_FILE" ] || : > "$RAW_FILE"

      awk '
        BEGIN { capture = 0 }
        /^[[:space:]]*```json[[:space:]]*$/ { capture = 1; next }
        capture && /^[[:space:]]*```[[:space:]]*$/ { exit }
        capture { print }
      ' "$RAW_FILE" > "$JSON_FILE"

      if [ ! -s "$JSON_FILE" ]; then
        sed -n '/^[[:space:]]*{/,/^[[:space:]]*}[[:space:]]*$/p' "$RAW_FILE" > "$JSON_FILE"
      fi

      if [ -s "$JSON_FILE" ] && jq empty "$JSON_FILE" 2>/dev/null; then
        jq \
          '
            .summary = (.summary // {})
            | .targets = (.targets // [])
            | .manual_checks = (.manual_checks // [])
            | .automation_queue = (.automation_queue // [])
          ' "$JSON_FILE" > {{retestPlanOutput}}
      else
        {
          if [ "$PREV_SOURCE_KIND" = "resume-context" ] && [ "$PREV_PRIORITY_MODE" = "manual-first" ]; then
            printf '%s\n' "$PREV_MANUAL_TARGETS_JSON" | jq -r '.[]? // empty' 2>/dev/null || true
            printf '%s\n' "$PREV_HIGH_CONFIDENCE_TARGETS_JSON" | jq -r '.[]? // empty' 2>/dev/null || true
            printf '%s\n' "$PREV_COMBINED_TARGETS_JSON" | jq -r '.[]? // empty' 2>/dev/null || true
          fi
          head -20 "{{confirmedUrlsFile}}" 2>/dev/null || true
          head -10 "{{entryPointsFile}}" 2>/dev/null || true
          head -10 "{{bestPathTargetsFile}}" 2>/dev/null || true
          if [ "$DECISION_SOURCE_KIND" != "none" ]; then
            printf '%s\n' "$DECISION_TARGETS_JSON" | jq -r '.[]? // empty' 2>/dev/null || true
          fi
          if [ "$PREV_SOURCE_KIND" = "resume-context" ]; then
            if [ "$PREV_PRIORITY_MODE" != "manual-first" ]; then
              printf '%s\n' "$PREV_COMBINED_TARGETS_JSON" | jq -r '.[]? // empty' 2>/dev/null || true
            fi
          elif [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
            jq -r '((.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_targets // []) + (.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.confirmed_targets // []))[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
          elif [ -n "$PREV_COMBINED_TARGETS_JSON" ]; then
            printf '%s\n' "$PREV_COMBINED_TARGETS_JSON" | jq -r '.[]? // empty' 2>/dev/null || true
          fi
          extract_semantic_targets "$ACTIVE_SEMANTIC_FILE"
        } | awk 'NF && !seen[$0]++' > "$FALLBACK_TARGETS" || true

        FALLBACK_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' "$FALLBACK_TARGETS" 2>/dev/null || echo '[]')
        jq -n \
          --arg recommended_flow "{{retestFlow}}" \
          --arg priority "{{retestPriority}}" \
          --argjson fallback_targets "$FALLBACK_JSON" \
          '{
            summary: {
              recommended_flow: $recommended_flow,
              priority: $priority,
              total_targets: ($fallback_targets | length),
              objective: (if ($fallback_targets | length) > 0 then "Fallback retest plan from AI decision, confirmed URLs, and attack-path signals" else "Retest plan generation fallback" end)
            },
            targets: [
              $fallback_targets[] | {
                target: .,
                priority: "P1",
                reason: "fallback target derived from ai decision / confirmed URLs / attack-chain / best-path outputs",
                retest_actions: ["重复验证", "补充 payload", "权限边界检查"],
                recommended_modules: ["httpx", "nuclei"],
                workflow: $recommended_flow
              }
            ],
            manual_checks: [
              $fallback_targets[0:5][] | {
                title: "Manual verification",
                target: .,
                reason: "fallback review due missing structured AI plan"
              }
            ],
            automation_queue: [
              $fallback_targets[] | {
                workflow: $recommended_flow,
                target: .,
                priority: $priority,
                reason: "fallback retest queue target"
              }
            ]
          }' > {{retestPlanOutput}}
      fi

      jq \
        --arg recommended_flow "{{retestFlow}}" \
        --arg priority "{{retestPriority}}" \
        --arg decision_source_kind "$DECISION_SOURCE_KIND" \
        --argjson decision_target_count "$DECISION_TARGET_COUNT" \
        --arg previous_followup_priority_mode "$PREV_PRIORITY_MODE" \
        --arg previous_followup_source_kind "$PREV_SOURCE_KIND" \
        --arg previous_followup_confidence_level "$PREV_CONFIDENCE_LEVEL" \
        --arg previous_followup_next_phase "$PREV_NEXT_PHASE" \
        --arg previous_followup_campaign_create_status "$PREV_CAMPAIGN_CREATE_STATUS" \
        --arg previous_followup_campaign_create_id "$PREV_CAMPAIGN_CREATE_ID" \
        --argjson previous_followup_campaign_create_queued_runs "$PREV_CAMPAIGN_CREATE_QUEUED_RUNS" \
        --argjson previous_followup_reuse_sources "$PREV_REUSE_SOURCES_JSON" \
        --argjson previous_followup_manual_followup_needed "$PREV_MANUAL_NEEDED" \
        --argjson previous_followup_campaign_followup_recommended "$PREV_CAMPAIGN_RECOMMENDED" \
        --argjson previous_followup_queue_followup_effective "$PREV_QUEUE_EFFECTIVE" \
        --argjson previous_followup_escalation_score "$PREV_ESCALATION_SCORE" \
        --argjson previous_followup_manual_targets "$PREV_MANUAL_TARGETS_JSON" \
        --argjson previous_followup_high_confidence_targets "$PREV_HIGH_CONFIDENCE_TARGETS_JSON" \
        '
          def target_in($arr; $value):
            (($arr | index($value)) != null);
          def normalize_target_priority($target; $priority):
            if ($target // "") == "" then ($priority // "P2")
            elif target_in($previous_followup_manual_targets; $target) then "P1"
            elif target_in($previous_followup_high_confidence_targets; $target) and ((($priority // "") == "") or ($priority == "P2") or ($priority == "P3")) then "P1"
            else ($priority // "P2")
            end;
          def enrich_reason($target; $reason):
            ($reason // "retest target")
            + (if target_in($previous_followup_manual_targets; $target) then " | previous followup manual-first" else "" end)
            + (if target_in($previous_followup_high_confidence_targets; $target) then " | previous followup high-confidence" else "" end)
            + (if $previous_followup_manual_followup_needed == true then " | manual follow-up advised" else "" end)
            + (if $previous_followup_queue_followup_effective == true then " | queue follow-up already effective" else "" end)
            + (if $previous_followup_campaign_followup_recommended == true then " | campaign follow-up remains viable" else "" end);
          def enrich_manual_reason($target; $reason):
            ($reason // "manual verification")
            + (if target_in($previous_followup_manual_targets; $target) then " | inherited manual-first target" else "" end)
            + (if target_in($previous_followup_high_confidence_targets; $target) then " | inherited high-confidence target" else "" end);
          .summary = ((.summary // {}) + {
            recommended_flow: (.summary.recommended_flow // $recommended_flow),
            priority: (.summary.priority // $priority),
            total_targets: (.summary.total_targets // 0),
            objective: (.summary.objective // "Retest plan generation fallback"),
            decision_source_kind: $decision_source_kind,
            decision_target_count: $decision_target_count,
            previous_followup_priority_mode: $previous_followup_priority_mode,
            previous_followup_source_kind: $previous_followup_source_kind,
            previous_followup_confidence_level: $previous_followup_confidence_level,
            previous_followup_next_phase: $previous_followup_next_phase,
            previous_followup_escalation_score: $previous_followup_escalation_score,
            previous_followup_reuse_sources: $previous_followup_reuse_sources,
            previous_followup_manual_followup_needed: $previous_followup_manual_followup_needed,
            previous_followup_campaign_followup_recommended: $previous_followup_campaign_followup_recommended,
            previous_followup_queue_followup_effective: $previous_followup_queue_followup_effective,
            previous_followup_manual_first_targets: ($previous_followup_manual_targets | length),
            previous_followup_high_confidence_targets: ($previous_followup_high_confidence_targets | length),
            previous_followup_campaign_create_status: $previous_followup_campaign_create_status,
            previous_followup_campaign_create_id: $previous_followup_campaign_create_id,
            previous_followup_campaign_create_queued_runs: $previous_followup_campaign_create_queued_runs
          })
          | .targets = (
              (.targets // [])
              | map(
                  .workflow = (.workflow // $recommended_flow)
                  | .priority = normalize_target_priority(.target; .priority)
                  | .reason = enrich_reason(.target; .reason)
                )
            )
          | .manual_checks = (
              ((.manual_checks // []) | map(.reason = enrich_manual_reason(.target; .reason)))
              + [
                  $previous_followup_manual_targets[]? | {
                    title: "Previous followup manual-first",
                    target: .,
                    reason: "Inherited from previous followup seed for manual verification"
                  }
                ]
              | reduce .[] as $item ([]; (($item.title // "") + "|" + ($item.target // "")) as $key | if ((map(((.title // "") + "|" + (.target // ""))) | index($key)) == null) then . + [$item] else . end)
            )
          | .automation_queue = (
              if $previous_followup_source_kind == "resume-context" and $previous_followup_queue_followup_effective == true then
                []
              else
                ((.automation_queue // [])
                  | map(
                      .workflow = (.workflow // $recommended_flow)
                      | .priority = (.priority // $priority)
                      | .reason = enrich_reason(.target; .reason)
                    ))
                + [
                    $previous_followup_manual_targets[]? | {
                      workflow: $recommended_flow,
                      target: .,
                      priority: $priority,
                      reason: "previous followup manual-first seed"
                    }
                  ]
                + [
                    $previous_followup_high_confidence_targets[]? | {
                      workflow: $recommended_flow,
                      target: .,
                      priority: $priority,
                      reason: "previous followup high-confidence seed"
                    }
                  ]
                | reduce .[] as $item ([]; (($item.workflow // "") + "|" + ($item.target // "")) as $key | if ((map(((.workflow // "") + "|" + (.target // ""))) | index($key)) == null) then . + [$item] else . end)
                | map(.reason = enrich_reason(.target; .reason))
              end
            )
        ' {{retestPlanOutput}} > {{retestPlanOutput}}.tmp 2>/dev/null && mv {{retestPlanOutput}}.tmp {{retestPlanOutput}} || true

      rm -f "$RAW_FILE" "$JSON_FILE" "$FALLBACK_TARGETS" 2>/dev/null || true

  - name: extract-retest-targets
    type: bash
    pre_condition: "{{enableRetestPlanning}}"
    command: |
      count_lines_safe() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      jq -r '
        [
          .targets[]?.target,
          .automation_queue[]?.target
        ] | map(select(. != null and . != "")) | .[]
      ' {{retestPlanOutput}} 2>/dev/null | awk 'NF && !seen[$0]++' > {{retestTargetsFile}} || true

      TARGET_COUNT=$(count_lines_safe "{{retestTargetsFile}}")
      jq --argjson total "$TARGET_COUNT" '.summary.total_targets = $total' {{retestPlanOutput}} > {{retestPlanOutput}}.tmp 2>/dev/null && mv {{retestPlanOutput}}.tmp {{retestPlanOutput}} || true
      echo "[Retest] Extracted $TARGET_COUNT targets"

  - name: render-retest-plan-markdown
    type: bash
    pre_condition: "{{enableRetestPlanning}}"
    command: |
      {
        echo "# AI 复测计划"
        echo "## 目标: {{Target}}"
        echo ""
        jq -r '.summary | "- Recommended flow: \(.recommended_flow // "web-analysis")\n- Priority: \(.priority // "high")\n- Total targets: \(.total_targets // 0)\n- Objective: \(.objective // "n/a")"' {{retestPlanOutput}} 2>/dev/null || true
        echo ""
        echo "## Previous Follow-up Advisory"
        jq -r '.summary | "- Priority mode: \(.previous_followup_priority_mode // "n/a")\n- Confidence: \(.previous_followup_confidence_level // "n/a")\n- Next phase: \(.previous_followup_next_phase // "n/a")\n- Escalation score: \(.previous_followup_escalation_score // 0)\n- Reuse sources: \((.previous_followup_reuse_sources // []) | join(", "))\n- Manual follow-up needed: \(.previous_followup_manual_followup_needed // false)\n- Campaign follow-up recommended: \(.previous_followup_campaign_followup_recommended // false)\n- Queue follow-up effective: \(.previous_followup_queue_followup_effective // false)"' {{retestPlanOutput}} 2>/dev/null || true
        echo ""
        echo "## Targets"
        jq -r '.targets[]? | "- [\(.priority // "P2")] \(.target // "unknown") :: \(.reason // "n/a")"' {{retestPlanOutput}} 2>/dev/null || echo "- none"
        echo ""
        echo "## Manual Checks"
        jq -r '.manual_checks[]? | "- \(.title // "manual-check") :: \(.target // "unknown") :: \(.reason // "n/a")"' {{retestPlanOutput}} 2>/dev/null || echo "- none"
        echo ""
        echo "## Automation Queue"
        jq -r '.automation_queue[]? | "- [\(.priority // "high")] \(.target // "unknown") :: \(.reason // "n/a")"' {{retestPlanOutput}} 2>/dev/null || echo "- none"
      } > {{retestPlanMd}}

  - name: log-retest-plan-complete
    type: function
    pre_condition: "{{enableRetestPlanning}}"
    functions:
      - 'log_info("AI retest planning completed for {{Target}}")'

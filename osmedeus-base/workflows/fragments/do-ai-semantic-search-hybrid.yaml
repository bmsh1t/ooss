# =============================================================================
# AI 语义搜索模块 - vectorkb 混合检索版
# =============================================================================
# 功能：
# - 使用 kb vector search 进行向量召回
# - 使用 kb search 进行关键词召回
# - 使用本地扫描语料做轻量级关键词补充
# - 使用 jq 融合排序，避免 Chroma/Python/runtime install 依赖
# =============================================================================

kind: module
name: ai-semantic-search-hybrid
description: AI-powered hybrid search with vectorkb vector recall and keyword fusion

params:
  - name: semanticIndexDir
    default: "{{Output}}/ai-analysis/semantic-index"
  - name: searchResultsOutput
    default: "{{Output}}/ai-analysis/hybrid-search-results-{{TargetSpace}}.json"
  - name: agentResultsOutput
    default: "{{Output}}/ai-analysis/hybrid-agent-results-{{TargetSpace}}.json"
  - name: embeddingsOutput
    default: "{{Output}}/ai-analysis/hybrid-embeddings-{{TargetSpace}}.json"
  - name: semanticHighlightsOutput
    default: "{{Output}}/ai-analysis/hybrid-search-highlights-{{TargetSpace}}.json"
  - name: semanticPriorityTargetsOutput
    default: "{{Output}}/ai-analysis/hybrid-priority-targets-{{TargetSpace}}.txt"
  - name: semanticPriorityVulnsOutput
    default: "{{Output}}/ai-analysis/hybrid-priority-vulns-{{TargetSpace}}.json"
  - name: vectorSearchResultsOutput
    default: "{{Output}}/ai-analysis/hybrid-vector-search-results-{{TargetSpace}}.json"
  - name: rerankResultsOutput
    default: "{{Output}}/ai-analysis/hybrid-rerank-results-{{TargetSpace}}.json"
  - name: vectorKnowledgeSearchOutput
    default: "{{Output}}/ai-analysis/hybrid-vector-kb-results-{{TargetSpace}}.json"
  - name: knowledgeSearchOutput
    default: "{{Output}}/ai-analysis/hybrid-knowledge-search-results-{{TargetSpace}}.json"
  - name: scanCorpusFile
    default: "{{semanticIndexDir}}/hybrid-scan-corpus.txt"
  - name: scanKeywordResultsOutput
    default: "{{Output}}/ai-analysis/hybrid-scan-keyword-results-{{TargetSpace}}.json"
  - name: knowledgeWorkspace
    default: "{{TargetSpace}}"
  - name: sharedKnowledgeWorkspace
    default: ""
  - name: globalKnowledgeWorkspace
    default: "global"
  - name: knowledgeIndexFile
    default: "{{semanticIndexDir}}/knowledge-index.txt"
  - name: nucleiFile
    default: "{{Output}}/vulnscan/nuclei-jsonl-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"
  - name: subdomainFile
    default: "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"
  - name: appliedDecisionFile
    default: "{{Output}}/ai-analysis/applied-ai-decision-{{TargetSpace}}.json"
  - name: previousFollowupDecisionFile
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"
  - name: confirmedUrlsFile
    default: "{{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt"
  - name: entryPointsFile
    default: "{{Output}}/ai-analysis/entry-points-{{TargetSpace}}.txt"
  - name: bestPathTargetsFile
    default: "{{Output}}/ai-analysis/best-path-targets-{{TargetSpace}}.txt"
  - name: semanticPriorityTargetsInput
    default: "{{Output}}/ai-analysis/semantic-priority-targets-{{TargetSpace}}.txt"
  - name: fallbackSemanticPriorityTargetsInput
    default: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"
  - name: secondFallbackSemanticPriorityTargetsInput
    default: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
  - name: thirdFallbackSemanticPriorityTargetsInput
    default: "{{Output}}/ai-analysis/semantic-priority-targets-early-{{TargetSpace}}.txt"
  - name: maxSearchResults
    type: integer
    default: 10
  - name: minRelevanceScore
    type: float
    default: 0.3
  - name: hybridAlpha
    type: float
    default: 0.7
    description: "Weight for vector recall in hybrid ranking"
  - name: searchQuery
    type: string
    default: "SQL injection vulnerabilities and misconfigurations"
  - name: enableHybridSearch
    type: bool
    default: true
  - name: includeKnowledgeBase
    type: bool
    default: true
  - name: indexExistingData
    type: bool
    default: true
  - name: maxKnowledgeChunks
    type: integer
    default: 200
  - name: enableRerank
    type: bool
    default: true
    description: "Enable rerank on kb vector search when rerank_config is available"
  - name: rerankProvider
    type: string
    default: ""
  - name: rerankModel
    type: string
    default: ""
  - name: rerankTopN
    type: integer
    default: 10
  - name: rerankMaxCandidates
    type: integer
    default: 40

  # Optional vectorkb provider/model overrides.
  - name: embeddingsProvider
    type: string
    default: ""
  - name: embeddingsModel
    type: string
    default: ""
  - name: resolvedSearchQueryOutput
    default: "{{semanticIndexDir}}/resolved-search-query.txt"
  - name: knowledgeSearchQueryOutput
    default: "{{semanticIndexDir}}/knowledge-search-query.txt"
  - name: searchQueryContextOutput
    default: "{{semanticIndexDir}}/resolved-search-query-context.json"
  - name: searchStage
    default: "auto"

steps:
  - name: prepare-hybrid-index
    type: function
    pre_condition: "{{enableHybridSearch}}"
    functions:
      - 'create_folder("{{semanticIndexDir}}")'
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'log_info("Starting hybrid semantic search for {{Target}} via vectorkb")'

  - name: resolve-search-query
    type: bash
    pre_condition: "{{enableHybridSearch}}"
    command: |
      mkdir -p {{semanticIndexDir}}

      count_lines_safe() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      BASE_QUERY="{{searchQuery}}"
      STAGE="{{searchStage}}"
      OUTPUT_HINT="{{searchResultsOutput}}"
      NUCLEI_COUNT=$(count_lines_safe "{{nucleiFile}}")

      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      sanitize_hint_text() {
        printf '%s' "$1" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//' | cut -c1-120
      }

      ACTIVE_SEMANTIC_PRIORITY_INPUT="{{semanticPriorityTargetsInput}}"
      for candidate in "{{semanticPriorityTargetsInput}}" "{{fallbackSemanticPriorityTargetsInput}}" "{{secondFallbackSemanticPriorityTargetsInput}}" "{{thirdFallbackSemanticPriorityTargetsInput}}"; do
        [ -n "$candidate" ] || continue
        if text_has_lines "$candidate"; then
          ACTIVE_SEMANTIC_PRIORITY_INPUT="$candidate"
          break
        fi
      done

      if [ "$STAGE" = "auto" ] || [ -z "$STAGE" ]; then
        case "$OUTPUT_HINT" in
          *decision-followup*|*decision*)
            STAGE="decision-followup"
            ;;
          *post-vuln*)
            STAGE="post-vuln"
            ;;
          *early*)
            STAGE="early"
            ;;
          *)
            if [ "$NUCLEI_COUNT" -gt 20 ] 2>/dev/null; then
              STAGE="post-vuln"
            else
              STAGE="early"
            fi
            ;;
        esac
      fi

      TECH_HINTS=$(
        jq -r '(.tech[]?, .technologies[]?, .techs[]?, .webserver?, .server?, .framework?, .title?) // empty' "{{fingerprintFile}}" 2>/dev/null \
          | awk 'NF {print tolower($0)}' \
          | sed 's/[^a-z0-9.+#_-]/ /g' \
          | awk 'NF && !seen[$0]++' \
          | head -8 \
          | jq -R -s 'split("\n") | map(select(length > 0)) | join(", ")' -r)

      TARGET_HINTS=$(
        {
          [ -f "{{appliedDecisionFile}}" ] && jq -r '.targets.focus_areas[]?, .targets.priority_targets[]?, .targets.rescan_targets[]?' "{{appliedDecisionFile}}" 2>/dev/null || true
          if [ -f "{{previousFollowupDecisionFile}}" ]; then
            jq -r '.seed_targets.focus_areas[]?, .seed_targets.priority_targets[]?, .seed_targets.rescan_targets[]?, .seed_targets.manual_first_targets[]?, .seed_targets.high_confidence_targets[]?, .seed_targets.rescan_critical_targets[]?, .seed_targets.rescan_high_targets[]?, .seed_targets.confirmed_targets[]?, .seed_targets.semantic_targets[]?' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.refined_targets.focus_areas[]?, .refined_targets.priority_targets[]?' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
          fi
          [ -f "{{confirmedUrlsFile}}" ] && head -20 "{{confirmedUrlsFile}}" 2>/dev/null || true
          [ -f "{{entryPointsFile}}" ] && head -15 "{{entryPointsFile}}" 2>/dev/null || true
          [ -f "{{bestPathTargetsFile}}" ] && head -15 "{{bestPathTargetsFile}}" 2>/dev/null || true
          [ -f "$ACTIVE_SEMANTIC_PRIORITY_INPUT" ] && head -15 "$ACTIVE_SEMANTIC_PRIORITY_INPUT" 2>/dev/null || true
          [ -f "{{httpFile}}" ] && grep -E 'admin|login|signin|auth|oauth|sso|jwt|api|graphql|swagger|openapi|upload|import|export|file|redirect|callback|webhook|ws' "{{httpFile}}" 2>/dev/null | head -20 || true
          [ -f "{{subdomainFile}}" ] && grep -E 'admin|api|auth|internal|dev|staging|gateway|graphql|vpn|sso' "{{subdomainFile}}" 2>/dev/null | head -15 || true
        } | awk 'NF && !seen[$0]++' | head -12 | jq -R -s 'split("\n") | map(select(length > 0)) | join(", ")' -r)

      FOCUS_HINTS=$(
        {
          [ -f "{{appliedDecisionFile}}" ] && jq -r '.targets.focus_areas[]?, .targets.priority_targets[]?' "{{appliedDecisionFile}}" 2>/dev/null || true
          if [ -f "{{previousFollowupDecisionFile}}" ]; then
            jq -r '.seed_targets.focus_areas[]?, .seed_targets.priority_targets[]?, .seed_targets.manual_first_targets[]?, .seed_targets.high_confidence_targets[]?, .seed_targets.semantic_targets[]?' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.refined_targets.focus_areas[]?, .refined_targets.priority_targets[]?' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
          fi
        } \
          | awk 'NF && !seen[$0]++' \
          | head -8 \
          | jq -R -s 'split("\n") | map(select(length > 0)) | join(", ")' -r)

      DECISION_HINTS=$(
        {
          [ -f "{{appliedDecisionFile}}" ] && jq -r '
            [
              .scan.profile // empty,
              .scan.severity // empty,
              (if .directives.use_ai_guided_nuclei == true then "ai-guided-nuclei" else empty end),
              (if .directives.use_focus_targets == true then "focus-targets" else empty end),
              (if .directives.use_rescan_targets == true then "rescan-targets" else empty end),
              (if .directives.enable_manual_followup == true then "manual-followup" else empty end)
            ] | .[]
          ' "{{appliedDecisionFile}}" 2>/dev/null || true
          if [ -f "{{previousFollowupDecisionFile}}" ]; then
            jq -r '.seed_focus.scan_profile? | select(. != null and . != "")' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.base_decision.profile? | select(. != null and . != "")' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.seed_focus.severity? | select(. != null and . != "")' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.base_decision.severity? | select(. != null and . != "")' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.seed_focus.next_phase? | select(. != null and . != "")' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.seed_focus.priority_mode? | select(. != null and . != "")' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.seed_focus.confidence_level? | select(. != null and . != "")' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.seed_focus.reuse_sources[]? | select(. != null and . != "") | "reuse-" + .' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '(.seed_focus.signal_scores.escalation_score // 0) | select(. > 0) | "escalation-" + tostring' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r '.execution_feedback.next_phase? | select(. != null and . != "")' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r 'if .seed_focus.manual_followup_needed == true or .execution_feedback.manual_followup_needed == true then "manual-followup" else empty end' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r 'if .seed_focus.campaign_followup_recommended == true or .execution_feedback.campaign_followup_recommended == true then "campaign-followup" else empty end' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
            jq -r 'if .seed_focus.queue_followup_effective == true or .execution_feedback.queue_followup_effective == true then "queue-followup" else empty end' "{{previousFollowupDecisionFile}}" 2>/dev/null || true
          fi
        } | awk 'NF && !seen[$0]++' | jq -R -s 'split("\n") | map(select(length > 0)) | join(", ")' -r)

      case "$STAGE" in
        post-vuln)
          RESOLVED_QUERY="confirmed findings, exploit chain, auth bypass, privilege escalation, idor, file upload, token/session abuse, manual exploitation, retest payloads, evidence capture, campaign handoff"
          ;;
        decision-followup)
          RESOLVED_QUERY="applied ai decision, prioritized retest targets, operator queue tasks, campaign handoff, targeted rescan guidance, manual exploitation, auth bypass, privilege escalation, idor, file upload, business logic abuse, evidence capture"
          ;;
        *)
          RESOLVED_QUERY="admin panels, authentication flows, high-value endpoints, exposed services, api routes, graphql, swagger, file handling, business logic entry points, tech-specific exploitation ideas"
          ;;
      esac
      if [ -n "$BASE_QUERY" ]; then
        RESOLVED_QUERY="$BASE_QUERY | $RESOLVED_QUERY"
      fi
      if [ -n "$TECH_HINTS" ]; then
        RESOLVED_QUERY="$RESOLVED_QUERY | technologies: $TECH_HINTS"
      fi
      if [ -n "$DECISION_HINTS" ]; then
        RESOLVED_QUERY="$RESOLVED_QUERY | decision: $DECISION_HINTS"
      fi
      if [ -n "$FOCUS_HINTS" ]; then
        RESOLVED_QUERY="$RESOLVED_QUERY | ai focus: $FOCUS_HINTS"
      fi
      if [ -n "$TARGET_HINTS" ]; then
        RESOLVED_QUERY="$RESOLVED_QUERY | candidate targets: $TARGET_HINTS"
      fi
      RESOLVED_QUERY=$(printf '%s' "$RESOLVED_QUERY" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
      QUERY_LENGTH=$(printf '%s' "$RESOLVED_QUERY" | wc -c | tr -d ' ')
      if [ "${QUERY_LENGTH:-0}" -gt 900 ] 2>/dev/null; then
        RESOLVED_QUERY=$(printf '%s' "$RESOLVED_QUERY" | cut -c1-900)
      fi

      printf '%s\n' "$RESOLVED_QUERY" > "{{resolvedSearchQueryOutput}}"
      KB_QUERY_BASE="$BASE_QUERY"
      if [ -z "$KB_QUERY_BASE" ]; then
        KB_QUERY_BASE="$RESOLVED_QUERY"
      fi
      KB_QUERY="$KB_QUERY_BASE"
      KB_QUERY=$(printf '%s' "$KB_QUERY" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
      KB_QUERY_LENGTH=$(printf '%s' "$KB_QUERY" | wc -c | tr -d ' ')
      if [ "${KB_QUERY_LENGTH:-0}" -gt 320 ] 2>/dev/null; then
        KB_QUERY=$(printf '%s' "$KB_QUERY" | cut -c1-320)
      fi

      printf '%s\n' "$KB_QUERY" > "{{knowledgeSearchQueryOutput}}"
      jq -n \
        --arg stage "$STAGE" \
        --arg base_query "$BASE_QUERY" \
        --arg resolved_query "$RESOLVED_QUERY" \
        --arg knowledge_query "$KB_QUERY" \
        --arg technologies "$TECH_HINTS" \
        --arg decision_hints "$DECISION_HINTS" \
        --arg candidate_targets "$TARGET_HINTS" \
        --arg focus_targets "$FOCUS_HINTS" \
        --argjson nuclei_count "$NUCLEI_COUNT" \
        '{
          stage: $stage,
          base_query: $base_query,
          resolved_query: $resolved_query,
          knowledge_query: $knowledge_query,
          technologies: (if $technologies == "" then [] else ($technologies | split(", ") | map(select(length > 0))) end),
          decision_hints: (if $decision_hints == "" then [] else ($decision_hints | split(", ") | map(select(length > 0))) end),
          candidate_targets: (if $candidate_targets == "" then [] else ($candidate_targets | split(", ") | map(select(length > 0))) end),
          focus_targets: (if $focus_targets == "" then [] else ($focus_targets | split(", ") | map(select(length > 0))) end),
          nuclei_count: $nuclei_count
        }' > "{{searchQueryContextOutput}}"

      echo "[Hybrid] Query stage: $STAGE"
      echo "[Hybrid] Resolved query: $RESOLVED_QUERY"
      echo "[Hybrid] Knowledge query: $KB_QUERY"

  - name: export-knowledge-corpus
    type: bash
    pre_condition: "{{enableHybridSearch}} && {{includeKnowledgeBase}}"
    command: |
      mkdir -p {{semanticIndexDir}}
      mkdir -p "{{semanticIndexDir}}/logs"
      : > "{{knowledgeIndexFile}}"

      count_lines_safe() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      OSM_BIN="${OSMEDEUS_CLI_BIN:-{{OsmedeusExec}}}"
      if [ -z "$OSM_BIN" ] || [ ! -x "$OSM_BIN" ]; then
        OSM_BIN=$(command -v osmedeus 2>/dev/null || true)
      fi

      if [ -z "$OSM_BIN" ]; then
        echo "[Hybrid] osmedeus binary not found, skipping knowledge export"
        exit 0
      fi
      OSM_CLI_BASE_ARGS="--settings-file {{SettingsFile}} --base-folder {{BaseFolder}} --workflow-folder {{Workflows}}"

      PRIMARY_WORKSPACE="{{knowledgeWorkspace}}"
      SHARED_WORKSPACE="{{sharedKnowledgeWorkspace}}"
      GLOBAL_WORKSPACE="{{globalKnowledgeWorkspace}}"
      PRIMARY_TMP="{{semanticIndexDir}}/.hybrid-knowledge-primary.txt"
      SHARED_TMP="{{semanticIndexDir}}/.hybrid-knowledge-shared.txt"
      GLOBAL_TMP="{{semanticIndexDir}}/.hybrid-knowledge-global.txt"
      PRIMARY_LOG="{{semanticIndexDir}}/logs/hybrid-kb-export-primary.log"
      SHARED_LOG="{{semanticIndexDir}}/logs/hybrid-kb-export-shared.log"
      GLOBAL_LOG="{{semanticIndexDir}}/logs/hybrid-kb-export-global.log"
      : > "$PRIMARY_TMP"
      : > "$SHARED_TMP"
      : > "$GLOBAL_TMP"
      : > "$PRIMARY_LOG"
      : > "$SHARED_LOG"
      : > "$GLOBAL_LOG"

      "$OSM_BIN" $OSM_CLI_BASE_ARGS kb export \
        -w "$PRIMARY_WORKSPACE" \
        --limit {{maxKnowledgeChunks}} \
        --output "$PRIMARY_TMP" >"$PRIMARY_LOG" 2>&1 || true

      if [ -n "$SHARED_WORKSPACE" ] && [ "$SHARED_WORKSPACE" != "$PRIMARY_WORKSPACE" ]; then
        "$OSM_BIN" $OSM_CLI_BASE_ARGS kb export \
          -w "$SHARED_WORKSPACE" \
          --limit {{maxKnowledgeChunks}} \
          --output "$SHARED_TMP" >"$SHARED_LOG" 2>&1 || true
      fi

      if [ -n "$GLOBAL_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$PRIMARY_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$SHARED_WORKSPACE" ]; then
        "$OSM_BIN" $OSM_CLI_BASE_ARGS kb export \
          -w "$GLOBAL_WORKSPACE" \
          --limit {{maxKnowledgeChunks}} \
          --output "$GLOBAL_TMP" >"$GLOBAL_LOG" 2>&1 || true
      fi

      cat "$PRIMARY_TMP" "$SHARED_TMP" "$GLOBAL_TMP" 2>/dev/null | awk 'NF && !seen[$0]++' > "{{knowledgeIndexFile}}" || true
      KB_LINES=$(count_lines_safe "{{knowledgeIndexFile}}")
      echo "[Hybrid] Exported knowledge corpus: $KB_LINES chunks"

  - name: collect-scan-corpus
    type: bash
    pre_condition: "{{enableHybridSearch}} && {{indexExistingData}}"
    command: |
      mkdir -p {{semanticIndexDir}}
      : > "{{scanCorpusFile}}"

      count_lines_safe() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      append_prefixed() {
        source_file="$1"
        prefix="$2"
        [ -f "$source_file" ] || return 0
        awk -v p="$prefix" 'NF { gsub(/\r/, ""); print p $0 }' "$source_file" >> "{{scanCorpusFile}}"
      }

      append_prefixed "{{nucleiFile}}" "[scan:vulns] "
      append_prefixed "{{fingerprintFile}}" "[scan:fingerprint] "
      append_prefixed "{{httpFile}}" "[scan:http] "
      append_prefixed "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt" "[scan:subdomains] "
      append_prefixed "{{Output}}/content-analysis/js-endpoints-{{TargetSpace}}.txt" "[scan:endpoints] "

      awk 'NF && !seen[$0]++' "{{scanCorpusFile}}" > "{{scanCorpusFile}}.tmp" && mv "{{scanCorpusFile}}.tmp" "{{scanCorpusFile}}"
      SCAN_LINES=$(count_lines_safe "{{scanCorpusFile}}")
      echo "[Hybrid] Scan corpus prepared: $SCAN_LINES lines"

  - name: search-knowledge-db
    type: bash
    pre_condition: "{{enableHybridSearch}} && {{includeKnowledgeBase}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      mkdir -p "{{semanticIndexDir}}/logs"
      QUERY_FILE="{{resolvedSearchQueryOutput}}"
      RESOLVED_QUERY="{{searchQuery}}"
      if [ -f "$QUERY_FILE" ] && [ -s "$QUERY_FILE" ]; then
        RESOLVED_QUERY=$(tr '\n' ' ' < "$QUERY_FILE" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
      fi
      KB_QUERY_FILE="{{knowledgeSearchQueryOutput}}"
      KB_QUERY="$RESOLVED_QUERY"
      if [ -f "$KB_QUERY_FILE" ] && [ -s "$KB_QUERY_FILE" ]; then
        KB_QUERY=$(tr '\n' ' ' < "$KB_QUERY_FILE" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
      fi
      echo '[]' > "{{knowledgeSearchOutput}}"
      echo '[]' > "{{vectorKnowledgeSearchOutput}}"
      jq -n --arg query "$KB_QUERY" '{status:"success",query:$query,enabled:false,rerank_applied:false,ranking_source:"hybrid",rerank_provider:"",rerank_model:"",total_results:0,results:[]}' > "{{rerankResultsOutput}}"
      jq -n --arg query "$KB_QUERY" '{status:"success",query:$query,provider:"config-default",ready:false,semantic_status:"uninitialized",reason:"semantic vector retrieval not started",total_results:0,results:[]}' > "{{vectorSearchResultsOutput}}"

      OSM_BIN="${OSMEDEUS_CLI_BIN:-{{OsmedeusExec}}}"
      if [ -z "$OSM_BIN" ] || [ ! -x "$OSM_BIN" ]; then
        OSM_BIN=$(command -v osmedeus 2>/dev/null || true)
      fi

      if [ -z "$OSM_BIN" ]; then
        echo "[Hybrid] osmedeus binary not found, skipping vector knowledge search"
        exit 0
      fi
      OSM_CLI_BASE_ARGS="--settings-file {{SettingsFile}} --base-folder {{BaseFolder}} --workflow-folder {{Workflows}}"

      PRIMARY_WORKSPACE="{{knowledgeWorkspace}}"
      SHARED_WORKSPACE="{{sharedKnowledgeWorkspace}}"
      GLOBAL_WORKSPACE="{{globalKnowledgeWorkspace}}"
      PRIMARY_VECTOR_JSON="{{semanticIndexDir}}/.hybrid-vector-primary.json"
      SHARED_VECTOR_JSON="{{semanticIndexDir}}/.hybrid-vector-shared.json"
      GLOBAL_VECTOR_JSON="{{semanticIndexDir}}/.hybrid-vector-global.json"
      PRIMARY_JSON="{{semanticIndexDir}}/.hybrid-keyword-primary.json"
      SHARED_JSON="{{semanticIndexDir}}/.hybrid-keyword-shared.json"
      GLOBAL_JSON="{{semanticIndexDir}}/.hybrid-keyword-global.json"
      PRIMARY_VECTOR_LOG="{{semanticIndexDir}}/logs/hybrid-kb-vector-search-primary.log"
      SHARED_VECTOR_LOG="{{semanticIndexDir}}/logs/hybrid-kb-vector-search-shared.log"
      GLOBAL_VECTOR_LOG="{{semanticIndexDir}}/logs/hybrid-kb-vector-search-global.log"
      PRIMARY_SEARCH_LOG="{{semanticIndexDir}}/logs/hybrid-kb-search-primary.log"
      SHARED_SEARCH_LOG="{{semanticIndexDir}}/logs/hybrid-kb-search-shared.log"
      GLOBAL_SEARCH_LOG="{{semanticIndexDir}}/logs/hybrid-kb-search-global.log"
      VECTOR_DOCTOR_JSON="{{semanticIndexDir}}/.hybrid-vector-doctor.json"
      VECTOR_DOCTOR_LOG="{{semanticIndexDir}}/logs/hybrid-kb-vector-doctor.log"
      VECTOR_PROVIDER="{{embeddingsProvider}}"
      VECTOR_MODEL="{{embeddingsModel}}"
      VECTOR_PROVIDER_LABEL="$VECTOR_PROVIDER"
      if [ -z "$VECTOR_PROVIDER_LABEL" ]; then
        VECTOR_PROVIDER_LABEL="config-default"
      fi
      RERANK_ENABLED="{{enableRerank}}"
      RERANK_PROVIDER="{{rerankProvider}}"
      RERANK_MODEL="{{rerankModel}}"
      RERANK_PROVIDER_LABEL=""
      RERANK_MODEL_LABEL=""
      if [ "$RERANK_ENABLED" = "true" ]; then
        RERANK_PROVIDER_LABEL="$RERANK_PROVIDER"
        RERANK_MODEL_LABEL="$RERANK_MODEL"
        if [ -z "$RERANK_PROVIDER_LABEL" ]; then
          RERANK_PROVIDER_LABEL="config-default"
        fi
        if [ -z "$RERANK_MODEL_LABEL" ]; then
          RERANK_MODEL_LABEL="config-default"
        fi
      fi
      : > "$PRIMARY_VECTOR_LOG"
      : > "$SHARED_VECTOR_LOG"
      : > "$GLOBAL_VECTOR_LOG"
      : > "$PRIMARY_SEARCH_LOG"
      : > "$SHARED_SEARCH_LOG"
      : > "$GLOBAL_SEARCH_LOG"
      echo '{}' > "$VECTOR_DOCTOR_JSON"
      KB_MIN_CONFIDENCE="0.60"
      KB_ALLOW_FALSE_POSITIVE="false"
      VECTOR_DOCTOR_READY="false"
      VECTOR_DOCTOR_STATUS="unknown"
      VECTOR_DOCTOR_REASON=""
      VECTOR_FAILURE_STATUS=""
      VECTOR_FAILURE_REASON=""
      if printf '%s' "$KB_QUERY" | tr '[:upper:]' '[:lower:]' | grep -Eq 'false[[:space:]-]*positive|误报|noise'; then
        KB_ALLOW_FALSE_POSITIVE="true"
      fi

      run_vector_search() {
        workspace="$1"
        output_file="$2"
        log_file="$3"
        set -- "$OSM_BIN" --silent $OSM_CLI_BASE_ARGS --json kb vector search \
          -w "$workspace" \
          --query "$KB_QUERY" \
          --limit {{maxSearchResults}}
        if [ -n "$KB_MIN_CONFIDENCE" ]; then
          set -- "$@" --min-confidence "$KB_MIN_CONFIDENCE"
        fi
        if [ "$KB_ALLOW_FALSE_POSITIVE" != "true" ]; then
          set -- "$@" --exclude-sample-type false_positive
        fi
        if [ -n "$VECTOR_PROVIDER" ]; then
          set -- "$@" --provider "$VECTOR_PROVIDER"
        fi
        if [ -n "$VECTOR_MODEL" ]; then
          set -- "$@" --model "$VECTOR_MODEL"
        fi
        if [ "$RERANK_ENABLED" = "true" ]; then
          set -- "$@" --rerank
          if [ -n "$RERANK_PROVIDER" ]; then
            set -- "$@" --rerank-provider "$RERANK_PROVIDER"
          fi
          if [ -n "$RERANK_MODEL" ]; then
            set -- "$@" --rerank-model "$RERANK_MODEL"
          fi
          if [ "{{rerankTopN}}" -gt 0 ] 2>/dev/null; then
            set -- "$@" --rerank-top-n "{{rerankTopN}}"
          fi
          if [ "{{rerankMaxCandidates}}" -gt 0 ] 2>/dev/null; then
            set -- "$@" --rerank-max-candidates "{{rerankMaxCandidates}}"
          fi
        fi
        if "$@" > "$output_file" 2>"$log_file"; then
          return 0
        fi
        echo '[]' > "$output_file"
        if [ -z "$VECTOR_FAILURE_REASON" ]; then
          VECTOR_FAILURE_STATUS="search_failed"
          VECTOR_FAILURE_REASON=$(tr '\n' ' ' < "$log_file" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
          if [ -z "$VECTOR_FAILURE_REASON" ]; then
            VECTOR_FAILURE_REASON="kb vector search failed for workspace $workspace"
          fi
        fi
        return 1
      }

      run_keyword_search() {
        workspace="$1"
        output_file="$2"
        log_file="$3"
        set -- "$OSM_BIN" --silent $OSM_CLI_BASE_ARGS --json kb search \
          -w "$workspace" \
          --query "$KB_QUERY" \
          --limit {{maxSearchResults}}
        if [ -n "$KB_MIN_CONFIDENCE" ]; then
          set -- "$@" --min-confidence "$KB_MIN_CONFIDENCE"
        fi
        if [ "$KB_ALLOW_FALSE_POSITIVE" != "true" ]; then
          set -- "$@" --exclude-sample-type false_positive
        fi
        "$@" > "$output_file" 2>"$log_file" || echo '[]' > "$output_file"
      }

      echo '[]' > "$PRIMARY_VECTOR_JSON"
      echo '[]' > "$SHARED_VECTOR_JSON"
      echo '[]' > "$GLOBAL_VECTOR_JSON"

      set -- "$OSM_BIN" --silent $OSM_CLI_BASE_ARGS --json kb vector doctor
      if [ -n "$PRIMARY_WORKSPACE" ]; then
        set -- "$@" -w "$PRIMARY_WORKSPACE"
      fi
      if [ -n "$VECTOR_PROVIDER" ]; then
        set -- "$@" --provider "$VECTOR_PROVIDER"
      fi
      if [ -n "$VECTOR_MODEL" ]; then
        set -- "$@" --model "$VECTOR_MODEL"
      fi
      "$@" > "$VECTOR_DOCTOR_JSON" 2>"$VECTOR_DOCTOR_LOG" || echo '{}' > "$VECTOR_DOCTOR_JSON"
      VECTOR_DOCTOR_READY=$(jq -r '.semantic_search_ready // false' "$VECTOR_DOCTOR_JSON" 2>/dev/null || echo false)
      VECTOR_DOCTOR_STATUS=$(jq -r '.semantic_status // "unknown"' "$VECTOR_DOCTOR_JSON" 2>/dev/null || echo unknown)
      VECTOR_DOCTOR_REASON=$(jq -r '.semantic_status_message // ""' "$VECTOR_DOCTOR_JSON" 2>/dev/null || echo "")
      if [ "$VECTOR_DOCTOR_READY" != "true" ] && [ -n "$VECTOR_DOCTOR_REASON" ]; then
        echo "[Hybrid] Vector doctor: $VECTOR_DOCTOR_STATUS - $VECTOR_DOCTOR_REASON"
      fi

      run_vector_search "$PRIMARY_WORKSPACE" "$PRIMARY_VECTOR_JSON" "$PRIMARY_VECTOR_LOG"

      if [ -n "$SHARED_WORKSPACE" ] && [ "$SHARED_WORKSPACE" != "$PRIMARY_WORKSPACE" ]; then
        run_vector_search "$SHARED_WORKSPACE" "$SHARED_VECTOR_JSON" "$SHARED_VECTOR_LOG"
      fi

      if [ -n "$GLOBAL_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$PRIMARY_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$SHARED_WORKSPACE" ]; then
        run_vector_search "$GLOBAL_WORKSPACE" "$GLOBAL_VECTOR_JSON" "$GLOBAL_VECTOR_LOG"
      fi

      jq -s --argjson max_results {{maxSearchResults}} '
        add
        | map(
            if type == "object" then (.source = (.source // "vector_kb")) else {"content": tostring, "source": "vector_kb"} end
          )
        | unique_by((.chunk_id // .id // .source_path // .title // .content // tostring))
        | sort_by(-(.relevance_score // .score // 0))
        | .[:$max_results]
      ' "$PRIMARY_VECTOR_JSON" "$SHARED_VECTOR_JSON" "$GLOBAL_VECTOR_JSON" > "{{vectorKnowledgeSearchOutput}}" 2>/dev/null || echo '[]' > "{{vectorKnowledgeSearchOutput}}"

      run_keyword_search "$PRIMARY_WORKSPACE" "$PRIMARY_JSON" "$PRIMARY_SEARCH_LOG"

      echo '[]' > "$SHARED_JSON"
      echo '[]' > "$GLOBAL_JSON"
      if [ -n "$SHARED_WORKSPACE" ] && [ "$SHARED_WORKSPACE" != "$PRIMARY_WORKSPACE" ]; then
        run_keyword_search "$SHARED_WORKSPACE" "$SHARED_JSON" "$SHARED_SEARCH_LOG"
      fi

      if [ -n "$GLOBAL_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$PRIMARY_WORKSPACE" ] && [ "$GLOBAL_WORKSPACE" != "$SHARED_WORKSPACE" ]; then
        run_keyword_search "$GLOBAL_WORKSPACE" "$GLOBAL_JSON" "$GLOBAL_SEARCH_LOG"
      fi

      jq -s --argjson max_results {{maxSearchResults}} '
        add
        | map(
            if type == "object" then (.source = (.source // "knowledge_keyword"))
            else {"content": tostring, "source": "knowledge_keyword"}
            end
          )
        | map(.workspace = (.workspace // .metadata.workspace // "unknown"))
        | unique_by((.chunk_id // .id // .source_path // .title // .content // tostring))
        | sort_by(-(.relevance_score // .score // 0))
        | .[:$max_results]
      ' "$PRIMARY_JSON" "$SHARED_JSON" "$GLOBAL_JSON" > "{{knowledgeSearchOutput}}" 2>/dev/null || echo '[]' > "{{knowledgeSearchOutput}}"

      VKB_HITS=$(jq 'length' "{{vectorKnowledgeSearchOutput}}" 2>/dev/null || echo 0)
      VECTOR_READY_FLAG="false"
      VECTOR_STATUS_FLAG="$VECTOR_DOCTOR_STATUS"
      VECTOR_REASON_FLAG="$VECTOR_DOCTOR_REASON"
      if [ -n "$VECTOR_FAILURE_REASON" ]; then
        VECTOR_STATUS_FLAG="$VECTOR_FAILURE_STATUS"
        VECTOR_REASON_FLAG="$VECTOR_FAILURE_REASON"
      elif [ "$VECTOR_DOCTOR_READY" = "true" ] || [ "$VKB_HITS" -gt 0 ]; then
        VECTOR_READY_FLAG="true"
      fi
      if [ "$VECTOR_READY_FLAG" = "true" ] && { [ -z "$VECTOR_STATUS_FLAG" ] || [ "$VECTOR_STATUS_FLAG" = "unknown" ]; }; then
        VECTOR_STATUS_FLAG="ready"
      fi
      VECTOR_RANKING_SOURCE=$(jq -r 'if length > 0 then (.[0].ranking_source // "") else "hybrid" end' "{{vectorKnowledgeSearchOutput}}" 2>/dev/null || echo hybrid)
      VECTOR_RERANK_APPLIED="false"
      if [ "$VECTOR_RANKING_SOURCE" = "rerank" ]; then
        VECTOR_RERANK_APPLIED="true"
      fi

      jq -n \
        --arg query "$KB_QUERY" \
        --arg ranking_source "$VECTOR_RANKING_SOURCE" \
        --arg rerank_provider "$RERANK_PROVIDER_LABEL" \
        --arg rerank_model "$RERANK_MODEL_LABEL" \
        --argjson enabled "$RERANK_ENABLED" \
        --argjson rerank_applied "$VECTOR_RERANK_APPLIED" \
        --slurpfile hits "{{vectorKnowledgeSearchOutput}}" '
        {
          status: "success",
          query: $query,
          enabled: $enabled,
          rerank_applied: $rerank_applied,
          ranking_source: $ranking_source,
          rerank_provider: (if $enabled then $rerank_provider else "" end),
          rerank_model: (if $enabled then $rerank_model else "" end),
          total_results: ($hits[0] | length),
          results: (
            $hits[0]
            | map({
                document_id: .document_id,
                chunk_id: .chunk_id,
                workspace: (.workspace // ""),
                title: (.title // ""),
                source_path: (.source_path // ""),
                doc_type: (.doc_type // ""),
                section: (.section // ""),
                content: (.content // .snippet // ""),
                snippet: (.snippet // .content // ""),
                relevance_score: (.relevance_score // .score // 0),
                base_relevance_score: (.base_relevance_score // 0),
                rerank_score: (.rerank_score // 0),
                ranking_source: (.ranking_source // "hybrid"),
                source: (.source // "vector_kb"),
                type: (.type // "vector_match"),
                metadata: (.metadata // null)
              })
          )
        }' > "{{rerankResultsOutput}}" 2>/dev/null || jq -n --arg query "$KB_QUERY" '{status:"success",query:$query,enabled:false,rerank_applied:false,ranking_source:"hybrid",rerank_provider:"",rerank_model:"",total_results:0,results:[]}' > "{{rerankResultsOutput}}"

      jq -n \
        --arg query "$KB_QUERY" \
        --arg provider "$VECTOR_PROVIDER_LABEL" \
        --arg semantic_status "$VECTOR_STATUS_FLAG" \
        --arg reason "$VECTOR_REASON_FLAG" \
        --arg ranking_source "$VECTOR_RANKING_SOURCE" \
        --arg rerank_provider "$RERANK_PROVIDER_LABEL" \
        --arg rerank_model "$RERANK_MODEL_LABEL" \
        --argjson ready "$VECTOR_READY_FLAG" \
        --argjson rerank_enabled "$RERANK_ENABLED" \
        --argjson rerank_applied "$VECTOR_RERANK_APPLIED" \
        --slurpfile hits "{{vectorKnowledgeSearchOutput}}" '
        {
          status: "success",
          query: $query,
          provider: $provider,
          ready: $ready,
          semantic_status: $semantic_status,
          reason: (if ($reason | length) > 0 then $reason else null end),
          ranking_source: $ranking_source,
          rerank_enabled: $rerank_enabled,
          rerank_applied: $rerank_applied,
          rerank_provider: (if $rerank_enabled then $rerank_provider else "" end),
          rerank_model: (if $rerank_enabled then $rerank_model else "" end),
          total_results: ($hits[0] | length),
          results: (
            $hits[0]
            | map({
                type: (.type // "vector_match"),
                content: (.content // .snippet // ""),
                relevance_score: (.relevance_score // .score // 0),
                base_relevance_score: (.base_relevance_score // 0),
                rerank_score: (.rerank_score // 0),
                ranking_source: (.ranking_source // "hybrid"),
                source: (.source // "vector_kb"),
                title: (.title // ""),
                workspace: (.workspace // ""),
                source_path: (.source_path // ""),
                snippet: (.snippet // .content // "")
              })
          )
        }' > "{{vectorSearchResultsOutput}}" 2>/dev/null || jq -n --arg query "$RESOLVED_QUERY" '{status:"success",query:$query,provider:"config-default",ready:false,semantic_status:"unknown",reason:"failed to build vector search result summary",total_results:0,results:[]}' > "{{vectorSearchResultsOutput}}"

      echo "[Hybrid] Vector KB hits: $VKB_HITS"
      echo "[Hybrid] Knowledge keyword hits: $(jq 'length' "{{knowledgeSearchOutput}}" 2>/dev/null || echo 0)"
      if [ "$RERANK_ENABLED" = "true" ]; then
        echo "[Hybrid] Vector rerank status: applied=$VECTOR_RERANK_APPLIED source=$VECTOR_RANKING_SOURCE provider=${RERANK_PROVIDER_LABEL:-config-default} model=${RERANK_MODEL_LABEL:-config-default}"
      fi
      if [ "$VECTOR_READY_FLAG" != "true" ] && [ -n "$VECTOR_REASON_FLAG" ]; then
        echo "[Hybrid] Vector retrieval unavailable: $VECTOR_STATUS_FLAG - $VECTOR_REASON_FLAG"
      fi

  - name: keyword-search-scan-corpus
    type: bash
    pre_condition: "{{enableHybridSearch}} && {{indexExistingData}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      echo '[]' > "{{scanKeywordResultsOutput}}"

      if [ ! -s "{{scanCorpusFile}}" ]; then
        echo "[Hybrid] Scan corpus empty, skipping local keyword recall"
        exit 0
      fi

      QUERY_FILE="{{resolvedSearchQueryOutput}}"
      RESOLVED_QUERY="{{searchQuery}}"
      if [ -f "$QUERY_FILE" ] && [ -s "$QUERY_FILE" ]; then
        RESOLVED_QUERY=$(tr '\n' ' ' < "$QUERY_FILE" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
      fi

      QUERY_PATTERN=$(printf '%s' "$RESOLVED_QUERY" \
        | tr '[:upper:]' '[:lower:]' \
        | tr -cs '[:alnum:]' '\n' \
        | awk 'length($0) >= 4 && !seen[$0]++ { print }' \
        | head -n 12 \
        | paste -sd'|' -)

      if [ -z "$QUERY_PATTERN" ]; then
        echo "[Hybrid] Query did not yield usable keyword terms"
        exit 0
      fi

      grep -Ein "$QUERY_PATTERN" "{{scanCorpusFile}}" 2>/dev/null | head -n {{maxSearchResults}} > "{{semanticIndexDir}}/.hybrid-scan-keywords.txt" || true

      jq -R -s '
        split("\n")
        | map(select(length > 0))
        | map(
            capture("^(?<line>[0-9]+):(?<content>.*)$")
            | {
                type: "scan_keyword",
                content: .content,
                source: "scan_index",
                source_path: "{{scanCorpusFile}}",
                line: (.line | tonumber),
                score: 0.35
              }
          )
      ' "{{semanticIndexDir}}/.hybrid-scan-keywords.txt" > "{{scanKeywordResultsOutput}}" 2>/dev/null || echo '[]' > "{{scanKeywordResultsOutput}}"

      echo "[Hybrid] Local scan keyword hits: $(jq 'length' "{{scanKeywordResultsOutput}}" 2>/dev/null || echo 0)"

  - name: merge-results
    type: bash
    pre_condition: "{{enableHybridSearch}}"
    command: |
      QUERY_FILE="{{resolvedSearchQueryOutput}}"
      RESOLVED_QUERY="{{searchQuery}}"
      VECTOR_PROVIDER_LABEL="{{embeddingsProvider}}"
      if [ -z "$VECTOR_PROVIDER_LABEL" ]; then
        VECTOR_PROVIDER_LABEL="config-default"
      fi
      if [ -f "$QUERY_FILE" ] && [ -s "$QUERY_FILE" ]; then
        RESOLVED_QUERY=$(tr '\n' ' ' < "$QUERY_FILE" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
      fi
      jq -n \
        --arg query "$RESOLVED_QUERY" \
        --arg target "{{Target}}" \
        --arg provider "$VECTOR_PROVIDER_LABEL" \
        --arg ts "$(date -Iseconds)" \
        --argjson alpha "{{hybridAlpha}}" \
        --argjson max_results {{maxSearchResults}} \
        --slurpfile vector_hits "{{vectorKnowledgeSearchOutput}}" \
        --slurpfile keyword_hits "{{knowledgeSearchOutput}}" \
        --slurpfile rerank_meta "{{rerankResultsOutput}}" \
        --slurpfile scan_hits "{{scanKeywordResultsOutput}}" '
        def textify:
          if . == null then "" else tostring end
          | gsub("\\s+"; " ")
          | gsub("^\\s+|\\s+$"; "");

        def keyword_weight($alpha):
          1 - $alpha;

        def default_score($kind):
          if $kind == "vector_search" then 0.72
          elif $kind == "knowledge_base" then 0.58
          else 0.35
          end;

        def source_bonus($kind):
          if $kind == "vector_search" then 0.22
          elif $kind == "knowledge_base" then 0.12
          else 0.05
          end;

        def pick_target($item; $text):
          (
            $item.target
            // $item.url
            // $item.host
            // $item.endpoint
            // $item.source_path
            // (try (($text | match("https?://[^\\s\\\"]+"; "i")).string) catch "")
            // ""
          ) | textify;

        def pick_category($text):
          if ($text | test("admin|dashboard|backoffice|manage"; "i")) then "admin_surface"
          elif ($text | test("login|auth|signin|session|oauth|sso|jwt"; "i")) then "auth_surface"
          elif ($text | test("graphql|swagger|openapi|api|endpoint"; "i")) then "api_surface"
          elif ($text | test("idor|authorization|authz|permission|privilege|role|tenant"; "i")) then "business_logic"
          elif ($text | test("upload|import|export|download|backup|file"; "i")) then "file_data_surface"
          elif ($text | test("sql|ssti|rce|ssrf|xss|takeover|secret|cve|critical"; "i")) then "vulnerability_context"
          else "general"
          end;

        def pick_severity($item; $text):
          (($item.severity // $item.severity_hint // "") | textify | ascii_downcase) as $direct
          | if ($direct | length) > 0 then $direct
            elif ($text | test("critical|rce|takeover|admin access|secret"; "i")) then "critical"
            elif ($text | test("high|login|auth|admin|graphql|swagger|sql|ssrf|ssti|upload|idor"; "i")) then "high"
            elif ($text | test("medium|token|session|api|endpoint"; "i")) then "medium"
            else "info"
            end;

        def pick_action($category; $text):
          if $category == "auth_surface" then "auth_review"
          elif $category == "admin_surface" then "admin_review"
          elif $category == "api_surface" then "api_probe"
          elif $category == "business_logic" then "logic_verify"
          elif ($text | test("sql|ssti|rce|ssrf|xss|takeover|secret"; "i")) then "exploit_verify"
          else "investigate"
          end;

        def normalize($kind):
          (if type == "object" then . else {content: (. | tostring)} end) as $item
          | (($item.content // $item.snippet // $item.text // $item.title // ($item | tostring)) | textify) as $text
          | (pick_target($item; $text)) as $target
          | (pick_category($text)) as $category
          | (pick_severity($item; $text)) as $severity
          | (($item.relevance_score // $item.score // default_score($kind)) | tonumber? // default_score($kind)) as $base_score
          | (
              if $kind == "vector_search"
              then (($base_score * $alpha) + source_bonus($kind))
              else (($base_score * keyword_weight($alpha)) + source_bonus($kind))
              end
            ) as $hybrid_score
          | {
              type: ($item.type // $category),
              content: ($text[0:800]),
              source: ($item.source // $kind),
              source_type: $kind,
              relevance_score: $base_score,
              base_relevance_score: ($item.base_relevance_score // $base_score),
              rerank_score: ($item.rerank_score // 0),
              ranking_source: ($item.ranking_source // "hybrid"),
              hybrid_score: $hybrid_score,
              target: $target,
              category: $category,
              severity_hint: $severity,
              action_type: pick_action($category; $text),
              title: ($item.title // ""),
              workspace: ($item.workspace // ($item.metadata.workspace?)),
              source_path: ($item.source_path // ""),
              snippet: ($item.snippet // $text[0:220])
            };

        def unique_nonempty:
          reduce .[] as $v ([]; ($v | textify) as $s | if ($s | length) == 0 or index($s) then . else . + [$s] end);

        ($vector_hits[0] // []) as $vector_doc
        | ($keyword_hits[0] // []) as $keyword_doc
        | ($rerank_meta[0] // {}) as $rerank_doc
        | ($scan_hits[0] // []) as $scan_doc
        | ($vector_doc | map(normalize("vector_search"))) as $vector_results
        | ($keyword_doc | map(normalize("knowledge_base"))) as $knowledge_results
        | ($scan_doc | map(normalize("scan_index"))) as $scan_results
        | ($vector_results + $knowledge_results + $scan_results) as $all_results
        | (
            $all_results
            | sort_by(.hybrid_score, .relevance_score)
            | reverse
            | reduce .[] as $item ({items: [], seen: []};
                (($item.source_path // "") + "|" + ($item.target // "") + "|" + ($item.content // "")) as $dedupe_key
                | if (
                    ((($item.content // "") | textify | length) == 0 and (($item.target // "") | textify | length) == 0)
                    or (.seen | index($dedupe_key))
                  )
                  then .
                  else {items: (.items + [$item]), seen: (.seen + [$dedupe_key])}
                  end
              ).items[:$max_results]
          ) as $combined
        | (
            [
              $combined[]
              | select((.severity_hint == "critical") or (.severity_hint == "high"))
              | (.target // .content // "")
            ] | unique_nonempty | .[:8]
          ) as $critical_findings
        | (
            [
              $combined[]
              | (.target // .source_path // .title // "")
            ] | unique_nonempty | .[:12]
          ) as $priority_targets
        | (
            [
              $combined[]
              | (.target // .source_path // .workspace // "")
            ] | unique_nonempty | .[:12]
          ) as $affected_systems
        | (
            [
              $knowledge_results[]
              | (.title // .snippet // .content // "")
            ] | unique_nonempty | .[:6]
          ) as $relevant_knowledge
        | (
            [
              $combined[]
              | "[\(.action_type // "investigate")] \(((.target // .content // "") | textify)[0:140])"
            ] | unique_nonempty | .[:8]
          ) as $immediate_actions
        | {
            query: $query,
            target: $target,
            timestamp: $ts,
            provider: $provider,
            alpha: $alpha,
            vector_ranking_source: ($rerank_doc.ranking_source // "hybrid"),
            rerank_applied: ($rerank_doc.rerank_applied // false),
            rerank_provider: ($rerank_doc.rerank_provider // ""),
            rerank_model: ($rerank_doc.rerank_model // ""),
            status: (if ($combined | length) > 0 then "success" else "no_results" end),
            vector_recall: {
              count: ($vector_results | length),
              results: $vector_results
            },
            knowledge_base: {
              count: ($knowledge_results | length),
              results: $knowledge_results
            },
            scan_data: {
              count: ($scan_results | length),
              results: $scan_results
            },
            total_results: ($combined | length),
            results: $combined,
            priority_targets: $priority_targets,
            highlights: {
              critical_findings: $critical_findings,
              relevant_knowledge: $relevant_knowledge,
              immediate_actions: $immediate_actions,
              affected_systems: $affected_systems
            }
          }
      ' > "{{searchResultsOutput}}"

      echo "[Hybrid] Results merged and saved to {{searchResultsOutput}}"

  - name: extract-compatibility-artifacts
    type: bash
    pre_condition: "{{enableHybridSearch}}"
    command: |
      mkdir -p {{Output}}/ai-analysis {{semanticIndexDir}}

      count_lines_safe() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      RESULTS_TMP="{{semanticIndexDir}}/.hybrid-results-compat-{{TargetSpace}}.json"

      jq '
        def textify:
          if . == null then "" else tostring end
          | gsub("\\s+"; " ")
          | gsub("^\\s+|\\s+$"; "");

        def unique_nonempty:
          reduce .[] as $v ([]; ($v | textify) as $s | if ($s | length) == 0 or index($s) then . else . + [$s] end);

        (.results // []) as $results
        | ([ $results[]? | (.target // .source_path // .title // "") ] | unique_nonempty | .[:12]) as $priority_targets
        | ([ $results[]? | (.target // .source_path // .workspace // "") ] | unique_nonempty | .[:12]) as $affected_systems
        | .priority_targets = $priority_targets
        | .highlights = {
            critical_findings: ((.highlights.critical_findings // []) | unique_nonempty),
            relevant_knowledge: ((.highlights.relevant_knowledge // []) | unique_nonempty),
            immediate_actions: ((.highlights.immediate_actions // []) | unique_nonempty),
            affected_systems: $affected_systems
          }
      ' "{{searchResultsOutput}}" > "$RESULTS_TMP" 2>/dev/null || cp "{{searchResultsOutput}}" "$RESULTS_TMP"
      mv "$RESULTS_TMP" "{{searchResultsOutput}}"

      jq '.highlights // {"critical_findings":[],"relevant_knowledge":[],"immediate_actions":[],"affected_systems":[]}' "{{searchResultsOutput}}" > "{{semanticHighlightsOutput}}" 2>/dev/null || echo '{"critical_findings":[],"relevant_knowledge":[],"immediate_actions":[],"affected_systems":[]}' > "{{semanticHighlightsOutput}}"

      jq -r '.highlights.critical_findings[] // empty' "{{searchResultsOutput}}" 2>/dev/null > "{{Output}}/ai-analysis/semantic-critical-findings.txt" || true
      jq -r '.highlights.immediate_actions[] // empty' "{{searchResultsOutput}}" 2>/dev/null > "{{Output}}/ai-analysis/semantic-immediate-actions.txt" || true
      jq -r '.highlights.affected_systems[] // empty' "{{searchResultsOutput}}" 2>/dev/null > "{{Output}}/ai-analysis/semantic-affected-systems.txt" || true
      jq -r '.priority_targets[]? // empty' "{{searchResultsOutput}}" 2>/dev/null > "{{semanticPriorityTargetsOutput}}" || true

      jq '[
        .results[]?
        | select(
            (.severity_hint == "critical") or (.severity_hint == "high")
            or (.category == "auth_surface")
            or (.category == "admin_surface")
            or (.category == "api_surface")
            or (.category == "business_logic")
          )
        | {
            target: (.target // ""),
            content,
            source,
            source_type,
            severity_hint,
            category,
            action_type,
            relevance_score,
            hybrid_score
          }
      ]' "{{searchResultsOutput}}" 2>/dev/null > "{{semanticPriorityVulnsOutput}}" || echo '[]' > "{{semanticPriorityVulnsOutput}}"

      if [ ! -f "{{agentResultsOutput}}" ]; then
        echo '{"status":"not_applicable","source":"ai-semantic-search-hybrid","results":[]}' > "{{agentResultsOutput}}"
      fi

      if [ ! -f "{{embeddingsOutput}}" ]; then
        echo '{"status":"not_applicable","source":"ai-semantic-search-hybrid","embeddings":[]}' > "{{embeddingsOutput}}"
      fi

      PRIORITY_COUNT=$(count_lines_safe "{{semanticPriorityTargetsOutput}}")
      AFFECTED_COUNT=$(count_lines_safe "{{Output}}/ai-analysis/semantic-affected-systems.txt")
      echo "[Hybrid] Compatibility outputs ready: priority_targets=$PRIORITY_COUNT affected_systems=$AFFECTED_COUNT"

  - name: generate-summary
    type: bash
    pre_condition: "{{enableHybridSearch}}"
    command: |
      RESULTS_FILE="{{searchResultsOutput}}"
      QUERY_FILE="{{resolvedSearchQueryOutput}}"
      RESOLVED_QUERY="{{searchQuery}}"
      if [ -f "$QUERY_FILE" ] && [ -s "$QUERY_FILE" ]; then
        RESOLVED_QUERY=$(tr '\n' ' ' < "$QUERY_FILE" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')
      fi

      if [ -f "$RESULTS_FILE" ] && jq empty "$RESULTS_FILE" >/dev/null 2>&1; then
        TOTAL=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$RESULTS_FILE" 2>/dev/null || echo 0)
        VECTOR_COUNT=$(jq '.vector_recall.count // 0' "$RESULTS_FILE" 2>/dev/null || echo 0)
        KB_COUNT=$(jq '.knowledge_base.count // 0' "$RESULTS_FILE" 2>/dev/null || echo 0)
        SCAN_COUNT=$(jq '.scan_data.count // 0' "$RESULTS_FILE" 2>/dev/null || echo 0)
        RERANK_APPLIED=$(jq -r '.rerank_applied // false' "$RESULTS_FILE" 2>/dev/null || echo false)
        RANKING_SOURCE=$(jq -r '.vector_ranking_source // "hybrid"' "$RESULTS_FILE" 2>/dev/null || echo hybrid)

        echo "[Hybrid] ========== Search Summary =========="
        echo "[Hybrid] Query: $RESOLVED_QUERY"
        echo "[Hybrid] Total Results: $TOTAL"
        echo "[Hybrid] Vector Recall Hits: $VECTOR_COUNT"
        echo "[Hybrid] Knowledge Base Hits: $KB_COUNT"
        echo "[Hybrid] Scan Data Hits: $SCAN_COUNT"
        echo "[Hybrid] Rerank Applied: $RERANK_APPLIED"
        echo "[Hybrid] Vector Ranking Source: $RANKING_SOURCE"
        echo "[Hybrid] Output: $RESULTS_FILE"
        echo "[Hybrid] ====================================="
      fi

  - name: log-complete
    type: function
    pre_condition: "{{enableHybridSearch}}"
    functions:
      - 'log_info("Hybrid semantic search completed for {{Target}}")'
      - 'log_info("Results: {{searchResultsOutput}}")'

# =============================================================================
# AI 语义搜索模块 - Chroma 混合检索版
# =============================================================================
# 功能：
# - 向量搜索 (Chroma + Jina/OpenAI embeddings)
# - BM25 关键词搜索
# - RRF (Reciprocal Rank Fusion) 混合检索
# - 知识库向量化索引
# =============================================================================

kind: module
name: ai-semantic-search-hybrid
description: AI-powered hybrid search with vector + BM25 + RRF fusion

params:
  - name: semanticIndexDir
    default: "{{Output}}/ai-analysis/semantic-index"
  - name: searchResultsOutput
    default: "{{Output}}/ai-analysis/hybrid-search-results-{{TargetSpace}}.json"
  - name: chromaPath
    default: "{{Output}}/ai-analysis/chroma_db"
  - name: collectionName
    default: "{{TargetSpace}}"
  - name: maxSearchResults
    type: integer
    default: 10
  - name: minRelevanceScore
    type: float
    default: 0.3
  - name: hybridAlpha
    type: float
    default: 0.7
    description: "Weight for vector search (1-alpha for BM25)"
  - name: searchQuery
    type: string
    default: "SQL injection vulnerabilities and misconfigurations"
  - name: enableHybridSearch
    type: bool
    default: true

  # Embeddings 配置
  - name: embeddingsProvider
    type: string
    default: "jina"
  - name: jinaApiUrl
    type: string
    default: "https://api.jina.ai/v1/embeddings"
  - name: jinaModel
    type: string
    default: "jina-embeddings-v5-small-eu"
  - name: jinaApiKey
    type: string
    default: "{{JINA_API_KEY}}"
  - name: openaiApiKey
    type: string
    default: "{{OPENAI_API_KEY}}"

steps:
  - name: prepare-hybrid-index
    type: function
    pre_condition: "{{enableHybridSearch}}"
    functions:
      - 'create_folder("{{semanticIndexDir}}")'
      - 'create_folder("{{chromaPath}}")'
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'log_info("Starting hybrid search for {{Target}}")'

  - name: check-chroma-available
    type: bash
    pre_condition: "{{enableHybridSearch}}"
    timeout: 30s
    command: |
      echo "[Hybrid] Checking Chroma availability..."
      
      # 检查 Python 环境
      if ! command -v python3 &> /dev/null; then
        echo "[Hybrid] Python3 not found"
        exit 1
      fi
      
      # 检查 chromadb 包
      if python3 -c "import chromadb" 2>/dev/null; then
        echo "[Hybrid] Chroma SDK available"
        CHROMA_OK=true
      else
        echo "[Hybrid] Chroma SDK not installed"
        echo "[Hybrid] Installing chromadb..."
        pip3 install --quiet chromadb || pip install --quiet chromadb
        if python3 -c "import chromadb" 2>/dev/null; then
          echo "[Hybrid] Chroma installed successfully"
        else
          echo "[Hybrid] Failed to install chromadb"
          exit 1
        fi
      fi
      
      # 验证脚本存在
      SCRIPT_PATH="{{OsmedeusBase}}/osmedeus-base/scripts/chroma-hybrid-search.py"
      if [ -f "$SCRIPT_PATH" ]; then
        echo "[Hybrid] Search script found: $SCRIPT_PATH"
      else
        echo "[Hybrid] ERROR: Search script not found: $SCRIPT_PATH"
        exit 1
      fi

  - name: index-knowledge-base
    type: bash
    pre_condition: "{{enableHybridSearch}}"
    timeout: 300s
    command: |
      echo "[Hybrid] Indexing knowledge base..."
      
      SKILLS_DIR="{{OsmedeusBase}}/osmedeus-base/skills"
      COMBINED_KB="{{semanticIndexDir}}/knowledge-base-combined.txt"
      SCRIPT="{{OsmedeusBase}}/osmedeus-base/scripts/chroma-hybrid-search.py"
      
      # 合并所有 skills 文件
      : > "$COMBINED_KB"
      
      for skill_dir in "$SKILLS_DIR"/*/; do
        if [ -d "$skill_dir" ]; then
          SKILL_NAME=$(basename "$skill_dir")
          SKILL_FILE="$skill_dir/SKILL.md"
          
          if [ -f "$SKILL_FILE" ]; then
            echo "=== [$SKILL_NAME] ===" >> "$COMBINED_KB"
            cat "$SKILL_FILE" >> "$COMBINED_KB"
            echo "" >> "$COMBINED_KB"
            echo "[Hybrid] Added: $SKILL_NAME"
          fi
        fi
      done
      
      KB_LINES=$(wc -l < "$COMBINED_KB" 2>/dev/null || echo 0)
      echo "[Hybrid] Knowledge base combined: $KB_LINES lines"
      
      # 使用 Chroma 脚本创建索引
      python3 "$SCRIPT" \
        --action create \
        --collection "{{collectionName}}" \
        --chroma-path "{{chromaPath}}" \
        --persist \
        --input-file "$COMBINED_KB" \
        --embeddings-api "{{embeddingsProvider}}" \
        --embeddings-model "{{jinaModel}}" \
        --embeddings-url "{{jinaApiUrl}}" \
        --embeddings-api-key "{{jinaApiKey}}"
      
      INDEX_STATUS=$?
      if [ $INDEX_STATUS -eq 0 ]; then
        echo "[Hybrid] Knowledge base indexed successfully"
      else
        echo "[Hybrid] Warning: Indexing may have issues (exit code: $INDEX_STATUS)"
      fi

  - name: index-scan-data
    type: bash
    pre_condition: "{{enableHybridSearch}}"
    timeout: 300s
    command: |
      echo "[Hybrid] Indexing scan data..."
      
      SCAN_DATA="{{semanticIndexDir}}/scan-data-combined.txt"
      SCRIPT="{{OsmedeusBase}}/osmedeus-base/scripts/chroma-hybrid-search.py"
      : > "$SCAN_DATA"
      
      # 索引漏洞数据
      if [ -f "{{nucleiFile}}" ]; then
        echo "=== [VULNERABILITIES] ===" >> "$SCAN_DATA"
        cat "{{nucleiFile}}" >> "$SCAN_DATA" 2>/dev/null || true
        echo "" >> "$SCAN_DATA"
        VULN_LINES=$(wc -l < "{{nucleiFile}}" 2>/dev/null || echo 0)
        echo "[Hybrid] Added vulnerabilities: $VULN_LINES lines"
      fi
      
      # 索引指纹数据
      if [ -f "{{fingerprintFile}}" ]; then
        echo "=== [FINGERPRINT] ===" >> "$SCAN_DATA"
        cat "{{fingerprintFile}}" >> "$SCAN_DATA" 2>/dev/null || true
        echo "" >> "$SCAN_DATA"
      fi
      
      # 索引子域名
      SUBDOMAIN_FILE="{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"
      if [ -f "$SUBDOMAIN_FILE" ]; then
        echo "=== [SUBDOMAINS] ===" >> "$SCAN_DATA"
        cat "$SUBDOMAIN_FILE" >> "$SCAN_DATA" 2>/dev/null || true
        echo "" >> "$SCAN_DATA"
      fi
      
      SCAN_LINES=$(wc -l < "$SCAN_DATA" 2>/dev/null || echo 0)
      echo "[Hybrid] Scan data combined: $SCAN_LINES lines"
      
      # 追加到 Chroma 索引
      if [ "$SCAN_LINES" -gt 0 ]; then
        python3 "$SCRIPT" \
          --action create \
          --collection "{{collectionName}}-scan" \
          --chroma-path "{{chromaPath}}" \
          --persist \
          --input-file "$SCAN_DATA" \
          --embeddings-api "{{embeddingsProvider}}" \
          --embeddings-model "{{jinaModel}}" \
          --embeddings-url "{{jinaApiUrl}}" \
          --embeddings-api-key "{{jinaApiKey}}"
        
        echo "[Hybrid] Scan data indexed"
      fi

  - name: hybrid-search
    type: bash
    pre_condition: "{{enableHybridSearch}}"
    timeout: 120s
    command: |
      echo "[Hybrid] Performing hybrid search..."
      echo "[Hybrid] Query: {{searchQuery}}"
      echo "[Hybrid] Alpha (vector weight): {{hybridAlpha}}"
      
      SCRIPT="{{OsmedeusBase}}/osmedeus-base/scripts/chroma-hybrid-search.py"
      
      # 搜索知识库
      echo "[Hybrid] Searching knowledge base..."
      python3 "$SCRIPT" \
        --action search \
        --collection "{{collectionName}}" \
        --chroma-path "{{chromaPath}}" \
        --persist \
        --query "{{searchQuery}}" \
        --n-results {{maxSearchResults}} \
        --alpha {{hybridAlpha}} \
        --min-score {{minRelevanceScore}} \
        --embeddings-api "{{embeddingsProvider}}" \
        --embeddings-model "{{jinaModel}}" \
        --embeddings-url "{{jinaApiUrl}}" \
        --embeddings-api-key "{{jinaApiKey}}" \
        --output "{{semanticIndexDir}}/kb-results.json"
      
      # 搜索扫描数据
      echo "[Hybrid] Searching scan data..."
      python3 "$SCRIPT" \
        --action search \
        --collection "{{collectionName}}-scan" \
        --chroma-path "{{chromaPath}}" \
        --persist \
        --query "{{searchQuery}}" \
        --n-results {{maxSearchResults}} \
        --alpha {{hybridAlpha}} \
        --min-score {{minRelevanceScore}} \
        --embeddings-api "{{embeddingsProvider}}" \
        --embeddings-model "{{jinaModel}}" \
        --embeddings-url "{{jinaApiUrl}}" \
        --embeddings-api-key "{{jinaApiKey}}" \
        --output "{{semanticIndexDir}}/scan-results.json"
      
      echo "[Hybrid] Search completed"

  - name: merge-results
    type: bash
    pre_condition: "{{enableHybridSearch}}"
    command: |
      echo "[Hybrid] Merging results..."
      
      KB_RESULTS="{{semanticIndexDir}}/kb-results.json"
      SCAN_RESULTS="{{semanticIndexDir}}/scan-results.json"
      FINAL_OUTPUT="{{searchResultsOutput}}"
      
      # 构建最终结果
      python3 << 'EOF'
      import json
      import sys
      
      try:
        # Load knowledge base results
        kb_data = {"results": []}
        try:
          with open("{{semanticIndexDir}}/kb-results.json", "r") as f:
            kb_data = json.load(f)
        except:
          pass
        
        # Load scan results
        scan_data = {"results": []}
        try:
          with open("{{semanticIndexDir}}/scan-results.json", "r") as f:
            scan_data = json.load(f)
        except:
          pass
        
        # Merge and deduplicate
        seen = set()
        merged = {
            "query": "{{searchQuery}}",
            "target": "{{Target}}",
            "timestamp": "",
            "knowledge_base": {
                "count": len(kb_data.get("results", [])),
                "results": kb_data.get("results", [])
            },
            "scan_data": {
                "count": len(scan_data.get("results", [])),
                "results": scan_data.get("results", [])
            },
            "total_results": 0,
            "highlights": {
                "critical_findings": [],
                "relevant_knowledge": [],
                "immediate_actions": []
            }
        }
        
        # Extract highlights
        all_results = kb_data.get("results", []) + scan_data.get("results", [])
        for r in all_results:
            content_lower = r.get("content", "").lower()
            
            # Critical keywords
            if any(k in content_lower for k in ["critical", "high severity", "rce", "remote code"]):
                merged["highlights"]["critical_findings"].append({
                    "content": r.get("content", "")[:200],
                    "source": r.get("id", "unknown"),
                    "score": r.get("score", 0)
                })
            
            # Actionable items
            if any(k in content_lower for k in ["remediation", "fix", "patch", "mitigation", "suggest"]):
                merged["highlights"]["immediate_actions"].append({
                    "content": r.get("content", "")[:200],
                    "source": r.get("id", "unknown")
                })
        
        merged["highlights"]["critical_findings"] = merged["highlights"]["critical_findings"][:5]
        merged["highlights"]["immediate_actions"] = merged["highlights"]["immediate_actions"][:5]
        merged["total_results"] = len(all_results)
        merged["status"] = "success"
        
        # Output
        output_path = "{{searchResultsOutput}}"
        with open(output_path, "w", encoding="utf-8") as f:
            json.dump(merged, f, ensure_ascii=False, indent=2)
        
        print(json.dumps({
            "status": "success",
            "total_results": merged["total_results"],
            "kb_count": len(kb_data.get("results", [])),
            "scan_count": len(scan_data.get("results", []))
        }))
        
      except Exception as e:
        print(json.dumps({"status": "error", "message": str(e)}))
      EOF
      
      echo "[Hybrid] Results merged and saved to {{searchResultsOutput}}"

  - name: generate-summary
    type: bash
    pre_condition: "{{enableHybridSearch}}"
    command: |
      echo "[Hybrid] Generating summary..."
      
      RESULTS_FILE="{{searchResultsOutput}}"
      
      if [ -f "$RESULTS_FILE" ]; then
        TOTAL=$(python3 -c "import json; print(json.load(open('$RESULTS_FILE')).get('total_results', 0))" 2>/dev/null || echo 0)
        KB_COUNT=$(python3 -c "import json; print(json.load(open('$RESULTS_FILE')).get('knowledge_base', {}).get('count', 0))" 2>/dev/null || echo 0)
        SCAN_COUNT=$(python3 -c "import json; print(json.load(open('$RESULTS_FILE')).get('scan_data', {}).get('count', 0))" 2>/dev/null || echo 0)
        
        echo "[Hybrid] ========== Search Summary =========="
        echo "[Hybrid] Query: {{searchQuery}}"
        echo "[Hybrid] Total Results: $TOTAL"
        echo "[Hybrid] Knowledge Base Hits: $KB_COUNT"
        echo "[Hybrid] Scan Data Hits: $SCAN_COUNT"
        echo "[Hybrid] Output: $RESULTS_FILE"
        echo "[Hybrid] ====================================="
      fi

  - name: log-complete
    type: function
    pre_condition: "{{enableHybridSearch}}"
    functions:
      - 'log_info("Hybrid semantic search completed for {{Target}}")'
      - 'log_info("Results: {{searchResultsOutput}}")'

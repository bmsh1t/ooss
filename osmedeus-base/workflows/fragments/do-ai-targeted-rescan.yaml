# =============================================================================
# AI 定向深扫模块
# =============================================================================
# 功能：
# - 读取 AI 验证过的高置信度漏洞 URL
# - 对这些目标做 nuclei critical/high 定向深扫
# - 输出补充扫描结果，与原始结果合并
#
# 设计原则：
# - 不重跑全量 vuln-suite（代价太高）
# - 只针对 AI confirmed 的目标做补充验证
# - 读取 ai-decision 中的 nuclei_severity/threads/rate_limit 建议
# =============================================================================

kind: module
name: ai-targeted-rescan
description: AI-guided targeted rescan - run nuclei against AI-confirmed high-confidence targets

params:
  # 输入：AI 分析结果
  - name: confirmedUrlsFile
    default: "{{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt"
  - name: attackChainEntryPointsFile
    default: "{{Output}}/ai-analysis/entry-points-{{TargetSpace}}.txt"
  - name: priorityTargetsFile
    default: "{{Output}}/ai-analysis/priority-targets-{{TargetSpace}}.txt"
  - name: operatorQueueTargetsFile
    default: "{{Output}}/ai-analysis/operator-queue-targets-{{TargetSpace}}.txt"
  - name: retestTargetsFile
    default: "{{Output}}/ai-analysis/retest-targets-{{TargetSpace}}.txt"
  - name: semanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-{{TargetSpace}}.txt"
  - name: fallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"
  - name: secondFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
  - name: thirdFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-early-{{TargetSpace}}.txt"
  - name: aiDecisionFile
    default: "{{Output}}/ai-analysis/ai-decision-{{TargetSpace}}.json"
  - name: appliedDecisionFile
    default: "{{Output}}/ai-analysis/applied-ai-decision-{{TargetSpace}}.json"
  - name: previousFollowupDecisionFile
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"
  - name: previous_followup_targets
    default: ""
  - name: previous_followup_priority_targets
    default: ""
  - name: previous_followup_focus_areas
    default: ""
  - name: previous_followup_manual_first_targets
    default: ""
  - name: previous_followup_high_confidence_targets
    default: ""
  - name: previous_followup_manual_first_targets_list
    default: ""
  - name: previous_followup_high_confidence_targets_list
    default: ""
  - name: previous_followup_combined_targets_list
    default: ""
  - name: previous_followup_reasoning
    default: ""
  - name: previous_followup_scan_profile
    default: ""
  - name: previous_followup_severity
    default: ""
  - name: previous_followup_priority_mode
    default: ""
  - name: previous_followup_confidence_level
    default: ""
  - name: previous_followup_next_phase
    default: ""
  - name: previous_followup_reuse_sources
    default: ""
  - name: previous_followup_manual_followup_needed
    default: ""
  - name: previous_followup_campaign_followup_recommended
    default: ""
  - name: previous_followup_queue_followup_effective
    default: ""
  - name: previous_followup_escalation_score
    default: ""
  - name: previous_followup_campaign_create_status
    default: ""
  - name: previous_followup_campaign_create_id
    default: ""
  - name: previous_followup_campaign_create_queued_runs
    default: ""
  - name: rescanTargetsFile
    default: "{{Output}}/ai-analysis/rescan-targets-{{TargetSpace}}.txt"

  # 输出
  - name: rescanOutputJsonl
    default: "{{Output}}/vulnscan/nuclei-rescan-{{TargetSpace}}.jsonl"
  - name: rescanCriticalFile
    default: "{{Output}}/vulnscan/rescan-critical-{{TargetSpace}}.txt"
  - name: rescanHighFile
    default: "{{Output}}/vulnscan/rescan-high-{{TargetSpace}}.txt"
  - name: mainNucleiOutputJsonl
    default: "{{Output}}/vulnscan/nuclei-jsonl-{{TargetSpace}}.txt"
  - name: mainNucleiCriticalFile
    default: "{{Output}}/vulnscan/nuclei-critical-{{TargetSpace}}.txt"
  - name: mainNucleiHighFile
    default: "{{Output}}/vulnscan/nuclei-high-{{TargetSpace}}.txt"
  - name: mainNucleiCleanFile
    default: "{{Output}}/vulnscan/clean-jsonl-{{TargetSpace}}.txt"
  - name: rescanSummaryFile
    default: "{{Output}}/ai-analysis/rescan-summary-{{TargetSpace}}.md"

  # 扫描配置（默认值，会被 AI 决策覆盖）
  - name: nucleiTemplateConfig
    default: "~/nuclei-templates/"
  - name: defaultSeverity
    default: "critical,high"
  - name: defaultThreads
    type: integer
    default: 15
  - name: defaultRateLimit
    type: integer
    default: 30
  - name: defaultTimeout
    default: "8"
  - name: scanTimeout
    default: "90m"
  - name: maxRescanTargets
    type: integer
    default: 100

  # 开关
  - name: enableTargetedRescan
    type: bool
    default: true

steps:
  - name: prepare-rescan
    type: function
    pre_condition: "{{enableTargetedRescan}}"
    log: "Preparing AI-guided targeted rescan"
    functions:
      - 'create_folder("{{Output}}/vulnscan")'
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'log_info("Starting AI targeted rescan for {{Target}}")'

  - name: check-confirmed-targets
    type: bash
    pre_condition: "{{enableTargetedRescan}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      TARGET_TMP="{{Output}}/ai-analysis/.rescan-targets-raw-{{TargetSpace}}.txt"
      : > "$TARGET_TMP"

      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      csv_or_json_to_array() {
        value="$1"
        if [ -z "$value" ]; then
          echo '[]'
        elif printf '%s' "$value" | jq -e 'type == "array"' >/dev/null 2>&1; then
          printf '%s' "$value"
        else
          printf '%s' "$value" | jq -R 'split(",") | reduce .[] as $item ([]; ($item | gsub("^\\s+|\\s+$"; "")) as $normalized | if ($normalized != "" and (index($normalized) == null)) then . + [$normalized] else . end)'
        fi
      }

      ACTIVE_SEMANTIC_PRIORITY_FILE="{{semanticPriorityTargetsFile}}"
      for candidate in "{{semanticPriorityTargetsFile}}" "{{fallbackSemanticPriorityTargetsFile}}" "{{secondFallbackSemanticPriorityTargetsFile}}" "{{thirdFallbackSemanticPriorityTargetsFile}}"; do
        [ -n "$candidate" ] || continue
        if text_has_lines "$candidate"; then
          ACTIVE_SEMANTIC_PRIORITY_FILE="$candidate"
          break
        fi
      done

      ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
      if [ -f "{{appliedDecisionFile}}" ] && jq empty "{{appliedDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{appliedDecisionFile}}"
      fi

      for f in "{{confirmedUrlsFile}}" "{{attackChainEntryPointsFile}}" "{{priorityTargetsFile}}" "$ACTIVE_SEMANTIC_PRIORITY_FILE" "{{operatorQueueTargetsFile}}" "{{retestTargetsFile}}"; do
        if [ -f "$f" ]; then
          cat "$f" >> "$TARGET_TMP" 2>/dev/null || true
        fi
      done

      if [ -f "$ACTIVE_DECISION_FILE" ] && jq empty "$ACTIVE_DECISION_FILE" 2>/dev/null; then
        jq -r '.targets.rescan_targets[]? // .rescan_targets[]? // empty' "$ACTIVE_DECISION_FILE" 2>/dev/null >> "$TARGET_TMP" || true
      fi
      if [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
        jq -r '((.seed_targets.rescan_targets // []) + (.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_critical_targets // []) + (.seed_targets.rescan_high_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.priority_targets // .refined_targets.priority_targets // []))[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$TARGET_TMP" || true
      else
        PREV_PARAM_MANUAL_JSON=$(csv_or_json_to_array "{{previous_followup_manual_first_targets_list}}")
        PREV_PARAM_HIGH_CONFIDENCE_JSON=$(csv_or_json_to_array "{{previous_followup_high_confidence_targets_list}}")
        PREV_PARAM_COMBINED_JSON=$(csv_or_json_to_array "{{previous_followup_combined_targets_list}}")
        PREV_PARAM_COMBINED_COUNT=$(printf '%s\n' "$PREV_PARAM_COMBINED_JSON" | jq -r 'length' 2>/dev/null || echo 0)
        if [ "$PREV_PARAM_COMBINED_COUNT" -eq 0 ] 2>/dev/null; then
          PREV_PARAM_COMBINED_JSON=$(jq -n \
            --argjson manual "$PREV_PARAM_MANUAL_JSON" \
            --argjson high "$PREV_PARAM_HIGH_CONFIDENCE_JSON" \
            '($manual + $high) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' 2>/dev/null || echo '[]')
        fi
        printf '%s\n' "$PREV_PARAM_COMBINED_JSON" | jq -r '.[]? // empty' 2>/dev/null >> "$TARGET_TMP" || true
      fi

      awk 'NF && !seen[$0]++' "$TARGET_TMP" | head -{{maxRescanTargets}} > "{{rescanTargetsFile}}" || true

      count_lines_safe() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      if [ ! -s "{{rescanTargetsFile}}" ]; then
        echo "[Rescan] No actionable targets collected, skipping rescan"
        touch "{{Output}}/ai-analysis/.rescan-skip"
      else
        TARGET_COUNT=$(count_lines_safe "{{rescanTargetsFile}}")
        echo "[Rescan] Collected $TARGET_COUNT actionable targets for deep scan"
        rm -f "{{Output}}/ai-analysis/.rescan-skip"
      fi

  - name: load-ai-decision
    type: bash
    pre_condition: "{{enableTargetedRescan}} && !file_exists(\"{{Output}}/ai-analysis/.rescan-skip\")"
    command: |
      # 读取 AI 决策建议的扫描参数
      normalize_int() {
        value="$1"
        case "$value" in
          ''|*[!0-9]*)
            echo 0
            ;;
          *)
            echo "$value"
            ;;
        esac
      }

      SEVERITY="{{defaultSeverity}}"
      THREADS={{defaultThreads}}
      RATE_LIMIT={{defaultRateLimit}}
      TIMEOUT="{{defaultTimeout}}"
      ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
      if [ -f "{{appliedDecisionFile}}" ] && jq empty "{{appliedDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{appliedDecisionFile}}"
      fi

      if [ -f "$ACTIVE_DECISION_FILE" ] && jq empty "$ACTIVE_DECISION_FILE" 2>/dev/null; then
        AI_SEVERITY=$(jq -r '.scan.severity // .nuclei_severity // ""' "$ACTIVE_DECISION_FILE" 2>/dev/null)
        AI_THREADS=$(jq -r '.scan.threads // .suggested_threads // 0' "$ACTIVE_DECISION_FILE" 2>/dev/null)
        AI_RATE=$(jq -r '.scan.rate_limit // .suggested_rate_limit // 0' "$ACTIVE_DECISION_FILE" 2>/dev/null)
        AI_TIMEOUT=$(jq -r '.scan.timeout // .recommended_timeout // ""' "$ACTIVE_DECISION_FILE" 2>/dev/null)
        AI_TIMEOUT_SECONDS=$(jq -r '.scan.timeout_seconds // 0' "$ACTIVE_DECISION_FILE" 2>/dev/null)

        [ -n "$AI_SEVERITY" ] && SEVERITY="$AI_SEVERITY"
        [ "$AI_THREADS" -gt 0 ] 2>/dev/null && THREADS=$AI_THREADS
        [ "$AI_RATE" -gt 0 ] 2>/dev/null && RATE_LIMIT=$AI_RATE
        [ "$AI_TIMEOUT_SECONDS" -gt 0 ] 2>/dev/null && TIMEOUT="$AI_TIMEOUT_SECONDS"
        # 支持 6h/30m/90s 这种配置，统一转换为 nuclei 所需的秒数。
        if [ "$TIMEOUT" = "{{defaultTimeout}}" ] && [ -n "$AI_TIMEOUT" ]; then
          case "$AI_TIMEOUT" in
            *h|*H)
              AI_TIMEOUT_NUM=$(printf '%s' "$AI_TIMEOUT" | tr -dc '0-9')
              [ -n "$AI_TIMEOUT_NUM" ] && [ "$AI_TIMEOUT_NUM" -gt 0 ] 2>/dev/null && TIMEOUT=$((AI_TIMEOUT_NUM * 3600))
              ;;
            *m|*M)
              AI_TIMEOUT_NUM=$(printf '%s' "$AI_TIMEOUT" | tr -dc '0-9')
              [ -n "$AI_TIMEOUT_NUM" ] && [ "$AI_TIMEOUT_NUM" -gt 0 ] 2>/dev/null && TIMEOUT=$((AI_TIMEOUT_NUM * 60))
              ;;
            *s|*S)
              AI_TIMEOUT_NUM=$(printf '%s' "$AI_TIMEOUT" | tr -dc '0-9')
              [ -n "$AI_TIMEOUT_NUM" ] && [ "$AI_TIMEOUT_NUM" -gt 0 ] 2>/dev/null && TIMEOUT="$AI_TIMEOUT_NUM"
              ;;
            *)
              AI_TIMEOUT_NUM=$(printf '%s' "$AI_TIMEOUT" | tr -dc '0-9')
              [ -n "$AI_TIMEOUT_NUM" ] && [ "$AI_TIMEOUT_NUM" -gt 0 ] 2>/dev/null && TIMEOUT="$AI_TIMEOUT_NUM"
              ;;
          esac
        fi

        echo "[Rescan] AI decision loaded: severity=$SEVERITY threads=$THREADS rate=$RATE_LIMIT timeout=$TIMEOUT"
      elif [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
        PREV_SEVERITY=$(jq -r '.seed_focus.severity // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_PROFILE=$(jq -r '.seed_focus.scan_profile // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        [ -n "$PREV_SEVERITY" ] && SEVERITY="$PREV_SEVERITY"
        case "$PREV_PROFILE" in
          aggressive)
            THREADS=15
            RATE_LIMIT=50
            TIMEOUT="28800"
            ;;
          balanced)
            THREADS=12
            RATE_LIMIT=40
            TIMEOUT="21600"
            ;;
        esac
        echo "[Rescan] Previous followup seed loaded: severity=$SEVERITY threads=$THREADS rate=$RATE_LIMIT timeout=$TIMEOUT"
      else
        PREV_PARAM_SEVERITY="{{previous_followup_severity}}"
        PREV_PARAM_PROFILE="{{previous_followup_scan_profile}}"
        PREV_PARAM_PRIORITY_MODE="{{previous_followup_priority_mode}}"
        PREV_PARAM_CONFIDENCE_LEVEL="{{previous_followup_confidence_level}}"
        PREV_PARAM_ESCALATION_SCORE=$(normalize_int "{{previous_followup_escalation_score}}")

        if [ -n "$PREV_PARAM_SEVERITY" ] || [ -n "$PREV_PARAM_PROFILE" ] || [ -n "$PREV_PARAM_PRIORITY_MODE" ] || [ -n "$PREV_PARAM_CONFIDENCE_LEVEL" ] || [ "$PREV_PARAM_ESCALATION_SCORE" -gt 0 ] 2>/dev/null; then
          [ -n "$PREV_PARAM_SEVERITY" ] && SEVERITY="$PREV_PARAM_SEVERITY"
          case "${PREV_PARAM_PROFILE:-focused}" in
            aggressive)
              THREADS=15
              RATE_LIMIT=50
              TIMEOUT="28800"
              ;;
            balanced)
              THREADS=12
              RATE_LIMIT=40
              TIMEOUT="21600"
              ;;
            *)
              THREADS={{defaultThreads}}
              RATE_LIMIT={{defaultRateLimit}}
              TIMEOUT="{{defaultTimeout}}"
              ;;
          esac

          if [ "$PREV_PARAM_PRIORITY_MODE" = "manual-first" ] || [ "$PREV_PARAM_CONFIDENCE_LEVEL" = "high" ] || [ "$PREV_PARAM_ESCALATION_SCORE" -ge 12 ] 2>/dev/null; then
            [ "$THREADS" -lt 15 ] 2>/dev/null && THREADS=15
            [ "$RATE_LIMIT" -lt 50 ] 2>/dev/null && RATE_LIMIT=50
            TIMEOUT="28800"
          elif [ "$PREV_PARAM_PRIORITY_MODE" = "campaign-first" ] || [ "$PREV_PARAM_PRIORITY_MODE" = "retest-first" ] || [ "$PREV_PARAM_CONFIDENCE_LEVEL" = "medium" ] || [ "$PREV_PARAM_ESCALATION_SCORE" -ge 6 ] 2>/dev/null; then
            [ "$THREADS" -lt 12 ] 2>/dev/null && THREADS=12
            [ "$RATE_LIMIT" -lt 40 ] 2>/dev/null && RATE_LIMIT=40
            if [ "$TIMEOUT" = "{{defaultTimeout}}" ] || [ "$TIMEOUT" -lt 21600 ] 2>/dev/null; then
              TIMEOUT="21600"
            fi
          fi

          echo "[Rescan] Queue previous followup params loaded: severity=$SEVERITY threads=$THREADS rate=$RATE_LIMIT timeout=$TIMEOUT"
        else
          echo "[Rescan] No AI decision found, using defaults"
        fi
      fi

      # 保存到工作目录（避免 /tmp 在容器/并发场景下的竞态问题）
      RESCAN_CFG="{{Output}}/ai-analysis/.rescan-config-{{TargetSpace}}.sh"
      {
        printf 'export RESCAN_SEVERITY=%s\n' "$(printf '%s' "$SEVERITY" | sed 's/["\\]/\\&/g')"
        printf 'export RESCAN_THREADS=%s\n' "$THREADS"
        printf 'export RESCAN_RATE_LIMIT=%s\n' "$RATE_LIMIT"
        printf 'export RESCAN_TIMEOUT=%s\n' "$(printf '%s' "$TIMEOUT" | sed 's/["\\]/\\&/g')"
      } > "$RESCAN_CFG"

      echo "[Rescan] Config saved to $RESCAN_CFG"

  - name: preflight-targeted-rescan-runtime
    type: bash
    pre_condition: "{{enableTargetedRescan}} && !file_exists(\"{{Output}}/ai-analysis/.rescan-skip\")"
    command: |
      expand_home_path() {
        value="$1"
        case "$value" in
          "~")
            printf '%s\n' "$HOME"
            ;;
          "~/"*)
            printf '%s/%s\n' "$HOME" "${value#~/}"
            ;;
          *)
            printf '%s\n' "$value"
            ;;
        esac
      }

      TEMPLATE_FILE="{{Output}}/ai-analysis/.rescan-template-dir-{{TargetSpace}}.txt"
      TEMPLATE_DIR=$(expand_home_path "{{nucleiTemplateConfig}}")

      if ! command -v nuclei >/dev/null 2>&1; then
        echo "[Rescan] nuclei binary not found, skipping targeted rescan"
        rm -f "$TEMPLATE_FILE" 2>/dev/null || true
        touch "{{Output}}/ai-analysis/.rescan-skip"
        exit 0
      fi

      if [ ! -d "$TEMPLATE_DIR" ]; then
        echo "[Rescan] Template directory not found: $TEMPLATE_DIR, skipping targeted rescan"
        rm -f "$TEMPLATE_FILE" 2>/dev/null || true
        touch "{{Output}}/ai-analysis/.rescan-skip"
        exit 0
      fi

      if ! find "$TEMPLATE_DIR" -type f -print -quit 2>/dev/null | grep -q .; then
        echo "[Rescan] Template directory is empty: $TEMPLATE_DIR, skipping targeted rescan"
        rm -f "$TEMPLATE_FILE" 2>/dev/null || true
        touch "{{Output}}/ai-analysis/.rescan-skip"
        exit 0
      fi

      printf '%s\n' "$TEMPLATE_DIR" > "$TEMPLATE_FILE"
      echo "[Rescan] Using template directory: $TEMPLATE_DIR"

  - name: run-targeted-nuclei
    type: bash
    pre_condition: "{{enableTargetedRescan}} && !file_exists(\"{{Output}}/ai-analysis/.rescan-skip\")"
    timeout: "{{scanTimeout}}"
    on_error:
      - action: continue
    command: |
      RESCAN_CFG="{{Output}}/ai-analysis/.rescan-config-{{TargetSpace}}.sh"
      TEMPLATE_FILE="{{Output}}/ai-analysis/.rescan-template-dir-{{TargetSpace}}.txt"
      [ -f "$RESCAN_CFG" ] && . "$RESCAN_CFG" 2>/dev/null || true
      SEVERITY=${RESCAN_SEVERITY:-"{{defaultSeverity}}"}
      THREADS=${RESCAN_THREADS:-{{defaultThreads}}}
      RATE_LIMIT=${RESCAN_RATE_LIMIT:-{{defaultRateLimit}}}
      TIMEOUT=${RESCAN_TIMEOUT:-"{{defaultTimeout}}"}

      expand_home_path() {
        value="$1"
        case "$value" in
          "~")
            printf '%s\n' "$HOME"
            ;;
          "~/"*)
            printf '%s/%s\n' "$HOME" "${value#~/}"
            ;;
          *)
            printf '%s\n' "$value"
            ;;
        esac
      }

      TEMPLATE_DIR=$(expand_home_path "{{nucleiTemplateConfig}}")
      if [ -f "$TEMPLATE_FILE" ]; then
        TEMPLATE_DIR=$(cat "$TEMPLATE_FILE" 2>/dev/null || printf '%s\n' "$TEMPLATE_DIR")
      fi

      count_lines_safe() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      TARGET_COUNT=$(count_lines_safe "{{rescanTargetsFile}}")
      echo "[Rescan] Running nuclei on $TARGET_COUNT confirmed targets"
      echo "[Rescan] Params: severity=$SEVERITY threads=$THREADS rate=$RATE_LIMIT timeout=$TIMEOUT templates=$TEMPLATE_DIR"

      nuclei \
        -l "{{rescanTargetsFile}}" \
        -t "$TEMPLATE_DIR" \
        -severity "$SEVERITY" \
        -c $THREADS \
        -rl $RATE_LIMIT \
        -timeout $TIMEOUT \
        -jsonl \
        -o "{{rescanOutputJsonl}}" \
        -silent 2>/dev/null || true

      rm -f "{{Output}}/ai-analysis/.rescan-config-{{TargetSpace}}.sh"
      rm -f "$TEMPLATE_FILE" 2>/dev/null || true

      FOUND=$(count_lines_safe "{{rescanOutputJsonl}}")
      echo "[Rescan] Nuclei completed: $FOUND findings"

  - name: extract-rescan-findings
    type: bash
    pre_condition: "{{enableTargetedRescan}} && !file_exists(\"{{Output}}/ai-analysis/.rescan-skip\")"
    command: |
      count_lines_safe() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      if [ ! -f "{{rescanOutputJsonl}}" ] || [ ! -s "{{rescanOutputJsonl}}" ]; then
        echo "[Rescan] No new findings from targeted rescan"
        exit 0
      fi

      # 提取 critical
      jq -r 'select(.info.severity == "critical") | "[" + .info.severity + "] " + .host + " - " + .info.name' \
        "{{rescanOutputJsonl}}" 2>/dev/null > "{{rescanCriticalFile}}" || true

      # 提取 high
      jq -r 'select(.info.severity == "high") | "[" + .info.severity + "] " + .host + " - " + .info.name' \
        "{{rescanOutputJsonl}}" 2>/dev/null > "{{rescanHighFile}}" || true

      CRITICAL=$(count_lines_safe "{{rescanCriticalFile}}")
      HIGH=$(count_lines_safe "{{rescanHighFile}}")
      echo "[Rescan] Extracted: critical=$CRITICAL high=$HIGH"

  - name: merge-rescan-findings-into-main-results
    type: bash
    pre_condition: "{{enableTargetedRescan}} && !file_exists(\"{{Output}}/ai-analysis/.rescan-skip\")"
    command: |
      count_lines_safe() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      if [ ! -f "{{rescanOutputJsonl}}" ] || [ ! -s "{{rescanOutputJsonl}}" ]; then
        echo "[Rescan] No rescan findings to merge"
        exit 0
      fi

      merge_jsonl() {
        MAIN_FILE="$1"
        EXTRA_FILE="$2"
        TMP_FILE="$3"

        if [ -f "$MAIN_FILE" ] && [ -s "$MAIN_FILE" ]; then
          jq -s '
            map(select(type == "object"))
            | unique_by([
                (."template-id" // ""),
                (."matched-at" // .matched_at // ""),
                (.host // ""),
                (.matched // ""),
                (.info.name // ""),
                (.info.severity // "")
              ])
            | .[]
          ' "$MAIN_FILE" "$EXTRA_FILE" > "$TMP_FILE" 2>/dev/null || cp "$MAIN_FILE" "$TMP_FILE"
        else
          cp "$EXTRA_FILE" "$TMP_FILE"
        fi

        mv "$TMP_FILE" "$MAIN_FILE"
      }

      TMP_ALL="{{Output}}/vulnscan/.nuclei-jsonl-merged-{{TargetSpace}}.tmp"
      TMP_CRIT="{{Output}}/vulnscan/.nuclei-critical-merged-{{TargetSpace}}.tmp"
      TMP_HIGH="{{Output}}/vulnscan/.nuclei-high-merged-{{TargetSpace}}.tmp"
      RESCAN_CRIT_JSONL="{{Output}}/vulnscan/.nuclei-rescan-critical-{{TargetSpace}}.jsonl"
      RESCAN_HIGH_JSONL="{{Output}}/vulnscan/.nuclei-rescan-high-{{TargetSpace}}.jsonl"

      merge_jsonl "{{mainNucleiOutputJsonl}}" "{{rescanOutputJsonl}}" "$TMP_ALL"

      jq 'select(.info.severity == "critical")' "{{rescanOutputJsonl}}" > "$RESCAN_CRIT_JSONL" 2>/dev/null || true
      jq 'select(.info.severity == "high")' "{{rescanOutputJsonl}}" > "$RESCAN_HIGH_JSONL" 2>/dev/null || true

      if [ -s "$RESCAN_CRIT_JSONL" ]; then
        merge_jsonl "{{mainNucleiCriticalFile}}" "$RESCAN_CRIT_JSONL" "$TMP_CRIT"
      fi
      if [ -s "$RESCAN_HIGH_JSONL" ]; then
        merge_jsonl "{{mainNucleiHighFile}}" "$RESCAN_HIGH_JSONL" "$TMP_HIGH"
      fi

      rm -f "$RESCAN_CRIT_JSONL" "$RESCAN_HIGH_JSONL" 2>/dev/null || true

      TOTAL_MAIN=$(count_lines_safe "{{mainNucleiOutputJsonl}}")
      TOTAL_RESCAN=$(count_lines_safe "{{rescanOutputJsonl}}")
      echo "[Rescan] Merged $TOTAL_RESCAN rescan findings into main vuln results (total=$TOTAL_MAIN)"

  - name: refresh-clean-vuln-jsonl
    type: function
    pre_condition: "{{enableTargetedRescan}} && !file_exists(\"{{Output}}/ai-analysis/.rescan-skip\") && file_exists(\"{{mainNucleiOutputJsonl}}\")"
    functions:
      - 'jsonl_filter("{{mainNucleiOutputJsonl}}", "{{mainNucleiCleanFile}}", "template-id,info.name,info.severity,matched-at,matched-name")'
      - 'sort_unix("{{mainNucleiCleanFile}}")'

  - name: import-rescan-findings
    type: function
    pre_condition: "{{enableTargetedRescan}} && !file_exists(\"{{Output}}/ai-analysis/.rescan-skip\") && file_exists(\"{{rescanOutputJsonl}}\") && file_length(\"{{rescanOutputJsonl}}\") > 0"
    on_error:
      - action: continue
    functions:
      - 'db_import_vuln_from_file("{{TargetSpace}}", "{{rescanOutputJsonl}}")'

  - name: generate-rescan-summary
    type: bash
    pre_condition: "{{enableTargetedRescan}}"
    command: |
      TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
      SKIPPED=false
      [ -f "{{Output}}/ai-analysis/.rescan-skip" ] && SKIPPED=true

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      {
        echo "# AI 定向深扫结果"
        echo "## 目标: {{Target}}"
        echo "## 时间: $TIMESTAMP"
        echo ""

        if [ "$SKIPPED" = "true" ]; then
          echo "> AI 验证无高置信度目标，跳过定向深扫"
        else
          CRITICAL=$(count_lines "{{rescanCriticalFile}}")
          HIGH=$(count_lines "{{rescanHighFile}}")
          TOTAL=$(count_lines "{{rescanOutputJsonl}}")
          TARGETS=$(count_lines "{{rescanTargetsFile}}")

          echo "## 扫描统计"
          echo "- 扫描目标数: $TARGETS"
          echo "- Critical 新发现: $CRITICAL"
          echo "- High 新发现: $HIGH"
          echo "- 总计新发现: $TOTAL"
          echo ""

          if [ "$CRITICAL" -gt 0 ]; then
            echo "## Critical 发现"
            cat "{{rescanCriticalFile}}" 2>/dev/null
            echo ""
          fi

          if [ "$HIGH" -gt 0 ]; then
            echo "## High 发现"
            cat "{{rescanHighFile}}" 2>/dev/null
            echo ""
          fi
        fi

        echo "---"
        echo "*由 AI 定向深扫模块生成*"
      } > "{{rescanSummaryFile}}"

      echo "[Rescan] Summary saved to {{rescanSummaryFile}}"

  - name: log-rescan-complete
    type: function
    pre_condition: "{{enableTargetedRescan}}"
    functions:
      - 'log_info("AI targeted rescan completed for {{Target}}")'

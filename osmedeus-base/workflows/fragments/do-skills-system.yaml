# =============================================================================
# Skills System - Read and use security testing skills
# =============================================================================
# 功能：
# - 读取技能文档内容
# - 根据漏洞类型加载对应技能
# - 提供技能内容给 AI 分析
# =============================================================================

kind: module
name: skills-system
description: Skill-based security testing knowledge system

params:
  - name: skillsDir
    default: "{{Workflows}}/../skills"
  - name: skillName
    type: string
    default: ""
    description: "Name of the skill to load (e.g., sql-injection, xss-testing)"
  - name: vulnTypes
    type: string
    default: ""
    description: "Comma-separated vulnerability types for bulk skill loading"
  - name: searchTerm
    type: string
    default: ""
    description: "Keyword to search across all skills"
  - name: targetType
    type: string
    default: "{{TargetType}}"
    description: "Target type used when generating a testing guide"
  - name: skillOutput
    default: "{{Output}}/ai-analysis/skill-content-{{TargetSpace}}.md"
    description: "Output file for skill content"

steps:
  - name: list-available-skills
    type: bash
    command: |
      echo "=== Available Security Testing Skills ==="
      echo ""
      
      SKILLS_DIR="{{skillsDir}}"

      read_meta_value() {
        local key="$1"
        local file="$2"
        awk -F': ' -v wanted="$key" '
          NR == 1 && $0 == "---" { in_fm = 1; next }
          in_fm && $0 == "---" { exit }
          in_fm && $1 == wanted {
            sub(/^[^:]+:[[:space:]]*/, "", $0)
            gsub(/^"/, "", $0)
            gsub(/"$/, "", $0)
            print
            exit
          }
        ' "$file"
      }
      
      if [ ! -d "$SKILLS_DIR" ]; then
        echo "Skills directory not found: $SKILLS_DIR"
        exit 0
      fi
      
      echo "Skills in $SKILLS_DIR:"
      echo ""
      
      for skill_dir in "$SKILLS_DIR"/*/; do
        if [ -d "$skill_dir" ]; then
          skill_name=$(basename "$skill_dir")
          skill_file="$skill_dir/SKILL.md"
          
          if [ -f "$skill_file" ]; then
            title=$(read_meta_value "name" "$skill_file" || true)
            description=$(read_meta_value "description" "$skill_file" || true)
            [ -z "$title" ] && title="$skill_name"
            [ -z "$description" ] && description="No description"
            echo "  [$skill_name] $title - $description"
          else
            echo "  [$skill_name] - (no SKILL.md found)"
          fi
        fi
      done
      
      echo ""
      echo "Usage: Set skillName parameter to load a specific skill"
      echo "Example: skillName=sql-injection"

  - name: load-skill-content
    type: bash
    pre_condition: '"{{skillName}}" != ""'
    command: |
      SKILLS_DIR="{{skillsDir}}"
      SKILL_NAME="{{skillName}}"
      SKILL_FILE="$SKILLS_DIR/$SKILL_NAME/SKILL.md"

      strip_frontmatter() {
        awk '
          NR == 1 && $0 == "---" { in_fm = 1; next }
          in_fm && $0 == "---" { in_fm = 0; next }
          !in_fm { print }
        ' "$1"
      }

      read_meta_value() {
        local key="$1"
        local file="$2"
        awk -F': ' -v wanted="$key" '
          NR == 1 && $0 == "---" { in_fm = 1; next }
          in_fm && $0 == "---" { exit }
          in_fm && $1 == wanted {
            sub(/^[^:]+:[[:space:]]*/, "", $0)
            gsub(/^"/, "", $0)
            gsub(/"$/, "", $0)
            print
            exit
          }
        ' "$file"
      }
      
      mkdir -p {{Output}}/ai-analysis
      
      if [ ! -d "$SKILLS_DIR/$SKILL_NAME" ]; then
        echo "[ERROR] Skill not found: $SKILL_NAME"
        echo "Available skills:"
        ls -1 "$SKILLS_DIR" 2>/dev/null || echo "  (no skills found)"
        echo 'Missing skill' > {{skillOutput}}
        exit 0
      fi
      
      if [ ! -f "$SKILL_FILE" ]; then
        echo "[ERROR] Skill file not found: $SKILL_FILE"
        echo 'Skill file missing' > {{skillOutput}}
        exit 0
      fi
      
      echo "[INFO] Loading skill: $SKILL_NAME"
      SKILL_TITLE=$(read_meta_value "name" "$SKILL_FILE" || true)
      [ -z "$SKILL_TITLE" ] && SKILL_TITLE="$SKILL_NAME"

      {
        printf '# Skill: %s\n' "$SKILL_TITLE"
        printf '# Skill ID: %s\n' "$SKILL_NAME"
        printf '# Loaded: %s\n\n' "$(date)"
        strip_frontmatter "$SKILL_FILE"
      } > {{skillOutput}}
      
      lines=$(wc -l < "$SKILL_FILE")
      size=$(wc -c < "$SKILL_FILE")
      
      echo ""
      echo "[INFO] Skill loaded: $SKILL_NAME ($lines lines, $size bytes)"
      echo "[INFO] Output: {{skillOutput}}"

  - name: load-multiple-skills
    type: bash
    command: |
      mkdir -p {{Output}}/ai-analysis
      
      # Load multiple skills based on vulnerability types
      VULN_TYPES="{{vulnTypes}}"
      SKILLS_DIR="{{skillsDir}}"

      strip_frontmatter() {
        awk '
          NR == 1 && $0 == "---" { in_fm = 1; next }
          in_fm && $0 == "---" { in_fm = 0; next }
          !in_fm { print }
        ' "$1"
      }

      read_meta_value() {
        local key="$1"
        local file="$2"
        awk -F': ' -v wanted="$key" '
          NR == 1 && $0 == "---" { in_fm = 1; next }
          in_fm && $0 == "---" { exit }
          in_fm && $1 == wanted {
            sub(/^[^:]+:[[:space:]]*/, "", $0)
            gsub(/^"/, "", $0)
            gsub(/"$/, "", $0)
            print
            exit
          }
        ' "$file"
      }
      
      if [ -z "$VULN_TYPES" ]; then
        echo "[INFO] No vulnTypes specified, using default skills"
        VULN_TYPES="sql-injection,xss-testing,ssrf-testing,command-injection-testing,rce-testing,api-security"
      fi
      
      echo "=== Loading Skills for: $VULN_TYPES ==="
      echo ""
      
      COMBINED_FILE="{{Output}}/ai-analysis/skills-combined.md"
      : > "$COMBINED_FILE"
      if [ ! -d "$SKILLS_DIR" ]; then
        {
          echo "# Security Testing Skills Library"
          echo ""
          echo "Skills directory not found: $SKILLS_DIR"
          echo "Using workflow fallback mode without bundled skill content."
        } > "$COMBINED_FILE"
        echo "[WARN] Skills directory not found: $SKILLS_DIR"
        echo "[INFO] Combined skills saved: $COMBINED_FILE ($(wc -l < "$COMBINED_FILE" 2>/dev/null || echo 0) lines)"
        exit 0
      fi
      
      for skill_name in $(printf '%s' "$VULN_TYPES" | tr ',' '\n' | sed '/^$/d' | sort -u); do
        SKILL_FILE="$SKILLS_DIR/$skill_name/SKILL.md"
        
        if [ -f "$SKILL_FILE" ]; then
          echo "Loading: $skill_name"
          SKILL_TITLE=$(read_meta_value "name" "$SKILL_FILE" || true)
          [ -z "$SKILL_TITLE" ] && SKILL_TITLE="$skill_name"
          {
            printf '\n# %s\n\n' "$SKILL_TITLE"
            strip_frontmatter "$SKILL_FILE"
            printf '\n---\n'
          } >> "$COMBINED_FILE"
        else
          echo "Skipping: $skill_name (not found)"
        fi
      done
      
      if [ -f "$COMBINED_FILE" ]; then
        lines=$(wc -l < "$COMBINED_FILE")
        echo ""
        echo "[INFO] Combined skills saved: $COMBINED_FILE ($lines lines)"
      fi

  - name: search-skills
    type: bash
    pre_condition: '"{{searchTerm}}" != ""'
    command: |
      SKILLS_DIR="{{skillsDir}}"
      SEARCH_TERM="{{searchTerm}}"
      
      if [ -z "$SEARCH_TERM" ]; then
        echo "[ERROR] No searchTerm specified"
        exit 1
      fi
      
      echo "=== Searching Skills for: $SEARCH_TERM ==="
      echo ""
      
      RESULTS_FILE="{{Output}}/ai-analysis/skills-search-results.md"
      echo "# Search Results for: $SEARCH_TERM" > "$RESULTS_FILE"
      echo "" >> "$RESULTS_FILE"
      
      found=0
      for skill_dir in "$SKILLS_DIR"/*/; do
        if [ -d "$skill_dir" ] && [ -f "$skill_dir/SKILL.md" ]; then
          skill_name=$(basename "$skill_dir")
          matches=$(grep -n -i -F "$SEARCH_TERM" "$skill_dir/SKILL.md" 2>/dev/null || true)
          
          if [ -n "$matches" ]; then
            found=$((found + 1))
            echo "## Found in: $skill_name" >> "$RESULTS_FILE"
            echo "" >> "$RESULTS_FILE"
            echo '```' >> "$RESULTS_FILE"
            echo "$matches" | head -20 >> "$RESULTS_FILE"
            echo '```' >> "$RESULTS_FILE"
            echo "" >> "$RESULTS_FILE"
            echo "Matches in: $skill_name ($(echo "$matches" | wc -l) lines)"
          fi
        fi
      done
      
      if [ $found -eq 0 ]; then
        echo "No skills found matching: $SEARCH_TERM"
        echo "No matching skills found." >> "$RESULTS_FILE"
      fi
      
      echo ""
      echo "[INFO] Search results: $found skills matched"
      echo "[INFO] Output: $RESULTS_FILE"

  - name: generate-skill-guide
    type: bash
    command: |
      mkdir -p {{Output}}/ai-analysis
      
      SKILLS_DIR="{{skillsDir}}"
      TARGET_TYPE="{{targetType}}"

      strip_frontmatter() {
        awk '
          NR == 1 && $0 == "---" { in_fm = 1; next }
          in_fm && $0 == "---" { in_fm = 0; next }
          !in_fm { print }
        ' "$1"
      }
      
      echo "=== Generating Security Testing Guide ==="
      echo ""
      
      GUIDE_FILE="{{Output}}/ai-analysis/security-testing-guide.md"
      : > "$GUIDE_FILE"
      
      {
        printf '# Security Testing Guide\n\n'
        printf 'Target: {{Target}}\n'
        printf 'Generated: %s\n\n' "$(date)"
        printf -- '---\n\n'
      } >> "$GUIDE_FILE"

      if [ ! -d "$SKILLS_DIR" ]; then
        printf 'Skills directory not found: %s\n' "$SKILLS_DIR" >> "$GUIDE_FILE"
        printf 'Workflow will continue without bundled skill excerpts.\n' >> "$GUIDE_FILE"
        echo "[WARN] Skills directory not found: $SKILLS_DIR"
        echo "[INFO] Guide generated: $GUIDE_FILE"
        exit 0
      fi
      
      # Add relevant skills based on target type
      case "$TARGET_TYPE" in
        web|Website|website|domain|subdomain|host|url)
          printf '## Web Application Testing\n\n' >> "$GUIDE_FILE"
          for skill in sql-injection xss-testing ssrf-testing rce-testing; do
            if [ -f "$SKILLS_DIR/$skill/SKILL.md" ]; then
              printf '### %s\n\n' "$skill" >> "$GUIDE_FILE"
              strip_frontmatter "$SKILLS_DIR/$skill/SKILL.md" | head -30 >> "$GUIDE_FILE"
              printf '\n---\n\n' >> "$GUIDE_FILE"
            fi
          done
          ;;
        api|REST|GraphQL)
          printf '## API Security Testing\n\n' >> "$GUIDE_FILE"
          if [ -f "$SKILLS_DIR/api-security/SKILL.md" ]; then
            strip_frontmatter "$SKILLS_DIR/api-security/SKILL.md" | head -40 >> "$GUIDE_FILE"
          fi
          ;;
        cloud|AWS|GCP|Azure)
          printf '## Cloud Security Testing\n\n' >> "$GUIDE_FILE"
          printf 'No dedicated cloud skill is installed yet. Reuse API, SSRF, and RCE skills as a baseline.\n' >> "$GUIDE_FILE"
          ;;
        *)
          printf '## General Security Testing\n\n' >> "$GUIDE_FILE"
          printf 'Loading all available skills...\n' >> "$GUIDE_FILE"
          for skill_dir in "$SKILLS_DIR"/*/; do
            if [ -d "$skill_dir" ] && [ -f "$skill_dir/SKILL.md" ]; then
              skill_name=$(basename "$skill_dir")
              printf '### %s\n\n' "$skill_name" >> "$GUIDE_FILE"
              strip_frontmatter "$skill_dir/SKILL.md" | head -15 >> "$GUIDE_FILE"
              printf '\n' >> "$GUIDE_FILE"
            fi
          done
          ;;
      esac
      
      echo "[INFO] Guide generated: $GUIDE_FILE"

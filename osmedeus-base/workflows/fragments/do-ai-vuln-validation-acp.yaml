# =============================================================================
# AI 漏洞验证模块 (agent-acp 版本)
# =============================================================================
# 功能：
# - 验证 Nuclei 发现的漏洞是否真实
# - 识别假阳性
# - 生成手动验证命令
# - 风险评估和优先级排序
#
# 特点：
# - 使用 agent-acp (claude-code)，不依赖 LLM API
# - 增加容错机制，API 不稳时也能运行
# =============================================================================

kind: module
name: ai-vuln-validation
description: AI-powered vulnerability validation using agent-acp - verify findings and identify false positives

params:
  - name: vulnValidationOutput
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: validatedVulnsFile
    default: "{{Output}}/ai-analysis/validated-vulns-{{TargetSpace}}.json"
  - name: falsePositivesFile
    default: "{{Output}}/ai-analysis/false-positives-{{TargetSpace}}.txt"
  - name: manualVerifyCommandsFile
    default: "{{Output}}/ai-analysis/validation/manual-commands.sh"
  - name: vulnValidationSkipFile
    default: "{{Output}}/ai-analysis/.vuln-validation-skip"

  # 输入文件
  - name: nucleiCriticalFile
    default: "{{Output}}/vulnscan/nuclei-critical-{{TargetSpace}}.txt"
  - name: nucleiHighFile
    default: "{{Output}}/vulnscan/nuclei-high-{{TargetSpace}}.txt"
  - name: nucleiFile
    default: "{{Output}}/vulnscan/nuclei-jsonl-{{TargetSpace}}.txt"
  - name: secretsFile
    default: "{{Output}}/vuln-scan-suite/secrets-{{TargetSpace}}.txt"
  - name: ssrfFile
    default: "{{Output}}/vuln-scan-suite/ssrf-{{TargetSpace}}.txt"
  - name: sstiFile
    default: "{{Output}}/vuln-scan-suite/ssti-{{TargetSpace}}.txt"
  - name: sqliFile
    default: "{{Output}}/vuln-scan-suite/sqli-{{TargetSpace}}.txt"
  - name: takeoverFile
    default: "{{Output}}/vuln-scan-suite/takeover-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"

  # 配置
  - name: enableVulnValidation
    type: bool
    default: true
  - name: agentTimeout
    type: string
    default: "{{agentTimeout}}"

steps:
  - name: prepare-vuln-validation
    type: function
    pre_condition: "{{enableVulnValidation}}"
    log: "Preparing vulnerability validation"
    functions:
      - 'create_folder("{{Output}}/ai-analysis/validation")'
      - 'log_info("Starting AI vulnerability validation for {{Target}}")'

  - name: validate-input-data
    type: bash
    pre_condition: "{{enableVulnValidation}}"
    command: |
      echo "[INFO] [Vuln Validation] Checking input data..."

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }
      
      # 检查必要的输入文件
      REQUIRED_FILES="{{nucleiCriticalFile}} {{nucleiHighFile}} {{fingerprintFile}}"
      MISSING_FILES=""
      EMPTY_FILES=""
      
      for f in $REQUIRED_FILES; do
        if [ ! -f "$f" ]; then
          MISSING_FILES="$MISSING_FILES $f"
        elif [ ! -s "$f" ]; then
          EMPTY_FILES="$EMPTY_FILES $f"
        fi
      done
      
      if [ -n "$MISSING_FILES" ]; then
        echo "[WARN] Missing input files:$MISSING_FILES"
      fi
      
      if [ -n "$EMPTY_FILES" ]; then
        echo "[WARN] Empty input files:$EMPTY_FILES"
      fi
      
      # 统计可用数据量
      CRIT_COUNT=$(count_lines "{{nucleiCriticalFile}}")
      HIGH_COUNT=$(count_lines "{{nucleiHighFile}}")
      NUCLEI_COUNT=$(count_lines "{{nucleiFile}}")
      SECRET_COUNT=$(count_lines "{{secretsFile}}")
      SSRF_COUNT=$(count_lines "{{ssrfFile}}")
      SSTI_COUNT=$(count_lines "{{sstiFile}}")
      SQLI_COUNT=$(count_lines "{{sqliFile}}")
      TAKEOVER_COUNT=$(count_lines "{{takeoverFile}}")
      FINDING_TOTAL=$((CRIT_COUNT + HIGH_COUNT + NUCLEI_COUNT + SECRET_COUNT + SSRF_COUNT + SSTI_COUNT + SQLI_COUNT + TAKEOVER_COUNT))

      echo "[INFO] [Vuln Validation] Critical vulns available: $CRIT_COUNT"
      echo "[INFO] [Vuln Validation] High vulns available: $HIGH_COUNT"

      if [ "$FINDING_TOTAL" -eq 0 ]; then
        echo "[WARN] [Vuln Validation] No findings available, skipping ACP validation"
        printf '%s\n' '{"status":"no_data","validation_summary":{"total_validated":0,"confirmed_real":0,"false_positives":0,"needs_manual_verification":0,"risk_level":"低"},"total_validated":0,"confirmed_real":0,"false_positives":0,"needs_manual_verification":0,"risk_level":"低","findings":[],"high_priority_items":[],"verification_commands":[]}' > {{vulnValidationOutput}}
        : > {{vulnValidationSkipFile}}
      else
        rm -f {{vulnValidationSkipFile}} 2>/dev/null || true
      fi
      
      echo "[INFO] [Vuln Validation] Input data check complete"

  - name: ai-validate-vulns
    type: agent-acp
    agent: claude-code
    timeout: "{{agentTimeout}}"
    pre_condition: '{{enableVulnValidation}} && !file_exists("{{vulnValidationSkipFile}}")'
    on_error:
      - action: continue
        log: "Vuln validation failed, continuing with unvalidated data"
    messages:
      - role: system
        content: |
          你是一个资深渗透测试专家，专注于漏洞验证。
          你的任务是对扫描结果进行验证，判断漏洞是否真实存在，识别假阳性。
          
          验证原则：
          1. 每个漏洞必须有明确的验证状态（真实/假阳性/需手动验证）
          2. 对于真实漏洞，提供具体的验证方法和命令
          3. 对于假阳性，说明原因
          4. 按风险等级排序输出
          
          重要约束：
          - 必须返回结构化的 JSON 输出
          - 每个漏洞必须有置信度评分
          - 提供可执行的验证命令
          - 完成后在日志中输出"验证完成"
          
      - role: user
        content: |
          请验证目标 {{Target}} 的漏洞发现，判断其真实性并识别假阳性。

          ## 技术栈背景
          请使用 read_lines 工具读取 {{fingerprintFile}}

          ## Nuclei Critical 漏洞
          请使用 read_lines 工具读取 {{nucleiCriticalFile}}

          ## Nuclei High 漏洞
          请使用 read_lines 工具读取 {{nucleiHighFile}}

          ## Secrets 发现
          请使用 read_lines 工具读取 {{secretsFile}}

          ## SSRF 发现
          请使用 read_lines 工具读取 {{ssrfFile}}

          ## SQLi 发现
          请使用 read_lines 工具读取 {{sqliFile}}

          ## Takeover 发现
          请使用 read_lines 工具读取 {{takeoverFile}}

          请输出 JSON 格式的验证结果保存到 {{vulnValidationOutput}}：
          ```json
          {
            "validation_summary": {
              "total_validated": 0,
              "confirmed_real": 0,
              "false_positives": 0,
              "needs_manual_verification": 0,
              "risk_level": "高/中/低"
            },
            "validated_findings": [
              {
                "id": "vuln-1",
                "severity": "critical/high/medium",
                "finding": "漏洞描述",
                "url": "目标URL",
                "template": "nuclei模板名",
                "verification_status": "confirmed/false_positive/needs_verification",
                "confidence": 0.95,
                "false_positive_reason": "如果是假阳性，说明原因",
                "manual_verification": {
                  "command": "curl命令或验证步骤",
                  "expected_response": "预期响应特征"
                },
                "remediation": "修复建议"
              }
            ],
            "high_priority_items": ["需要立即处理的项目"],
            "verification_commands": ["可执行的验证命令"]
          }
          ```

          只输出 JSON，确保格式完全正确。验证完成后输出"验证完成"。

    exports:
      validation_json: "{{acp_output}}"

  - name: log-progress
    type: function
    pre_condition: "{{enableVulnValidation}}"
    functions:
      - 'log_info("[Progress] AI vulnerability validation step completed")'

  - name: save-validation-results
    type: bash
    pre_condition: "{{enableVulnValidation}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/validation

      RAW_FILE="{{Output}}/ai-analysis/validation/.vuln-validation-acp-raw-{{TargetSpace}}.txt"
      JSON_FILE="{{Output}}/ai-analysis/validation/.vuln-validation-acp-json-{{TargetSpace}}.json"
      FALLBACK_LINES="{{Output}}/ai-analysis/validation/.vuln-validation-acp-fallback-lines-{{TargetSpace}}.txt"
      FALLBACK_FINDINGS_JSONL="{{Output}}/ai-analysis/validation/.vuln-validation-acp-fallback-findings-{{TargetSpace}}.jsonl"

      if [ -f "{{vulnValidationSkipFile}}" ] && [ -s "{{vulnValidationOutput}}" ] && jq empty {{vulnValidationOutput}} >/dev/null 2>&1; then
        CONFIRMED=$(jq -r '.confirmed_real // 0' {{vulnValidationOutput}} 2>/dev/null || echo 0)
        FP=$(jq -r '.false_positives // 0' {{vulnValidationOutput}} 2>/dev/null || echo 0)
        TOTAL=$(jq -r '.findings | length' {{vulnValidationOutput}} 2>/dev/null || echo 0)
        echo "[INFO] [Vuln Validation] Using precomputed fallback output"
        echo "[RESULT] Confirmed: $CONFIRMED, False Positives: $FP, Total: $TOTAL"
        exit 0
      fi

      printf '%s\n' "{{validation_json}}" > "$RAW_FILE"
      : > "$JSON_FILE"

      awk '
        BEGIN { capture = 0 }
        /^[[:space:]]*```json[[:space:]]*$/ { capture = 1; next }
        capture && /^[[:space:]]*```[[:space:]]*$/ { exit }
        capture { print }
      ' "$RAW_FILE" > "$JSON_FILE"

      if [ ! -s "$JSON_FILE" ] && jq empty "$RAW_FILE" >/dev/null 2>&1; then
        cp "$RAW_FILE" "$JSON_FILE"
      fi

      if [ ! -s "$JSON_FILE" ]; then
        awk '
          BEGIN { capture = 0 }
          /^[[:space:]]*{/ { capture = 1 }
          capture { print }
        ' "$RAW_FILE" > "$JSON_FILE"
      fi

      if [ -s "$JSON_FILE" ] && grep -q '[^[:space:]]' "$JSON_FILE" && jq empty "$JSON_FILE" >/dev/null 2>&1; then
        jq '
          def normalize_status:
            if . == "confirmed" then "confirmed"
            elif . == "false_positive" then "false_positive"
            elif . == "needs_verification" then "needs_manual_verification"
            elif . == "manual" then "needs_manual_verification"
            elif . == "needs_manual_verification" then "needs_manual_verification"
            else (. // "needs_manual_verification")
            end;
          def normalize_finding:
            . as $f
            | {
                severity: ($f.severity // $f.info.severity // "unknown"),
                type: ($f.type // $f.finding // $f.template // $f.template_id // "unknown"),
                url: ($f.url // $f.target // $f.host // $f."matched-at" // $f.matched_at // ""),
                status: (($f.status // $f.verification_status) | normalize_status),
                confidence: (($f.confidence // $f.score // 0.6) | tonumber? // 0.6),
                reason: ($f.reason // $f.false_positive_reason // $f.analysis // ""),
                evidence: ($f.evidence // $f.proof // $f.details // $f.manual_verification.expected_response // ""),
                verification_command: ($f.verification_command // $f.manual_verification.command // ""),
                remediation: ($f.remediation // "")
              };
          (.findings // .validated_findings // []) as $raw_findings
          | .findings = ($raw_findings | map(normalize_finding))
          | .total_validated = (.total_validated // .validation_summary.total_validated // (.findings | length))
          | .confirmed_real = (.confirmed_real // .validation_summary.confirmed_real // ([.findings[]? | select(.status == "confirmed")] | length))
          | .false_positives = (.false_positives // .validation_summary.false_positives // ([.findings[]? | select(.status == "false_positive")] | length))
          | .needs_manual_verification = (.needs_manual_verification // .validation_summary.needs_manual_verification // ([.findings[]? | select(.status == "needs_manual_verification")] | length))
          | .risk_level = (.risk_level // .validation_summary.risk_level // (if .confirmed_real > 0 then "高" elif .needs_manual_verification > 0 then "中" else "低" end))
          | .high_priority_items = (.high_priority_items // ([.findings[]? | select(((.severity // "unknown") | ascii_downcase) == "critical" or ((.severity // "unknown") | ascii_downcase) == "high") | ((if (.url // "") != "" then (.url + " - ") else "" end) + (.type // "unknown"))] | unique | .[0:10]))
          | del(.validated_findings, .validation_summary, .verification_commands)
        ' "$JSON_FILE" > {{vulnValidationOutput}}
        echo "[OK] Normalized ACP validation JSON extracted successfully"
      else
        echo "[WARN] ACP validation JSON extraction failed, generating practical fallback data..."

        : > "$FALLBACK_LINES"
        : > "$FALLBACK_FINDINGS_JSONL"
        collect_lines() {
          source_name="$1"
          severity="$2"
          source_file="$3"
          limit="$4"
          [ -f "$source_file" ] || return 0
          head -"$limit" "$source_file" 2>/dev/null | awk -v src="$source_name" -v sev="$severity" 'NF { gsub(/\r/, ""); print src "|" sev "|" $0 }' >> "$FALLBACK_LINES"
        }

        collect_lines "nuclei-critical" "critical" "{{nucleiCriticalFile}}" 12
        collect_lines "nuclei-high" "high" "{{nucleiHighFile}}" 12
        collect_lines "sqli" "high" "{{sqliFile}}" 6
        collect_lines "ssrf" "high" "{{ssrfFile}}" 6
        collect_lines "ssti" "high" "{{sstiFile}}" 6
        collect_lines "takeover" "high" "{{takeoverFile}}" 6
        collect_lines "secrets" "medium" "{{secretsFile}}" 6

        if [ -s "$FALLBACK_LINES" ]; then
          detect_type() {
            source_name="$1"
            raw_line="$2"
            lower_line=$(printf '%s' "$raw_line" | tr '[:upper:]' '[:lower:]')
          case "$source_name:$lower_line" in
              sqli:*|*:sql*) echo "sql-injection" ;;
              ssrf:*|*:ssrf*) echo "ssrf" ;;
              ssti:*|*:ssti*|*:template*) echo "ssti" ;;
              takeover:*|*:takeover*|*:dangling*) echo "subdomain-takeover" ;;
              secrets:*|*:secret*|*:token*|*:credential*|*:api-key*|*:apikey*) echo "secret-exposure" ;;
              *:xss*) echo "xss" ;;
              *:rce*|*:command*) echo "rce" ;;
              *jwt*) echo "jwt-misconfiguration" ;;
              *graphql*) echo "graphql-exposure" ;;
              *) echo "high-risk-finding" ;;
            esac
          }

          while IFS='|' read -r source_name severity raw_line; do
            [ -n "${raw_line:-}" ] || continue
            clean_line=$(printf '%s' "$raw_line" | tr -d '\r')
            url=$(printf '%s\n' "$clean_line" | grep -Eo 'https?://[^[:space:]"]+' | head -1 || true)
            finding=$(printf '%s\n' "$clean_line" \
              | sed -E 's/^\[[^]]+\][[:space:]]*//' \
              | sed -E 's/[[:space:]]*-[[:space:]]*https?:\/\/[^[:space:]"]+$//' \
              | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')
            if [ -z "$finding" ]; then
              finding="${source_name} finding"
            fi
            finding_type=$(detect_type "$source_name" "$clean_line")
            confidence="0.60"
            if [ "$(printf '%s' "$severity" | tr '[:upper:]' '[:lower:]')" = "critical" ]; then
              confidence="0.70"
            fi
            verification_command='printf "manual review required\n"'
            if [ -n "$url" ]; then
              verification_command=$(printf 'curl -skI "%s"' "$url")
            fi
            evidence=$(printf '%s' "$clean_line" | cut -c1-400)

            jq -cn \
              --arg severity "$(printf '%s' "$severity" | tr '[:upper:]' '[:lower:]')" \
              --arg finding "$finding" \
              --arg type "$finding_type" \
              --arg url "$url" \
              --arg evidence "$evidence" \
              --arg source_name "$source_name" \
              --arg verification_command "$verification_command" \
              --argjson confidence "$confidence" \
              '{
                severity: $severity,
                finding: $finding,
                type: $type,
                url: $url,
                status: "needs_manual_verification",
                confidence: $confidence,
                reason: ("ACP validation output parse failed; derived from raw " + $source_name + " evidence"),
                evidence: $evidence,
                verification_command: $verification_command,
                remediation: "Reproduce manually, capture request/response evidence, and tighten exposure or authorization controls"
              }' >> "$FALLBACK_FINDINGS_JSONL"
          done < "$FALLBACK_LINES"

          if [ -s "$FALLBACK_FINDINGS_JSONL" ]; then
            jq -s '
              . as $findings
              | {
                  error: "parse_failed_fallback",
                  validation_summary: {
                    total_validated: ($findings | length),
                    confirmed_real: 0,
                    false_positives: 0,
                    needs_manual_verification: ($findings | length),
                    risk_level: (if ([$findings[] | select(.severity == "critical")] | length) > 0 then "高" else "中" end)
                  },
                  total_validated: ($findings | length),
                  confirmed_real: 0,
                  false_positives: 0,
                  needs_manual_verification: ($findings | length),
                  risk_level: (if ([$findings[] | select(.severity == "critical")] | length) > 0 then "高" else "中" end),
                  findings: $findings,
                  high_priority_items: ($findings | map((if (.url // "") != "" then (.url + " - ") else "" end) + (.finding // .type // "unknown")) | unique | .[0:10]),
                  verification_commands: ($findings | map(.verification_command) | map(select(. != null and . != "")) | unique)
                }
            ' "$FALLBACK_FINDINGS_JSONL" > {{vulnValidationOutput}}
          else
            echo '{"error":"parse_failed","risk_level":"中","total_validated":0,"confirmed_real":0,"false_positives":0,"needs_manual_verification":0,"findings":[],"high_priority_items":[]}' > {{vulnValidationOutput}}
          fi
        else
          echo '{"error":"parse_failed","risk_level":"中","total_validated":0,"confirmed_real":0,"false_positives":0,"needs_manual_verification":0,"findings":[],"high_priority_items":[]}' > {{vulnValidationOutput}}
        fi
      fi

      if [ ! -s "{{vulnValidationOutput}}" ] || ! jq empty {{vulnValidationOutput}} >/dev/null 2>&1; then
        echo '{"error":"validation_output_invalid","risk_level":"中","total_validated":0,"confirmed_real":0,"false_positives":0,"needs_manual_verification":0,"findings":[],"high_priority_items":[]}' > {{vulnValidationOutput}}
      fi

      if [ -s "$FALLBACK_FINDINGS_JSONL" ]; then
        CURRENT_TOTAL=$(jq -r '.total_validated // (.findings | length) // 0' {{vulnValidationOutput}} 2>/dev/null || echo 0)
        if [ "${CURRENT_TOTAL:-0}" -eq 0 ]; then
          jq -s '
            . as $findings
            | {
                error: "fallback_findings_recovered",
                validation_summary: {
                  total_validated: ($findings | length),
                  confirmed_real: 0,
                  false_positives: 0,
                  needs_manual_verification: ($findings | length),
                  risk_level: (if ([$findings[] | select(.severity == "critical")] | length) > 0 then "高" else "中" end)
                },
                total_validated: ($findings | length),
                confirmed_real: 0,
                false_positives: 0,
                needs_manual_verification: ($findings | length),
                risk_level: (if ([$findings[] | select(.severity == "critical")] | length) > 0 then "高" else "中" end),
                findings: $findings,
                high_priority_items: ($findings | map((if (.url // "") != "" then (.url + " - ") else "" end) + (.finding // .type // "unknown")) | unique | .[0:10]),
                verification_commands: ($findings | map(.verification_command) | map(select(. != null and . != "")) | unique)
              }
          ' "$FALLBACK_FINDINGS_JSONL" > {{vulnValidationOutput}}
        fi
      fi

      for field in risk_level findings confirmed_real false_positives needs_manual_verification total_validated high_priority_items; do
        if ! jq -e "has(\"$field\")" {{vulnValidationOutput}} > /dev/null 2>&1; then
          case $field in
            risk_level) jq '.risk_level = "中"' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            findings) jq '.findings = []' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            confirmed_real) jq '.confirmed_real = 0' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            false_positives) jq '.false_positives = 0' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            needs_manual_verification) jq '.needs_manual_verification = 0' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            total_validated) jq '.total_validated = (.findings | length)' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            high_priority_items) jq '.high_priority_items = []' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
          esac
        fi
      done

      CONFIRMED=$(jq -r '.confirmed_real // 0' {{vulnValidationOutput}} 2>/dev/null || echo 0)
      FP=$(jq -r '.false_positives // 0' {{vulnValidationOutput}} 2>/dev/null || echo 0)
      TOTAL=$(jq -r '.findings | length' {{vulnValidationOutput}} 2>/dev/null || echo 0)
      echo "[RESULT] Confirmed: $CONFIRMED, False Positives: $FP, Total: $TOTAL"

  - name: extract-validation-data
    type: bash
    pre_condition: "{{enableVulnValidation}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/validation

      jq '[.findings[]? | {
        severity: (.severity // "unknown"),
        type: (.type // "unknown"),
        url: (.url // ""),
        status: (.status // "needs_manual_verification"),
        confidence: (.confidence // 0),
        reason: (.reason // ""),
        evidence: (.evidence // ""),
        verification_command: (.verification_command // "")
      }]' {{vulnValidationOutput}} 2>/dev/null > {{validatedVulnsFile}} || echo '[]' > {{validatedVulnsFile}}

      jq -r '.findings[] | select(.status == "false_positive") | "\(.url // .type // "unknown") - \(.reason // "no reason provided")"' {{vulnValidationOutput}} 2>/dev/null > {{falsePositivesFile}} || true

      jq -r '
        .findings[]?
        | select(.status == "needs_manual_verification")
        | "# [" + (.severity // "unknown") + "] " + (.type // "unknown") + "\n"
          + "# Target: " + (.url // "unknown") + "\n"
          + (.verification_command // (if (.url // "") != "" then ("curl -skI \"" + .url + "\"") else "printf \"manual review required\\n\"" end))
          + "\n# Reason: " + (.reason // "manual verification required") + "\n"
      ' {{vulnValidationOutput}} 2>/dev/null > {{manualVerifyCommandsFile}} || true

      if [ ! -s "{{manualVerifyCommandsFile}}" ]; then
        echo "# No manual verification commands generated" > {{manualVerifyCommandsFile}}
      fi
      chmod +x {{manualVerifyCommandsFile}} 2>/dev/null || true

      jq -r '.findings[] | select(.status == "confirmed") | .url // empty' {{vulnValidationOutput}} 2>/dev/null > {{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt || true
      touch {{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt

      CONFIRMED_COUNT=$(wc -l < {{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt 2>/dev/null || echo 0)
      echo "[Vuln Validation] Extracted $CONFIRMED_COUNT confirmed URLs"

  - name: log-validation-complete
    type: function
    pre_condition: "{{enableVulnValidation}}"
    functions:
      - 'log_info("AI vulnerability validation completed for {{Target}}")'

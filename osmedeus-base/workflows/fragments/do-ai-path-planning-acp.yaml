# =============================================================================
# AI 攻击路径规划模块 (agent-acp 版本)
# =============================================================================
# 功能：
# - 基于攻击链分析生成详细攻击计划
# - 分解攻击步骤为可执行命令
# - 生成时间线和资源需求
# - 提供防御建议
#
# 特点：
# - 使用 agent-acp (claude-code)，不依赖 LLM API
# - 增加容错机制
# =============================================================================

kind: module
name: ai-path-planning
description: AI-powered attack path planning using agent-acp - detailed execution plans for attack chains

params:
  - name: pathPlanningOutput
    default: "{{Output}}/ai-analysis/path-planning-{{TargetSpace}}.json"
  - name: attackPlanFile
    default: "{{Output}}/ai-analysis/attack-plan-{{TargetSpace}}.md"
  - name: executionChecklistFile
    default: "{{Output}}/ai-analysis/execution-checklist-{{TargetSpace}}.txt"

  # 输入文件
  - name: attackChainFile
    default: "{{Output}}/ai-analysis/attack-chain-{{TargetSpace}}.json"
  - name: vulnValidationFile
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: entryPointsFile
    default: "{{Output}}/ai-analysis/entry-points-{{TargetSpace}}.txt"
  - name: confirmedUrlsFile
    default: "{{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt"
  - name: bestPathTargetsFile
    default: "{{Output}}/ai-analysis/best-path-targets-{{TargetSpace}}.txt"
  - name: semanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-early-{{TargetSpace}}.json"
  - name: fallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-decision-followup-{{TargetSpace}}.json"
  - name: secondFallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-post-vuln-{{TargetSpace}}.json"
  - name: thirdFallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-early-{{TargetSpace}}.json"
  - name: semanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-{{TargetSpace}}.txt"
  - name: fallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"
  - name: secondFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
  - name: thirdFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-early-{{TargetSpace}}.txt"
  - name: knowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-early-{{TargetSpace}}.json"
  - name: fallbackKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-decision-followup-{{TargetSpace}}.json"
  - name: secondFallbackKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-post-vuln-{{TargetSpace}}.json"
  - name: thirdFallbackKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-early-{{TargetSpace}}.json"
  - name: vectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-early-{{TargetSpace}}.json"
  - name: fallbackVectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-decision-followup-{{TargetSpace}}.json"
  - name: secondFallbackVectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-post-vuln-{{TargetSpace}}.json"
  - name: thirdFallbackVectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-early-{{TargetSpace}}.json"
  - name: passiveWebRiskSummaryFile
    default: "{{Output}}/passive-web-risk/passive-web-risk-summary-{{TargetSpace}}.md"
  - name: sourceMapExposureFile
    default: "{{Output}}/passive-web-risk/source-map-exposure-{{TargetSpace}}.txt"
  - name: apiSurfaceFile
    default: "{{Output}}/passive-web-risk/api-surface-{{TargetSpace}}.txt"
  - name: corsCacheHeuristicsFile
    default: "{{Output}}/passive-web-risk/cors-cache-heuristics-{{TargetSpace}}.txt"
  - name: cloudLeakFile
    default: "{{Output}}/passive-web-risk/cloud-storage-leaks-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"
  - name: osintFile
    default: "{{Output}}/osint/emails-{{TargetSpace}}.txt"
  - name: wafFile
    default: "{{Output}}/waf/waf-{{TargetSpace}}.txt"

  # 配置
  - name: enablePathPlanning
    type: bool
    default: true
  - name: agentTimeout
    type: string
    default: "{{agentTimeout}}"

steps:
  - name: prepare-path-planning
    type: function
    pre_condition: "{{enablePathPlanning}}"
    log: "Preparing attack path planning"
    functions:
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'log_info("Starting AI attack path planning for {{Target}}")'

  - name: validate-input-data
    type: bash
    pre_condition: "{{enablePathPlanning}}"
    command: |
      echo "[INFO] [Path Planning] Checking input data..."

      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      semantic_hits() {
        file="$1"
        [ -f "$file" ] || return 1
        jq empty "$file" >/dev/null 2>&1 || return 1
        hits=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$file" 2>/dev/null || echo 0)
        [ "${hits:-0}" -gt 0 ] 2>/dev/null
      }

      list_hits() {
        file="$1"
        [ -f "$file" ] || return 1
        jq empty "$file" >/dev/null 2>&1 || return 1
        hits=$(jq -r 'length // 0' "$file" 2>/dev/null || echo 0)
        [ "${hits:-0}" -gt 0 ] 2>/dev/null
      }

      pick_semantic_file() {
        for candidate in "$@"; do
          [ -n "$candidate" ] || continue
          if semantic_hits "$candidate"; then
            printf '%s\n' "$candidate"
            return 0
          fi
        done
        printf '%s\n' "$1"
      }

      pick_list_file() {
        for candidate in "$@"; do
          [ -n "$candidate" ] || continue
          if list_hits "$candidate"; then
            printf '%s\n' "$candidate"
            return 0
          fi
        done
        printf '%s\n' "$1"
      }

      pick_text_file() {
        for candidate in "$@"; do
          [ -n "$candidate" ] || continue
          if text_has_lines "$candidate"; then
            printf '%s\n' "$candidate"
            return 0
          fi
        done
        printf '%s\n' "$1"
      }

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      ACTIVE_SEMANTIC_FILE=$(pick_semantic_file "{{semanticSearchFile}}" "{{fallbackSemanticSearchFile}}" "{{secondFallbackSemanticSearchFile}}" "{{thirdFallbackSemanticSearchFile}}")
      ACTIVE_SEMANTIC_PRIORITY_FILE=$(pick_text_file "{{semanticPriorityTargetsFile}}" "{{fallbackSemanticPriorityTargetsFile}}" "{{secondFallbackSemanticPriorityTargetsFile}}" "{{thirdFallbackSemanticPriorityTargetsFile}}")
      ACTIVE_KNOWLEDGE_FILE=$(pick_list_file "{{knowledgeSearchFile}}" "{{fallbackKnowledgeSearchFile}}" "{{secondFallbackKnowledgeSearchFile}}" "{{thirdFallbackKnowledgeSearchFile}}")
      ACTIVE_VECTOR_KNOWLEDGE_FILE=$(pick_list_file "{{vectorKnowledgeSearchFile}}" "{{fallbackVectorKnowledgeSearchFile}}" "{{secondFallbackVectorKnowledgeSearchFile}}" "{{thirdFallbackVectorKnowledgeSearchFile}}")
      PASSIVE_COUNT=0
      if text_has_lines "{{passiveWebRiskSummaryFile}}"; then
        PASSIVE_COUNT=$(count_lines "{{passiveWebRiskSummaryFile}}")
      else
        for candidate in "{{sourceMapExposureFile}}" "{{apiSurfaceFile}}" "{{corsCacheHeuristicsFile}}" "{{cloudLeakFile}}"; do
          if text_has_lines "$candidate"; then
            PASSIVE_COUNT=$((PASSIVE_COUNT + $(count_lines "$candidate")))
          fi
        done
      fi

      CHAINS=0
      if [ -f "{{attackChainFile}}" ] && jq empty "{{attackChainFile}}" 2>/dev/null; then
        CHAINS=$(jq -r '.attack_chain_summary.total_chains // 0' "{{attackChainFile}}" 2>/dev/null || echo 0)
      fi
      CONFIRMED_COUNT=$(count_lines "{{confirmedUrlsFile}}")
      ENTRY_COUNT=$(count_lines "{{entryPointsFile}}")
      BEST_COUNT=$(count_lines "{{bestPathTargetsFile}}")
      SEMANTIC_COUNT=0
      KNOWLEDGE_COUNT=0
      VECTOR_KNOWLEDGE_COUNT=0
      if [ -f "$ACTIVE_SEMANTIC_FILE" ] && jq empty "$ACTIVE_SEMANTIC_FILE" 2>/dev/null; then
        SEMANTIC_COUNT=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$ACTIVE_SEMANTIC_FILE" 2>/dev/null || echo 0)
      fi
      if [ -f "$ACTIVE_KNOWLEDGE_FILE" ] && jq empty "$ACTIVE_KNOWLEDGE_FILE" 2>/dev/null; then
        KNOWLEDGE_COUNT=$(jq -r 'length // 0' "$ACTIVE_KNOWLEDGE_FILE" 2>/dev/null || echo 0)
      fi
      if [ -f "$ACTIVE_VECTOR_KNOWLEDGE_FILE" ] && jq empty "$ACTIVE_VECTOR_KNOWLEDGE_FILE" 2>/dev/null; then
        VECTOR_KNOWLEDGE_COUNT=$(jq -r 'length // 0' "$ACTIVE_VECTOR_KNOWLEDGE_FILE" 2>/dev/null || echo 0)
      fi

      echo "[INFO] [Path Planning] Attack chains=$CHAINS confirmed=$CONFIRMED_COUNT entry_points=$ENTRY_COUNT best_path=$BEST_COUNT semantic=$SEMANTIC_COUNT knowledge=$KNOWLEDGE_COUNT vector=$VECTOR_KNOWLEDGE_COUNT passive=$PASSIVE_COUNT"
      echo "[INFO] [Path Planning] Active inputs: semantic=$ACTIVE_SEMANTIC_FILE semantic_targets=$ACTIVE_SEMANTIC_PRIORITY_FILE knowledge=$ACTIVE_KNOWLEDGE_FILE vector=$ACTIVE_VECTOR_KNOWLEDGE_FILE"
      echo "[INFO] [Path Planning] Input data check complete"

  - name: collect-planning-data
    type: bash
    pre_condition: "{{enablePathPlanning}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/.input

      INPUT_DIR="{{Output}}/ai-analysis/.input"
      : > "$INPUT_DIR/chains.json"
      : > "$INPUT_DIR/vuln-validation.json"
      : > "$INPUT_DIR/priority-targets.txt"
      : > "$INPUT_DIR/semantic-priority.txt"
      : > "$INPUT_DIR/knowledge-priority.txt"
      : > "$INPUT_DIR/passive-web-risk.txt"
      : > "$INPUT_DIR/fingerprint.jsonl"
      : > "$INPUT_DIR/waf.txt"

      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      semantic_hits() {
        file="$1"
        [ -f "$file" ] || return 1
        jq empty "$file" >/dev/null 2>&1 || return 1
        hits=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$file" 2>/dev/null || echo 0)
        [ "${hits:-0}" -gt 0 ] 2>/dev/null
      }

      list_hits() {
        file="$1"
        [ -f "$file" ] || return 1
        jq empty "$file" >/dev/null 2>&1 || return 1
        hits=$(jq -r 'length // 0' "$file" 2>/dev/null || echo 0)
        [ "${hits:-0}" -gt 0 ] 2>/dev/null
      }

      pick_semantic_file() {
        for candidate in "$@"; do
          [ -n "$candidate" ] || continue
          if semantic_hits "$candidate"; then
            printf '%s\n' "$candidate"
            return 0
          fi
        done
        printf '%s\n' "$1"
      }

      pick_list_file() {
        for candidate in "$@"; do
          [ -n "$candidate" ] || continue
          if list_hits "$candidate"; then
            printf '%s\n' "$candidate"
            return 0
          fi
        done
        printf '%s\n' "$1"
      }

      pick_text_file() {
        for candidate in "$@"; do
          [ -n "$candidate" ] || continue
          if text_has_lines "$candidate"; then
            printf '%s\n' "$candidate"
            return 0
          fi
        done
        printf '%s\n' "$1"
      }

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      count_bytes() {
        file="$1"
        if [ -f "$file" ]; then
          wc -c < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      append_passive_context() {
        file="$1"
        label="$2"
        limit="${3:-5}"
        [ -f "$file" ] || return 0
        sed -n "1,${limit}p" "$file" 2>/dev/null | sed "s|^|[$label] |" >> "$INPUT_DIR/passive-web-risk.txt" || true
      }

      ACTIVE_SEMANTIC_FILE=$(pick_semantic_file "{{semanticSearchFile}}" "{{fallbackSemanticSearchFile}}" "{{secondFallbackSemanticSearchFile}}" "{{thirdFallbackSemanticSearchFile}}")
      ACTIVE_SEMANTIC_PRIORITY_FILE=$(pick_text_file "{{semanticPriorityTargetsFile}}" "{{fallbackSemanticPriorityTargetsFile}}" "{{secondFallbackSemanticPriorityTargetsFile}}" "{{thirdFallbackSemanticPriorityTargetsFile}}")
      ACTIVE_KNOWLEDGE_FILE=$(pick_list_file "{{knowledgeSearchFile}}" "{{fallbackKnowledgeSearchFile}}" "{{secondFallbackKnowledgeSearchFile}}" "{{thirdFallbackKnowledgeSearchFile}}")
      ACTIVE_VECTOR_KNOWLEDGE_FILE=$(pick_list_file "{{vectorKnowledgeSearchFile}}" "{{fallbackVectorKnowledgeSearchFile}}" "{{secondFallbackVectorKnowledgeSearchFile}}" "{{thirdFallbackVectorKnowledgeSearchFile}}")

      if [ -f "{{attackChainFile}}" ] && jq empty "{{attackChainFile}}" 2>/dev/null; then
        jq '{
          attack_chain_summary: (.attack_chain_summary // {}),
          attack_chains: ((.attack_chains // [])[0:3])
        }' "{{attackChainFile}}" > "$INPUT_DIR/chains.json" 2>/dev/null || true
      else
        echo '{"error":"no_attack_chain_data"}' > "$INPUT_DIR/chains.json"
      fi

      if [ -f "{{vulnValidationFile}}" ] && jq empty "{{vulnValidationFile}}" 2>/dev/null; then
        jq '{
          confirmed_real: (.confirmed_real // .validation_summary.confirmed_real // 0),
          false_positives: (.false_positives // .validation_summary.false_positives // 0),
          risk_level: (.risk_level // .validation_summary.risk_level // "unknown"),
          findings: ((.findings // [])[0:10])
        }' "{{vulnValidationFile}}" > "$INPUT_DIR/vuln-validation.json" 2>/dev/null || true
      else
        echo '{}' > "$INPUT_DIR/vuln-validation.json"
      fi

      {
        jq -r '.attack_chain_summary.most_likely_entry_points[]? // empty' "{{attackChainFile}}" 2>/dev/null || true
        cat "{{confirmedUrlsFile}}" 2>/dev/null || true
        cat "{{entryPointsFile}}" 2>/dev/null || true
        cat "{{bestPathTargetsFile}}" 2>/dev/null || true
        cat "$ACTIVE_SEMANTIC_PRIORITY_FILE" 2>/dev/null || true
      } | awk 'NF && !seen[$0]++' | head -20 > "$INPUT_DIR/priority-targets.txt" || true

      if [ -f "$ACTIVE_SEMANTIC_FILE" ] && jq empty "$ACTIVE_SEMANTIC_FILE" 2>/dev/null; then
        jq -r '.results[0:8][]? | [
          (.target // .title // "unknown"),
          (.category // "general"),
          ("severity=" + ((.severity_hint // "info") | tostring)),
          (.content // .snippet // "")
        ] | @tsv' "$ACTIVE_SEMANTIC_FILE" > "$INPUT_DIR/semantic-priority.txt" 2>/dev/null || true
      fi

      if [ ! -s "$INPUT_DIR/semantic-priority.txt" ] && text_has_lines "$ACTIVE_SEMANTIC_PRIORITY_FILE"; then
        awk 'NF { print $0 "\tsemantic-priority\tpriority-target\tscore=manual\t" }' "$ACTIVE_SEMANTIC_PRIORITY_FILE" | head -12 > "$INPUT_DIR/semantic-priority.txt" || true
      fi

      {
        if [ -f "$ACTIVE_VECTOR_KNOWLEDGE_FILE" ] && jq empty "$ACTIVE_VECTOR_KNOWLEDGE_FILE" 2>/dev/null; then
          jq -r '.[]? | [
            "vector-kb",
            (.title // .source_path // "unknown"),
            (.section // "general"),
            ("score=" + (((.relevance_score // .score) // 0) | tostring)),
            (.snippet // .content // "")
          ] | @tsv' "$ACTIVE_VECTOR_KNOWLEDGE_FILE" 2>/dev/null || true
        fi
        if [ -f "$ACTIVE_KNOWLEDGE_FILE" ] && jq empty "$ACTIVE_KNOWLEDGE_FILE" 2>/dev/null; then
          jq -r '.[]? | [
            (.source // "knowledge"),
            (.title // .source_path // "unknown"),
            (.section // "general"),
            ("score=" + (((.relevance_score // .score) // 0) | tostring)),
            (.snippet // .content // "")
          ] | @tsv' "$ACTIVE_KNOWLEDGE_FILE" 2>/dev/null || true
        fi
      } | awk 'NF && !seen[$0]++' | head -12 > "$INPUT_DIR/knowledge-priority.txt" || true

      if text_has_lines "{{passiveWebRiskSummaryFile}}"; then
        sed -n '1,40p' "{{passiveWebRiskSummaryFile}}" > "$INPUT_DIR/passive-web-risk.txt" 2>/dev/null || true
      else
        append_passive_context "{{sourceMapExposureFile}}" "source-map" 6
        append_passive_context "{{apiSurfaceFile}}" "api-surface" 8
        append_passive_context "{{corsCacheHeuristicsFile}}" "cors-cache" 8
        append_passive_context "{{cloudLeakFile}}" "cloud-storage" 6
      fi

      awk 'NF && !seen[$0]++' "$INPUT_DIR/passive-web-risk.txt" 2>/dev/null > "$INPUT_DIR/passive-web-risk.txt.tmp" \
        && mv "$INPUT_DIR/passive-web-risk.txt.tmp" "$INPUT_DIR/passive-web-risk.txt" \
        || true

      if [ -f "{{fingerprintFile}}" ]; then
        sed -n '1,60p' "{{fingerprintFile}}" > "$INPUT_DIR/fingerprint.jsonl" 2>/dev/null || true
      fi
      if [ -f "{{wafFile}}" ]; then
        sed -n '1,40p' "{{wafFile}}" > "$INPUT_DIR/waf.txt" 2>/dev/null || true
      fi

      CHAIN_SIZE=$(count_bytes "$INPUT_DIR/chains.json")
      TARGET_COUNT=$(count_lines "$INPUT_DIR/priority-targets.txt")
      SEMANTIC_COUNT=$(count_lines "$INPUT_DIR/semantic-priority.txt")
      KNOWLEDGE_COUNT=$(count_lines "$INPUT_DIR/knowledge-priority.txt")
      PASSIVE_COUNT=$(count_lines "$INPUT_DIR/passive-web-risk.txt")
      FINGERPRINT_COUNT=$(count_lines "$INPUT_DIR/fingerprint.jsonl")
      WAF_COUNT=$(count_lines "$INPUT_DIR/waf.txt")

      jq -n \
        --arg target "{{Target}}" \
        --arg active_semantic_file "$ACTIVE_SEMANTIC_FILE" \
        --arg active_semantic_targets_file "$ACTIVE_SEMANTIC_PRIORITY_FILE" \
        --arg active_knowledge_file "$ACTIVE_KNOWLEDGE_FILE" \
        --arg active_vector_knowledge_file "$ACTIVE_VECTOR_KNOWLEDGE_FILE" \
        --arg vuln_validation_file "$INPUT_DIR/vuln-validation.json" \
        --arg attack_chain_file "$INPUT_DIR/chains.json" \
        --arg priority_targets_file "$INPUT_DIR/priority-targets.txt" \
        --arg semantic_priority_file "$INPUT_DIR/semantic-priority.txt" \
        --arg knowledge_priority_file "$INPUT_DIR/knowledge-priority.txt" \
        --arg passive_web_risk_file "$INPUT_DIR/passive-web-risk.txt" \
        --arg fingerprint_file "$INPUT_DIR/fingerprint.jsonl" \
        --arg waf_file "$INPUT_DIR/waf.txt" \
        --argjson chain_size "$CHAIN_SIZE" \
        --argjson priority_targets "$TARGET_COUNT" \
        --argjson semantic_hits "$SEMANTIC_COUNT" \
        --argjson knowledge_hits "$KNOWLEDGE_COUNT" \
        --argjson passive_hits "$PASSIVE_COUNT" \
        --argjson fingerprint_hits "$FINGERPRINT_COUNT" \
        --argjson waf_hits "$WAF_COUNT" \
        '{
          target: $target,
          active_inputs: {
            semantic_search: $active_semantic_file,
            semantic_priority_targets: $active_semantic_targets_file,
            knowledge_search: $active_knowledge_file,
            vector_knowledge_search: $active_vector_knowledge_file
          },
          counts: {
            attack_chain_size: $chain_size,
            priority_targets: $priority_targets,
            semantic_hits: $semantic_hits,
            knowledge_hits: $knowledge_hits,
            passive_hits: $passive_hits,
            fingerprint_hits: $fingerprint_hits,
            waf_hits: $waf_hits
          },
          files: {
            vuln_validation: $vuln_validation_file,
            attack_chain: $attack_chain_file,
            priority_targets: $priority_targets_file,
            semantic_priority: $semantic_priority_file,
            knowledge_priority: $knowledge_priority_file,
            passive_web_risk: $passive_web_risk_file,
            fingerprint: $fingerprint_file,
            waf: $waf_file
          }
        }' > "$INPUT_DIR/planning-context.json"

      if [ "$CHAIN_SIZE" -lt 50 ] && [ "$TARGET_COUNT" -eq 0 ] && [ "$SEMANTIC_COUNT" -eq 0 ] && [ "$KNOWLEDGE_COUNT" -eq 0 ] && [ "$PASSIVE_COUNT" -eq 0 ]; then
        echo "[WARN] [Path Planning] No useful planning context available"
        echo '{"error": "no_data", "plan_summary": {"total_phases": 0}, "execution_phases": [], "verification_checklist": []}' > {{pathPlanningOutput}}
        echo "SKIP_AI=true" > {{Output}}/ai-analysis/.path-planning-skip
      else
        rm -f {{Output}}/ai-analysis/.path-planning-skip 2>/dev/null || true
      fi

      echo "[INFO] [Path Planning] Prepared context: chains=$CHAIN_SIZE priority_targets=$TARGET_COUNT semantic=$SEMANTIC_COUNT knowledge=$KNOWLEDGE_COUNT passive=$PASSIVE_COUNT"

  - name: ai-generate-attack-plan
    type: agent-acp
    agent: claude-code
    timeout: "{{agentTimeout}}"
    pre_condition: '{{enablePathPlanning}} && !file_exists("{{Output}}/ai-analysis/.path-planning-skip")'
    on_error:
      - action: continue
        log: "Path planning failed, continuing with basic plan"
    messages:
      - role: system
        content: |
          你是一个资深红队行动规划专家，专注于攻击执行规划。
          你的任务是将攻击链转化为详细的、可执行的行动计划。
          
          规划原则：
          1. 每个步骤必须有明确的执行命令
          2. 考虑实际操作环境和限制
          3. 提供备选方案和回退策略
          4. 评估执行风险和成功概率
          
          重要约束：
          - 必须返回结构化的 JSON 输出
          - 每个阶段必须有具体的时间估计
          - 提供验证步骤确认攻击成功

      - role: user
        content: |
          请基于以下攻击链分析，为目标 {{Target}} 生成详细的执行计划。

          请先读取标准化上下文文件：
          - {{Output}}/ai-analysis/.input/planning-context.json

          然后至少读取这些标准化输入文件：
          - {{Output}}/ai-analysis/.input/vuln-validation.json
          - {{Output}}/ai-analysis/.input/chains.json
          - {{Output}}/ai-analysis/.input/priority-targets.txt
          - {{Output}}/ai-analysis/.input/semantic-priority.txt
          - {{Output}}/ai-analysis/.input/knowledge-priority.txt
          - {{Output}}/ai-analysis/.input/passive-web-risk.txt
          - {{Output}}/ai-analysis/.input/fingerprint.jsonl
          - {{Output}}/ai-analysis/.input/waf.txt

          请输出 JSON 格式的攻击计划保存到 {{pathPlanningOutput}}：
          ```json
          {
            "plan_summary": {
              "total_phases": 0,
              "estimated_total_time": "总耗时",
              "success_probability": 0.85,
              "risk_level": "高/中/低",
              "resources_needed": ["工具1", "工具2"]
            },
            "execution_phases": [
              {
                "phase": 1,
                "phase_name": "阶段名称（如：信息收集）",
                "objectives": ["目标1", "目标2"],
                "actions": [
                  {
                    "action_id": "action-1",
                    "description": "操作描述",
                    "command": "具体执行命令",
                    "expected_result": "预期结果",
                    "verification": "如何验证成功",
                    "timeout": "超时时间",
                    "retry_on_failure": true,
                    "fallback": "失败时的备选方案"
                  }
                ],
                "tools_required": ["工具列表"],
                "estimated_time": "预计耗时",
                "risk_factors": ["风险因素"],
                "success_criteria": "成功标准"
              }
            ],
            "execution_order": {
              "sequence": ["phase1", "phase2"],
              "dependencies": {
                "phase2": ["phase1"],
                "phase3": ["phase2"]
              },
              "parallelizable": ["phase1"]
            },
            "verification_checklist": [
              {
                "step": 1,
                "verification_point": "验证点描述",
                "command": "验证命令",
                "expected": "预期结果",
                "critical": true
              }
            ],
            "rollback_plan": "如果失败如何回退",
            "contingency": "备选方案描述"
          }
          ```

          只输出 JSON，确保格式完全正确。

          额外要求：
          - 优先围绕“攻击链入口 + confirmed URLs / best-path / semantic priority + knowledge 高频命中点”来规划阶段
          - 如果攻击链不完整，也要根据已验证漏洞、确认 URL 和高价值入口生成可执行计划
          - 把知识库里提示高价值的认证面、后台面、API 面、文件处理面和业务逻辑面前置
          - 如果 passive web risk 摘要指向 source map/debug、API/auth/internal 面、CORS/cache 复核点或 cloud/signed URL 暴露，要把对应低噪音验证动作前置
          - 计划要尽量低噪音、可验证、适合真实复测与人工跟进

    exports:
      path_planning_json: "{{acp_output}}"

  - name: persist-path-planning-raw
    type: function
    pre_condition: '{{enablePathPlanning}} && !file_exists("{{Output}}/ai-analysis/.path-planning-skip")'
    functions:
      - 'save_content(typeof path_planning_json !== "undefined" ? path_planning_json : "", "{{Output}}/ai-analysis/.path-plan-acp-raw-{{TargetSpace}}.txt")'

  - name: log-progress
    type: function
    pre_condition: '{{enablePathPlanning}} && !file_exists("{{Output}}/ai-analysis/.path-planning-skip")'
    functions:
      - 'log_info("[Progress] AI path planning step completed")'

  - name: save-path-planning-results
    type: bash
    pre_condition: '{{enablePathPlanning}} && !file_exists("{{Output}}/ai-analysis/.path-planning-skip")'
    command: |
      echo "[INFO] [Path Planning] Saving planning results..."
      mkdir -p {{Output}}/ai-analysis

      RAW_FILE="{{Output}}/ai-analysis/.path-plan-acp-raw-{{TargetSpace}}.txt"
      JSON_FILE="{{Output}}/ai-analysis/.path-plan-acp-json-{{TargetSpace}}.json"
      FALLBACK_TARGETS="{{Output}}/ai-analysis/.path-plan-acp-fallback-targets-{{TargetSpace}}.txt"
      [ -f "$RAW_FILE" ] || : > "$RAW_FILE"

      awk '
        BEGIN { capture = 0 }
        /^[[:space:]]*```json[[:space:]]*$/ { capture = 1; next }
        capture && /^[[:space:]]*```[[:space:]]*$/ { exit }
        capture { print }
      ' "$RAW_FILE" > "$JSON_FILE"

      if [ ! -s "$JSON_FILE" ]; then
        sed -n '/^[[:space:]]*{/,/^[[:space:]]*}[[:space:]]*$/p' "$RAW_FILE" > "$JSON_FILE"
      fi

      if [ -s "$JSON_FILE" ] && jq empty "$JSON_FILE" 2>/dev/null; then
        jq '
          .plan_summary = ((.plan_summary // {}) + {
            total_phases: (.plan_summary.total_phases // ([.execution_phases[]?] | length)),
            estimated_total_time: (.plan_summary.estimated_total_time // "unknown"),
            success_probability: (.plan_summary.success_probability // 0),
            risk_level: (.plan_summary.risk_level // "中"),
            resources_needed: (.plan_summary.resources_needed // [])
          })
          | .execution_phases = (.execution_phases // [])
          | .verification_checklist = (.verification_checklist // [])
          | .rollback_plan = (.rollback_plan // "Fallback to manual verification and narrow the scope")
          | .contingency = (.contingency // "Use operator queue for manual confirmation")
        ' "$JSON_FILE" > {{pathPlanningOutput}}
        echo "[INFO] [Path Planning] Valid JSON extracted"
      else
        {
          cat "{{Output}}/ai-analysis/.input/priority-targets.txt" 2>/dev/null || true
          jq -r '.attack_chain_summary.most_likely_entry_points[]? // empty' "{{attackChainFile}}" 2>/dev/null || true
          cat "{{confirmedUrlsFile}}" 2>/dev/null || true
          cat "{{entryPointsFile}}" 2>/dev/null || true
          cat "{{bestPathTargetsFile}}" 2>/dev/null || true
          grep -Eo 'https?://[^[:space:]]+' "{{Output}}/ai-analysis/.input/passive-web-risk.txt" 2>/dev/null || true
        } | awk 'NF && !seen[$0]++' | head -8 > "$FALLBACK_TARGETS" || true

        FALLBACK_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' "$FALLBACK_TARGETS" 2>/dev/null || echo '[]')
        jq -n \
          --argjson targets "$FALLBACK_JSON" \
          '{
            error: "parse_failed_fallback_generated",
            plan_summary: {
              total_phases: (if ($targets | length) > 0 then 2 else 0 end),
              estimated_total_time: (if ($targets | length) > 0 then "45分钟" else "0分钟" end),
              success_probability: (if ($targets | length) > 0 then 0.65 else 0 end),
              risk_level: (if ($targets | length) > 0 then "中" else "低" end),
              resources_needed: ["curl", "httpx", "operator-review"]
            },
            execution_phases: [
              {
                phase: 1,
                phase_name: "Prioritized target validation",
                actions: [
                  $targets[] | {
                    action_id: ("validate-" + ((. | @base64) | gsub("[/=+]"; "") | .[0:8])),
                    description: ("Validate prioritized target " + .),
                    command: ("curl -sk \"" + . + "\""),
                    expected_result: "Confirm exposure, auth boundary, and exploit preconditions",
                    timeout: "5m"
                  }
                ],
                estimated_time: "20分钟",
                success_criteria: "At least one prioritized target is confirmed exploitable or worth manual follow-up"
              },
              {
                phase: 2,
                phase_name: "Manual chain expansion",
                actions: [
                  {
                    action_id: "manual-chain-review",
                    description: "Review validated targets for privilege escalation, business-logic abuse, and pivot potential",
                    command: "operator-follow-up",
                    expected_result: "Produce operator queue or campaign-ready evidence",
                    timeout: "25m"
                  }
                ],
                estimated_time: "25分钟",
                success_criteria: "High-value target pack is ready for retest, campaign, or operator queue"
              }
            ],
            verification_checklist: [
              $targets[] | {
                step: 1,
                verification_point: ("Reachability and auth boundary check for " + .),
                command: ("curl -sk \"" + . + "\""),
                expected: "200/30x/40x response that confirms the target exists and is worth further testing",
                critical: true
              }
            ],
            rollback_plan: "If direct path planning is unavailable, fall back to manual validation of prioritized targets",
            contingency: "Use operator queue and retest plan as the primary execution source"
          }' > {{pathPlanningOutput}}
        echo "[WARN] [Path Planning] Using fallback path planning generation"
      fi

      jq '
        .plan_summary = ((.plan_summary // {}) + {
          total_phases: (.plan_summary.total_phases // ([.execution_phases[]?] | length)),
          estimated_total_time: (.plan_summary.estimated_total_time // "unknown"),
          success_probability: (.plan_summary.success_probability // 0),
          risk_level: (.plan_summary.risk_level // "中"),
          resources_needed: (.plan_summary.resources_needed // [])
        })
        | .execution_phases = (.execution_phases // [])
        | .verification_checklist = (.verification_checklist // [])
        | .rollback_plan = (.rollback_plan // "Fallback to manual verification and narrow the scope")
        | .contingency = (.contingency // "Use operator queue for manual confirmation")
      ' {{pathPlanningOutput}} > {{pathPlanningOutput}}.tmp 2>/dev/null && mv {{pathPlanningOutput}}.tmp {{pathPlanningOutput}} || true

      PHASES=$(jq -r '.plan_summary.total_phases // 0' {{pathPlanningOutput}} 2>/dev/null || echo 0)
      TIME=$(jq -r '.plan_summary.estimated_total_time // "unknown"' {{pathPlanningOutput}} 2>/dev/null || echo "unknown")
      echo "[INFO] [Path Planning] Total phases: $PHASES, Est. time: $TIME"
      rm -f "$RAW_FILE" "$JSON_FILE" "$FALLBACK_TARGETS" 2>/dev/null || true

  - name: generate-attack-plan-markdown
    type: bash
    pre_condition: "{{enablePathPlanning}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')

      # 构建报告
      cat > {{attackPlanFile}} << 'HEADER'
      # AI 攻击执行计划
      ## 目标
      TARGET_PLACEHOLDER
      
      ## 生成时间
      TIMESTAMP_PLACEHOLDER
      
      ---
      
      ## 执行摘要
      HEADER

      sed -i "s|TARGET_PLACEHOLDER|{{Target}}|g" {{attackPlanFile}}
      sed -i "s|TIMESTAMP_PLACEHOLDER|$TIMESTAMP|g" {{attackPlanFile}}

      # 容错：检查文件是否存在
      if [ -f "{{pathPlanningOutput}}" ] && jq empty {{pathPlanningOutput}} 2>/dev/null; then
        # 添加摘要信息
        jq -r '.plan_summary | "**总阶段数:** \(.total_phases)\n**预计时间:** \(.estimated_total_time)\n**成功率:** \(.success_probability)\n**风险等级:** \(.risk_level)\n**所需资源:** \(.resources_needed | join(", "))"' {{pathPlanningOutput}} 2>/dev/null >> {{attackPlanFile}} || true

        echo "" >> {{attackPlanFile}}
        echo "---" >> {{attackPlanFile}}
        echo "" >> {{attackPlanFile}}
        echo "## 执行阶段" >> {{attackPlanFile}}
        echo "" >> {{attackPlanFile}}

        # 添加各阶段详情
        jq -r '.execution_phases[] | "### Phase \(.phase): \(.phase_name)\n\n**目标:** \(.objectives | join(", "))\n**预计时间:** \(.estimated_time)\n**所需工具:** \(.tools_required | join(", "))\n**成功标准:** \(.success_criteria)\n\n**操作步骤:**\n" + (.actions | .[] | "- **[\(.action_id)]** \(.description)\n  - Command: `\(.command)`\n  - Expected: \(.expected_result)\n  - Verification: \(.verification)\n  - Timeout: \(.timeout)\n")' {{pathPlanningOutput}} 2>/dev/null >> {{attackPlanFile}} || true

        echo "" >> {{attackPlanFile}}
        echo "---" >> {{attackPlanFile}}
        echo "" >> {{attackPlanFile}}
        echo "## 验证清单" >> {{attackPlanFile}}
        echo "" >> {{attackPlanFile}}

        jq -r '.verification_checklist[] | "\(.step). [\((.critical // false) | if . then "CRITICAL" else "OPTIONAL" end)] \(.verification_point)\n   Command: `\(.command)`\n   Expected: \(.expected)\n"' {{pathPlanningOutput}} 2>/dev/null >> {{attackPlanFile}} || true

        echo "" >> {{attackPlanFile}}
        echo "---" >> {{attackPlanFile}}
        echo "" >> {{attackPlanFile}}
        echo "## 回退计划" >> {{attackPlanFile}}
        echo "" >> {{attackPlanFile}}
        jq -r '.rollback_plan' {{pathPlanningOutput}} 2>/dev/null >> {{attackPlanFile}} || true
      else
        echo "无可用的攻击计划数据" >> {{attackPlanFile}}
      fi

      echo "" >> {{attackPlanFile}}
      echo "*此计划由 AI 攻击路径规划模块自动生成*" >> {{attackPlanFile}}

      echo "[INFO] [Path Planning] Attack plan saved to {{attackPlanFile}}"

  - name: generate-execution-checklist
    type: bash
    pre_condition: "{{enablePathPlanning}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      # 容错：检查文件是否存在
      if [ -f "{{pathPlanningOutput}}" ] && jq empty {{pathPlanningOutput}} 2>/dev/null; then
        # 生成可执行的检查清单
        jq -r '.verification_checklist[] | "\(.step). [\((.critical // false) | if . then "CRITICAL" else "OPTIONAL" end)] \(.verification_point)\nCommand: \(.command)\nExpected: \(.expected)\n---"' {{pathPlanningOutput}} 2>/dev/null > {{executionChecklistFile}} || true
      else
        echo "# No execution checklist available" > {{executionChecklistFile}}
      fi

      echo "[INFO] [Path Planning] Execution checklist saved"

  - name: log-path-planning-complete
    type: function
    pre_condition: "{{enablePathPlanning}}"
    functions:
      - 'log_info("AI attack path planning completed for {{Target}}")'

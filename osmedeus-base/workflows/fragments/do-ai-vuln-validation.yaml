# =============================================================================
# AI 漏洞验证模块 - 优化版
# =============================================================================
# 优化点：
# - JSON 输出稳定性：使用 Markdown + JSON 代码块格式
# - Token 优化：max_iterations 从 6 降到 3
# - 验证能力：让 agent 真正执行验证命令
# - Prompt 优化：添加 few-shot 示例
# =============================================================================

kind: module
name: ai-vuln-validation
description: AI-powered vulnerability validation - verify findings and identify false positives

params:
  - name: vulnValidationOutput
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: validatedVulnsFile
    default: "{{Output}}/ai-analysis/validated-vulns-{{TargetSpace}}.json"
  - name: falsePositivesFile
    default: "{{Output}}/ai-analysis/false-positives-{{TargetSpace}}.txt"
  - name: manualVerifyCommandsFile
    default: "{{Output}}/ai-analysis/validation/manual-commands.sh"

  # 输入文件
  - name: nucleiCriticalFile
    default: "{{Output}}/vulnscan/nuclei-critical-{{TargetSpace}}.txt"
  - name: nucleiHighFile
    default: "{{Output}}/vulnscan/nuclei-high-{{TargetSpace}}.txt"
  - name: nucleiFile
    default: "{{Output}}/vulnscan/nuclei-jsonl-{{TargetSpace}}.txt"
  - name: secretsFile
    default: "{{Output}}/vuln-scan-suite/secrets-{{TargetSpace}}.txt"
  - name: ssrfFile
    default: "{{Output}}/vuln-scan-suite/ssrf-{{TargetSpace}}.txt"
  - name: sstiFile
    default: "{{Output}}/vuln-scan-suite/ssti-{{TargetSpace}}.txt"
  - name: sqliFile
    default: "{{Output}}/vuln-scan-suite/sqli-{{TargetSpace}}.txt"
  - name: takeoverFile
    default: "{{Output}}/vuln-scan-suite/takeover-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"

  # 配置
  - name: enableVulnValidation
    type: bool
    default: true
  - name: enableCvePreQuery
    type: bool
    default: false
    description: "Enable CVE pre-query from NVD API before analysis"

steps:
  - name: prepare-vuln-validation
    type: function
    pre_condition: "{{enableVulnValidation}}"
    log: "Preparing vulnerability validation"
    functions:
      - 'create_folder("{{Output}}/ai-analysis/validation")'
      - 'create_folder("{{Output}}/ai-analysis/cve")'
      - 'log_info("Starting AI vulnerability validation for {{Target}}")'

  - name: pre-query-cve
    type: bash
    pre_condition: "{{enableVulnValidation}} && {{enableCvePreQuery}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/cve
      
      echo "[CVE] Starting NVD API pre-query..."
      
      # 提取技术栈关键词
      TECH_KEYWORDS=$(cat {{fingerprintFile}} 2>/dev/null | jq -r '.tech // [] | .[0:5][]' 2>/dev/null | tr '\n' ',' | sed 's/,$//')
      
      if [ -z "$TECH_KEYWORDS" ]; then
        TECH_KEYWORDS="apache,nginx,wordpress,jetty,django"
      fi
      
      echo "[CVE] Tech keywords: $TECH_KEYWORDS"
      
      # 初始化 CVE 文件
      > {{Output}}/ai-analysis/cve/tech-cve.txt
      > {{Output}}/ai-analysis/cve/vuln-type-cve.txt
      
      # 查询技术栈相关 CVE（CVSS >= 7.0）
      for tech in $(echo "$TECH_KEYWORDS" | tr ',' '\n' | head -5); do
        curl -s --connect-timeout 5 --max-time 10 \
          "https://services.nvd.nist.gov/rest/json/cves/2.0?keywordSearch=${tech}&cvssV3Severity=HIGH&resultsPerPage=3" | \
        jq -r '.vulnerabilities[]? | "|\(.cve.id)|\(.metrics.cvssMetricV31[0].cvssData.baseScore // "N/A")|\(.cve.descriptions[0].value // "" | .[0:150])"' >> {{Output}}/ai-analysis/cve/tech-cve.txt 2>/dev/null || true
        sleep 0.3
      done
      
      # 查询通用漏洞类型 CVE
      for vuln_type in "sql injection" "xss" "remote code execution" "ssrf" "ssti"; do
        curl -s --connect-timeout 5 --max-time 10 \
          "https://services.nvd.nist.gov/rest/json/cves/2.0?keywordSearch=${vuln_type}&cvssV3Severity=HIGH&resultsPerPage=2" | \
        jq -r '.vulnerabilities[]? | "|\(.cve.id)|\(.metrics.cvssMetricV31[0].cvssData.baseScore // "N/A")|\(.cve.descriptions[0].value // "" | .[0:150])"' >> {{Output}}/ai-analysis/cve/vuln-type-cve.txt 2>/dev/null || true
        sleep 0.3
      done
      
      TECH_CVE_COUNT=$(wc -l < {{Output}}/ai-analysis/cve/tech-cve.txt 2>/dev/null || echo 0)
      VULN_CVE_COUNT=$(wc -l < {{Output}}/ai-analysis/cve/vuln-type-cve.txt 2>/dev/null || echo 0)
      
      echo "[CVE] Pre-query completed, Tech CVEs: $TECH_CVE_COUNT, Vuln Type CVEs: $VULN_CVE_COUNT"

  - name: check-vuln-data
    type: bash
    pre_condition: "{{enableVulnValidation}}"
    command: |
      echo "[Vuln Validation] Checking data availability..."
      
      NUCLEI_JSONL_SIZE=0
      CRITICAL_SIZE=0
      HIGH_SIZE=0
      
      if [ -f "{{nucleiFile}}" ]; then
        NUCLEI_JSONL_SIZE=$(wc -c < "{{nucleiFile}}" 2>/dev/null || echo 0)
      fi
      if [ -f "{{nucleiCriticalFile}}" ]; then
        CRITICAL_SIZE=$(wc -l < "{{nucleiCriticalFile}}" 2>/dev/null || echo 0)
      fi
      if [ -f "{{nucleiHighFile}}" ]; then
        HIGH_SIZE=$(wc -l < "{{nucleiHighFile}}" 2>/dev/null || echo 0)
      fi
      
      echo "[Vuln Validation] Data: nuclei_jsonl=$NUCLEI_JSONL_SIZE bytes, critical=$CRITICAL_SIZE, high=$HIGH_SIZE"
      
      if [ "$NUCLEI_JSONL_SIZE" -lt 100 ] && [ "$CRITICAL_SIZE" -eq 0 ] && [ "$HIGH_SIZE" -eq 0 ]; then
        echo "[WARN] No vulnerability data found, generating empty results"
        mkdir -p {{Output}}/ai-analysis/validation
        echo '{"error": "no_data", "risk_level": "低", "total_validated": 0, "confirmed_real": 0, "false_positives": 0, "needs_manual_verification": 0, "findings": [], "high_priority_items": []}' > {{vulnValidationOutput}}
        echo "SKIP_AI=true" > {{Output}}/ai-analysis/.vuln-validation-skip
        exit 0
      fi
      
      rm -f {{Output}}/ai-analysis/.vuln-validation-skip 2>/dev/null || true
      echo "[Vuln Validation] Proceeding with validation"

  - name: prepare-input-data
    type: bash
    pre_condition: '{{enableVulnValidation}} && !file_exists("{{Output}}/ai-analysis/.vuln-validation-skip")'
    command: |
      mkdir -p {{Output}}/ai-analysis/.input
      mkdir -p {{Output}}/ai-analysis/validation
      
      # 合并漏洞数据到单个文件（限制大小）
      : > {{Output}}/ai-analysis/.input/vuln-data.txt
      
      # Critical 漏洞（前 20 条）
      if [ -f "{{nucleiCriticalFile}}" ]; then
        echo "## CRITICAL VULNERABILITIES" >> {{Output}}/ai-analysis/.input/vuln-data.txt
        head -20 "{{nucleiCriticalFile}}" >> {{Output}}/ai-analysis/.input/vuln-data.txt 2>/dev/null || true
        echo "" >> {{Output}}/ai-analysis/.input/vuln-data.txt
      fi
      
      # High 漏洞（前 15 条）
      if [ -f "{{nucleiHighFile}}" ]; then
        echo "## HIGH VULNERABILITIES" >> {{Output}}/ai-analysis/.input/vuln-data.txt
        head -15 "{{nucleiHighFile}}" >> {{Output}}/ai-analysis/.input/vuln-data.txt 2>/dev/null || true
        echo "" >> {{Output}}/ai-analysis/.input/vuln-data.txt
      fi
      
      # 技术栈
      if [ -f "{{fingerprintFile}}" ]; then
        echo "## TECHNOLOGY STACK" >> {{Output}}/ai-analysis/.input/vuln-data.txt
        head -5 "{{fingerprintFile}}" | jq -r '.tech // [] | .[0:10][]' 2>/dev/null | head -20 >> {{Output}}/ai-analysis/.input/vuln-data.txt || true
        echo "" >> {{Output}}/ai-analysis/.input/vuln-data.txt
      fi
      
      INPUT_SIZE=$(wc -c < {{Output}}/ai-analysis/.input/vuln-data.txt 2>/dev/null || echo 0)
      echo "[Vuln Validation] Input prepared: $INPUT_SIZE bytes"

  - name: ai-validate-vulns
    type: agent
    pre_condition: '{{enableVulnValidation}} && !file_exists("{{Output}}/ai-analysis/.vuln-validation-skip")'
    max_iterations: 3
    timeout: 600
    on_error:
      - action: continue
    system_prompt: |
      你是一个渗透测试专家，负责验证漏洞发现并识别假阳性。
      
      输出格式：
      先用文字分析发现的漏洞，然后用 JSON 代码块输出结构化结果。
      
      ## 分析示例
      
      ### 已验证的真实漏洞
      - CVE-2021-44228 (Log4j): http://target.com - 返回正确的 JNDI 响应，确认可利用
      - SQL Injection: http://api.target.com/api?id=1 - 执行了测试 payloads，确认存在
      
      ### 识别假阳性
      - Path Traversal on /static/files - 响应是 404，非漏洞
      - Self-XSS on comment field - 需要受害者互动，无实际危害
      
      ### 需要进一步验证
      - DOM XSS on /search - 需要复现步骤
      
      ```json
      {
        "risk_level": "高",
        "confirmed_real": 2,
        "false_positives": 2,
        "needs_manual_verification": 1,
        "findings": [
          {
            "severity": "critical",
            "type": "log4j-rce",
            "url": "http://target.com",
            "status": "confirmed",
            "confidence": 0.95,
            "reason": "返回正确的 JNDI lookup 响应",
            "evidence": "DNS 回调成功"
          },
          {
            "severity": "high",
            "type": "sql-injection",
            "url": "http://api.target.com/api?id=1",
            "status": "confirmed",
            "confidence": 0.90,
            "reason": "测试 payload 成功执行",
            "verification_command": "curl -X POST 'http://api.target.com/api?id=1' ..."
          }
        ],
        "high_priority_items": ["CVE-2021-44228 on http://target.com"]
      }
      ```
      
      重要：
      1. 优先对 Critical/High 漏洞进行验证
      2. 每个 findings 必须有 confidence (0.0-1.0)
      3. confirmed 状态的漏洞必须有验证证据
      4. false_positive 必须说明原因
      5. 使用 bash 工具执行验证命令，不要只生成命令
    query: |
      验证 {{Target}} 的漏洞发现。
      
      数据文件：{{Output}}/ai-analysis/.input/vuln-data.txt
      
      请读取数据文件，分析每个漏洞，对于可疑漏洞使用 bash 执行 curl 命令验证。
      
      输出格式：
      1. 先写分析（哪些是真实的，哪些是假阳性）
      2. 然后用 JSON 代码块输出结构化结果
    agent_tools:
      - preset: read_file
      - preset: file_exists
      - preset: bash
      - preset: http_request
      - preset: save_content
    exports:
      validation_json: "{{agent_content}}"

  - name: save-validation-results
    type: bash
    pre_condition: "{{enableVulnValidation}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/validation

      # 从 Markdown 中提取 JSON（更稳定）
      RAW='{{validation_json}}'
      
      # 提取 markdown 代码块中的 JSON
      JSON_CONTENT=$(echo "$RAW" | sed -n '/```json/,/```/p' | sed '1d;$d' | sed 's/^[[:space:]]*//')
      
      if [ -z "$JSON_CONTENT" ] || [ "$JSON_CONTENT" = "```json" ] || [ "$JSON_CONTENT" = "```" ]; then
        # 尝试直接解析
        JSON_CONTENT=$(echo "$RAW" | grep -o '{.*}' | head -1)
      fi
      
      if [ -n "$JSON_CONTENT" ] && echo "$JSON_CONTENT" | jq empty 2>/dev/null; then
        echo "$JSON_CONTENT" > {{vulnValidationOutput}}
        echo "[OK] Valid JSON extracted from markdown"
      else
        echo "[WARN] JSON extraction failed, trying alternative methods..."
        
        # 尝试提取 {...} 模式
        EXTRACTED=$(echo "$RAW" | grep -oP '\{[^}]*"findings"[^}]*\}' | head -1)
        if [ -n "$EXTRACTED" ] && echo "$EXTRACTED" | jq empty 2>/dev/null; then
          echo "$EXTRACTED" > {{vulnValidationOutput}}
          echo "[OK] Extracted using pattern match"
        else
          # Fallback
          echo '{"error": "parse_failed", "risk_level": "中", "total_validated": 0, "confirmed_real": 0, "false_positives": 0, "needs_manual_verification": 0, "findings": [], "high_priority_items": []}' > {{vulnValidationOutput}}
          echo "[ERROR] Using fallback empty result"
        fi
      fi
      
      # 验证必需字段
      for field in risk_level findings confirmed_real false_positives needs_manual_verification; do
        if ! jq -e "has(\"$field\")" {{vulnValidationOutput}} > /dev/null 2>&1; then
          case $field in
            risk_level) jq '.risk_level = "中"' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            findings) jq '.findings = []' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            confirmed_real) jq '.confirmed_real = 0' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            false_positives) jq '.false_positives = 0' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            needs_manual_verification) jq '.needs_manual_verification = 0' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
          esac
        fi
      done

      CONFIRMED=$(jq -r '.confirmed_real // 0' {{vulnValidationOutput}} 2>/dev/null)
      FP=$(jq -r '.false_positives // 0' {{vulnValidationOutput}} 2>/dev/null)
      TOTAL=$(jq -r '.findings | length' {{vulnValidationOutput}} 2>/dev/null)
      
      echo "[RESULT] Confirmed: $CONFIRMED, False Positives: $FP, Total: $TOTAL"

  - name: extract-validation-data
    type: bash
    pre_condition: "{{enableVulnValidation}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/validation

      # 提取假阳性列表
      jq -r '.findings[] | select(.status == "false_positive") | "\(.url // .finding // "unknown") - \(.reason // "no reason provided")"' {{vulnValidationOutput}} 2>/dev/null > {{falsePositivesFile}} || true

      # 提取已验证漏洞列表
      jq -r '.findings[] | select(.status == "confirmed") | .url // empty' {{vulnValidationOutput}} 2>/dev/null > {{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt || true

      CONFIRMED_COUNT=$(wc -l < {{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt 2>/dev/null || echo 0)
      echo "[Vuln Validation] Extracted $CONFIRMED_COUNT confirmed URLs"

  - name: log-validation-complete
    type: function
    pre_condition: "{{enableVulnValidation}}"
    functions:
      - 'log_info("AI vulnerability validation completed for {{Target}}")'

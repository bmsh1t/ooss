# =============================================================================
# AI 漏洞验证模块 - 优化版
# =============================================================================
# 优化点：
# - JSON 输出稳定性：使用 Markdown + JSON 代码块格式
# - Token 优化：max_iterations 从 6 降到 3
# - 验证能力：让 agent 真正执行验证命令
# - Prompt 优化：添加 few-shot 示例
# =============================================================================

kind: module
name: ai-vuln-validation
description: AI-powered vulnerability validation - verify findings and identify false positives

params:
  - name: vulnValidationOutput
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: validatedVulnsFile
    default: "{{Output}}/ai-analysis/validated-vulns-{{TargetSpace}}.json"
  - name: falsePositivesFile
    default: "{{Output}}/ai-analysis/false-positives-{{TargetSpace}}.txt"
  - name: manualVerifyCommandsFile
    default: "{{Output}}/ai-analysis/validation/manual-commands.sh"

  # 输入文件
  - name: nucleiCriticalFile
    default: "{{Output}}/vulnscan/nuclei-critical-{{TargetSpace}}.txt"
  - name: nucleiHighFile
    default: "{{Output}}/vulnscan/nuclei-high-{{TargetSpace}}.txt"
  - name: nucleiFile
    default: "{{Output}}/vulnscan/nuclei-jsonl-{{TargetSpace}}.txt"
  - name: secretsFile
    default: "{{Output}}/vuln-scan-suite/secrets-{{TargetSpace}}.txt"
  - name: ssrfFile
    default: "{{Output}}/vuln-scan-suite/ssrf-{{TargetSpace}}.txt"
  - name: sstiFile
    default: "{{Output}}/vuln-scan-suite/ssti-{{TargetSpace}}.txt"
  - name: sqliFile
    default: "{{Output}}/vuln-scan-suite/sqli-{{TargetSpace}}.txt"
  - name: takeoverFile
    default: "{{Output}}/vuln-scan-suite/takeover-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"

  # 配置
  - name: enableVulnValidation
    type: bool
    default: true
  - name: enableCvePreQuery
    type: bool
    default: false
    description: "Enable CVE pre-query from NVD API before analysis"

steps:
  - name: prepare-vuln-validation
    type: function
    pre_condition: "{{enableVulnValidation}}"
    log: "Preparing vulnerability validation"
    functions:
      - 'create_folder("{{Output}}/ai-analysis/validation")'
      - 'create_folder("{{Output}}/ai-analysis/cve")'
      - 'log_info("Starting AI vulnerability validation for {{Target}}")'

  - name: pre-query-cve
    type: bash
    pre_condition: "{{enableVulnValidation}} && {{enableCvePreQuery}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/cve
      
      echo "[CVE] Starting NVD API pre-query..."
      
      # 提取技术栈关键词
      TECH_KEYWORDS=$(cat {{fingerprintFile}} 2>/dev/null | jq -r '.tech // [] | .[0:5][]' 2>/dev/null | tr '\n' ',' | sed 's/,$//')
      
      if [ -z "$TECH_KEYWORDS" ]; then
        TECH_KEYWORDS="apache,nginx,wordpress,jetty,django"
      fi
      
      echo "[CVE] Tech keywords: $TECH_KEYWORDS"
      
      # 初始化 CVE 文件
      > {{Output}}/ai-analysis/cve/tech-cve.txt
      > {{Output}}/ai-analysis/cve/vuln-type-cve.txt
      
      # 查询技术栈相关 CVE（CVSS >= 7.0，并发执行）
      printf '%s\n' "$TECH_KEYWORDS" | tr ',' '\n' | awk 'NF' | head -5 | \
        xargs -P5 -I{} sh -c '
          tech="$1"
          curl -s --connect-timeout 5 --max-time 10 \
            "https://services.nvd.nist.gov/rest/json/cves/2.0?keywordSearch=${tech}&cvssV3Severity=HIGH&resultsPerPage=3" | \
          jq -r '\''.vulnerabilities[]? | "|\(.cve.id)|\(.metrics.cvssMetricV31[0].cvssData.baseScore // "N/A")|\(.cve.descriptions[0].value // "" | .[0:150])"'\'' 2>/dev/null || true
        ' _ {} >> {{Output}}/ai-analysis/cve/tech-cve.txt

      # 查询通用漏洞类型 CVE（并发执行）
      printf '%s\n' "sql injection" "xss" "remote code execution" "ssrf" "ssti" | \
        xargs -P5 -I{} sh -c '
          vuln_type="$1"
          curl -s --connect-timeout 5 --max-time 10 \
            "https://services.nvd.nist.gov/rest/json/cves/2.0?keywordSearch=${vuln_type}&cvssV3Severity=HIGH&resultsPerPage=2" | \
          jq -r '\''.vulnerabilities[]? | "|\(.cve.id)|\(.metrics.cvssMetricV31[0].cvssData.baseScore // "N/A")|\(.cve.descriptions[0].value // "" | .[0:150])"'\'' 2>/dev/null || true
        ' _ {} >> {{Output}}/ai-analysis/cve/vuln-type-cve.txt
      
      TECH_CVE_COUNT=$(wc -l < {{Output}}/ai-analysis/cve/tech-cve.txt 2>/dev/null || echo 0)
      VULN_CVE_COUNT=$(wc -l < {{Output}}/ai-analysis/cve/vuln-type-cve.txt 2>/dev/null || echo 0)
      
      echo "[CVE] Pre-query completed, Tech CVEs: $TECH_CVE_COUNT, Vuln Type CVEs: $VULN_CVE_COUNT"

  - name: check-vuln-data
    type: bash
    pre_condition: "{{enableVulnValidation}}"
    command: |
      echo "[Vuln Validation] Checking data availability..."
      
      NUCLEI_JSONL_SIZE=0
      CRITICAL_SIZE=0
      HIGH_SIZE=0
      
      if [ -f "{{nucleiFile}}" ]; then
        NUCLEI_JSONL_SIZE=$(wc -c < "{{nucleiFile}}" 2>/dev/null || echo 0)
      fi
      if [ -f "{{nucleiCriticalFile}}" ]; then
        CRITICAL_SIZE=$(wc -l < "{{nucleiCriticalFile}}" 2>/dev/null || echo 0)
      fi
      if [ -f "{{nucleiHighFile}}" ]; then
        HIGH_SIZE=$(wc -l < "{{nucleiHighFile}}" 2>/dev/null || echo 0)
      fi
      
      echo "[Vuln Validation] Data: nuclei_jsonl=$NUCLEI_JSONL_SIZE bytes, critical=$CRITICAL_SIZE, high=$HIGH_SIZE"
      
      if [ "$NUCLEI_JSONL_SIZE" -lt 100 ] && [ "$CRITICAL_SIZE" -eq 0 ] && [ "$HIGH_SIZE" -eq 0 ]; then
        echo "[WARN] No vulnerability data found, generating empty results"
        mkdir -p {{Output}}/ai-analysis/validation
        echo '{"error": "no_data", "risk_level": "低", "total_validated": 0, "confirmed_real": 0, "false_positives": 0, "needs_manual_verification": 0, "findings": [], "high_priority_items": []}' > {{vulnValidationOutput}}
        echo "SKIP_AI=true" > {{Output}}/ai-analysis/.vuln-validation-skip
        exit 0
      fi
      
      rm -f {{Output}}/ai-analysis/.vuln-validation-skip 2>/dev/null || true
      echo "[Vuln Validation] Proceeding with validation"

  - name: prepare-input-data
    type: bash
    pre_condition: '{{enableVulnValidation}} && !file_exists("{{Output}}/ai-analysis/.vuln-validation-skip")'
    command: |
      mkdir -p {{Output}}/ai-analysis/.input
      mkdir -p {{Output}}/ai-analysis/validation
      
      # 合并漏洞数据到单个文件（限制大小）
      : > {{Output}}/ai-analysis/.input/vuln-data.txt
      
      # Critical 漏洞（前 20 条）
      if [ -f "{{nucleiCriticalFile}}" ]; then
        echo "## CRITICAL VULNERABILITIES" >> {{Output}}/ai-analysis/.input/vuln-data.txt
        head -20 "{{nucleiCriticalFile}}" >> {{Output}}/ai-analysis/.input/vuln-data.txt 2>/dev/null || true
        echo "" >> {{Output}}/ai-analysis/.input/vuln-data.txt
      fi
      
      # High 漏洞（前 15 条）
      if [ -f "{{nucleiHighFile}}" ]; then
        echo "## HIGH VULNERABILITIES" >> {{Output}}/ai-analysis/.input/vuln-data.txt
        head -15 "{{nucleiHighFile}}" >> {{Output}}/ai-analysis/.input/vuln-data.txt 2>/dev/null || true
        echo "" >> {{Output}}/ai-analysis/.input/vuln-data.txt
      fi
      
      # 技术栈
      if [ -f "{{fingerprintFile}}" ]; then
        echo "## TECHNOLOGY STACK" >> {{Output}}/ai-analysis/.input/vuln-data.txt
        head -5 "{{fingerprintFile}}" | jq -r '.tech // [] | .[0:10][]' 2>/dev/null | head -20 >> {{Output}}/ai-analysis/.input/vuln-data.txt || true
        echo "" >> {{Output}}/ai-analysis/.input/vuln-data.txt
      fi
      
      INPUT_SIZE=$(wc -c < {{Output}}/ai-analysis/.input/vuln-data.txt 2>/dev/null || echo 0)
      echo "[Vuln Validation] Input prepared: $INPUT_SIZE bytes"

  - name: ai-validate-vulns
    type: agent
    pre_condition: '{{enableVulnValidation}} && !file_exists("{{Output}}/ai-analysis/.vuln-validation-skip")'
    max_iterations: 3
    timeout: 600
    on_error:
      - action: continue
    system_prompt: |
      你是一个渗透测试专家，负责验证漏洞发现并识别假阳性。
      
      输出格式：
      先用文字分析发现的漏洞，然后用 JSON 代码块输出结构化结果。
      
      ## 分析示例
      
      ### 已验证的真实漏洞
      - CVE-2021-44228 (Log4j): http://target.com - 返回正确的 JNDI 响应，确认可利用
      - SQL Injection: http://api.target.com/api?id=1 - 执行了测试 payloads，确认存在
      
      ### 识别假阳性
      - Path Traversal on /static/files - 响应是 404，非漏洞
      - Self-XSS on comment field - 需要受害者互动，无实际危害
      
      ### 需要进一步验证
      - DOM XSS on /search - 需要复现步骤
      
      ```json
      {
        "risk_level": "高",
        "confirmed_real": 2,
        "false_positives": 2,
        "needs_manual_verification": 1,
        "findings": [
          {
            "severity": "critical",
            "type": "log4j-rce",
            "url": "http://target.com",
            "status": "confirmed",
            "confidence": 0.95,
            "reason": "返回正确的 JNDI lookup 响应",
            "evidence": "DNS 回调成功"
          },
          {
            "severity": "high",
            "type": "sql-injection",
            "url": "http://api.target.com/api?id=1",
            "status": "confirmed",
            "confidence": 0.90,
            "reason": "测试 payload 成功执行",
            "verification_command": "curl -X POST 'http://api.target.com/api?id=1' ..."
          }
        ],
        "high_priority_items": ["CVE-2021-44228 on http://target.com"]
      }
      ```
      
      重要：
      1. 优先对 Critical/High 漏洞进行验证
      2. 每个 findings 必须有 confidence (0.0-1.0)
      3. confirmed 状态的漏洞必须有验证证据
      4. false_positive 必须说明原因
      5. 使用 bash 工具执行验证命令，不要只生成命令
    query: |
      验证 {{Target}} 的漏洞发现。
      
      数据文件：{{Output}}/ai-analysis/.input/vuln-data.txt
      
      请读取数据文件，分析每个漏洞，对于可疑漏洞使用 bash 执行 curl 命令验证。
      
      输出格式：
      1. 先写分析（哪些是真实的，哪些是假阳性）
      2. 然后用 JSON 代码块输出结构化结果
    agent_tools:
      - preset: read_file
      - preset: file_exists
      - preset: bash
      - preset: http_request
      - preset: save_content
    exports:
      validation_json: "{{agent_content}}"

  - name: save-validation-results
    type: bash
    pre_condition: "{{enableVulnValidation}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/validation

      RAW_FILE="{{Output}}/ai-analysis/validation/.vuln-validation-raw-{{TargetSpace}}.txt"
      JSON_FILE="{{Output}}/ai-analysis/validation/.vuln-validation-json-{{TargetSpace}}.json"
      FALLBACK_LINES="{{Output}}/ai-analysis/validation/.vuln-validation-fallback-lines-{{TargetSpace}}.txt"

      printf '%s' '{{validation_json}}' > "$RAW_FILE"
      : > "$JSON_FILE"

      awk '
        BEGIN { capture = 0 }
        /^[[:space:]]*```json[[:space:]]*$/ { capture = 1; next }
        capture && /^[[:space:]]*```[[:space:]]*$/ { exit }
        capture { print }
      ' "$RAW_FILE" > "$JSON_FILE"

      if [ ! -s "$JSON_FILE" ] && jq empty "$RAW_FILE" >/dev/null 2>&1; then
        cp "$RAW_FILE" "$JSON_FILE"
      fi

      if [ ! -s "$JSON_FILE" ]; then
        awk '
          BEGIN { capture = 0 }
          /^[[:space:]]*{/ { capture = 1 }
          capture { print }
        ' "$RAW_FILE" > "$JSON_FILE"
      fi

      if [ -s "$JSON_FILE" ] && jq empty "$JSON_FILE" >/dev/null 2>&1; then
        jq '
          def normalize_status:
            if . == "confirmed" then "confirmed"
            elif . == "false_positive" then "false_positive"
            elif . == "needs_verification" then "needs_manual_verification"
            elif . == "manual" then "needs_manual_verification"
            elif . == "needs_manual_verification" then "needs_manual_verification"
            else (. // "needs_manual_verification")
            end;
          def normalize_finding:
            . as $f
            | {
                severity: ($f.severity // $f.info.severity // "unknown"),
                type: ($f.type // $f.finding // $f.template_id // "unknown"),
                url: ($f.url // $f.target // $f.host // $f."matched-at" // $f.matched_at // ""),
                status: (($f.status // $f.verification_status) | normalize_status),
                confidence: (($f.confidence // $f.score // 0.6) | tonumber? // 0.6),
                reason: ($f.reason // $f.false_positive_reason // $f.analysis // ""),
                evidence: ($f.evidence // $f.proof // $f.details // ""),
                verification_command: ($f.verification_command // $f.manual_verification.command // "")
              };
          (.findings // .validated_findings // []) as $raw_findings
          | .findings = ($raw_findings | map(normalize_finding))
          | .total_validated = (.total_validated // .validation_summary.total_validated // (.findings | length))
          | .confirmed_real = (.confirmed_real // .validation_summary.confirmed_real // ([.findings[]? | select(.status == "confirmed")] | length))
          | .false_positives = (.false_positives // .validation_summary.false_positives // ([.findings[]? | select(.status == "false_positive")] | length))
          | .needs_manual_verification = (.needs_manual_verification // .validation_summary.needs_manual_verification // ([.findings[]? | select(.status == "needs_manual_verification")] | length))
          | .risk_level = (.risk_level // .validation_summary.risk_level // (if .confirmed_real > 0 then "高" elif .needs_manual_verification > 0 then "中" else "低" end))
          | .high_priority_items = (.high_priority_items // ([.findings[]? | select(((.severity // "unknown") | ascii_downcase) == "critical" or ((.severity // "unknown") | ascii_downcase) == "high") | ((if (.url // "") != "" then (.url + " - ") else "" end) + (.type // "unknown"))] | unique | .[0:10]))
          | del(.validated_findings, .validation_summary)
        ' "$JSON_FILE" > {{vulnValidationOutput}}
        echo "[OK] Normalized validation JSON extracted successfully"
      else
        echo "[WARN] Validation JSON extraction failed, generating practical fallback data..."

        : > "$FALLBACK_LINES"
        collect_lines() {
          source_name="$1"
          severity="$2"
          source_file="$3"
          limit="$4"
          [ -f "$source_file" ] || return 0
          head -"$limit" "$source_file" 2>/dev/null | awk -v src="$source_name" -v sev="$severity" 'NF { gsub(/\r/, ""); print src "|" sev "|" $0 }' >> "$FALLBACK_LINES"
        }

        collect_lines "nuclei-critical" "critical" "{{nucleiCriticalFile}}" 12
        collect_lines "nuclei-high" "high" "{{nucleiHighFile}}" 12
        collect_lines "sqli" "high" "{{sqliFile}}" 6
        collect_lines "ssrf" "high" "{{ssrfFile}}" 6
        collect_lines "ssti" "high" "{{sstiFile}}" 6
        collect_lines "takeover" "high" "{{takeoverFile}}" 6
        collect_lines "secrets" "medium" "{{secretsFile}}" 6

        if [ -s "$FALLBACK_LINES" ]; then
          jq -R -s '
            def detect_type($src; $line):
              ($line | ascii_downcase) as $l
              | if $src == "sqli" or ($l | test("sql")) then "sql-injection"
                elif $src == "ssrf" or ($l | test("ssrf")) then "ssrf"
                elif $src == "ssti" or ($l | test("ssti|template")) then "ssti"
                elif $src == "takeover" or ($l | test("takeover|dangling")) then "subdomain-takeover"
                elif $src == "secrets" or ($l | test("secret|token|key|credential")) then "secret-exposure"
                elif ($l | test("xss")) then "xss"
                elif ($l | test("rce|command")) then "rce"
                else "high-risk-finding"
                end;
            split("\n")
            | map(select(length > 0))
            | map(capture("^(?<src>[^|]+)\\|(?<sev>[^|]+)\\|(?<line>.*)$"))
            | map(
                (.line | capture("(?<u>https?://[^[:space:]\"]+)")?.u // "") as $url
                | {
                    severity: (.sev | ascii_downcase),
                    type: detect_type(.src; .line),
                    url: $url,
                    status: "needs_manual_verification",
                    confidence: (if (.sev | ascii_downcase) == "critical" then 0.7 else 0.6 end),
                    reason: ("AI output parse failed; derived from raw " + .src + " evidence"),
                    evidence: (.line[0:400]),
                    verification_command: (if $url != "" then ("curl -skI \"" + $url + "\"") else "printf \"manual review required\\n\"" end)
                  }
              ) as $findings
            | {
                error: "parse_failed_fallback",
                risk_level: (if ([$findings[] | select(.severity == "critical")] | length) > 0 then "高" else "中" end),
                total_validated: ($findings | length),
                confirmed_real: 0,
                false_positives: 0,
                needs_manual_verification: ($findings | length),
                findings: $findings,
                high_priority_items: ($findings | map((if (.url // "") != "" then (.url + " - ") else "" end) + (.type // "unknown")) | unique | .[0:10])
              }
          ' "$FALLBACK_LINES" > {{vulnValidationOutput}}
        else
          echo '{"error": "parse_failed", "risk_level": "中", "total_validated": 0, "confirmed_real": 0, "false_positives": 0, "needs_manual_verification": 0, "findings": [], "high_priority_items": []}' > {{vulnValidationOutput}}
        fi
      fi

      if ! jq empty {{vulnValidationOutput}} >/dev/null 2>&1; then
        echo '{"error": "validation_output_invalid", "risk_level": "中", "total_validated": 0, "confirmed_real": 0, "false_positives": 0, "needs_manual_verification": 0, "findings": [], "high_priority_items": []}' > {{vulnValidationOutput}}
      fi

      for field in risk_level findings confirmed_real false_positives needs_manual_verification total_validated high_priority_items; do
        if ! jq -e "has(\"$field\")" {{vulnValidationOutput}} > /dev/null 2>&1; then
          case $field in
            risk_level) jq '.risk_level = "中"' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            findings) jq '.findings = []' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            confirmed_real) jq '.confirmed_real = 0' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            false_positives) jq '.false_positives = 0' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            needs_manual_verification) jq '.needs_manual_verification = 0' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            total_validated) jq '.total_validated = (.findings | length)' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
            high_priority_items) jq '.high_priority_items = []' {{vulnValidationOutput}} > {{vulnValidationOutput}}.tmp && mv {{vulnValidationOutput}}.tmp {{vulnValidationOutput}} ;;
          esac
        fi
      done

      CONFIRMED=$(jq -r '.confirmed_real // 0' {{vulnValidationOutput}} 2>/dev/null)
      FP=$(jq -r '.false_positives // 0' {{vulnValidationOutput}} 2>/dev/null)
      TOTAL=$(jq -r '.findings | length' {{vulnValidationOutput}} 2>/dev/null)
      
      echo "[RESULT] Confirmed: $CONFIRMED, False Positives: $FP, Total: $TOTAL"

  - name: extract-validation-data
    type: bash
    pre_condition: "{{enableVulnValidation}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/validation

      jq '[.findings[]? | {
        severity: (.severity // "unknown"),
        type: (.type // "unknown"),
        url: (.url // ""),
        status: (.status // "needs_manual_verification"),
        confidence: (.confidence // 0),
        reason: (.reason // ""),
        evidence: (.evidence // ""),
        verification_command: (.verification_command // "")
      }]' {{vulnValidationOutput}} 2>/dev/null > {{validatedVulnsFile}} || echo '[]' > {{validatedVulnsFile}}

      jq -r '.findings[] | select(.status == "false_positive") | "\(.url // .finding // "unknown") - \(.reason // "no reason provided")"' {{vulnValidationOutput}} 2>/dev/null > {{falsePositivesFile}} || true

      jq -r '
        .findings[]?
        | select(.status == "needs_manual_verification")
        | "# [" + (.severity // "unknown") + "] " + (.type // "unknown") + "\n"
          + "# Target: " + (.url // "unknown") + "\n"
          + (.verification_command // (if (.url // "") != "" then ("curl -skI \"" + .url + "\"") else "printf \"manual review required\\n\"" end))
          + "\n# Reason: " + (.reason // "manual verification required") + "\n"
      ' {{vulnValidationOutput}} 2>/dev/null > {{manualVerifyCommandsFile}} || true

      if [ ! -s "{{manualVerifyCommandsFile}}" ]; then
        echo "# No manual verification commands generated" > {{manualVerifyCommandsFile}}
      fi
      chmod +x {{manualVerifyCommandsFile}} 2>/dev/null || true

      jq -r '.findings[] | select(.status == "confirmed") | .url // empty' {{vulnValidationOutput}} 2>/dev/null > {{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt || true
      touch {{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt

      CONFIRMED_COUNT=$(wc -l < {{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt 2>/dev/null || echo 0)
      echo "[Vuln Validation] Extracted $CONFIRMED_COUNT confirmed URLs"

  - name: log-validation-complete
    type: function
    pre_condition: "{{enableVulnValidation}}"
    functions:
      - 'log_info("AI vulnerability validation completed for {{Target}}")'

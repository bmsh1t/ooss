# =============================================================================
# AI 智能分析协调器模块
# =============================================================================
# 功能：
# - 读取三个子模块的执行结果
# - 聚合并分析结果
# - 生成统一的 AI 决策配置供 vuln-suite 使用
# - 生成综合分析报告
# =============================================================================

kind: module
name: ai-intelligent-analysis
description: AI analysis coordinator - aggregates results from vuln validation, attack chain, and path planning

params:
  # 文件路径
  - name: analysisOutputJson
    default: "{{Output}}/ai-analysis/intelligent-analysis-{{TargetSpace}}.json"
  - name: analysisOutputMd
    default: "{{Output}}/ai-analysis/intelligent-analysis-{{TargetSpace}}.md"
  - name: memoryOutput
    default: "{{Output}}/ai-analysis/ai-memory-{{TargetSpace}}.json"
  
  # AI 决策配置 - 必须与 vuln-suite.yaml 中的读取路径一致
  - name: aiDecisionFile
    default: "{{Output}}/ai-analysis/ai-decision-{{TargetSpace}}.json"
  - name: aiVarsFile
    default: "{{Output}}/ai-analysis/ai-vars.yaml"

  # 输入文件 - 子模块输出
  - name: vulnValidationFile
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: attackChainFile
    default: "{{Output}}/ai-analysis/attack-chain-{{TargetSpace}}.json"
  - name: pathPlanningFile
    default: "{{Output}}/ai-analysis/path-planning-{{TargetSpace}}.json"
  - name: semanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-results-{{TargetSpace}}.json"
  - name: initialSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-early-{{TargetSpace}}.json"
  - name: knowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-post-vuln-{{TargetSpace}}.json"
  - name: initialKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-early-{{TargetSpace}}.json"
  - name: vectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-post-vuln-{{TargetSpace}}.json"
  - name: initialVectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-early-{{TargetSpace}}.json"
  - name: semanticHighlightsFile
    default: "{{Output}}/ai-analysis/semantic-highlights-{{TargetSpace}}.json"
  - name: initialSemanticHighlightsFile
    default: "{{Output}}/ai-analysis/semantic-highlights-early-{{TargetSpace}}.json"

  # 输入文件 - 扫描数据
  - name: subdomainFile
    default: "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"
  - name: resolvedFile
    default: "{{Output}}/probing/resolved-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"
  - name: nucleiCriticalFile
    default: "{{Output}}/vulnscan/nuclei-critical-{{TargetSpace}}.txt"
  - name: nucleiHighFile
    default: "{{Output}}/vulnscan/nuclei-high-{{TargetSpace}}.txt"
  - name: wafFile
    default: "{{Output}}/waf/waf-{{TargetSpace}}.txt"
  - name: priorityTargetsFile
    default: "{{Output}}/ai-analysis/priority-targets-{{TargetSpace}}.txt"
  - name: confirmedUrlsFile
    default: "{{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt"
  - name: entryPointsFile
    default: "{{Output}}/ai-analysis/entry-points-{{TargetSpace}}.txt"
  - name: bestPathTargetsFile
    default: "{{Output}}/ai-analysis/best-path-targets-{{TargetSpace}}.txt"
  - name: semanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-{{TargetSpace}}.txt"

  # 配置
  - name: enableIntelligentAnalysis
    type: bool
    default: true
  - name: enableMemory
    type: bool
    default: true

  # 扫描激进度阈值（可通过参数覆盖）
  - name: aggressiveThreshold
    type: integer
    default: 10
    description: "确认漏洞数量超过此值时切换到激进扫描模式"
  - name: balancedThreshold
    type: integer
    default: 5
    description: "确认漏洞数量超过此值时切换到均衡扫描模式"

steps:
  - name: prepare-analysis
    type: function
    pre_condition: "{{enableIntelligentAnalysis}}"
    log: "Preparing intelligent AI analysis coordinator"
    functions:
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'create_folder("{{Output}}/ai-analysis/validation")'
      - 'log_info("Starting AI analysis coordination for {{Target}}")'

  - name: collect-analysis-data
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/validation 2>/dev/null || true

      # 统计各项数据
      SUBDOMAINS=$(wc -l < {{subdomainFile}} 2>/dev/null || echo 0)
      HTTP_COUNT=$(wc -l < {{httpFile}} 2>/dev/null || echo 0)
      RESOLVED=$(wc -l < {{resolvedFile}} 2>/dev/null || echo 0)
      CRITICAL=$(wc -l < {{nucleiCriticalFile}} 2>/dev/null || echo 0)
      HIGH=$(wc -l < {{nucleiHighFile}} 2>/dev/null || echo 0)
      PRIORITY_COUNT=$(wc -l < {{priorityTargetsFile}} 2>/dev/null || echo 0)

      # 提取技术栈
      TECH_STACK=""
      if [ -f "{{fingerprintFile}}" ]; then
        TECH_STACK=$(cat {{fingerprintFile}} 2>/dev/null | jq -r '.tech // [] | .[]' 2>/dev/null | head -20 | tr '\n' ',' | sed 's/,$//')
      fi

      # 统计 WAF
      WAF_COUNT=$(wc -l < {{wafFile}} 2>/dev/null || echo 0)
      WAF_TYPES=""
      if [ -f "{{wafFile}}" ]; then
        WAF_TYPES=$(cut -d',' -f2 {{wafFile}} 2>/dev/null | sort -u | head -5 | tr '\n' ',' | sed 's/,$//')
      fi

      jq -n \
        --argjson subdomains "$SUBDOMAINS" \
        --argjson http_count "$HTTP_COUNT" \
        --argjson resolved "$RESOLVED" \
        --argjson critical "$CRITICAL" \
        --argjson high "$HIGH" \
        --argjson priority_targets "$PRIORITY_COUNT" \
        --argjson waf_count "$WAF_COUNT" \
        --arg waf_types "$WAF_TYPES" \
        --arg tech_stack "$TECH_STACK" \
        '{
          subdomains: $subdomains,
          http_count: $http_count,
          resolved: $resolved,
          critical: $critical,
          high: $high,
          priority_targets: $priority_targets,
          waf_count: $waf_count,
          waf_types: $waf_types,
          tech_stack: $tech_stack
        }' > {{Output}}/ai-analysis/intelligent-stats.json

      echo "[AI Coordinator] Stats: Critical=$CRITICAL, High=$HIGH, WAF=$WAF_COUNT"

  - name: aggregate-submodule-results
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      # 汇总文件路径
      VULN_FILE="{{vulnValidationFile}}"
      CHAIN_FILE="{{attackChainFile}}"
      PLAN_FILE="{{pathPlanningFile}}"
      SEMANTIC_FILE="{{semanticSearchFile}}"
      INITIAL_SEMANTIC_FILE="{{initialSemanticSearchFile}}"

      echo "[AI Coordinator] Checking submodule results..."

      # 检查并报告各模块状态
      check_file() {
        file="$1"
        name="$2"
        if [ -f "$file" ] && jq empty "$file" 2>/dev/null; then
          size=$(wc -c < "$file" 2>/dev/null || echo 0)
          if [ "$size" -gt 50 ]; then
            echo "[OK] [AI Coordinator] $name: available ($size bytes)"
            return 0
          fi
        fi
        echo "[WARN] [AI Coordinator] $name: not available or empty"
        return 1
      }

      # 聚合漏洞验证结果
      VULN_STATUS="not_available"
      CONFIRMED_VULNS=0
      FALSE_POSITIVES=0
      if check_file "$VULN_FILE" "Vuln validation"; then
        VULN_STATUS="available"
        # 兼容两种 schema:
        # - 非 ACP: .confirmed_real / .false_positives
        # - ACP:    .validation_summary.confirmed_real / .validation_summary.false_positives
        CONFIRMED_VULNS=$(jq -r '(.confirmed_real // .validation_summary.confirmed_real // 0)' "$VULN_FILE" 2>/dev/null || echo 0)
        FALSE_POSITIVES=$(jq -r '(.false_positives // .validation_summary.false_positives // 0)' "$VULN_FILE" 2>/dev/null || echo 0)
      fi

      # 聚合攻击链结果
      CHAIN_STATUS="not_available"
      TOTAL_CHAINS=0
      CRITICAL_CHAINS=0
      if check_file "$CHAIN_FILE" "Attack chain"; then
        CHAIN_STATUS="available"
        TOTAL_CHAINS=$(jq -r '.attack_chain_summary.total_chains // 0' "$CHAIN_FILE" 2>/dev/null || echo 0)
        CRITICAL_CHAINS=$(jq -r '.attack_chain_summary.critical_chains // 0' "$CHAIN_FILE" 2>/dev/null || echo 0)
      fi

      # 聚合路径规划结果
      PLAN_STATUS="not_available"
      TOTAL_PHASES=0
      if check_file "$PLAN_FILE" "Path planning"; then
        PLAN_STATUS="available"
        TOTAL_PHASES=$(jq -r '.plan_summary.total_phases // 0' "$PLAN_FILE" 2>/dev/null || echo 0)
      fi

      # 聚合语义搜索结果
      INITIAL_SEMANTIC_STATUS="not_available"
      INITIAL_SEMANTIC_RESULTS=0
      if check_file "$INITIAL_SEMANTIC_FILE" "Initial semantic search"; then
        INITIAL_SEMANTIC_STATUS="available"
        INITIAL_SEMANTIC_RESULTS=$(jq -r '.total_results // 0' "$INITIAL_SEMANTIC_FILE" 2>/dev/null || echo 0)
      fi

      INITIAL_KNOWLEDGE_STATUS="not_available"
      INITIAL_KNOWLEDGE_RESULTS=0
      if check_file "{{initialKnowledgeSearchFile}}" "Initial knowledge search"; then
        INITIAL_KNOWLEDGE_STATUS="available"
        INITIAL_KNOWLEDGE_RESULTS=$(jq -r 'length // 0' "{{initialKnowledgeSearchFile}}" 2>/dev/null || echo 0)
      fi

      INITIAL_VECTOR_KNOWLEDGE_STATUS="not_available"
      INITIAL_VECTOR_KNOWLEDGE_RESULTS=0
      if check_file "{{initialVectorKnowledgeSearchFile}}" "Initial vector knowledge search"; then
        INITIAL_VECTOR_KNOWLEDGE_STATUS="available"
        INITIAL_VECTOR_KNOWLEDGE_RESULTS=$(jq -r 'length // 0' "{{initialVectorKnowledgeSearchFile}}" 2>/dev/null || echo 0)
      fi

      SEMANTIC_STATUS="not_available"
      SEMANTIC_RESULTS=0
      if check_file "$SEMANTIC_FILE" "Semantic search"; then
        SEMANTIC_STATUS="available"
        SEMANTIC_RESULTS=$(jq -r '.total_results // 0' "$SEMANTIC_FILE" 2>/dev/null || echo 0)
      fi

      KNOWLEDGE_STATUS="not_available"
      KNOWLEDGE_RESULTS=0
      if check_file "{{knowledgeSearchFile}}" "Knowledge search"; then
        KNOWLEDGE_STATUS="available"
        KNOWLEDGE_RESULTS=$(jq -r 'length // 0' "{{knowledgeSearchFile}}" 2>/dev/null || echo 0)
      fi

      VECTOR_KNOWLEDGE_STATUS="not_available"
      VECTOR_KNOWLEDGE_RESULTS=0
      if check_file "{{vectorKnowledgeSearchFile}}" "Vector knowledge search"; then
        VECTOR_KNOWLEDGE_STATUS="available"
        VECTOR_KNOWLEDGE_RESULTS=$(jq -r 'length // 0' "{{vectorKnowledgeSearchFile}}" 2>/dev/null || echo 0)
      fi

      # 检查是否有任何模块产生了有效结果
      ANY_DATA="false"
      if [ "$VULN_STATUS" = "available" ] || [ "$CHAIN_STATUS" = "available" ] || [ "$PLAN_STATUS" = "available" ] || [ "$SEMANTIC_STATUS" = "available" ] || [ "$INITIAL_SEMANTIC_STATUS" = "available" ] || [ "$KNOWLEDGE_STATUS" = "available" ] || [ "$VECTOR_KNOWLEDGE_STATUS" = "available" ] || [ "$INITIAL_KNOWLEDGE_STATUS" = "available" ] || [ "$INITIAL_VECTOR_KNOWLEDGE_STATUS" = "available" ]; then
        ANY_DATA="true"
      fi

      echo "[INFO] [AI Coordinator] Any data available: $ANY_DATA"

      # 创建聚合结果文件
      jq -n \
        --arg aggregation_timestamp "$(date -Iseconds)" \
        --argjson any_data_available "$ANY_DATA" \
        --arg vuln_status "$VULN_STATUS" \
        --argjson confirmed_vulns "$CONFIRMED_VULNS" \
        --argjson false_positives "$FALSE_POSITIVES" \
        --arg chain_status "$CHAIN_STATUS" \
        --argjson total_chains "$TOTAL_CHAINS" \
        --argjson critical_chains "$CRITICAL_CHAINS" \
        --arg plan_status "$PLAN_STATUS" \
        --argjson total_phases "$TOTAL_PHASES" \
        --arg initial_semantic_status "$INITIAL_SEMANTIC_STATUS" \
        --argjson initial_semantic_results "$INITIAL_SEMANTIC_RESULTS" \
        --arg initial_knowledge_status "$INITIAL_KNOWLEDGE_STATUS" \
        --argjson initial_knowledge_results "$INITIAL_KNOWLEDGE_RESULTS" \
        --arg initial_vector_knowledge_status "$INITIAL_VECTOR_KNOWLEDGE_STATUS" \
        --argjson initial_vector_knowledge_results "$INITIAL_VECTOR_KNOWLEDGE_RESULTS" \
        --arg semantic_status "$SEMANTIC_STATUS" \
        --argjson semantic_results "$SEMANTIC_RESULTS" \
        --arg knowledge_status "$KNOWLEDGE_STATUS" \
        --argjson knowledge_results "$KNOWLEDGE_RESULTS" \
        --arg vector_knowledge_status "$VECTOR_KNOWLEDGE_STATUS" \
        --argjson vector_knowledge_results "$VECTOR_KNOWLEDGE_RESULTS" \
        '{
          aggregation_timestamp: $aggregation_timestamp,
          any_data_available: $any_data_available,
          components: {
            vuln_validation: {
              status: $vuln_status,
              confirmed_vulns: $confirmed_vulns,
              false_positives: $false_positives
            },
            attack_chain: {
              status: $chain_status,
              total_chains: $total_chains,
              critical_chains: $critical_chains
            },
            path_planning: {
              status: $plan_status,
              total_phases: $total_phases
            },
            semantic_search_initial: {
              status: $initial_semantic_status,
              results: $initial_semantic_results
            },
            knowledge_search_initial: {
              status: $initial_knowledge_status,
              results: $initial_knowledge_results
            },
            vector_knowledge_search_initial: {
              status: $initial_vector_knowledge_status,
              results: $initial_vector_knowledge_results
            },
            semantic_search: {
              status: $semantic_status,
              results: $semantic_results
            },
            knowledge_search: {
              status: $knowledge_status,
              results: $knowledge_results
            },
            vector_knowledge_search: {
              status: $vector_knowledge_status,
              results: $vector_knowledge_results
            }
          }
        }' > {{Output}}/ai-analysis/aggregated-results.json

      echo "[AI Coordinator] Results aggregation complete"
      echo "[AI Coordinator] Summary: Vuln=$CONFIRMED_VULNS confirmed, Chains=$TOTAL_CHAINS, Phases=$TOTAL_PHASES"

  - name: generate-unified-config
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      # 基于聚合结果生成 AI 决策配置
      STATS_FILE="{{Output}}/ai-analysis/intelligent-stats.json"
      VULN_FILE="{{vulnValidationFile}}"
      AGG_FILE="{{Output}}/ai-analysis/aggregated-results.json"

      # 默认值
      SEVERITY="critical,high"
      THREADS=10
      RATE_LIMIT=30
      TIMEOUT="6h"
      WAF_NEEDED="false"
      WAF_TECH=""
      WAF_DELAY="1s"
      REASONING="AI-generated from coordinator"

      # 从 stats 文件获取基础信息
      if [ -f "$STATS_FILE" ]; then
        WAF_TYPES=$(jq -r '.waf_types // ""' "$STATS_FILE" 2>/dev/null || echo "")
        if [ -n "$WAF_TYPES" ]; then
          WAF_NEEDED="true"
          WAF_TECH="$WAF_TYPES"
        fi
      fi

      # 从漏洞验证结果中提取配置
      if [ -f "$VULN_FILE" ] && jq empty "$VULN_FILE" 2>/dev/null; then
        # 兼容两种 schema:
        # - 非 ACP: .risk_level / .confirmed_real
        # - ACP:    .validation_summary.risk_level / .validation_summary.confirmed_real
        RISK=$(jq -r '(.risk_level // .validation_summary.risk_level // "中")' "$VULN_FILE" 2>/dev/null)
        CONFIRMED=$(jq -r '(.confirmed_real // .validation_summary.confirmed_real // 0)' "$VULN_FILE" 2>/dev/null)

        # 根据确认漏洞数量调整配置（阈值可通过参数覆盖）
        AGGRESSIVE_THRESHOLD={{aggressiveThreshold}}
        BALANCED_THRESHOLD={{balancedThreshold}}
        if [ "$CONFIRMED" -gt "$AGGRESSIVE_THRESHOLD" ]; then
          SEVERITY="critical,high,medium"
          THREADS=15
          RATE_LIMIT=50
          TIMEOUT="8h"
          REASONING="High confirmed findings ($CONFIRMED), aggressive scan"
        elif [ "$CONFIRMED" -gt "$BALANCED_THRESHOLD" ]; then
          SEVERITY="critical,high"
          THREADS=12
          RATE_LIMIT=40
          TIMEOUT="6h"
          REASONING="Moderate confirmed findings ($CONFIRMED), balanced scan"
        else
          REASONING="Low confirmed findings ($CONFIRMED), focused scan"
        fi

        # 更新 reasoning 包含风险等级
        if [ "$RISK" != "null" ] && [ -n "$RISK" ]; then
          REASONING="$REASONING (risk: $RISK)"
        fi
      fi

      # 从语义搜索结果获取高优先级发现
      TOTAL_SEMANTIC_CRITICAL=0
      if [ -f "{{initialSemanticSearchFile}}" ] && jq empty "{{initialSemanticSearchFile}}" 2>/dev/null; then
        EARLY_SEMANTIC_CRITICAL=$(jq -r '.highlights.critical_findings | length // 0' "{{initialSemanticSearchFile}}" 2>/dev/null || echo 0)
        TOTAL_SEMANTIC_CRITICAL=$((TOTAL_SEMANTIC_CRITICAL + EARLY_SEMANTIC_CRITICAL))
      fi

      SEMANTIC_FILE="{{semanticSearchFile}}"
      if [ -f "$SEMANTIC_FILE" ] && jq empty "$SEMANTIC_FILE" 2>/dev/null; then
        SEMANTIC_CRITICAL=$(jq -r '.highlights.critical_findings | length // 0' "$SEMANTIC_FILE" 2>/dev/null || echo 0)
        TOTAL_SEMANTIC_CRITICAL=$((TOTAL_SEMANTIC_CRITICAL + SEMANTIC_CRITICAL))
      fi

      if [ "$TOTAL_SEMANTIC_CRITICAL" -gt 0 ]; then
        REASONING="$REASONING + $TOTAL_SEMANTIC_CRITICAL semantic highlights"
      fi

      TOTAL_KNOWLEDGE_HITS=0
      if [ -f "{{initialKnowledgeSearchFile}}" ] && jq empty "{{initialKnowledgeSearchFile}}" 2>/dev/null; then
        INITIAL_KNOWLEDGE_HITS=$(jq -r 'length // 0' "{{initialKnowledgeSearchFile}}" 2>/dev/null || echo 0)
        TOTAL_KNOWLEDGE_HITS=$((TOTAL_KNOWLEDGE_HITS + INITIAL_KNOWLEDGE_HITS))
      fi
      if [ -f "{{knowledgeSearchFile}}" ] && jq empty "{{knowledgeSearchFile}}" 2>/dev/null; then
        KNOWLEDGE_HITS=$(jq -r 'length // 0' "{{knowledgeSearchFile}}" 2>/dev/null || echo 0)
        TOTAL_KNOWLEDGE_HITS=$((TOTAL_KNOWLEDGE_HITS + KNOWLEDGE_HITS))
      fi
      if [ -f "{{initialVectorKnowledgeSearchFile}}" ] && jq empty "{{initialVectorKnowledgeSearchFile}}" 2>/dev/null; then
        INITIAL_VECTOR_KNOWLEDGE_HITS=$(jq -r 'length // 0' "{{initialVectorKnowledgeSearchFile}}" 2>/dev/null || echo 0)
        TOTAL_KNOWLEDGE_HITS=$((TOTAL_KNOWLEDGE_HITS + INITIAL_VECTOR_KNOWLEDGE_HITS))
      fi
      if [ -f "{{vectorKnowledgeSearchFile}}" ] && jq empty "{{vectorKnowledgeSearchFile}}" 2>/dev/null; then
        VECTOR_KNOWLEDGE_HITS=$(jq -r 'length // 0' "{{vectorKnowledgeSearchFile}}" 2>/dev/null || echo 0)
        TOTAL_KNOWLEDGE_HITS=$((TOTAL_KNOWLEDGE_HITS + VECTOR_KNOWLEDGE_HITS))
      fi

      if [ "$TOTAL_KNOWLEDGE_HITS" -gt 0 ]; then
        REASONING="$REASONING + $TOTAL_KNOWLEDGE_HITS knowledge context hits"
      fi

      FOCUS_TMP="{{Output}}/ai-analysis/.focus-areas-{{TargetSpace}}.txt"
      RESCAN_TMP="{{Output}}/ai-analysis/.rescan-targets-{{TargetSpace}}.txt"
      : > "$FOCUS_TMP"
      : > "$RESCAN_TMP"

      if [ -f "{{priorityTargetsFile}}" ]; then
        head -15 "{{priorityTargetsFile}}" >> "$FOCUS_TMP" 2>/dev/null || true
        head -20 "{{priorityTargetsFile}}" >> "$RESCAN_TMP" 2>/dev/null || true
      fi
      if [ -f "{{confirmedUrlsFile}}" ]; then
        cat "{{confirmedUrlsFile}}" >> "$RESCAN_TMP" 2>/dev/null || true
      fi
      if [ -f "{{entryPointsFile}}" ]; then
        head -15 "{{entryPointsFile}}" >> "$FOCUS_TMP" 2>/dev/null || true
        cat "{{entryPointsFile}}" >> "$RESCAN_TMP" 2>/dev/null || true
      fi
      if [ -f "{{bestPathTargetsFile}}" ]; then
        head -15 "{{bestPathTargetsFile}}" >> "$FOCUS_TMP" 2>/dev/null || true
        head -20 "{{bestPathTargetsFile}}" >> "$RESCAN_TMP" 2>/dev/null || true
      fi
      if [ -f "{{semanticPriorityTargetsFile}}" ]; then
        head -15 "{{semanticPriorityTargetsFile}}" >> "$FOCUS_TMP" 2>/dev/null || true
        head -20 "{{semanticPriorityTargetsFile}}" >> "$RESCAN_TMP" 2>/dev/null || true
      fi

      awk 'NF && !seen[$0]++' "$FOCUS_TMP" > "$FOCUS_TMP.tmp" && mv "$FOCUS_TMP.tmp" "$FOCUS_TMP"
      awk 'NF && !seen[$0]++' "$RESCAN_TMP" > "$RESCAN_TMP.tmp" && mv "$RESCAN_TMP.tmp" "$RESCAN_TMP"

      FOCUS_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' "$FOCUS_TMP" 2>/dev/null || echo '[]')
      RESCAN_TARGETS_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' "$RESCAN_TMP" 2>/dev/null || echo '[]')
      FOCUS_COUNT=$(wc -l < "$FOCUS_TMP" 2>/dev/null || echo 0)
      RESCAN_COUNT=$(wc -l < "$RESCAN_TMP" 2>/dev/null || echo 0)

      if [ "$FOCUS_COUNT" -gt 0 ]; then
        REASONING="$REASONING + $FOCUS_COUNT focus areas"
      fi
      if [ "$RESCAN_COUNT" -gt 0 ]; then
        REASONING="$REASONING + $RESCAN_COUNT retest targets"
      fi

      # 生成 AI 决策 JSON 文件 - 与 vuln-suite.yaml 读取路径一致
      jq -n \
        --arg nuclei_severity "$SEVERITY" \
        --argjson suggested_threads "$THREADS" \
        --argjson suggested_rate_limit "$RATE_LIMIT" \
        --arg recommended_timeout "$TIMEOUT" \
        --argjson waf_bypass_needed "$WAF_NEEDED" \
        --arg waf_bypass_techniques "$WAF_TECH" \
        --arg waf_recommended_delay "$WAF_DELAY" \
        --argjson focus_areas "$FOCUS_JSON" \
        --argjson rescan_targets "$RESCAN_TARGETS_JSON" \
        --argjson knowledge_context_hits "$TOTAL_KNOWLEDGE_HITS" \
        --arg reasoning "$REASONING" \
        '{
          nuclei_severity: $nuclei_severity,
          suggested_threads: $suggested_threads,
          suggested_rate_limit: $suggested_rate_limit,
          recommended_timeout: $recommended_timeout,
          waf_bypass_needed: $waf_bypass_needed,
          waf_bypass_techniques: $waf_bypass_techniques,
          waf_recommended_delay: $waf_recommended_delay,
          enable_ssrf_scan: true,
          enable_ssti_scan: true,
          enable_sqli_scan: true,
          enable_lfi_scan: true,
          enable_takeover_scan: true,
          focus_areas: $focus_areas,
          priority_targets: $focus_areas,
          rescan_targets: $rescan_targets,
          decision_inputs: {
            knowledge_context_hits: $knowledge_context_hits,
            focus_area_count: ($focus_areas | length),
            rescan_target_count: ($rescan_targets | length)
          },
          reasoning: $reasoning
        }' > {{aiDecisionFile}}

      # 生成 AI 变量 YAML 文件
      {
        printf '# AI Decision Variables\n'
        printf '# Generated by ai-intelligent-analysis coordinator\n'
        printf '# Target: {{Target}}\n'
        printf '# Generated: %s\n' "$(date)"
        printf '\n'
        printf 'nucleiSeverity: %s\n' "$(printf '%s' "$SEVERITY" | sed 's/["\\]/\\&/g')"
        printf 'nucleiThreads: %s\n' "$THREADS"
        printf 'nucleiRateLimit: %s\n' "$RATE_LIMIT"
        printf 'nucleiTimeout: %s\n' "$(printf '%s' "$TIMEOUT" | sed 's/["\\]/\\&/g')"
        printf 'enableWafAwareScan: %s\n' "$WAF_NEEDED"
        printf 'wafBypassTechniques: %s\n' "$(printf '%s' "$WAF_TECH" | sed 's/["\\]/\\&/g')"
        printf 'wafRecommendedDelay: %s\n' "$(printf '%s' "$WAF_DELAY" | sed 's/["\\]/\\&/g')"
        printf 'enableSsrfScan: true\n'
        printf 'enableSstiScan: true\n'
        printf 'enableSqliScan: true\n'
        printf 'enableLfiScan: true\n'
        printf 'enableTakeoverScan: true\n'
      } > {{aiVarsFile}}

      echo "[AI Decision] Config saved to {{aiDecisionFile}}"
      echo "[AI Decision] Variables saved to {{aiVarsFile}}"
      echo "[AI Decision] severity=$SEVERITY, threads=$THREADS, rate_limit=$RATE_LIMIT, waf_bypass=$WAF_NEEDED"

  - name: generate-comprehensive-report
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
      AGG_FILE="{{Output}}/ai-analysis/aggregated-results.json"

      # 构建报告
      cat > {{analysisOutputMd}} << 'EOF'
      # AI 智能安全分析报告

      ## 扫描目标
      - **目标**: TARGET_PLACEHOLDER
      - **时间**: TIMESTAMP_PLACEHOLDER
      - **分析类型**: 漏洞验证 + 攻击链分析 + 路径规划 + 语义搜索

      ---

      ## 分析组件状态
      EOF

      sed -i "s|TARGET_PLACEHOLDER|{{Target}}|g" {{analysisOutputMd}}
      sed -i "s|TIMESTAMP_PLACEHOLDER|$TIMESTAMP|g" {{analysisOutputMd}}

      # 添加各组件状态
      if [ -f "$AGG_FILE" ]; then
        jq -r '.components | "### 漏洞验证\n- 状态: \(.vuln_validation.status)\n- 确认漏洞: \(.vuln_validation.confirmed_vulns)\n- 假阳性: \(.vuln_validation.false_positives)\n\n### 攻击链分析\n- 状态: \(.attack_chain.status)\n- 总攻击链: \(.attack_chain.total_chains)\n- 关键攻击链: \(.attack_chain.critical_chains)\n\n### 路径规划\n- 状态: \(.path_planning.status)\n- 规划阶段: \(.path_planning.total_phases)\n\n### 语义搜索\n- 状态: \(.semantic_search.status)\n- 搜索结果: \(.semantic_search.results)\n\n### 知识库上下文\n- 初始知识命中: \(.knowledge_search_initial.results)\n- 初始向量知识命中: \(.vector_knowledge_search_initial.results)\n- 漏洞后知识命中: \(.knowledge_search.results)\n- 漏洞后向量知识命中: \(.vector_knowledge_search.results)\n"' "$AGG_FILE" 2>/dev/null >> {{analysisOutputMd}} || true
      fi

      # 添加 AI 决策配置
      echo "" >> {{analysisOutputMd}}
      echo "---" >> {{analysisOutputMd}}
      echo "" >> {{analysisOutputMd}}
      echo "## AI 决策配置" >> {{analysisOutputMd}}
      echo "" >> {{analysisOutputMd}}
      echo "本次分析生成的 AI 决策配置已保存至 \`ai-decision-{{TargetSpace}}.json\`，漏洞扫描模块将自动加载并应用此配置。" >> {{analysisOutputMd}}

      echo "" >> {{analysisOutputMd}}
      echo "---" >> {{analysisOutputMd}}
      echo "" >> {{analysisOutputMd}}
      echo "*此报告由 AI 智能分析协调器模块自动生成*" >> {{analysisOutputMd}}

      echo "[AI Coordinator] Comprehensive report saved"

  - name: save-memory-context
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}} && {{enableMemory}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      STATS_FILE="{{Output}}/ai-analysis/intelligent-stats.json"
      AGG_FILE="{{Output}}/ai-analysis/aggregated-results.json"
      RISK="中"
      TOTAL=0

      if [ -f "$STATS_FILE" ]; then
        CRITICAL=$(jq -r '.critical // 0' "$STATS_FILE" 2>/dev/null || echo 0)
        HIGH=$(jq -r '.high // 0' "$STATS_FILE" 2>/dev/null || echo 0)
        TOTAL=$((CRITICAL + HIGH))
        if [ "$CRITICAL" -gt 5 ]; then
          RISK="高"
        elif [ "$CRITICAL" -eq 0 ] && [ "$HIGH" -lt 5 ]; then
          RISK="低"
        fi
      fi

      # 从聚合结果获取更多信息
      CONFIRMED=0
      CHAINS=0
      if [ -f "$AGG_FILE" ]; then
        CONFIRMED=$(jq -r '.components.vuln_validation.confirmed_vulns // 0' "$AGG_FILE" 2>/dev/null || echo 0)
        CHAINS=$(jq -r '.components.attack_chain.total_chains // 0' "$AGG_FILE" 2>/dev/null || echo 0)
      fi

      cat > {{memoryOutput}} << EOF
      {
        "target": "{{Target}}",
        "timestamp": "$(date -Iseconds)",
        "phase": "intelligent-analysis",
        "analysis_type": "coordinator-aggregated",
        "risk_level": "$RISK",
        "total_findings": $TOTAL,
        "confirmed_findings": $CONFIRMED,
        "attack_chains": $CHAINS,
        "components_completed": ["vuln_validation", "attack_chain", "path_planning", "semantic_search"],
        "next_phases": ["vuln-suite", "code-review", "report"]
      }
      EOF

      echo "[AI Memory] Context saved to {{memoryOutput}}"

  - name: generate-ai-status-report
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      REPORT_FILE="{{Output}}/ai-analysis/ai-execution-status.json"
      MARKDOWN_FILE="{{Output}}/ai-analysis/ai-execution-status.md"

      echo "[AI Status] Generating execution status report..."

      # 收集各模块状态
      check_module() {
        name="$1"
        file="$2"
        size=0
        status="not_run"
        error=""

        if [ -f "$file" ]; then
          size=$(wc -c < "$file" 2>/dev/null || echo 0)
          if [ "$size" -gt 50 ]; then
            if jq empty "$file" 2>/dev/null; then
              status="completed"
              error=$(jq -r '.error // "none"' "$file" 2>/dev/null)
              if [ "$error" = "none" ] || [ -z "$error" ]; then
                error=""
              fi
            else
              status="invalid_json"
              error="JSON validation failed"
            fi
          else
            status="empty_output"
            error="Output too small"
          fi
        else
          status="file_not_found"
          error="Module output file not found"
        fi

        echo "$name|$status|$size|$error"
      }

      parse_result() {
        result="$1"
        field="$2"
        case "$field" in
          name) printf '%s\n' "$result" | cut -d'|' -f1 ;;
          status) printf '%s\n' "$result" | cut -d'|' -f2 ;;
          size) printf '%s\n' "$result" | cut -d'|' -f3 ;;
          error) printf '%s\n' "$result" | cut -d'|' -f4- ;;
          *) return 1 ;;
        esac
      }

      # 检查各模块
      VULN_RESULT=$(check_module "vuln-validation" "{{vulnValidationFile}}")
      CHAIN_RESULT=$(check_module "attack-chain" "{{attackChainFile}}")
      PLAN_RESULT=$(check_module "path-planning" "{{pathPlanningFile}}")
      SEMANTIC_RESULT=$(check_module "semantic-search" "{{semanticSearchFile}}")

      VULN_STATUS=$(parse_result "$VULN_RESULT" status)
      VULN_SIZE=$(parse_result "$VULN_RESULT" size)
      VULN_ERROR=$(parse_result "$VULN_RESULT" error)
      CHAIN_STATUS=$(parse_result "$CHAIN_RESULT" status)
      CHAIN_SIZE=$(parse_result "$CHAIN_RESULT" size)
      CHAIN_ERROR=$(parse_result "$CHAIN_RESULT" error)
      PLAN_STATUS=$(parse_result "$PLAN_RESULT" status)
      PLAN_SIZE=$(parse_result "$PLAN_RESULT" size)
      PLAN_ERROR=$(parse_result "$PLAN_RESULT" error)
      SEMANTIC_STATUS=$(parse_result "$SEMANTIC_RESULT" status)
      SEMANTIC_SIZE=$(parse_result "$SEMANTIC_RESULT" size)
      SEMANTIC_ERROR=$(parse_result "$SEMANTIC_RESULT" error)

      COMPLETED_COUNT=0
      FAILED_COUNT=0
      SKIPPED_COUNT=0
      OVERALL_STATUS="completed"
      RECOMMENDATIONS='[]'

      for status in "$VULN_STATUS" "$CHAIN_STATUS" "$PLAN_STATUS" "$SEMANTIC_STATUS"; do
        case "$status" in
          completed) COMPLETED_COUNT=$((COMPLETED_COUNT + 1)) ;;
          invalid_json)
            FAILED_COUNT=$((FAILED_COUNT + 1))
            OVERALL_STATUS="partial"
            ;;
          empty_output|file_not_found|not_run)
            SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
            [ "$OVERALL_STATUS" = "completed" ] && OVERALL_STATUS="partial"
            ;;
          *)
            FAILED_COUNT=$((FAILED_COUNT + 1))
            OVERALL_STATUS="partial"
            ;;
        esac
      done

      if [ "$FAILED_COUNT" -gt 0 ] && [ "$SKIPPED_COUNT" -gt 0 ]; then
        RECOMMENDATIONS='["Check module outputs and logs for failed steps","Review upstream scan coverage because some modules produced no usable artifacts"]'
      elif [ "$FAILED_COUNT" -gt 0 ]; then
        RECOMMENDATIONS='["Check module outputs and logs for failed steps"]'
      elif [ "$SKIPPED_COUNT" -gt 2 ]; then
        RECOMMENDATIONS='["Review upstream scan coverage because multiple modules produced no usable artifacts"]'
      fi

      jq -n \
        --arg generated "$(date -Iseconds)" \
        --arg target "{{Target}}" \
        --arg overall_status "$OVERALL_STATUS" \
        --arg vuln_status "$VULN_STATUS" \
        --argjson vuln_size "$VULN_SIZE" \
        --arg vuln_error "$VULN_ERROR" \
        --arg chain_status "$CHAIN_STATUS" \
        --argjson chain_size "$CHAIN_SIZE" \
        --arg chain_error "$CHAIN_ERROR" \
        --arg plan_status "$PLAN_STATUS" \
        --argjson plan_size "$PLAN_SIZE" \
        --arg plan_error "$PLAN_ERROR" \
        --arg semantic_status "$SEMANTIC_STATUS" \
        --argjson semantic_size "$SEMANTIC_SIZE" \
        --arg semantic_error "$SEMANTIC_ERROR" \
        --argjson recommendations "$RECOMMENDATIONS" \
        '{
          report_generated: $generated,
          target: $target,
          overall_status: $overall_status,
          modules: {
            "vuln-validation": {status: $vuln_status, size: $vuln_size, error: $vuln_error},
            "attack-chain": {status: $chain_status, size: $chain_size, error: $chain_error},
            "path-planning": {status: $plan_status, size: $plan_size, error: $plan_error},
            "semantic-search": {status: $semantic_status, size: $semantic_size, error: $semantic_error}
          },
          recommendations: $recommendations
        }' > "$REPORT_FILE"

      # 生成 Markdown 报告
      generate_markdown_report() {
        cat > "$MARKDOWN_FILE" << 'EOF'
      # AI 模块执行状态报告
      
      ## 目标
      TARGET_PLACEHOLDER
      
      ## 生成时间
      TIMESTAMP_PLACEHOLDER
      
      ---
      
      ## 模块执行状态
      
      | 模块 | 状态 | 大小 | 备注 |
      |------|------|------|------|
      
      ---
      
      ## 执行摘要
      
      ---
      
      ## 建议
      
      EOF

        sed -i "s|TARGET_PLACEHOLDER|{{Target}}|g" "$MARKDOWN_FILE"
        sed -i "s|TIMESTAMP_PLACEHOLDER|$(date '+%Y-%m-%d %H:%M:%S')|g" "$MARKDOWN_FILE"

        # 添加模块状态表格
        for result in "$VULN_RESULT" "$CHAIN_RESULT" "$PLAN_RESULT" "$SEMANTIC_RESULT"; do
          name=$(parse_result "$result" name)
          status=$(parse_result "$result" status)
          size=$(parse_result "$result" size)
          error=$(parse_result "$result" error)
          status_icon=""
          case $status in
            completed) status_icon="[OK]" ;;
            failed) status_icon="[FAIL]" ;;
            invalid_json) status_icon="[WARN]" ;;
            empty_output) status_icon="[EMPTY]" ;;
            not_run) status_icon="[SKIP]" ;;
            *) status_icon="[?]" ;;
          esac
          echo "| $name | $status_icon $status | $size bytes | $error |" >> "$MARKDOWN_FILE"
        done

        # 添加执行摘要
        echo "" >> "$MARKDOWN_FILE"
        echo "**执行摘要**: $COMPLETED_COUNT 成功, $FAILED_COUNT 失败, $SKIPPED_COUNT 跳过/空" >> "$MARKDOWN_FILE"
        echo "" >> "$MARKDOWN_FILE"

        # 添加建议
        if [ "$FAILED_COUNT" -gt 0 ]; then
          echo "**建议**: 部分模块执行失败，建议检查日志文件获取详细信息。" >> "$MARKDOWN_FILE"
        fi
        if [ "$SKIPPED_COUNT" -gt 2 ]; then
          echo "**注意**: 多个模块未产生有效输出，可能是前置扫描未完成或数据不足。" >> "$MARKDOWN_FILE"
        fi
      }

      generate_markdown_report

      echo "[AI Status] Report saved to $REPORT_FILE"
      echo "[AI Status] Markdown report saved to $MARKDOWN_FILE"

      # 输出汇总信息
      echo ""
      echo "========== AI 执行状态汇总 =========="
      echo "目标: {{Target}}"
      echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
      echo ""
      echo "模块状态:"
      for result in "$VULN_RESULT" "$CHAIN_RESULT" "$PLAN_RESULT" "$SEMANTIC_RESULT"; do
        name=$(parse_result "$result" name)
        status=$(parse_result "$result" status)
        size=$(parse_result "$result" size)
        printf "  %-20s %-15s (%s bytes)\n" "$name" "$status" "$size"
      done
      echo "=========================================="

  - name: log-analysis-complete
    type: function
    pre_condition: "{{enableIntelligentAnalysis}}"
    functions:
      - 'log_info("AI Intelligent analysis coordination completed for {{Target}}")'

# =============================================================================
# AI 智能分析协调器模块
# =============================================================================
# 功能：
# - 读取三个子模块的执行结果
# - 聚合并分析结果
# - 生成统一的 AI 决策配置供 vuln-suite 使用
# - 生成综合分析报告
# =============================================================================

kind: module
name: ai-intelligent-analysis
description: AI analysis coordinator - aggregates results from vuln validation, attack chain, and path planning

params:
  # 文件路径
  - name: analysisOutputJson
    default: "{{Output}}/ai-analysis/intelligent-analysis-{{TargetSpace}}.json"
  - name: analysisOutputMd
    default: "{{Output}}/ai-analysis/intelligent-analysis-{{TargetSpace}}.md"
  - name: memoryOutput
    default: "{{Output}}/ai-analysis/ai-memory-{{TargetSpace}}.json"
  
  # AI 决策配置 - 必须与 vuln-suite.yaml 中的读取路径一致
  - name: aiDecisionFile
    default: "{{Output}}/ai-analysis/ai-decision-{{TargetSpace}}.json"
  - name: aiVarsFile
    default: "{{Output}}/ai-analysis/ai-vars.yaml"

  # 输入文件 - 子模块输出
  - name: vulnValidationFile
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: attackChainFile
    default: "{{Output}}/ai-analysis/attack-chain-{{TargetSpace}}.json"
  - name: pathPlanningFile
    default: "{{Output}}/ai-analysis/path-planning-{{TargetSpace}}.json"
  - name: semanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-results-{{TargetSpace}}.json"
  - name: initialSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-early-{{TargetSpace}}.json"
  - name: knowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-post-vuln-{{TargetSpace}}.json"
  - name: initialKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/knowledge-search-results-early-{{TargetSpace}}.json"
  - name: vectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-post-vuln-{{TargetSpace}}.json"
  - name: initialVectorKnowledgeSearchFile
    default: "{{Output}}/ai-analysis/vector-kb-search-results-early-{{TargetSpace}}.json"
  - name: semanticHighlightsFile
    default: "{{Output}}/ai-analysis/semantic-highlights-{{TargetSpace}}.json"
  - name: initialSemanticHighlightsFile
    default: "{{Output}}/ai-analysis/semantic-highlights-early-{{TargetSpace}}.json"
  - name: passiveWebRiskSummaryFile
    default: "{{Output}}/passive-web-risk/passive-web-risk-summary-{{TargetSpace}}.md"
  - name: sourceMapExposureFile
    default: "{{Output}}/passive-web-risk/source-map-exposure-{{TargetSpace}}.txt"
  - name: apiSurfaceFile
    default: "{{Output}}/passive-web-risk/api-surface-{{TargetSpace}}.txt"
  - name: corsCacheHeuristicsFile
    default: "{{Output}}/passive-web-risk/cors-cache-heuristics-{{TargetSpace}}.txt"
  - name: cloudLeakFile
    default: "{{Output}}/passive-web-risk/cloud-storage-leaks-{{TargetSpace}}.txt"

  # 输入文件 - 扫描数据
  - name: subdomainFile
    default: "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"
  - name: resolvedFile
    default: "{{Output}}/probing/resolved-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"
  - name: nucleiCriticalFile
    default: "{{Output}}/vulnscan/nuclei-critical-{{TargetSpace}}.txt"
  - name: nucleiHighFile
    default: "{{Output}}/vulnscan/nuclei-high-{{TargetSpace}}.txt"
  - name: wafFile
    default: "{{Output}}/waf/waf-{{TargetSpace}}.txt"
  - name: priorityTargetsFile
    default: "{{Output}}/ai-analysis/priority-targets-{{TargetSpace}}.txt"
  - name: confirmedUrlsFile
    default: "{{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt"
  - name: entryPointsFile
    default: "{{Output}}/ai-analysis/entry-points-{{TargetSpace}}.txt"
  - name: bestPathTargetsFile
    default: "{{Output}}/ai-analysis/best-path-targets-{{TargetSpace}}.txt"
  - name: semanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-{{TargetSpace}}.txt"
  - name: fallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"
  - name: secondFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
  - name: thirdFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-early-{{TargetSpace}}.txt"
  - name: previousFollowupDecisionFile
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"
  - name: previous_followup_targets
    default: ""
  - name: previous_followup_priority_targets
    default: ""
  - name: previous_followup_focus_areas
    default: ""
  - name: previous_followup_manual_first_targets
    default: ""
  - name: previous_followup_high_confidence_targets
    default: ""
  - name: previous_followup_reasoning
    default: ""
  - name: previous_followup_scan_profile
    default: ""
  - name: previous_followup_severity
    default: ""
  - name: previous_followup_priority_mode
    default: ""
  - name: previous_followup_confidence_level
    default: ""
  - name: previous_followup_next_phase
    default: ""
  - name: previous_followup_reuse_sources
    default: ""
  - name: previous_followup_resume_suppressed_actions
    default: ""
  - name: previous_followup_reused_actions
    default: ""
  - name: previous_followup_skipped_duplicate_actions
    default: ""
  - name: previous_followup_manual_followup_needed
    default: ""
  - name: previous_followup_campaign_followup_recommended
    default: ""
  - name: previous_followup_queue_followup_effective
    default: ""
  - name: previous_followup_escalation_score
    default: ""
  - name: previous_followup_campaign_create_status
    default: ""
  - name: previous_followup_campaign_create_id
    default: ""
  - name: previous_followup_campaign_create_queued_runs
    default: ""

  # 配置
  - name: enableIntelligentAnalysis
    type: bool
    default: true
  - name: enableMemory
    type: bool
    default: true

  # 扫描激进度阈值（可通过参数覆盖）
  - name: aggressiveThreshold
    type: integer
    default: 10
    description: "确认漏洞数量超过此值时切换到激进扫描模式"
  - name: balancedThreshold
    type: integer
    default: 5
    description: "确认漏洞数量超过此值时切换到均衡扫描模式"

steps:
  - name: prepare-analysis
    type: function
    pre_condition: "{{enableIntelligentAnalysis}}"
    log: "Preparing intelligent AI analysis coordinator"
    functions:
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'create_folder("{{Output}}/ai-analysis/validation")'
      - 'log_info("Starting AI analysis coordination for {{Target}}")'

  - name: collect-analysis-data
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/validation 2>/dev/null || true

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      # 统计各项数据
      SUBDOMAINS=$(count_lines "{{subdomainFile}}")
      HTTP_COUNT=$(count_lines "{{httpFile}}")
      RESOLVED=$(count_lines "{{resolvedFile}}")
      CRITICAL=$(count_lines "{{nucleiCriticalFile}}")
      HIGH=$(count_lines "{{nucleiHighFile}}")
      PRIORITY_COUNT=$(count_lines "{{priorityTargetsFile}}")
      SOURCEMAP_EXPOSURES=$(count_lines "{{sourceMapExposureFile}}")
      API_SURFACE=$(count_lines "{{apiSurfaceFile}}")
      CORS_CACHE=$(count_lines "{{corsCacheHeuristicsFile}}")
      CLOUD_LEAKS=$(count_lines "{{cloudLeakFile}}")
      PASSIVE_WEB_RISK_SIGNALS=$((SOURCEMAP_EXPOSURES + API_SURFACE + CORS_CACHE + CLOUD_LEAKS))
      PASSIVE_WEB_RISK_SUMMARY_AVAILABLE=false
      if [ -f "{{passiveWebRiskSummaryFile}}" ] && [ -s "{{passiveWebRiskSummaryFile}}" ]; then
        PASSIVE_WEB_RISK_SUMMARY_AVAILABLE=true
      fi

      # 提取技术栈
      TECH_STACK=""
      if [ -f "{{fingerprintFile}}" ]; then
        TECH_STACK=$(cat {{fingerprintFile}} 2>/dev/null | jq -r '.tech // [] | .[]' 2>/dev/null | head -20 | tr '\n' ',' | sed 's/,$//')
      fi

      # 统计 WAF
      WAF_COUNT=$(count_lines "{{wafFile}}")
      WAF_TYPES=""
      if [ -f "{{wafFile}}" ]; then
        WAF_TYPES=$(cut -d',' -f2 {{wafFile}} 2>/dev/null | sort -u | head -5 | tr '\n' ',' | sed 's/,$//')
      fi

      jq -n \
        --argjson subdomains "$SUBDOMAINS" \
        --argjson http_count "$HTTP_COUNT" \
        --argjson resolved "$RESOLVED" \
        --argjson critical "$CRITICAL" \
        --argjson high "$HIGH" \
        --argjson priority_targets "$PRIORITY_COUNT" \
        --argjson source_map_exposures "$SOURCEMAP_EXPOSURES" \
        --argjson api_surface_candidates "$API_SURFACE" \
        --argjson cors_cache_review_candidates "$CORS_CACHE" \
        --argjson cloud_storage_candidates "$CLOUD_LEAKS" \
        --argjson passive_web_risk_signals "$PASSIVE_WEB_RISK_SIGNALS" \
        --argjson passive_web_risk_summary_available "$PASSIVE_WEB_RISK_SUMMARY_AVAILABLE" \
        --argjson waf_count "$WAF_COUNT" \
        --arg waf_types "$WAF_TYPES" \
        --arg tech_stack "$TECH_STACK" \
        '{
          subdomains: $subdomains,
          http_count: $http_count,
          resolved: $resolved,
          critical: $critical,
          high: $high,
          priority_targets: $priority_targets,
          source_map_exposures: $source_map_exposures,
          api_surface_candidates: $api_surface_candidates,
          cors_cache_review_candidates: $cors_cache_review_candidates,
          cloud_storage_candidates: $cloud_storage_candidates,
          passive_web_risk_signals: $passive_web_risk_signals,
          passive_web_risk_summary_available: $passive_web_risk_summary_available,
          waf_count: $waf_count,
          waf_types: $waf_types,
          tech_stack: $tech_stack
        }' > {{Output}}/ai-analysis/intelligent-stats.json

      echo "[AI Coordinator] Stats: Critical=$CRITICAL, High=$HIGH, WAF=$WAF_COUNT"

  - name: aggregate-submodule-results
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      # 汇总文件路径
      VULN_FILE="{{vulnValidationFile}}"
      CHAIN_FILE="{{attackChainFile}}"
      PLAN_FILE="{{pathPlanningFile}}"
      SEMANTIC_FILE="{{semanticSearchFile}}"
      INITIAL_SEMANTIC_FILE="{{initialSemanticSearchFile}}"

      echo "[AI Coordinator] Checking submodule results..."

      count_bytes() {
        file="$1"
        if [ -f "$file" ]; then
          wc -c < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      # 检查并报告各模块状态
      check_file() {
        file="$1"
        name="$2"
        if [ -f "$file" ] && jq empty "$file" 2>/dev/null; then
          size=$(count_bytes "$file")
          if [ "$size" -gt 50 ]; then
            echo "[OK] [AI Coordinator] $name: available ($size bytes)"
            return 0
          fi
        fi
        echo "[WARN] [AI Coordinator] $name: not available or empty"
        return 1
      }

      semantic_result_count() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          jq -r '.total_results // ([.results[]?] | length) // 0' "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      # 聚合漏洞验证结果
      VULN_STATUS="not_available"
      CONFIRMED_VULNS=0
      FALSE_POSITIVES=0
      if check_file "$VULN_FILE" "Vuln validation"; then
        VULN_STATUS="available"
        # 兼容两种 schema:
        # - 非 ACP: .confirmed_real / .false_positives
        # - ACP:    .validation_summary.confirmed_real / .validation_summary.false_positives
        CONFIRMED_VULNS=$(jq -r '(.confirmed_real // .validation_summary.confirmed_real // 0)' "$VULN_FILE" 2>/dev/null || echo 0)
        FALSE_POSITIVES=$(jq -r '(.false_positives // .validation_summary.false_positives // 0)' "$VULN_FILE" 2>/dev/null || echo 0)
      fi

      # 聚合攻击链结果
      CHAIN_STATUS="not_available"
      TOTAL_CHAINS=0
      CRITICAL_CHAINS=0
      if check_file "$CHAIN_FILE" "Attack chain"; then
        CHAIN_STATUS="available"
        TOTAL_CHAINS=$(jq -r '.attack_chain_summary.total_chains // 0' "$CHAIN_FILE" 2>/dev/null || echo 0)
        CRITICAL_CHAINS=$(jq -r '.attack_chain_summary.critical_chains // 0' "$CHAIN_FILE" 2>/dev/null || echo 0)
      fi

      # 聚合路径规划结果
      PLAN_STATUS="not_available"
      TOTAL_PHASES=0
      if check_file "$PLAN_FILE" "Path planning"; then
        PLAN_STATUS="available"
        TOTAL_PHASES=$(jq -r '.plan_summary.total_phases // 0' "$PLAN_FILE" 2>/dev/null || echo 0)
      fi

      # 聚合语义搜索结果
      INITIAL_SEMANTIC_STATUS="not_available"
      INITIAL_SEMANTIC_RESULTS=0
      if check_file "$INITIAL_SEMANTIC_FILE" "Initial semantic search"; then
        INITIAL_SEMANTIC_STATUS="available"
        INITIAL_SEMANTIC_RESULTS=$(semantic_result_count "$INITIAL_SEMANTIC_FILE")
      fi

      INITIAL_KNOWLEDGE_STATUS="not_available"
      INITIAL_KNOWLEDGE_RESULTS=0
      if check_file "{{initialKnowledgeSearchFile}}" "Initial knowledge search"; then
        INITIAL_KNOWLEDGE_STATUS="available"
        INITIAL_KNOWLEDGE_RESULTS=$(jq -r 'length // 0' "{{initialKnowledgeSearchFile}}" 2>/dev/null || echo 0)
      fi

      INITIAL_VECTOR_KNOWLEDGE_STATUS="not_available"
      INITIAL_VECTOR_KNOWLEDGE_RESULTS=0
      if check_file "{{initialVectorKnowledgeSearchFile}}" "Initial vector knowledge search"; then
        INITIAL_VECTOR_KNOWLEDGE_STATUS="available"
        INITIAL_VECTOR_KNOWLEDGE_RESULTS=$(jq -r 'length // 0' "{{initialVectorKnowledgeSearchFile}}" 2>/dev/null || echo 0)
      fi

      SEMANTIC_STATUS="not_available"
      SEMANTIC_RESULTS=0
      if check_file "$SEMANTIC_FILE" "Semantic search"; then
        SEMANTIC_STATUS="available"
        SEMANTIC_RESULTS=$(semantic_result_count "$SEMANTIC_FILE")
      fi

      KNOWLEDGE_STATUS="not_available"
      KNOWLEDGE_RESULTS=0
      if check_file "{{knowledgeSearchFile}}" "Knowledge search"; then
        KNOWLEDGE_STATUS="available"
        KNOWLEDGE_RESULTS=$(jq -r 'length // 0' "{{knowledgeSearchFile}}" 2>/dev/null || echo 0)
      fi

      VECTOR_KNOWLEDGE_STATUS="not_available"
      VECTOR_KNOWLEDGE_RESULTS=0
      if check_file "{{vectorKnowledgeSearchFile}}" "Vector knowledge search"; then
        VECTOR_KNOWLEDGE_STATUS="available"
        VECTOR_KNOWLEDGE_RESULTS=$(jq -r 'length // 0' "{{vectorKnowledgeSearchFile}}" 2>/dev/null || echo 0)
      fi

      PASSIVE_WEB_RISK_STATUS="not_available"
      PASSIVE_WEB_RISK_SUMMARY_BYTES=0
      PASSIVE_SOURCE_MAP_COUNT=$(count_lines "{{sourceMapExposureFile}}")
      PASSIVE_API_SURFACE_COUNT=$(count_lines "{{apiSurfaceFile}}")
      PASSIVE_CORS_CACHE_COUNT=$(count_lines "{{corsCacheHeuristicsFile}}")
      PASSIVE_CLOUD_LEAK_COUNT=$(count_lines "{{cloudLeakFile}}")
      if [ -f "{{passiveWebRiskSummaryFile}}" ] && [ -s "{{passiveWebRiskSummaryFile}}" ]; then
        PASSIVE_WEB_RISK_STATUS="available"
        PASSIVE_WEB_RISK_SUMMARY_BYTES=$(count_bytes "{{passiveWebRiskSummaryFile}}")
      fi

      # 检查是否有任何模块产生了有效结果
      ANY_DATA="false"
      if [ "$VULN_STATUS" = "available" ] || [ "$CHAIN_STATUS" = "available" ] || [ "$PLAN_STATUS" = "available" ] || [ "$SEMANTIC_STATUS" = "available" ] || [ "$INITIAL_SEMANTIC_STATUS" = "available" ] || [ "$KNOWLEDGE_STATUS" = "available" ] || [ "$VECTOR_KNOWLEDGE_STATUS" = "available" ] || [ "$INITIAL_KNOWLEDGE_STATUS" = "available" ] || [ "$INITIAL_VECTOR_KNOWLEDGE_STATUS" = "available" ] || [ "$PASSIVE_WEB_RISK_STATUS" = "available" ]; then
        ANY_DATA="true"
      fi

      echo "[INFO] [AI Coordinator] Any data available: $ANY_DATA"

      # 创建聚合结果文件
      jq -n \
        --arg aggregation_timestamp "$(date -Iseconds)" \
        --argjson any_data_available "$ANY_DATA" \
        --arg vuln_status "$VULN_STATUS" \
        --argjson confirmed_vulns "$CONFIRMED_VULNS" \
        --argjson false_positives "$FALSE_POSITIVES" \
        --arg chain_status "$CHAIN_STATUS" \
        --argjson total_chains "$TOTAL_CHAINS" \
        --argjson critical_chains "$CRITICAL_CHAINS" \
        --arg plan_status "$PLAN_STATUS" \
        --argjson total_phases "$TOTAL_PHASES" \
        --arg initial_semantic_status "$INITIAL_SEMANTIC_STATUS" \
        --argjson initial_semantic_results "$INITIAL_SEMANTIC_RESULTS" \
        --arg initial_knowledge_status "$INITIAL_KNOWLEDGE_STATUS" \
        --argjson initial_knowledge_results "$INITIAL_KNOWLEDGE_RESULTS" \
        --arg initial_vector_knowledge_status "$INITIAL_VECTOR_KNOWLEDGE_STATUS" \
        --argjson initial_vector_knowledge_results "$INITIAL_VECTOR_KNOWLEDGE_RESULTS" \
        --arg semantic_status "$SEMANTIC_STATUS" \
        --argjson semantic_results "$SEMANTIC_RESULTS" \
        --arg knowledge_status "$KNOWLEDGE_STATUS" \
        --argjson knowledge_results "$KNOWLEDGE_RESULTS" \
        --arg vector_knowledge_status "$VECTOR_KNOWLEDGE_STATUS" \
        --argjson vector_knowledge_results "$VECTOR_KNOWLEDGE_RESULTS" \
        --arg passive_web_risk_status "$PASSIVE_WEB_RISK_STATUS" \
        --argjson passive_web_risk_summary_bytes "$PASSIVE_WEB_RISK_SUMMARY_BYTES" \
        --argjson passive_source_map_count "$PASSIVE_SOURCE_MAP_COUNT" \
        --argjson passive_api_surface_count "$PASSIVE_API_SURFACE_COUNT" \
        --argjson passive_cors_cache_count "$PASSIVE_CORS_CACHE_COUNT" \
        --argjson passive_cloud_leak_count "$PASSIVE_CLOUD_LEAK_COUNT" \
        '{
          aggregation_timestamp: $aggregation_timestamp,
          any_data_available: $any_data_available,
          components: {
            vuln_validation: {
              status: $vuln_status,
              confirmed_vulns: $confirmed_vulns,
              false_positives: $false_positives
            },
            attack_chain: {
              status: $chain_status,
              total_chains: $total_chains,
              critical_chains: $critical_chains
            },
            path_planning: {
              status: $plan_status,
              total_phases: $total_phases
            },
            semantic_search_initial: {
              status: $initial_semantic_status,
              results: $initial_semantic_results
            },
            knowledge_search_initial: {
              status: $initial_knowledge_status,
              results: $initial_knowledge_results
            },
            vector_knowledge_search_initial: {
              status: $initial_vector_knowledge_status,
              results: $initial_vector_knowledge_results
            },
            semantic_search: {
              status: $semantic_status,
              results: $semantic_results
            },
            knowledge_search: {
              status: $knowledge_status,
              results: $knowledge_results
            },
            vector_knowledge_search: {
              status: $vector_knowledge_status,
              results: $vector_knowledge_results
            },
            passive_web_risk: {
              status: $passive_web_risk_status,
              summary_bytes: $passive_web_risk_summary_bytes,
              source_map_exposures: $passive_source_map_count,
              api_surface_candidates: $passive_api_surface_count,
              cors_cache_review_candidates: $passive_cors_cache_count,
              cloud_storage_candidates: $passive_cloud_leak_count
            }
          }
        }' > {{Output}}/ai-analysis/aggregated-results.json

      echo "[AI Coordinator] Results aggregation complete"
      echo "[AI Coordinator] Summary: Vuln=$CONFIRMED_VULNS confirmed, Chains=$TOTAL_CHAINS, Phases=$TOTAL_PHASES, PassiveRisk=$PASSIVE_WEB_RISK_STATUS"

  - name: generate-unified-config
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      normalize_int() {
        value="$1"
        case "$value" in
          ''|*[!0-9]*)
            echo 0
            ;;
          *)
            echo "$value"
            ;;
        esac
      }

      normalize_bool() {
        value=$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')
        case "$value" in
          1|true|yes|y|on)
            echo true
            ;;
          *)
            echo false
            ;;
        esac
      }

      csv_or_json_to_array() {
        value="$1"
        if [ -z "$value" ]; then
          echo '[]'
        elif printf '%s' "$value" | jq -e 'type == "array"' >/dev/null 2>&1; then
          printf '%s' "$value"
        else
          printf '%s' "$value" | jq -R 'split(",") | reduce .[] as $item ([]; ($item | gsub("^\\s+|\\s+$"; "")) as $normalized | if ($normalized != "" and (index($normalized) == null)) then . + [$normalized] else . end)'
        fi
      }

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      ACTIVE_SEMANTIC_PRIORITY_FILE="{{semanticPriorityTargetsFile}}"
      for candidate in "{{semanticPriorityTargetsFile}}" "{{fallbackSemanticPriorityTargetsFile}}" "{{secondFallbackSemanticPriorityTargetsFile}}" "{{thirdFallbackSemanticPriorityTargetsFile}}"; do
        [ -n "$candidate" ] || continue
        if text_has_lines "$candidate"; then
          ACTIVE_SEMANTIC_PRIORITY_FILE="$candidate"
          break
        fi
      done

      # 基于聚合结果生成 AI 决策配置
      STATS_FILE="{{Output}}/ai-analysis/intelligent-stats.json"
      VULN_FILE="{{vulnValidationFile}}"
      AGG_FILE="{{Output}}/ai-analysis/aggregated-results.json"

      # 默认值
      SEVERITY="critical,high"
      THREADS=10
      RATE_LIMIT=30
      TIMEOUT="6h"
      WAF_NEEDED="false"
      WAF_TECH=""
      WAF_DELAY="1s"
      REASONING="AI-generated from coordinator"

      # 从 stats 文件获取基础信息
      if [ -f "$STATS_FILE" ]; then
        WAF_TYPES=$(jq -r '.waf_types // ""' "$STATS_FILE" 2>/dev/null || echo "")
        if [ -n "$WAF_TYPES" ]; then
          WAF_NEEDED="true"
          WAF_TECH="$WAF_TYPES"
        fi
      fi

      PASSIVE_WEB_RISK_SIGNALS=0
      PASSIVE_WEB_RISK_SUMMARY_AVAILABLE=false
      if [ -f "$STATS_FILE" ]; then
        PASSIVE_WEB_RISK_SIGNALS=$(jq -r '.passive_web_risk_signals // 0' "$STATS_FILE" 2>/dev/null || echo 0)
        PASSIVE_WEB_RISK_SUMMARY_AVAILABLE=$(jq -r '.passive_web_risk_summary_available // false' "$STATS_FILE" 2>/dev/null || echo false)
      fi
      if [ "${PASSIVE_WEB_RISK_SIGNALS:-0}" -gt 0 ] 2>/dev/null; then
        REASONING="$REASONING + passive web risk signals=$PASSIVE_WEB_RISK_SIGNALS"
      fi
      if [ "$PASSIVE_WEB_RISK_SUMMARY_AVAILABLE" = "true" ]; then
        REASONING="$REASONING + passive web risk summary available"
      fi

      # 从漏洞验证结果中提取配置
      if [ -f "$VULN_FILE" ] && jq empty "$VULN_FILE" 2>/dev/null; then
        # 兼容两种 schema:
        # - 非 ACP: .risk_level / .confirmed_real
        # - ACP:    .validation_summary.risk_level / .validation_summary.confirmed_real
        RISK=$(jq -r '(.risk_level // .validation_summary.risk_level // "中")' "$VULN_FILE" 2>/dev/null)
        CONFIRMED=$(jq -r '(.confirmed_real // .validation_summary.confirmed_real // 0)' "$VULN_FILE" 2>/dev/null)

        # 根据确认漏洞数量调整配置（阈值可通过参数覆盖）
        AGGRESSIVE_THRESHOLD={{aggressiveThreshold}}
        BALANCED_THRESHOLD={{balancedThreshold}}
        if [ "$CONFIRMED" -gt "$AGGRESSIVE_THRESHOLD" ]; then
          SEVERITY="critical,high,medium"
          THREADS=15
          RATE_LIMIT=50
          TIMEOUT="8h"
          REASONING="High confirmed findings ($CONFIRMED), aggressive scan"
        elif [ "$CONFIRMED" -gt "$BALANCED_THRESHOLD" ]; then
          SEVERITY="critical,high"
          THREADS=12
          RATE_LIMIT=40
          TIMEOUT="6h"
          REASONING="Moderate confirmed findings ($CONFIRMED), balanced scan"
        else
          REASONING="Low confirmed findings ($CONFIRMED), focused scan"
        fi

        # 更新 reasoning 包含风险等级
        if [ "$RISK" != "null" ] && [ -n "$RISK" ]; then
          REASONING="$REASONING (risk: $RISK)"
        fi
      fi

      # 从语义搜索结果获取高优先级发现
      TOTAL_SEMANTIC_CRITICAL=0
      if [ -f "{{initialSemanticSearchFile}}" ] && jq empty "{{initialSemanticSearchFile}}" 2>/dev/null; then
        EARLY_SEMANTIC_CRITICAL=$(jq -r '.highlights.critical_findings | length // 0' "{{initialSemanticSearchFile}}" 2>/dev/null || echo 0)
        TOTAL_SEMANTIC_CRITICAL=$((TOTAL_SEMANTIC_CRITICAL + EARLY_SEMANTIC_CRITICAL))
      fi

      SEMANTIC_FILE="{{semanticSearchFile}}"
      if [ -f "$SEMANTIC_FILE" ] && jq empty "$SEMANTIC_FILE" 2>/dev/null; then
        SEMANTIC_CRITICAL=$(jq -r '.highlights.critical_findings | length // 0' "$SEMANTIC_FILE" 2>/dev/null || echo 0)
        TOTAL_SEMANTIC_CRITICAL=$((TOTAL_SEMANTIC_CRITICAL + SEMANTIC_CRITICAL))
      fi

      if [ "$TOTAL_SEMANTIC_CRITICAL" -gt 0 ]; then
        REASONING="$REASONING + $TOTAL_SEMANTIC_CRITICAL semantic highlights"
      fi

      TOTAL_KNOWLEDGE_HITS=0
      if [ -f "{{initialKnowledgeSearchFile}}" ] && jq empty "{{initialKnowledgeSearchFile}}" 2>/dev/null; then
        INITIAL_KNOWLEDGE_HITS=$(jq -r 'length // 0' "{{initialKnowledgeSearchFile}}" 2>/dev/null || echo 0)
        TOTAL_KNOWLEDGE_HITS=$((TOTAL_KNOWLEDGE_HITS + INITIAL_KNOWLEDGE_HITS))
      fi
      if [ -f "{{knowledgeSearchFile}}" ] && jq empty "{{knowledgeSearchFile}}" 2>/dev/null; then
        KNOWLEDGE_HITS=$(jq -r 'length // 0' "{{knowledgeSearchFile}}" 2>/dev/null || echo 0)
        TOTAL_KNOWLEDGE_HITS=$((TOTAL_KNOWLEDGE_HITS + KNOWLEDGE_HITS))
      fi
      if [ -f "{{initialVectorKnowledgeSearchFile}}" ] && jq empty "{{initialVectorKnowledgeSearchFile}}" 2>/dev/null; then
        INITIAL_VECTOR_KNOWLEDGE_HITS=$(jq -r 'length // 0' "{{initialVectorKnowledgeSearchFile}}" 2>/dev/null || echo 0)
        TOTAL_KNOWLEDGE_HITS=$((TOTAL_KNOWLEDGE_HITS + INITIAL_VECTOR_KNOWLEDGE_HITS))
      fi
      if [ -f "{{vectorKnowledgeSearchFile}}" ] && jq empty "{{vectorKnowledgeSearchFile}}" 2>/dev/null; then
        VECTOR_KNOWLEDGE_HITS=$(jq -r 'length // 0' "{{vectorKnowledgeSearchFile}}" 2>/dev/null || echo 0)
        TOTAL_KNOWLEDGE_HITS=$((TOTAL_KNOWLEDGE_HITS + VECTOR_KNOWLEDGE_HITS))
      fi

      if [ "$TOTAL_KNOWLEDGE_HITS" -gt 0 ]; then
        REASONING="$REASONING + $TOTAL_KNOWLEDGE_HITS knowledge context hits"
      fi

      PREV_FOLLOWUP_FOCUS_COUNT=0
      PREV_FOLLOWUP_PRIORITY_COUNT=0
      PREV_FOLLOWUP_TARGET_COUNT=0
      PREV_FOLLOWUP_NEXT_PHASE=""
      PREV_FOLLOWUP_REASONING=""
      PREV_FOLLOWUP_SCAN_PROFILE=""
      PREV_FOLLOWUP_SEVERITY=""
      PREV_FOLLOWUP_SOURCE_KIND="none"
      PREV_FOLLOWUP_PRIORITY_MODE=""
      PREV_FOLLOWUP_CONFIDENCE_LEVEL=""
      PREV_FOLLOWUP_ESCALATION_SCORE=0
      PREV_FOLLOWUP_CAMPAIGN_CREATE_STATUS=""
      PREV_FOLLOWUP_CAMPAIGN_CREATE_ID=""
      PREV_FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS=0
      PREV_FOLLOWUP_REUSE_SOURCES_JSON='[]'
      PREV_FOLLOWUP_RESUME_SUPPRESSED_JSON='[]'
      PREV_FOLLOWUP_REUSED_ACTIONS_JSON='[]'
      PREV_FOLLOWUP_SKIPPED_DUPLICATES_JSON='[]'
      PREV_FOLLOWUP_MANUAL_FOLLOWUP_NEEDED=false
      PREV_FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED=false
      PREV_FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE=false
      PREV_FOLLOWUP_MANUAL_COUNT=0
      PREV_FOLLOWUP_HIGH_CONFIDENCE_COUNT=0
      if [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
        PREV_FOLLOWUP_SOURCE_KIND="decision-file"
        PREV_FOLLOWUP_FOCUS_COUNT=$(jq -r '[((.seed_targets.focus_areas // .refined_targets.focus_areas // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_FOLLOWUP_PRIORITY_COUNT=$(jq -r '[((.seed_targets.priority_targets // .refined_targets.priority_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_FOLLOWUP_TARGET_COUNT=$(jq -r '[((.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_critical_targets // []) + (.seed_targets.rescan_high_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.rescan_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_FOLLOWUP_NEXT_PHASE=$(jq -r '.seed_focus.next_phase // .execution_feedback.next_phase // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_FOLLOWUP_REASONING=$(jq -r '.seed_focus.reasoning // .base_decision.reasoning // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_FOLLOWUP_SCAN_PROFILE=$(jq -r '.seed_focus.scan_profile // .base_decision.profile // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_FOLLOWUP_SEVERITY=$(jq -r '.seed_focus.severity // .base_decision.severity // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_FOLLOWUP_PRIORITY_MODE=$(jq -r '.seed_focus.priority_mode // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_FOLLOWUP_CONFIDENCE_LEVEL=$(jq -r '.seed_focus.confidence_level // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_FOLLOWUP_ESCALATION_SCORE=$(jq -r '.seed_focus.signal_scores.escalation_score // 0' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_FOLLOWUP_CAMPAIGN_CREATE_STATUS=$(jq -r '.followup_summary.campaign_create_status // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_FOLLOWUP_CAMPAIGN_CREATE_ID=$(jq -r '.followup_summary.campaign_create_id // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        PREV_FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.followup_summary.campaign_create_queued_runs // 0' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_FOLLOWUP_REUSE_SOURCES_JSON=$(jq -c '.seed_focus.reuse_sources // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_FOLLOWUP_RESUME_SUPPRESSED_JSON=$(jq -c '.followup_summary.resume_suppressed_actions // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_FOLLOWUP_REUSED_ACTIONS_JSON=$(jq -c '.followup_summary.reused_actions // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_FOLLOWUP_SKIPPED_DUPLICATES_JSON=$(jq -c '.followup_summary.skipped_duplicate_actions // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        PREV_FOLLOWUP_MANUAL_FOLLOWUP_NEEDED=$(jq -r '.seed_focus.manual_followup_needed // .execution_feedback.manual_followup_needed // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED=$(jq -r '.seed_focus.campaign_followup_recommended // .execution_feedback.campaign_followup_recommended // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE=$(jq -r '.seed_focus.queue_followup_effective // .execution_feedback.queue_followup_effective // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        PREV_FOLLOWUP_MANUAL_COUNT=$(jq -r '[((.seed_targets.manual_first_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        PREV_FOLLOWUP_HIGH_CONFIDENCE_COUNT=$(jq -r '[((.seed_targets.high_confidence_targets // []))[]?] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
      else
        PREV_PARAM_TARGET_COUNT=$(normalize_int "{{previous_followup_targets}}")
        PREV_PARAM_PRIORITY_COUNT=$(normalize_int "{{previous_followup_priority_targets}}")
        PREV_PARAM_FOCUS_COUNT=$(normalize_int "{{previous_followup_focus_areas}}")
        PREV_PARAM_MANUAL_COUNT=$(normalize_int "{{previous_followup_manual_first_targets}}")
        PREV_PARAM_HIGH_CONFIDENCE_COUNT=$(normalize_int "{{previous_followup_high_confidence_targets}}")
        PREV_PARAM_REASONING="{{previous_followup_reasoning}}"
        PREV_PARAM_SCAN_PROFILE="{{previous_followup_scan_profile}}"
        PREV_PARAM_SEVERITY="{{previous_followup_severity}}"
        PREV_PARAM_PRIORITY_MODE="{{previous_followup_priority_mode}}"
        PREV_PARAM_CONFIDENCE_LEVEL="{{previous_followup_confidence_level}}"
        PREV_PARAM_NEXT_PHASE="{{previous_followup_next_phase}}"
        PREV_PARAM_REUSE_SOURCES_JSON=$(csv_or_json_to_array "{{previous_followup_reuse_sources}}")
        PREV_PARAM_RESUME_SUPPRESSED_JSON=$(csv_or_json_to_array "{{previous_followup_resume_suppressed_actions}}")
        PREV_PARAM_REUSED_ACTIONS_JSON=$(csv_or_json_to_array "{{previous_followup_reused_actions}}")
        PREV_PARAM_SKIPPED_DUPLICATES_JSON=$(csv_or_json_to_array "{{previous_followup_skipped_duplicate_actions}}")
        PREV_PARAM_MANUAL_FOLLOWUP_NEEDED=$(normalize_bool "{{previous_followup_manual_followup_needed}}")
        PREV_PARAM_CAMPAIGN_FOLLOWUP_RECOMMENDED=$(normalize_bool "{{previous_followup_campaign_followup_recommended}}")
        PREV_PARAM_QUEUE_FOLLOWUP_EFFECTIVE=$(normalize_bool "{{previous_followup_queue_followup_effective}}")
        PREV_PARAM_ESCALATION_SCORE=$(normalize_int "{{previous_followup_escalation_score}}")
        PREV_PARAM_CAMPAIGN_CREATE_STATUS="{{previous_followup_campaign_create_status}}"
        PREV_PARAM_CAMPAIGN_CREATE_ID="{{previous_followup_campaign_create_id}}"
        PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS=$(normalize_int "{{previous_followup_campaign_create_queued_runs}}")
        if [ "$PREV_PARAM_TARGET_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_PRIORITY_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_FOCUS_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_MANUAL_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$PREV_PARAM_HIGH_CONFIDENCE_COUNT" -gt 0 ] 2>/dev/null \
          || [ -n "$PREV_PARAM_REASONING" ] \
          || [ -n "$PREV_PARAM_SCAN_PROFILE" ] \
          || [ -n "$PREV_PARAM_SEVERITY" ] \
          || [ -n "$PREV_PARAM_PRIORITY_MODE" ] \
          || [ -n "$PREV_PARAM_CONFIDENCE_LEVEL" ] \
          || [ -n "$PREV_PARAM_NEXT_PHASE" ] \
          || [ "$PREV_PARAM_MANUAL_FOLLOWUP_NEEDED" = "true" ] \
          || [ "$PREV_PARAM_CAMPAIGN_FOLLOWUP_RECOMMENDED" = "true" ] \
          || [ "$PREV_PARAM_QUEUE_FOLLOWUP_EFFECTIVE" = "true" ] \
          || [ "$PREV_PARAM_ESCALATION_SCORE" -gt 0 ] 2>/dev/null \
          || [ -n "$PREV_PARAM_CAMPAIGN_CREATE_STATUS" ] \
          || [ -n "$PREV_PARAM_CAMPAIGN_CREATE_ID" ] \
          || [ "$PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS" -gt 0 ] 2>/dev/null; then
          PREV_FOLLOWUP_SOURCE_KIND="queue-params"
          PREV_FOLLOWUP_TARGET_COUNT="$PREV_PARAM_TARGET_COUNT"
          PREV_FOLLOWUP_FOCUS_COUNT="$PREV_PARAM_FOCUS_COUNT"
          PREV_FOLLOWUP_PRIORITY_COUNT="$PREV_PARAM_PRIORITY_COUNT"
          PREV_FOLLOWUP_NEXT_PHASE="$PREV_PARAM_NEXT_PHASE"
          PREV_FOLLOWUP_REASONING="$PREV_PARAM_REASONING"
          PREV_FOLLOWUP_SCAN_PROFILE="$PREV_PARAM_SCAN_PROFILE"
          PREV_FOLLOWUP_SEVERITY="$PREV_PARAM_SEVERITY"
          PREV_FOLLOWUP_PRIORITY_MODE="$PREV_PARAM_PRIORITY_MODE"
          PREV_FOLLOWUP_CONFIDENCE_LEVEL="$PREV_PARAM_CONFIDENCE_LEVEL"
          PREV_FOLLOWUP_ESCALATION_SCORE="$PREV_PARAM_ESCALATION_SCORE"
          PREV_FOLLOWUP_CAMPAIGN_CREATE_STATUS="$PREV_PARAM_CAMPAIGN_CREATE_STATUS"
          PREV_FOLLOWUP_CAMPAIGN_CREATE_ID="$PREV_PARAM_CAMPAIGN_CREATE_ID"
          PREV_FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS="$PREV_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS"
          PREV_FOLLOWUP_REUSE_SOURCES_JSON="$PREV_PARAM_REUSE_SOURCES_JSON"
          PREV_FOLLOWUP_RESUME_SUPPRESSED_JSON="$PREV_PARAM_RESUME_SUPPRESSED_JSON"
          PREV_FOLLOWUP_REUSED_ACTIONS_JSON="$PREV_PARAM_REUSED_ACTIONS_JSON"
          PREV_FOLLOWUP_SKIPPED_DUPLICATES_JSON="$PREV_PARAM_SKIPPED_DUPLICATES_JSON"
          PREV_FOLLOWUP_MANUAL_FOLLOWUP_NEEDED="$PREV_PARAM_MANUAL_FOLLOWUP_NEEDED"
          PREV_FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED="$PREV_PARAM_CAMPAIGN_FOLLOWUP_RECOMMENDED"
          PREV_FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE="$PREV_PARAM_QUEUE_FOLLOWUP_EFFECTIVE"
          PREV_FOLLOWUP_MANUAL_COUNT="$PREV_PARAM_MANUAL_COUNT"
          PREV_FOLLOWUP_HIGH_CONFIDENCE_COUNT="$PREV_PARAM_HIGH_CONFIDENCE_COUNT"
        fi
      fi

      if [ "$PREV_FOLLOWUP_TARGET_COUNT" -gt 0 ] || [ "$PREV_FOLLOWUP_FOCUS_COUNT" -gt 0 ] || [ "$PREV_FOLLOWUP_PRIORITY_COUNT" -gt 0 ]; then
        REASONING="$REASONING + previous followup targets=$PREV_FOLLOWUP_TARGET_COUNT focus=$PREV_FOLLOWUP_FOCUS_COUNT priority=$PREV_FOLLOWUP_PRIORITY_COUNT"
      fi
      if [ -n "$PREV_FOLLOWUP_REASONING" ]; then
        REASONING="$REASONING + previous reasoning=$PREV_FOLLOWUP_REASONING"
      fi
      if [ -n "$PREV_FOLLOWUP_SCAN_PROFILE" ]; then
        REASONING="$REASONING + previous scan_profile=$PREV_FOLLOWUP_SCAN_PROFILE"
      fi
      if [ -n "$PREV_FOLLOWUP_SEVERITY" ]; then
        REASONING="$REASONING + previous severity=$PREV_FOLLOWUP_SEVERITY"
      fi
      if [ -n "$PREV_FOLLOWUP_NEXT_PHASE" ]; then
        REASONING="$REASONING + previous next phase: $PREV_FOLLOWUP_NEXT_PHASE"
      fi
      if [ -n "$PREV_FOLLOWUP_PRIORITY_MODE" ] || [ -n "$PREV_FOLLOWUP_CONFIDENCE_LEVEL" ]; then
        REASONING="$REASONING + previous priority mode=$PREV_FOLLOWUP_PRIORITY_MODE confidence=$PREV_FOLLOWUP_CONFIDENCE_LEVEL escalation=$PREV_FOLLOWUP_ESCALATION_SCORE"
      fi
      if [ -n "$PREV_FOLLOWUP_CAMPAIGN_CREATE_STATUS" ]; then
        REASONING="$REASONING + previous campaign_create=$PREV_FOLLOWUP_CAMPAIGN_CREATE_STATUS campaign_id=$PREV_FOLLOWUP_CAMPAIGN_CREATE_ID queued_runs=$PREV_FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS"
      fi
      PREV_FOLLOWUP_REUSE_SOURCES=$(printf '%s\n' "$PREV_FOLLOWUP_REUSE_SOURCES_JSON" | jq -r 'join(",")' 2>/dev/null || echo "")
      if [ -n "$PREV_FOLLOWUP_REUSE_SOURCES" ]; then
        REASONING="$REASONING + previous reuse_sources=$PREV_FOLLOWUP_REUSE_SOURCES"
      fi
      if [ "$PREV_FOLLOWUP_MANUAL_FOLLOWUP_NEEDED" = "true" ] || [ "$PREV_FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED" = "true" ] || [ "$PREV_FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE" = "true" ]; then
        REASONING="$REASONING + previous manual_followup=$PREV_FOLLOWUP_MANUAL_FOLLOWUP_NEEDED campaign_followup=$PREV_FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED queue_effective=$PREV_FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE"
      fi

      case "$PREV_FOLLOWUP_SCAN_PROFILE" in
        aggressive)
          [ "$THREADS" -lt 15 ] 2>/dev/null && THREADS=15
          [ "$RATE_LIMIT" -lt 50 ] 2>/dev/null && RATE_LIMIT=50
          TIMEOUT="8h"
          ;;
        balanced)
          [ "$THREADS" -lt 12 ] 2>/dev/null && THREADS=12
          [ "$RATE_LIMIT" -lt 40 ] 2>/dev/null && RATE_LIMIT=40
          ;;
      esac

      case "$PREV_FOLLOWUP_SEVERITY" in
        *medium*|*low*|*info*)
          [ "$SEVERITY" = "critical,high" ] && SEVERITY="$PREV_FOLLOWUP_SEVERITY"
          ;;
      esac

      FOCUS_TMP="{{Output}}/ai-analysis/.focus-areas-{{TargetSpace}}.txt"
      RESCAN_TMP="{{Output}}/ai-analysis/.rescan-targets-{{TargetSpace}}.txt"
      PASSIVE_TARGETS_TMP="{{Output}}/ai-analysis/.passive-targets-{{TargetSpace}}.txt"
      : > "$FOCUS_TMP"
      : > "$RESCAN_TMP"
      : > "$PASSIVE_TARGETS_TMP"

      append_passive_urls() {
        file="$1"
        [ -f "$file" ] || return 0
        grep -Eo 'https?://[^[:space:]]+' "$file" 2>/dev/null || true
      }

      if [ -f "{{priorityTargetsFile}}" ]; then
        head -15 "{{priorityTargetsFile}}" >> "$FOCUS_TMP" 2>/dev/null || true
        head -20 "{{priorityTargetsFile}}" >> "$RESCAN_TMP" 2>/dev/null || true
      fi
      if [ -f "{{confirmedUrlsFile}}" ]; then
        cat "{{confirmedUrlsFile}}" >> "$RESCAN_TMP" 2>/dev/null || true
      fi
      if [ -f "{{entryPointsFile}}" ]; then
        head -15 "{{entryPointsFile}}" >> "$FOCUS_TMP" 2>/dev/null || true
        cat "{{entryPointsFile}}" >> "$RESCAN_TMP" 2>/dev/null || true
      fi
      if [ -f "{{bestPathTargetsFile}}" ]; then
        head -15 "{{bestPathTargetsFile}}" >> "$FOCUS_TMP" 2>/dev/null || true
        head -20 "{{bestPathTargetsFile}}" >> "$RESCAN_TMP" 2>/dev/null || true
      fi
      if [ -f "$ACTIVE_SEMANTIC_PRIORITY_FILE" ]; then
        head -15 "$ACTIVE_SEMANTIC_PRIORITY_FILE" >> "$FOCUS_TMP" 2>/dev/null || true
        head -20 "$ACTIVE_SEMANTIC_PRIORITY_FILE" >> "$RESCAN_TMP" 2>/dev/null || true
      fi
      {
        append_passive_urls "{{sourceMapExposureFile}}"
        append_passive_urls "{{apiSurfaceFile}}"
        append_passive_urls "{{corsCacheHeuristicsFile}}"
        append_passive_urls "{{cloudLeakFile}}"
        append_passive_urls "{{passiveWebRiskSummaryFile}}"
      } | awk 'NF && !seen[$0]++' > "$PASSIVE_TARGETS_TMP" || true
      if [ -s "$PASSIVE_TARGETS_TMP" ]; then
        head -12 "$PASSIVE_TARGETS_TMP" >> "$FOCUS_TMP" 2>/dev/null || true
        head -16 "$PASSIVE_TARGETS_TMP" >> "$RESCAN_TMP" 2>/dev/null || true
      fi
      if [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
        jq -r '(.seed_targets.focus_areas // .refined_targets.focus_areas // [])[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$FOCUS_TMP" || true
        jq -r '(.seed_targets.priority_targets // .refined_targets.priority_targets // [])[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$FOCUS_TMP" || true
        jq -r '(.seed_targets.semantic_targets // [])[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$FOCUS_TMP" || true
        jq -r '(.seed_targets.manual_first_targets // [])[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$FOCUS_TMP" || true
        jq -r '(.seed_targets.high_confidence_targets // [])[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$FOCUS_TMP" || true
        jq -r '(.seed_targets.rescan_targets // .seed_targets.priority_targets // .refined_targets.priority_targets // [])[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$RESCAN_TMP" || true
        jq -r '(.seed_targets.manual_first_targets // [])[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$RESCAN_TMP" || true
        jq -r '(.seed_targets.high_confidence_targets // [])[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$RESCAN_TMP" || true
        jq -r '(.seed_targets.rescan_critical_targets // [])[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$RESCAN_TMP" || true
        jq -r '(.seed_targets.rescan_high_targets // [])[]? // empty' "{{previousFollowupDecisionFile}}" 2>/dev/null >> "$RESCAN_TMP" || true
      fi

      awk 'NF && !seen[$0]++' "$FOCUS_TMP" > "$FOCUS_TMP.tmp" && mv "$FOCUS_TMP.tmp" "$FOCUS_TMP"
      awk 'NF && !seen[$0]++' "$RESCAN_TMP" > "$RESCAN_TMP.tmp" && mv "$RESCAN_TMP.tmp" "$RESCAN_TMP"

      FOCUS_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' "$FOCUS_TMP" 2>/dev/null || echo '[]')
      RESCAN_TARGETS_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' "$RESCAN_TMP" 2>/dev/null || echo '[]')
      FOCUS_COUNT=$(count_lines "$FOCUS_TMP")
      RESCAN_COUNT=$(count_lines "$RESCAN_TMP")
      PASSIVE_TARGET_COUNT=$(count_lines "$PASSIVE_TARGETS_TMP")

      if [ "$FOCUS_COUNT" -gt 0 ]; then
        REASONING="$REASONING + $FOCUS_COUNT focus areas"
      fi
      if [ "$RESCAN_COUNT" -gt 0 ]; then
        REASONING="$REASONING + $RESCAN_COUNT retest targets"
      fi
      if [ "$PASSIVE_TARGET_COUNT" -gt 0 ]; then
        REASONING="$REASONING + passive targets=$PASSIVE_TARGET_COUNT"
      fi

      if [ "$PREV_FOLLOWUP_PRIORITY_MODE" = "manual-first" ] || [ "$PREV_FOLLOWUP_CONFIDENCE_LEVEL" = "high" ] || [ "${PREV_FOLLOWUP_ESCALATION_SCORE:-0}" -ge 12 ] 2>/dev/null; then
        [ "$THREADS" -lt 15 ] 2>/dev/null && THREADS=15
        [ "$RATE_LIMIT" -lt 50 ] 2>/dev/null && RATE_LIMIT=50
        TIMEOUT="8h"
      elif [ "$PREV_FOLLOWUP_PRIORITY_MODE" = "campaign-first" ] || [ "$PREV_FOLLOWUP_PRIORITY_MODE" = "retest-first" ] || [ "$PREV_FOLLOWUP_CONFIDENCE_LEVEL" = "medium" ] || [ "${PREV_FOLLOWUP_ESCALATION_SCORE:-0}" -ge 6 ] 2>/dev/null; then
        [ "$THREADS" -lt 12 ] 2>/dev/null && THREADS=12
        [ "$RATE_LIMIT" -lt 40 ] 2>/dev/null && RATE_LIMIT=40
      fi

      # 生成 AI 决策 JSON 文件 - 与 vuln-suite.yaml 读取路径一致
      jq -n \
        --arg nuclei_severity "$SEVERITY" \
        --argjson suggested_threads "$THREADS" \
        --argjson suggested_rate_limit "$RATE_LIMIT" \
        --arg recommended_timeout "$TIMEOUT" \
        --argjson waf_bypass_needed "$WAF_NEEDED" \
        --arg waf_bypass_techniques "$WAF_TECH" \
        --arg waf_recommended_delay "$WAF_DELAY" \
        --argjson focus_areas "$FOCUS_JSON" \
        --argjson rescan_targets "$RESCAN_TARGETS_JSON" \
        --argjson knowledge_context_hits "$TOTAL_KNOWLEDGE_HITS" \
        --argjson passive_web_risk_signals "$PASSIVE_WEB_RISK_SIGNALS" \
        --argjson passive_web_risk_summary_available "$PASSIVE_WEB_RISK_SUMMARY_AVAILABLE" \
        --argjson passive_target_count "$PASSIVE_TARGET_COUNT" \
        --arg previous_followup_source_kind "$PREV_FOLLOWUP_SOURCE_KIND" \
        --argjson previous_followup_targets "$PREV_FOLLOWUP_TARGET_COUNT" \
        --argjson previous_followup_focus_count "$PREV_FOLLOWUP_FOCUS_COUNT" \
        --argjson previous_followup_priority_count "$PREV_FOLLOWUP_PRIORITY_COUNT" \
        --arg previous_followup_next_phase "$PREV_FOLLOWUP_NEXT_PHASE" \
        --arg previous_followup_reasoning "$PREV_FOLLOWUP_REASONING" \
        --arg previous_followup_scan_profile "$PREV_FOLLOWUP_SCAN_PROFILE" \
        --arg previous_followup_severity "$PREV_FOLLOWUP_SEVERITY" \
        --arg previous_followup_priority_mode "$PREV_FOLLOWUP_PRIORITY_MODE" \
        --arg previous_followup_confidence_level "$PREV_FOLLOWUP_CONFIDENCE_LEVEL" \
        --argjson previous_followup_escalation_score "$PREV_FOLLOWUP_ESCALATION_SCORE" \
        --arg previous_followup_campaign_create_status "$PREV_FOLLOWUP_CAMPAIGN_CREATE_STATUS" \
        --arg previous_followup_campaign_create_id "$PREV_FOLLOWUP_CAMPAIGN_CREATE_ID" \
        --argjson previous_followup_campaign_create_queued_runs "$PREV_FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS" \
        --argjson previous_followup_reuse_sources "$PREV_FOLLOWUP_REUSE_SOURCES_JSON" \
        --argjson previous_followup_resume_suppressed_actions "$PREV_FOLLOWUP_RESUME_SUPPRESSED_JSON" \
        --argjson previous_followup_reused_actions "$PREV_FOLLOWUP_REUSED_ACTIONS_JSON" \
        --argjson previous_followup_skipped_duplicate_actions "$PREV_FOLLOWUP_SKIPPED_DUPLICATES_JSON" \
        --argjson previous_followup_manual_followup_needed "$PREV_FOLLOWUP_MANUAL_FOLLOWUP_NEEDED" \
        --argjson previous_followup_campaign_followup_recommended "$PREV_FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED" \
        --argjson previous_followup_queue_followup_effective "$PREV_FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE" \
        --argjson previous_followup_manual_first_count "$PREV_FOLLOWUP_MANUAL_COUNT" \
        --argjson previous_followup_high_confidence_count "$PREV_FOLLOWUP_HIGH_CONFIDENCE_COUNT" \
        --arg reasoning "$REASONING" \
        '{
          nuclei_severity: $nuclei_severity,
          suggested_threads: $suggested_threads,
          suggested_rate_limit: $suggested_rate_limit,
          recommended_timeout: $recommended_timeout,
          waf_bypass_needed: $waf_bypass_needed,
          waf_bypass_techniques: $waf_bypass_techniques,
          waf_recommended_delay: $waf_recommended_delay,
          enable_ssrf_scan: true,
          enable_ssti_scan: true,
          enable_sqli_scan: true,
          enable_lfi_scan: true,
          enable_takeover_scan: true,
          focus_areas: $focus_areas,
          priority_targets: $focus_areas,
          rescan_targets: $rescan_targets,
          decision_inputs: {
            knowledge_context_hits: $knowledge_context_hits,
            passive_web_risk_signals: $passive_web_risk_signals,
            passive_web_risk_summary_available: $passive_web_risk_summary_available,
            passive_target_count: $passive_target_count,
            focus_area_count: ($focus_areas | length),
            rescan_target_count: ($rescan_targets | length),
            previous_followup_source_kind: $previous_followup_source_kind,
            previous_followup_targets: $previous_followup_targets,
            previous_followup_focus_count: $previous_followup_focus_count,
            previous_followup_priority_count: $previous_followup_priority_count,
            previous_followup_next_phase: $previous_followup_next_phase,
            previous_followup_reasoning: $previous_followup_reasoning,
            previous_followup_scan_profile: $previous_followup_scan_profile,
            previous_followup_severity: $previous_followup_severity,
            previous_followup_priority_mode: $previous_followup_priority_mode,
            previous_followup_confidence_level: $previous_followup_confidence_level,
            previous_followup_escalation_score: $previous_followup_escalation_score,
            previous_followup_campaign_create_status: $previous_followup_campaign_create_status,
            previous_followup_campaign_create_id: $previous_followup_campaign_create_id,
            previous_followup_campaign_create_queued_runs: $previous_followup_campaign_create_queued_runs,
            previous_followup_reuse_sources: $previous_followup_reuse_sources,
            previous_followup_resume_suppressed_actions: $previous_followup_resume_suppressed_actions,
            previous_followup_reused_actions: $previous_followup_reused_actions,
            previous_followup_skipped_duplicate_actions: $previous_followup_skipped_duplicate_actions,
            previous_followup_manual_followup_needed: $previous_followup_manual_followup_needed,
            previous_followup_campaign_followup_recommended: $previous_followup_campaign_followup_recommended,
            previous_followup_queue_followup_effective: $previous_followup_queue_followup_effective,
            previous_followup_manual_first_count: $previous_followup_manual_first_count,
            previous_followup_high_confidence_count: $previous_followup_high_confidence_count
          },
          reasoning: $reasoning
        }' > {{aiDecisionFile}}

      # 生成 AI 变量 YAML 文件
      {
        printf '# AI Decision Variables\n'
        printf '# Generated by ai-intelligent-analysis coordinator\n'
        printf '# Target: {{Target}}\n'
        printf '# Generated: %s\n' "$(date)"
        printf '\n'
        printf 'nucleiSeverity: %s\n' "$(printf '%s' "$SEVERITY" | sed 's/["\\]/\\&/g')"
        printf 'nucleiThreads: %s\n' "$THREADS"
        printf 'nucleiRateLimit: %s\n' "$RATE_LIMIT"
        printf 'nucleiTimeout: %s\n' "$(printf '%s' "$TIMEOUT" | sed 's/["\\]/\\&/g')"
        printf 'enableWafAwareScan: %s\n' "$WAF_NEEDED"
        printf 'wafBypassTechniques: %s\n' "$(printf '%s' "$WAF_TECH" | sed 's/["\\]/\\&/g')"
        printf 'wafRecommendedDelay: %s\n' "$(printf '%s' "$WAF_DELAY" | sed 's/["\\]/\\&/g')"
        printf 'enableSsrfScan: true\n'
        printf 'enableSstiScan: true\n'
        printf 'enableSqliScan: true\n'
        printf 'enableLfiScan: true\n'
        printf 'enableTakeoverScan: true\n'
      } > {{aiVarsFile}}

      echo "[AI Decision] Config saved to {{aiDecisionFile}}"
      echo "[AI Decision] Variables saved to {{aiVarsFile}}"
      echo "[AI Decision] severity=$SEVERITY, threads=$THREADS, rate_limit=$RATE_LIMIT, waf_bypass=$WAF_NEEDED"

  - name: generate-comprehensive-report
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}}"
    on_error:
      - action: continue
    command: |
      mkdir -p {{Output}}/ai-analysis

      TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
      AGG_FILE="{{Output}}/ai-analysis/aggregated-results.json"

      # 构建报告
      cat > {{analysisOutputMd}} << 'EOF'
      # AI 智能安全分析报告

      ## 扫描目标
      - **目标**: TARGET_PLACEHOLDER
      - **时间**: TIMESTAMP_PLACEHOLDER
      - **分析类型**: 漏洞验证 + 攻击链分析 + 路径规划 + 语义搜索

      ---

      ## 分析组件状态
      EOF

      sed -i "s|TARGET_PLACEHOLDER|{{Target}}|g" {{analysisOutputMd}}
      sed -i "s|TIMESTAMP_PLACEHOLDER|$TIMESTAMP|g" {{analysisOutputMd}}

      # 添加各组件状态
      if [ -f "$AGG_FILE" ]; then
        jq -r '.components | "### 漏洞验证\n- 状态: \(.vuln_validation.status)\n- 确认漏洞: \(.vuln_validation.confirmed_vulns)\n- 假阳性: \(.vuln_validation.false_positives)\n\n### 攻击链分析\n- 状态: \(.attack_chain.status)\n- 总攻击链: \(.attack_chain.total_chains)\n- 关键攻击链: \(.attack_chain.critical_chains)\n\n### 路径规划\n- 状态: \(.path_planning.status)\n- 规划阶段: \(.path_planning.total_phases)\n\n### 语义搜索\n- 状态: \(.semantic_search.status)\n- 搜索结果: \(.semantic_search.results)\n\n### 被动 Web 风险\n- 状态: \(.passive_web_risk.status)\n- Source Map / Debug: \(.passive_web_risk.source_map_exposures)\n- API Surface: \(.passive_web_risk.api_surface_candidates)\n- CORS / Cache: \(.passive_web_risk.cors_cache_review_candidates)\n- Cloud Storage: \(.passive_web_risk.cloud_storage_candidates)\n\n### 知识库上下文\n- 初始知识命中: \(.knowledge_search_initial.results)\n- 初始向量知识命中: \(.vector_knowledge_search_initial.results)\n- 漏洞后知识命中: \(.knowledge_search.results)\n- 漏洞后向量知识命中: \(.vector_knowledge_search.results)\n"' "$AGG_FILE" 2>/dev/null >> {{analysisOutputMd}} || true
      fi

      if [ -f "{{passiveWebRiskSummaryFile}}" ] && [ -s "{{passiveWebRiskSummaryFile}}" ]; then
        {
          echo ""
          echo "### 被动 Web 风险摘要"
          echo ""
          head -40 "{{passiveWebRiskSummaryFile}}" 2>/dev/null || true
        } >> {{analysisOutputMd}}
      fi

      # 添加 AI 决策配置
      echo "" >> {{analysisOutputMd}}
      echo "---" >> {{analysisOutputMd}}
      echo "" >> {{analysisOutputMd}}
      echo "## AI 决策配置" >> {{analysisOutputMd}}
      echo "" >> {{analysisOutputMd}}
      echo "本次分析生成的 AI 决策配置已保存至 \`ai-decision-{{TargetSpace}}.json\`，漏洞扫描模块将自动加载并应用此配置。" >> {{analysisOutputMd}}

      echo "" >> {{analysisOutputMd}}
      echo "---" >> {{analysisOutputMd}}
      echo "" >> {{analysisOutputMd}}
      echo "*此报告由 AI 智能分析协调器模块自动生成*" >> {{analysisOutputMd}}

      echo "[AI Coordinator] Comprehensive report saved"

  - name: save-memory-context
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}} && {{enableMemory}}"
    on_error:
      - action: continue
    command: |
      mkdir -p {{Output}}/ai-analysis

      STATS_FILE="{{Output}}/ai-analysis/intelligent-stats.json"
      AGG_FILE="{{Output}}/ai-analysis/aggregated-results.json"
      RISK="中"
      TOTAL=0

      if [ -f "$STATS_FILE" ]; then
        CRITICAL=$(jq -r '.critical // 0' "$STATS_FILE" 2>/dev/null || echo 0)
        HIGH=$(jq -r '.high // 0' "$STATS_FILE" 2>/dev/null || echo 0)
        TOTAL=$((CRITICAL + HIGH))
        if [ "$CRITICAL" -gt 5 ]; then
          RISK="高"
        elif [ "$CRITICAL" -eq 0 ] && [ "$HIGH" -lt 5 ]; then
          RISK="低"
        fi
      fi

      # 从聚合结果获取更多信息
      CONFIRMED=0
      CHAINS=0
      if [ -f "$AGG_FILE" ]; then
        CONFIRMED=$(jq -r '.components.vuln_validation.confirmed_vulns // 0' "$AGG_FILE" 2>/dev/null || echo 0)
        CHAINS=$(jq -r '.components.attack_chain.total_chains // 0' "$AGG_FILE" 2>/dev/null || echo 0)
      fi

      cat > {{memoryOutput}} << EOF
      {
        "target": "{{Target}}",
        "timestamp": "$(date -Iseconds)",
        "phase": "intelligent-analysis",
        "analysis_type": "coordinator-aggregated",
        "risk_level": "$RISK",
        "total_findings": $TOTAL,
        "confirmed_findings": $CONFIRMED,
        "attack_chains": $CHAINS,
        "components_completed": ["vuln_validation", "attack_chain", "path_planning", "semantic_search", "passive_web_risk"],
        "next_phases": ["vuln-suite", "code-review", "report"]
      }
      EOF

      echo "[AI Memory] Context saved to {{memoryOutput}}"

  - name: generate-ai-status-report
    type: bash
    pre_condition: "{{enableIntelligentAnalysis}}"
    on_error:
      - action: continue
    command: |
      mkdir -p {{Output}}/ai-analysis

      REPORT_FILE="{{Output}}/ai-analysis/ai-execution-status.json"
      MARKDOWN_FILE="{{Output}}/ai-analysis/ai-execution-status.md"
      SUMMARY_FILE="{{analysisOutputJson}}"

      echo "[AI Status] Generating execution status report..."

      count_bytes() {
        file="$1"
        if [ -f "$file" ]; then
          wc -c < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      # 收集各模块状态
      check_module() {
        name="$1"
        file="$2"
        size=0
        status="not_run"
        error=""

        if [ -f "$file" ]; then
          size=$(count_bytes "$file")
          if [ "$size" -gt 50 ]; then
            if jq empty "$file" 2>/dev/null; then
              status="completed"
              error=$(jq -r '.error // "none"' "$file" 2>/dev/null)
              if [ "$error" = "none" ] || [ -z "$error" ]; then
                error=""
              fi
            else
              status="invalid_json"
              error="JSON validation failed"
            fi
          else
            status="empty_output"
            error="Output too small"
          fi
        else
          status="file_not_found"
          error="Module output file not found"
        fi

        echo "$name|$status|$size|$error"
      }

      parse_result() {
        result="$1"
        field="$2"
        case "$field" in
          name) printf '%s\n' "$result" | cut -d'|' -f1 ;;
          status) printf '%s\n' "$result" | cut -d'|' -f2 ;;
          size) printf '%s\n' "$result" | cut -d'|' -f3 ;;
          error) printf '%s\n' "$result" | cut -d'|' -f4- ;;
          *) return 1 ;;
        esac
      }

      # 检查各模块
      VULN_RESULT=$(check_module "vuln-validation" "{{vulnValidationFile}}")
      CHAIN_RESULT=$(check_module "attack-chain" "{{attackChainFile}}")
      PLAN_RESULT=$(check_module "path-planning" "{{pathPlanningFile}}")
      SEMANTIC_RESULT=$(check_module "semantic-search" "{{semanticSearchFile}}")

      VULN_STATUS=$(parse_result "$VULN_RESULT" status)
      VULN_SIZE=$(parse_result "$VULN_RESULT" size)
      VULN_ERROR=$(parse_result "$VULN_RESULT" error)
      CHAIN_STATUS=$(parse_result "$CHAIN_RESULT" status)
      CHAIN_SIZE=$(parse_result "$CHAIN_RESULT" size)
      CHAIN_ERROR=$(parse_result "$CHAIN_RESULT" error)
      PLAN_STATUS=$(parse_result "$PLAN_RESULT" status)
      PLAN_SIZE=$(parse_result "$PLAN_RESULT" size)
      PLAN_ERROR=$(parse_result "$PLAN_RESULT" error)
      SEMANTIC_STATUS=$(parse_result "$SEMANTIC_RESULT" status)
      SEMANTIC_SIZE=$(parse_result "$SEMANTIC_RESULT" size)
      SEMANTIC_ERROR=$(parse_result "$SEMANTIC_RESULT" error)

      COMPLETED_COUNT=0
      FAILED_COUNT=0
      SKIPPED_COUNT=0
      OVERALL_STATUS="completed"
      RECOMMENDATIONS='[]'

      for status in "$VULN_STATUS" "$CHAIN_STATUS" "$PLAN_STATUS" "$SEMANTIC_STATUS"; do
        case "$status" in
          completed) COMPLETED_COUNT=$((COMPLETED_COUNT + 1)) ;;
          invalid_json)
            FAILED_COUNT=$((FAILED_COUNT + 1))
            OVERALL_STATUS="partial"
            ;;
          empty_output|file_not_found|not_run)
            SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
            [ "$OVERALL_STATUS" = "completed" ] && OVERALL_STATUS="partial"
            ;;
          *)
            FAILED_COUNT=$((FAILED_COUNT + 1))
            OVERALL_STATUS="partial"
            ;;
        esac
      done

      if [ "$FAILED_COUNT" -gt 0 ] && [ "$SKIPPED_COUNT" -gt 0 ]; then
        RECOMMENDATIONS='["Check module outputs and logs for failed steps","Review upstream scan coverage because some modules produced no usable artifacts"]'
      elif [ "$FAILED_COUNT" -gt 0 ]; then
        RECOMMENDATIONS='["Check module outputs and logs for failed steps"]'
      elif [ "$SKIPPED_COUNT" -gt 2 ]; then
        RECOMMENDATIONS='["Review upstream scan coverage because multiple modules produced no usable artifacts"]'
      fi

      jq -n \
        --arg generated "$(date -Iseconds)" \
        --arg target "{{Target}}" \
        --arg overall_status "$OVERALL_STATUS" \
        --arg vuln_status "$VULN_STATUS" \
        --argjson vuln_size "$VULN_SIZE" \
        --arg vuln_error "$VULN_ERROR" \
        --arg chain_status "$CHAIN_STATUS" \
        --argjson chain_size "$CHAIN_SIZE" \
        --arg chain_error "$CHAIN_ERROR" \
        --arg plan_status "$PLAN_STATUS" \
        --argjson plan_size "$PLAN_SIZE" \
        --arg plan_error "$PLAN_ERROR" \
        --arg semantic_status "$SEMANTIC_STATUS" \
        --argjson semantic_size "$SEMANTIC_SIZE" \
        --arg semantic_error "$SEMANTIC_ERROR" \
        --argjson recommendations "$RECOMMENDATIONS" \
        '{
          report_generated: $generated,
          target: $target,
          overall_status: $overall_status,
          modules: {
            "vuln-validation": {status: $vuln_status, size: $vuln_size, error: $vuln_error},
            "attack-chain": {status: $chain_status, size: $chain_size, error: $chain_error},
            "path-planning": {status: $plan_status, size: $plan_size, error: $plan_error},
            "semantic-search": {status: $semantic_status, size: $semantic_size, error: $semantic_error}
          },
          recommendations: $recommendations
        }' > "$REPORT_FILE"

      # 生成 Markdown 报告
      generate_markdown_report() {
        cat > "$MARKDOWN_FILE" << 'EOF'
      # AI 模块执行状态报告
      
      ## 目标
      TARGET_PLACEHOLDER
      
      ## 生成时间
      TIMESTAMP_PLACEHOLDER
      
      ---
      
      ## 模块执行状态
      
      | 模块 | 状态 | 大小 | 备注 |
      |------|------|------|------|
      
      ---
      
      ## 执行摘要
      
      ---
      
      ## 建议
      
      EOF

        sed -i "s|TARGET_PLACEHOLDER|{{Target}}|g" "$MARKDOWN_FILE"
        sed -i "s|TIMESTAMP_PLACEHOLDER|$(date '+%Y-%m-%d %H:%M:%S')|g" "$MARKDOWN_FILE"

        # 添加模块状态表格
        for result in "$VULN_RESULT" "$CHAIN_RESULT" "$PLAN_RESULT" "$SEMANTIC_RESULT"; do
          name=$(parse_result "$result" name)
          status=$(parse_result "$result" status)
          size=$(parse_result "$result" size)
          error=$(parse_result "$result" error)
          status_icon=""
          case $status in
            completed) status_icon="[OK]" ;;
            failed) status_icon="[FAIL]" ;;
            invalid_json) status_icon="[WARN]" ;;
            empty_output) status_icon="[EMPTY]" ;;
            not_run) status_icon="[SKIP]" ;;
            *) status_icon="[?]" ;;
          esac
          echo "| $name | $status_icon $status | $size bytes | $error |" >> "$MARKDOWN_FILE"
        done

        # 添加执行摘要
        echo "" >> "$MARKDOWN_FILE"
        echo "**执行摘要**: $COMPLETED_COUNT 成功, $FAILED_COUNT 失败, $SKIPPED_COUNT 跳过/空" >> "$MARKDOWN_FILE"
        echo "" >> "$MARKDOWN_FILE"

        # 添加建议
        if [ "$FAILED_COUNT" -gt 0 ]; then
          echo "**建议**: 部分模块执行失败，建议检查日志文件获取详细信息。" >> "$MARKDOWN_FILE"
        fi
        if [ "$SKIPPED_COUNT" -gt 2 ]; then
          echo "**注意**: 多个模块未产生有效输出，可能是前置扫描未完成或数据不足。" >> "$MARKDOWN_FILE"
        fi
      }

      generate_markdown_report

      jq -n \
        --arg generated "$(date -Iseconds)" \
        --arg target "{{Target}}" \
        --arg overall_status "$OVERALL_STATUS" \
        --arg stats_file "{{Output}}/ai-analysis/intelligent-stats.json" \
        --arg aggregated_results_file "{{Output}}/ai-analysis/aggregated-results.json" \
        --arg decision_file "{{aiDecisionFile}}" \
        --arg vars_file "{{aiVarsFile}}" \
        --arg markdown_file "{{analysisOutputMd}}" \
        --arg status_file "$REPORT_FILE" \
        --argjson completed_modules "$COMPLETED_COUNT" \
        --argjson failed_modules "$FAILED_COUNT" \
        --argjson skipped_modules "$SKIPPED_COUNT" \
        --argjson recommendations "$RECOMMENDATIONS" \
        '{
          generated_at: $generated,
          target: $target,
          overall_status: $overall_status,
          artifacts: {
            stats_file: $stats_file,
            aggregated_results_file: $aggregated_results_file,
            decision_file: $decision_file,
            vars_file: $vars_file,
            markdown_file: $markdown_file,
            status_file: $status_file
          },
          module_counts: {
            completed: $completed_modules,
            failed: $failed_modules,
            skipped_or_empty: $skipped_modules
          },
          recommendations: $recommendations
        }' > "$SUMMARY_FILE"

      echo "[AI Status] Report saved to $REPORT_FILE"
      echo "[AI Status] Markdown report saved to $MARKDOWN_FILE"
      echo "[AI Status] Summary saved to $SUMMARY_FILE"

      # 输出汇总信息
      echo ""
      echo "========== AI 执行状态汇总 =========="
      echo "目标: {{Target}}"
      echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
      echo ""
      echo "模块状态:"
      for result in "$VULN_RESULT" "$CHAIN_RESULT" "$PLAN_RESULT" "$SEMANTIC_RESULT"; do
        name=$(parse_result "$result" name)
        status=$(parse_result "$result" status)
        size=$(parse_result "$result" size)
        printf "  %-20s %-15s (%s bytes)\n" "$name" "$status" "$size"
      done
      echo "=========================================="

  - name: log-analysis-complete
    type: function
    pre_condition: "{{enableIntelligentAnalysis}}"
    functions:
      - 'log_info("AI Intelligent analysis coordination completed for {{Target}}")'

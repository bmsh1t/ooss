kind: module
name: ai-post-followup-coordination
description: Aggregate follow-up execution outputs into a final AI decision package for reporting and downstream reuse

params:
  - name: followupDecisionOutput
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"
  - name: followupDecisionMd
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.md"
  - name: followupPriorityTargetsFile
    default: "{{Output}}/ai-analysis/followup-priority-targets-{{TargetSpace}}.txt"
  - name: followupFocusAreasFile
    default: "{{Output}}/ai-analysis/followup-focus-areas-{{TargetSpace}}.txt"
  - name: resumeContextOutput
    default: "{{Output}}/ai-analysis/resume-context-{{TargetSpace}}.json"
  - name: nextActionsOutput
    default: "{{Output}}/ai-analysis/next-actions-{{TargetSpace}}.json"
  - name: operatorSummaryOutput
    default: "{{Output}}/ai-analysis/operator-summary-{{TargetSpace}}.md"

  - name: aiDecisionFile
    default: "{{Output}}/ai-analysis/ai-decision-{{TargetSpace}}.json"
  - name: appliedDecisionFile
    default: "{{Output}}/ai-analysis/applied-ai-decision-{{TargetSpace}}.json"
  - name: retestPlanOutput
    default: "{{Output}}/ai-analysis/retest-plan-{{TargetSpace}}.json"
  - name: operatorQueueOutput
    default: "{{Output}}/ai-analysis/operator-queue-{{TargetSpace}}.json"
  - name: campaignHandoffOutput
    default: "{{Output}}/ai-analysis/campaign-handoff-{{TargetSpace}}.json"
  - name: campaignCreateOutput
    default: "{{Output}}/ai-analysis/campaign-create-{{TargetSpace}}.json"
  - name: retestQueueSummary
    default: "{{Output}}/ai-analysis/retest-queue-summary-{{TargetSpace}}.json"
  - name: rescanOutputJsonl
    default: "{{Output}}/vulnscan/nuclei-rescan-{{TargetSpace}}.jsonl"
  - name: semanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-{{TargetSpace}}.txt"
  - name: fallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"
  - name: secondFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
  - name: thirdFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-early-{{TargetSpace}}.txt"
  - name: confirmedUrlsFile
    default: "{{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt"
  - name: operatorQueueTargetsFile
    default: "{{Output}}/ai-analysis/operator-queue-targets-{{TargetSpace}}.txt"
  - name: retestTargetsFile
    default: "{{Output}}/ai-analysis/retest-targets-{{TargetSpace}}.txt"
  - name: campaignTargetsFile
    default: "{{Output}}/ai-analysis/campaign-targets-{{TargetSpace}}.txt"
  - name: passiveWebRiskSummaryFile
    default: "{{Output}}/passive-web-risk/passive-web-risk-summary-{{TargetSpace}}.md"
  - name: sourceMapExposureFile
    default: "{{Output}}/passive-web-risk/source-map-exposure-{{TargetSpace}}.txt"
  - name: apiSurfaceFile
    default: "{{Output}}/passive-web-risk/api-surface-{{TargetSpace}}.txt"
  - name: corsCacheHeuristicsFile
    default: "{{Output}}/passive-web-risk/cors-cache-heuristics-{{TargetSpace}}.txt"
  - name: cloudLeakFile
    default: "{{Output}}/passive-web-risk/cloud-storage-leaks-{{TargetSpace}}.txt"

  - name: enablePostFollowupCoordination
    type: bool
    default: true

steps:
  - name: prepare-post-followup
    type: function
    pre_condition: "{{enablePostFollowupCoordination}}"
    functions:
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'log_info("Preparing post-followup coordination for {{Target}}")'

  - name: build-post-followup-decision
    type: bash
    pre_condition: "{{enablePostFollowupCoordination}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      file_to_json_array() {
        file="$1"
        if [ -f "$file" ]; then
          jq -R -s 'split("\n") | reduce .[] as $item ([]; ($item | gsub("^\\s+|\\s+$"; "")) as $normalized | if ($normalized != "" and (index($normalized) == null)) then . + [$normalized] else . end)' "$file" 2>/dev/null || echo '[]'
        else
          echo '[]'
        fi
      }

      count_operator_tasks() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          jq -r 'if has("tasks") then ([.tasks[]?] | length) else (.summary.total_tasks // 0) end' "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      campaign_targets_json_from_handoff() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          jq -c '
            if has("targets") then
              [
                (.targets.decision_rescan[]?),
                (.targets.retest[]?),
                (.targets.operator_focus[]?),
                (.targets.semantic_priority[]?),
                (.targets.previous_followup[]?)
              ]
              | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)
            else
              []
            end
          ' "$file" 2>/dev/null || echo '[]'
        else
          echo '[]'
        fi
      }

      count_campaign_targets() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          target_json=$(campaign_targets_json_from_handoff "$file")
          target_count=$(printf '%s\n' "$target_json" | jq -r 'length' 2>/dev/null || echo 0)
          if [ "${target_count:-0}" -gt 0 ] 2>/dev/null; then
            printf '%s\n' "$target_count"
          else
            jq -r '.counts.campaign_targets // 0' "$file" 2>/dev/null || echo 0
          fi
        else
          echo 0
        fi
      }

      count_retest_queued_targets() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          target_file=$(jq -r '.target_file // ""' "$file" 2>/dev/null || echo "")
          if [ -n "$target_file" ] && [ -f "$target_file" ]; then
            awk 'NF {count++} END {print count+0}' "$target_file" 2>/dev/null || echo 0
          else
            jq -r '.queued_targets // 0' "$file" 2>/dev/null || echo 0
          fi
        else
          echo 0
        fi
      }

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      append_passive_urls() {
        file="$1"
        [ -f "$file" ] || return 0
        grep -Eo 'https?://[^[:space:]]+' "$file" 2>/dev/null || true
      }

      ACTIVE_SEMANTIC_PRIORITY_FILE="{{semanticPriorityTargetsFile}}"
      for candidate in "{{semanticPriorityTargetsFile}}" "{{fallbackSemanticPriorityTargetsFile}}" "{{secondFallbackSemanticPriorityTargetsFile}}" "{{thirdFallbackSemanticPriorityTargetsFile}}"; do
        [ -n "$candidate" ] || continue
        if text_has_lines "$candidate"; then
          ACTIVE_SEMANTIC_PRIORITY_FILE="$candidate"
          break
        fi
      done

      ACTIVE_DECISION_FILE="{{aiDecisionFile}}"
      if [ -f "{{appliedDecisionFile}}" ] && jq empty "{{appliedDecisionFile}}" 2>/dev/null; then
        ACTIVE_DECISION_FILE="{{appliedDecisionFile}}"
      fi

      BASE_FOCUS_JSON='[]'
      BASE_RESCAN_JSON='[]'
      BASE_REASONING="no_base_decision"
      BASE_PROFILE="focused"
      BASE_SEVERITY="critical,high"
      if [ -f "$ACTIVE_DECISION_FILE" ] && jq empty "$ACTIVE_DECISION_FILE" 2>/dev/null; then
        BASE_FOCUS_JSON=$(jq -c '.targets.focus_areas // .focus_areas // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        BASE_RESCAN_JSON=$(jq -c '.targets.rescan_targets // .rescan_targets // []' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo '[]')
        BASE_REASONING=$(jq -r '.reasoning // "ai-decision-loaded"' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo "ai-decision-loaded")
        BASE_PROFILE=$(jq -r '.scan.profile // "focused"' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo "focused")
        BASE_SEVERITY=$(jq -r '.scan.severity // .nuclei_severity // "critical,high"' "$ACTIVE_DECISION_FILE" 2>/dev/null || echo "critical,high")
      fi

      RETEST_TARGETS_JSON='[]'
      RETEST_COUNT=0
      if [ -f "{{retestPlanOutput}}" ] && jq empty "{{retestPlanOutput}}" 2>/dev/null; then
        RETEST_TARGETS_JSON=$(jq -c '[((.targets[]? | if type == "object" then .target else . end)), ((.automation_queue[]? | if type == "object" then .target else . end))] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{retestPlanOutput}}" 2>/dev/null || echo '[]')
        RETEST_COUNT=$(printf '%s\n' "$RETEST_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)
      fi

      OPERATOR_TARGETS_JSON='[]'
      OPERATOR_TASKS=0
      if [ -f "{{operatorQueueOutput}}" ] && jq empty "{{operatorQueueOutput}}" 2>/dev/null; then
        OPERATOR_TARGETS_JSON=$(jq -c '[.focus_targets[]?, .tasks[]?.target] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{operatorQueueOutput}}" 2>/dev/null || echo '[]')
        OPERATOR_TASKS=$(count_operator_tasks "{{operatorQueueOutput}}")
      fi

      CAMPAIGN_READY=false
      CAMPAIGN_TARGETS=0
      CAMPAIGN_CREATE_STATUS="not_requested"
      CAMPAIGN_CREATE_ID=""
      CAMPAIGN_CREATE_QUEUED_RUNS=0
      if [ -f "{{campaignHandoffOutput}}" ] && jq empty "{{campaignHandoffOutput}}" 2>/dev/null; then
        CAMPAIGN_READY=$(jq -r '.handoff_ready // false' "{{campaignHandoffOutput}}" 2>/dev/null || echo false)
        CAMPAIGN_TARGETS=$(count_campaign_targets "{{campaignHandoffOutput}}")
      fi
      if [ -f "{{campaignCreateOutput}}" ] && jq empty "{{campaignCreateOutput}}" 2>/dev/null; then
        CAMPAIGN_CREATE_STATUS=$(jq -r '.status // "not_requested"' "{{campaignCreateOutput}}" 2>/dev/null || echo not_requested)
        CAMPAIGN_CREATE_ID=$(jq -r '.campaign_id // ""' "{{campaignCreateOutput}}" 2>/dev/null || echo "")
        CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.queued_runs // 0' "{{campaignCreateOutput}}" 2>/dev/null || echo 0)
      fi

      RETEST_QUEUED=0
      RETEST_QUEUE_STATUS="not_requested"
      if [ -f "{{retestQueueSummary}}" ] && jq empty "{{retestQueueSummary}}" 2>/dev/null; then
        RETEST_QUEUED=$(count_retest_queued_targets "{{retestQueueSummary}}")
        RETEST_QUEUE_STATUS=$(jq -r '.status // "not_requested"' "{{retestQueueSummary}}" 2>/dev/null || echo not_requested)
      fi

      RESCAN_TOTAL=$(count_lines "{{rescanOutputJsonl}}")
      if [ -f "{{rescanOutputJsonl}}" ]; then
        RESCAN_CRITICAL=$(jq -r 'select(.info.severity == "critical") | 1' "{{rescanOutputJsonl}}" 2>/dev/null | wc -l | tr -d ' ')
        RESCAN_HIGH=$(jq -r 'select(.info.severity == "high") | 1' "{{rescanOutputJsonl}}" 2>/dev/null | wc -l | tr -d ' ')
      else
        RESCAN_CRITICAL=0
        RESCAN_HIGH=0
      fi

      PASSIVE_TARGETS_TMP="{{Output}}/ai-analysis/.followup-passive-targets-{{TargetSpace}}.txt"
      : > "$PASSIVE_TARGETS_TMP"
      {
        append_passive_urls "{{sourceMapExposureFile}}"
        append_passive_urls "{{apiSurfaceFile}}"
        append_passive_urls "{{corsCacheHeuristicsFile}}"
        append_passive_urls "{{cloudLeakFile}}"
        append_passive_urls "{{passiveWebRiskSummaryFile}}"
      } | awk 'NF && !seen[$0]++' > "$PASSIVE_TARGETS_TMP" || true
      PASSIVE_TARGETS_JSON=$(file_to_json_array "$PASSIVE_TARGETS_TMP")
      PASSIVE_TARGET_COUNT=$(printf '%s\n' "$PASSIVE_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)

      {
        printf '%s\n' "$BASE_FOCUS_JSON" | jq -r '.[]' 2>/dev/null
        printf '%s\n' "$BASE_RESCAN_JSON" | jq -r '.[]' 2>/dev/null
        printf '%s\n' "$RETEST_TARGETS_JSON" | jq -r '.[]' 2>/dev/null
        printf '%s\n' "$OPERATOR_TARGETS_JSON" | jq -r '.[]' 2>/dev/null
        printf '%s\n' "$PASSIVE_TARGETS_JSON" | jq -r '.[]' 2>/dev/null
        cat "$ACTIVE_SEMANTIC_PRIORITY_FILE" 2>/dev/null || true
        cat "{{operatorQueueTargetsFile}}" 2>/dev/null || true
        cat "{{retestTargetsFile}}" 2>/dev/null || true
        cat "{{campaignTargetsFile}}" 2>/dev/null || true
        head -20 "{{confirmedUrlsFile}}" 2>/dev/null || true
      } | awk 'NF && !seen[$0]++' > "{{followupPriorityTargetsFile}}" || true

      {
        printf '%s\n' "$BASE_FOCUS_JSON" | jq -r '.[]' 2>/dev/null
        printf '%s\n' "$PASSIVE_TARGETS_JSON" | jq -r '.[]' 2>/dev/null
        cat "$ACTIVE_SEMANTIC_PRIORITY_FILE" 2>/dev/null || true
        cat "{{operatorQueueTargetsFile}}" 2>/dev/null || true
        head -15 "{{confirmedUrlsFile}}" 2>/dev/null || true
      } | awk 'NF && !seen[$0]++' > "{{followupFocusAreasFile}}" || true

      PRIORITY_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' "{{followupPriorityTargetsFile}}" 2>/dev/null || echo '[]')
      FOCUS_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' "{{followupFocusAreasFile}}" 2>/dev/null || echo '[]')
      CONFIRMED_JSON=$(file_to_json_array "{{confirmedUrlsFile}}")
      CONFIRMED_COUNT=$(printf '%s\n' "$CONFIRMED_JSON" | jq -r 'length' 2>/dev/null || echo 0)
      CAMPAIGN_TARGETS_JSON=$(file_to_json_array "{{campaignTargetsFile}}")
      if [ "$(printf '%s\n' "$CAMPAIGN_TARGETS_JSON" | jq -r 'length' 2>/dev/null || echo 0)" -eq 0 ] 2>/dev/null; then
        CAMPAIGN_TARGETS_JSON=$(campaign_targets_json_from_handoff "{{campaignHandoffOutput}}")
      fi
      SEMANTIC_PRIORITY_JSON=$(file_to_json_array "$ACTIVE_SEMANTIC_PRIORITY_FILE")

      RESCAN_CRITICAL_TMP="{{Output}}/ai-analysis/.rescan-critical-targets-{{TargetSpace}}.txt"
      RESCAN_HIGH_TMP="{{Output}}/ai-analysis/.rescan-high-targets-{{TargetSpace}}.txt"
      REUSE_SOURCES_TMP="{{Output}}/ai-analysis/.seed-reuse-sources-{{TargetSpace}}.txt"
      : > "$RESCAN_CRITICAL_TMP"
      : > "$RESCAN_HIGH_TMP"
      : > "$REUSE_SOURCES_TMP"

      if [ -f "{{rescanOutputJsonl}}" ] && [ -s "{{rescanOutputJsonl}}" ]; then
        jq -r 'select(.info.severity == "critical") | (."matched-at" // .matched_at // .host // .matched // "")' "{{rescanOutputJsonl}}" 2>/dev/null \
          | awk 'NF && !seen[$0]++' > "$RESCAN_CRITICAL_TMP" || true
        jq -r 'select(.info.severity == "high") | (."matched-at" // .matched_at // .host // .matched // "")' "{{rescanOutputJsonl}}" 2>/dev/null \
          | awk 'NF && !seen[$0]++' > "$RESCAN_HIGH_TMP" || true
      fi

      RESCAN_CRITICAL_TARGETS_JSON=$(file_to_json_array "$RESCAN_CRITICAL_TMP")
      RESCAN_HIGH_TARGETS_JSON=$(file_to_json_array "$RESCAN_HIGH_TMP")

      if [ "$RETEST_COUNT" -gt 0 ] || [ "$RETEST_QUEUED" -gt 0 ]; then
        echo "retest" >> "$REUSE_SOURCES_TMP"
      fi
      if [ "$OPERATOR_TASKS" -gt 0 ]; then
        echo "operator-queue" >> "$REUSE_SOURCES_TMP"
      fi
      if [ "$CAMPAIGN_READY" = "true" ] || [ "$CAMPAIGN_TARGETS" -gt 0 ]; then
        echo "campaign-handoff" >> "$REUSE_SOURCES_TMP"
      fi
      if [ "$CAMPAIGN_CREATE_STATUS" = "created" ] || [ "$CAMPAIGN_CREATE_QUEUED_RUNS" -gt 0 ]; then
        echo "campaign-create" >> "$REUSE_SOURCES_TMP"
      fi
      if text_has_lines "$ACTIVE_SEMANTIC_PRIORITY_FILE"; then
        echo "semantic-priority" >> "$REUSE_SOURCES_TMP"
      fi
      if [ "$CONFIRMED_COUNT" -gt 0 ]; then
        echo "confirmed-urls" >> "$REUSE_SOURCES_TMP"
      fi
      if [ "$RESCAN_CRITICAL" -gt 0 ] || [ "$RESCAN_HIGH" -gt 0 ]; then
        echo "targeted-rescan" >> "$REUSE_SOURCES_TMP"
      fi
      if [ "$PASSIVE_TARGET_COUNT" -gt 0 ]; then
        echo "passive-web-risk" >> "$REUSE_SOURCES_TMP"
      fi
      REUSE_SOURCES_JSON=$(file_to_json_array "$REUSE_SOURCES_TMP")

      MANUAL_FIRST_JSON=$(jq -n \
        --argjson confirmed "$CONFIRMED_JSON" \
        --argjson operator "$OPERATOR_TARGETS_JSON" \
        --argjson retest "$RETEST_TARGETS_JSON" \
        --argjson rescan_critical "$RESCAN_CRITICAL_TARGETS_JSON" \
        --argjson rescan_high "$RESCAN_HIGH_TARGETS_JSON" \
        '($operator + $confirmed + $rescan_critical + $rescan_high + $retest)
          | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)')

      HIGH_CONFIDENCE_JSON=$(jq -n \
        --argjson confirmed "$CONFIRMED_JSON" \
        --argjson operator "$OPERATOR_TARGETS_JSON" \
        --argjson retest "$RETEST_TARGETS_JSON" \
        --argjson campaign "$CAMPAIGN_TARGETS_JSON" \
        --argjson semantic "$SEMANTIC_PRIORITY_JSON" \
        --argjson rescan_critical "$RESCAN_CRITICAL_TARGETS_JSON" \
        --argjson rescan_high "$RESCAN_HIGH_TARGETS_JSON" \
        '($confirmed + $operator + $rescan_critical + $rescan_high + $retest + $campaign + $semantic)
          | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)')

      NEXT_PHASE="knowledge-consolidation"
      if [ "$RESCAN_CRITICAL" -gt 0 ] || [ "$OPERATOR_TASKS" -gt 0 ]; then
        NEXT_PHASE="manual-exploitation"
      elif [ "$CAMPAIGN_READY" = "true" ] || [ "$CAMPAIGN_TARGETS" -gt 0 ]; then
        NEXT_PHASE="campaign-followup"
      elif [ "$RETEST_COUNT" -gt 0 ] || [ "$RETEST_QUEUED" -gt 0 ]; then
        NEXT_PHASE="targeted-retest"
      fi

      SEED_PRIORITY_MODE="knowledge-first"
      if [ "$RESCAN_CRITICAL" -gt 0 ] || [ "$RESCAN_HIGH" -gt 0 ] || [ "$OPERATOR_TASKS" -gt 0 ]; then
        SEED_PRIORITY_MODE="manual-first"
      elif [ "$CAMPAIGN_READY" = "true" ] || [ "$CAMPAIGN_TARGETS" -gt 0 ]; then
        SEED_PRIORITY_MODE="campaign-first"
      elif [ "$RETEST_COUNT" -gt 0 ] || [ "$RETEST_QUEUED" -gt 0 ]; then
        SEED_PRIORITY_MODE="retest-first"
      fi

      ESCALATION_SCORE=$((RESCAN_CRITICAL * 5 + RESCAN_HIGH * 3 + OPERATOR_TASKS * 4 + RETEST_COUNT * 2 + RETEST_QUEUED * 2 + CAMPAIGN_TARGETS + CONFIRMED_COUNT))
      SEED_CONFIDENCE_LEVEL="low"
      if [ "$RESCAN_CRITICAL" -gt 0 ] || [ "$OPERATOR_TASKS" -gt 0 ] || [ "$ESCALATION_SCORE" -ge 12 ] 2>/dev/null; then
        SEED_CONFIDENCE_LEVEL="high"
      elif [ "$RESCAN_HIGH" -gt 0 ] || [ "$RETEST_COUNT" -gt 0 ] || [ "$RETEST_QUEUED" -gt 0 ] || [ "$CAMPAIGN_TARGETS" -gt 0 ] || [ "$CONFIRMED_COUNT" -gt 0 ]; then
        SEED_CONFIDENCE_LEVEL="medium"
      fi

      SEED_SCAN_PROFILE="$BASE_PROFILE"
      if [ "$BASE_PROFILE" = "aggressive" ]; then
        SEED_SCAN_PROFILE="aggressive"
      elif [ "$RESCAN_CRITICAL" -gt 0 ] || [ "$OPERATOR_TASKS" -ge 2 ] || [ "$ESCALATION_SCORE" -ge 14 ] 2>/dev/null; then
        SEED_SCAN_PROFILE="aggressive"
      elif [ "$OPERATOR_TASKS" -gt 0 ] || [ "$RESCAN_HIGH" -gt 0 ] || [ "$RETEST_COUNT" -gt 0 ] || [ "$RETEST_QUEUED" -gt 0 ] || [ "$CAMPAIGN_TARGETS" -gt 0 ]; then
        if [ "$BASE_PROFILE" = "focused" ]; then
          SEED_SCAN_PROFILE="balanced"
        fi
      fi

      SEED_SEVERITY="$BASE_SEVERITY"
      SEED_REASONING="$BASE_REASONING | followup mode=$SEED_PRIORITY_MODE confidence=$SEED_CONFIDENCE_LEVEL operator_tasks=$OPERATOR_TASKS retest_targets=$RETEST_COUNT campaign_targets=$CAMPAIGN_TARGETS passive_targets=$PASSIVE_TARGET_COUNT queued_retests=$RETEST_QUEUED rescan_critical=$RESCAN_CRITICAL rescan_high=$RESCAN_HIGH campaign_create_status=$CAMPAIGN_CREATE_STATUS queued_campaign_runs=$CAMPAIGN_CREATE_QUEUED_RUNS"

      jq -n \
        --arg generated_at "$(date -Iseconds)" \
        --arg base_decision_file "$ACTIVE_DECISION_FILE" \
        --arg base_profile "$BASE_PROFILE" \
        --arg base_severity "$BASE_SEVERITY" \
        --arg base_reasoning "$BASE_REASONING" \
        --arg seed_scan_profile "$SEED_SCAN_PROFILE" \
        --arg seed_severity "$SEED_SEVERITY" \
        --arg seed_reasoning "$SEED_REASONING" \
        --arg next_phase "$NEXT_PHASE" \
        --arg priority_mode "$SEED_PRIORITY_MODE" \
        --arg confidence_level "$SEED_CONFIDENCE_LEVEL" \
        --arg campaign_create_status "$CAMPAIGN_CREATE_STATUS" \
        --arg campaign_create_id "$CAMPAIGN_CREATE_ID" \
        --arg retest_queue_status "$RETEST_QUEUE_STATUS" \
        --argjson campaign_create_queued_runs "$CAMPAIGN_CREATE_QUEUED_RUNS" \
        --argjson retest_targets "$RETEST_COUNT" \
        --argjson retest_target_list "$RETEST_TARGETS_JSON" \
        --argjson operator_tasks "$OPERATOR_TASKS" \
        --argjson operator_target_list "$OPERATOR_TARGETS_JSON" \
        --argjson campaign_targets "$CAMPAIGN_TARGETS" \
        --argjson passive_targets "$PASSIVE_TARGET_COUNT" \
        --argjson retest_queued "$RETEST_QUEUED" \
        --argjson rescan_total "$RESCAN_TOTAL" \
        --argjson rescan_critical "$RESCAN_CRITICAL" \
        --argjson rescan_high "$RESCAN_HIGH" \
        --argjson campaign_ready "$CAMPAIGN_READY" \
        --argjson refined_focus_areas "$FOCUS_JSON" \
        --argjson refined_priority_targets "$PRIORITY_JSON" \
        --argjson confirmed_targets "$CONFIRMED_JSON" \
        --argjson semantic_priority_targets "$SEMANTIC_PRIORITY_JSON" \
        --argjson campaign_target_list "$CAMPAIGN_TARGETS_JSON" \
        --argjson rescan_critical_targets "$RESCAN_CRITICAL_TARGETS_JSON" \
        --argjson rescan_high_targets "$RESCAN_HIGH_TARGETS_JSON" \
        --argjson manual_first_targets "$MANUAL_FIRST_JSON" \
        --argjson high_confidence_targets "$HIGH_CONFIDENCE_JSON" \
        --argjson reuse_sources "$REUSE_SOURCES_JSON" \
        --argjson escalation_score "$ESCALATION_SCORE" \
        '{
          generated_at: $generated_at,
          base_decision: {
            file: $base_decision_file,
            profile: $base_profile,
            severity: $base_severity,
            reasoning: $base_reasoning
          },
          followup_summary: {
            retest_targets: $retest_targets,
            operator_tasks: $operator_tasks,
            campaign_targets: $campaign_targets,
            passive_targets: $passive_targets,
            retest_queued_targets: $retest_queued,
            rescan_findings: $rescan_total,
            rescan_critical: $rescan_critical,
            rescan_high: $rescan_high,
            campaign_ready: $campaign_ready,
            campaign_create_status: $campaign_create_status,
            campaign_create_id: $campaign_create_id,
            campaign_create_queued_runs: $campaign_create_queued_runs,
            retest_queue_status: $retest_queue_status
          },
          refined_targets: {
            focus_areas: $refined_focus_areas,
            priority_targets: $refined_priority_targets
          },
          seed_targets: {
            focus_areas: $refined_focus_areas,
            priority_targets: $refined_priority_targets,
            rescan_targets: (($refined_priority_targets + $refined_focus_areas + $manual_first_targets + $high_confidence_targets) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)),
            retest_targets: $retest_target_list,
            operator_targets: $operator_target_list,
            campaign_targets: $campaign_target_list,
            confirmed_targets: $confirmed_targets,
            semantic_targets: $semantic_priority_targets,
            rescan_critical_targets: $rescan_critical_targets,
            rescan_high_targets: $rescan_high_targets,
            manual_first_targets: $manual_first_targets,
            high_confidence_targets: $high_confidence_targets
          },
          seed_focus: {
            scan_profile: $seed_scan_profile,
            severity: $seed_severity,
            reasoning: $seed_reasoning,
            next_phase: $next_phase,
            priority_mode: $priority_mode,
            confidence_level: $confidence_level,
            reuse_sources: $reuse_sources,
            signal_scores: {
              confirmed_urls: ($confirmed_targets | length),
              retest_targets: $retest_targets,
              operator_tasks: $operator_tasks,
              campaign_targets: $campaign_targets,
              passive_targets: $passive_targets,
              retest_queued_targets: $retest_queued,
              rescan_critical: $rescan_critical,
              rescan_high: $rescan_high,
              escalation_score: $escalation_score
            },
            keep_aggressive_scan: (($seed_scan_profile == "aggressive") or ($rescan_critical > 0)),
            manual_followup_needed: (($operator_tasks > 0) or ($rescan_critical > 0) or ($rescan_high > 0)),
            campaign_followup_recommended: (($campaign_ready == true) and ($campaign_targets > 0)),
            queue_followup_effective: ($retest_queued > 0)
          },
          execution_feedback: {
            next_phase: $next_phase,
            keep_aggressive_scan: (($seed_scan_profile == "aggressive") or ($rescan_critical > 0)),
            manual_followup_needed: (($operator_tasks > 0) or ($rescan_critical > 0) or ($rescan_high > 0)),
            campaign_followup_recommended: (($campaign_ready == true) and ($campaign_targets > 0)),
            queue_followup_effective: ($retest_queued > 0)
          },
          next_actions: (
            [
              (if $rescan_total > 0 then "Review targeted rescan hits first and capture proof for all new findings" else empty end),
              (if $operator_tasks > 0 then "Execute P1/P2 operator tasks against refined priority targets" else empty end),
              (if $passive_targets > 0 then "Keep passive web risk URLs in the refined target pack for low-noise manual validation" else empty end),
              (if ($campaign_ready == true) and ($campaign_targets > 0) then "Use campaign handoff as the next-stage batch execution package" else empty end),
              (if ($campaign_create_status == "created") and ($campaign_create_queued_runs > 0) then ("Track campaign " + $campaign_create_id + " and monitor " + ($campaign_create_queued_runs | tostring) + " queued runs for follow-up evidence") else empty end),
              (if $retest_queued > 0 then "Track queued retest jobs and fold their results back into the knowledge base" else empty end),
              "Persist the final follow-up decision package for future reruns and manual handoff"
            ] | map(select(. != null and . != ""))
          )
        }' > "{{followupDecisionOutput}}"

      rm -f "$RESCAN_CRITICAL_TMP" "$RESCAN_HIGH_TMP" "$REUSE_SOURCES_TMP" "$PASSIVE_TARGETS_TMP" 2>/dev/null || true

  - name: render-post-followup-markdown
    type: bash
    pre_condition: "{{enablePostFollowupCoordination}}"
    command: |
      {
        echo "# AI Post-Followup Decision"
        echo "## 目标: {{Target}}"
        echo ""
        jq -r '.base_decision | "- Base profile: \(.profile // "focused")\n- Base severity: \(.severity // "critical,high")\n- Reasoning: \(.reasoning // "n/a")"' "{{followupDecisionOutput}}" 2>/dev/null || true
        echo ""
        echo "## Follow-up Summary"
        jq -r '.followup_summary | "- Retest targets: \(.retest_targets // 0)\n- Operator tasks: \(.operator_tasks // 0)\n- Campaign targets: \(.campaign_targets // 0)\n- Passive targets: \(.passive_targets // 0)\n- Retest queued: \(.retest_queued_targets // 0)\n- Rescan findings: \(.rescan_findings // 0) (critical=\(.rescan_critical // 0), high=\(.rescan_high // 0))\n- Campaign ready: \(.campaign_ready // false)\n- Campaign create: \(.campaign_create_status // "not_requested")\n- Campaign id: \(.campaign_create_id // "")\n- Campaign queued runs: \(.campaign_create_queued_runs // 0)\n- Retest queue: \(.retest_queue_status // "not_requested")"' "{{followupDecisionOutput}}" 2>/dev/null || true
        echo ""
        echo "## Seed Focus"
        jq -r '.seed_focus | "- Scan profile: \(.scan_profile // "focused")\n- Severity: \(.severity // "critical,high")\n- Next phase: \(.next_phase // "knowledge-consolidation")\n- Priority mode: \(.priority_mode // "knowledge-first")\n- Confidence: \(.confidence_level // "low")\n- Reuse sources: \((.reuse_sources // []) | join(", "))"' "{{followupDecisionOutput}}" 2>/dev/null || true
        echo ""
        echo "## Refined Priority Targets"
        jq -r '.refined_targets.priority_targets[]? | "- \(.)"' "{{followupDecisionOutput}}" 2>/dev/null || echo "- none"
        echo ""
        echo "## Next Actions"
        jq -r '.next_actions[]? | "- \(.)"' "{{followupDecisionOutput}}" 2>/dev/null || true
      } > "{{followupDecisionMd}}"

  - name: write-resume-autopilot-artifacts
    type: bash
    pre_condition: "{{enablePostFollowupCoordination}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      if [ -f "{{followupDecisionOutput}}" ] && jq empty "{{followupDecisionOutput}}" >/dev/null 2>&1; then
        SOURCE_FILE="{{followupDecisionOutput}}"
      else
        SOURCE_FILE="{{Output}}/ai-analysis/.followup-decision-fallback-{{TargetSpace}}.json"
        jq -n \
          --arg generated_at "$(date -Iseconds)" \
          '{
            generated_at: $generated_at,
            followup_summary: {
              retest_targets: 0,
              operator_tasks: 0,
              campaign_targets: 0,
              passive_targets: 0,
              retest_queued_targets: 0,
              rescan_findings: 0,
              rescan_critical: 0,
              rescan_high: 0,
              campaign_ready: false,
              campaign_create_status: "not_requested",
              campaign_create_id: "",
              campaign_create_queued_runs: 0,
              retest_queue_status: "not_requested"
            },
            refined_targets: {
              focus_areas: [],
              priority_targets: []
            },
            seed_targets: {
              focus_areas: [],
              priority_targets: [],
              rescan_targets: [],
              retest_targets: [],
              operator_targets: [],
              campaign_targets: [],
              confirmed_targets: [],
              semantic_targets: [],
              rescan_critical_targets: [],
              rescan_high_targets: [],
              manual_first_targets: [],
              high_confidence_targets: []
            },
            seed_focus: {
              scan_profile: "focused",
              severity: "critical,high",
              reasoning: "no_followup_decision",
              next_phase: "knowledge-consolidation",
              priority_mode: "knowledge-first",
              confidence_level: "low",
              reuse_sources: [],
              signal_scores: {
                confirmed_urls: 0,
                retest_targets: 0,
                operator_tasks: 0,
                campaign_targets: 0,
                passive_targets: 0,
                retest_queued_targets: 0,
                rescan_critical: 0,
                rescan_high: 0,
                escalation_score: 0
              },
              keep_aggressive_scan: false,
              manual_followup_needed: false,
              campaign_followup_recommended: false,
              queue_followup_effective: false
            },
            next_actions: [
              "Persist the final follow-up decision package for future reruns and manual handoff"
            ]
          }' > "$SOURCE_FILE"
      fi

      jq -n \
        --arg generated_at "$(date -Iseconds)" \
        --arg target "{{Target}}" \
        --arg target_space "{{TargetSpace}}" \
        --arg source_file "{{followupDecisionOutput}}" \
        --slurpfile source "$SOURCE_FILE" \
        '($source[0] // {}) as $doc
        | {
            generated_at: $generated_at,
            target: $target,
            target_space: $target_space,
            followup_decision_file: $source_file,
            next_phase: ($doc.seed_focus.next_phase // "knowledge-consolidation"),
            priority_mode: ($doc.seed_focus.priority_mode // "knowledge-first"),
            confidence_level: ($doc.seed_focus.confidence_level // "low"),
            scan_profile: ($doc.seed_focus.scan_profile // "focused"),
            severity: ($doc.seed_focus.severity // "critical,high"),
            reasoning: ($doc.seed_focus.reasoning // "no_followup_decision"),
            reuse_sources: ($doc.seed_focus.reuse_sources // []),
            signal_scores: ($doc.seed_focus.signal_scores // {}),
            refined_targets: {
              focus_areas: ($doc.refined_targets.focus_areas // []),
              priority_targets: ($doc.refined_targets.priority_targets // [])
            },
            seed_targets: {
              rescan_targets: ($doc.seed_targets.rescan_targets // []),
              retest_targets: ($doc.seed_targets.retest_targets // []),
              operator_targets: ($doc.seed_targets.operator_targets // []),
              campaign_targets: ($doc.seed_targets.campaign_targets // []),
              confirmed_targets: ($doc.seed_targets.confirmed_targets // []),
              semantic_targets: ($doc.seed_targets.semantic_targets // []),
              manual_first_targets: ($doc.seed_targets.manual_first_targets // []),
              high_confidence_targets: ($doc.seed_targets.high_confidence_targets // [])
            },
            followup_summary: ($doc.followup_summary // {}),
            campaign_create: {
              status: ($doc.followup_summary.campaign_create_status // "not_requested"),
              campaign_id: ($doc.followup_summary.campaign_create_id // ""),
              queued_runs: ($doc.followup_summary.campaign_create_queued_runs // 0)
            },
            retest_queue: {
              status: ($doc.followup_summary.retest_queue_status // "not_requested"),
              queued_targets: ($doc.followup_summary.retest_queued_targets // 0)
            },
            next_actions: ($doc.next_actions // [])
          }' > "{{resumeContextOutput}}"

      jq -c '.next_actions // []' "$SOURCE_FILE" > "{{nextActionsOutput}}" 2>/dev/null || echo '[]' > "{{nextActionsOutput}}"

      {
        echo "# AI Operator Summary"
        echo "## Target: {{Target}}"
        echo ""
        jq -r '
          "- Next phase: \(.seed_focus.next_phase // "knowledge-consolidation")\n" +
          "- Priority mode: \(.seed_focus.priority_mode // "knowledge-first")\n" +
          "- Confidence: \(.seed_focus.confidence_level // "low")\n" +
          "- Scan profile: \(.seed_focus.scan_profile // "focused")\n" +
          "- Severity: \(.seed_focus.severity // "critical,high")\n" +
          "- Campaign status: \(.followup_summary.campaign_create_status // "not_requested")\n" +
          "- Campaign id: \(.followup_summary.campaign_create_id // "")\n" +
          "- Queued retests: \(.followup_summary.retest_queued_targets // 0)\n" +
          "- Operator tasks: \(.followup_summary.operator_tasks // 0)"
        ' "$SOURCE_FILE" 2>/dev/null || true
        echo ""
        echo "## Next Actions"
        jq -r '.next_actions[]? | "- \(.)"' "$SOURCE_FILE" 2>/dev/null || true
      } > "{{operatorSummaryOutput}}"

      if [ "$SOURCE_FILE" = "{{Output}}/ai-analysis/.followup-decision-fallback-{{TargetSpace}}.json" ]; then
        rm -f "$SOURCE_FILE" 2>/dev/null || true
      fi

  - name: log-post-followup-complete
    type: function
    pre_condition: "{{enablePostFollowupCoordination}}"
    functions:
      - 'log_info("Post-followup coordination completed for {{Target}}")'

# =============================================================================
# AI 攻击链分析模块 - 优化版
# =============================================================================
# 优化点：
# - JSON 输出稳定性：使用 Markdown + JSON 代码块格式
# - Token 优化：max_iterations 从 5 降到 3
# - 输入数据优化：精简数据量
# =============================================================================

kind: module
name: ai-attack-chain
description: AI-powered attack chain analysis - identify exploitable vulnerability chains

params:
  - name: attackChainOutput
    default: "{{Output}}/ai-analysis/attack-chain-{{TargetSpace}}.json"
  - name: attackChainsFile
    default: "{{Output}}/ai-analysis/attack-chains.txt"
  - name: criticalPathsFile
    default: "{{Output}}/ai-analysis/critical-paths.txt"

  # 输入文件
  - name: vulnValidationFile
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: nucleiCriticalFile
    default: "{{Output}}/vulnscan/nuclei-critical-{{TargetSpace}}.txt"
  - name: nucleiHighFile
    default: "{{Output}}/vulnscan/nuclei-high-{{TargetSpace}}.txt"
  - name: secretsFile
    default: "{{Output}}/vuln-scan-suite/secrets-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"
  - name: confirmedUrlsFile
    default: "{{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt"

  # 配置
  - name: enableAttackChain
    type: bool
    default: true

steps:
  - name: prepare-attack-chain
    type: function
    pre_condition: "{{enableAttackChain}}"
    log: "Preparing attack chain analysis"
    functions:
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'log_info("Starting AI attack chain analysis for {{Target}}")'

  - name: prepare-input-data
    type: bash
    pre_condition: "{{enableAttackChain}}"
    command: |
      mkdir -p {{Output}}/ai-analysis/.input

      # 优先使用已验证的漏洞数据
      if [ -f "{{vulnValidationFile}}" ] && jq empty "{{vulnValidationFile}}" 2>/dev/null; then
        echo "[Attack Chain] Using validated vulnerability data"
        
        # 提取 confirmed 漏洞（兼容两种 schema）
        # 1) 非 ACP: .findings[] with .status == "confirmed"
        # 2) ACP:    .validated_findings[] with .verification_status == "confirmed"
        jq -r '(
          [.findings[]? | select(.status == "confirmed") | "\(.type // .finding // "unknown") | \(.url // "unknown") | severity=\(.severity // "unknown")"] +
          [.validated_findings[]? | select(.verification_status == "confirmed") | "\(.finding // "unknown") | \(.url // "unknown") | severity=\(.severity // "unknown")"]
        )[]' "{{vulnValidationFile}}" 2>/dev/null > {{Output}}/ai-analysis/.input/confirmed-vulns.txt || true
        
        CONFIRMED_COUNT=$(wc -l < {{Output}}/ai-analysis/.input/confirmed-vulns.txt 2>/dev/null || echo 0)
        echo "[Attack Chain] Confirmed vulns: $CONFIRMED_COUNT"
      fi
      
      # 如果没有 confirmed 漏洞，使用原始扫描数据
      if [ ! -s "{{Output}}/ai-analysis/.input/confirmed-vulns.txt" ]; then
        echo "[Attack Chain] No confirmed vulns, using raw scan data"
        
        : > {{Output}}/ai-analysis/.input/confirmed-vulns.txt
        
        # Critical（前 10 条）
        if [ -f "{{nucleiCriticalFile}}" ]; then
          head -10 "{{nucleiCriticalFile}}" >> {{Output}}/ai-analysis/.input/confirmed-vulns.txt 2>/dev/null || true
        fi
        
        # High（前 5 条）
        if [ -f "{{nucleiHighFile}}" ]; then
          head -5 "{{nucleiHighFile}}" >> {{Output}}/ai-analysis/.input/confirmed-vulns.txt 2>/dev/null || true
        fi
      fi
      
      # 技术栈
      if [ -f "{{fingerprintFile}}" ]; then
        head -3 "{{fingerprintFile}}" | jq -r '"Tech: \(.tech | join(", "))"' 2>/dev/null > {{Output}}/ai-analysis/.input/tech-stack.txt || true
      fi
      
      INPUT_SIZE=$(wc -l < {{Output}}/ai-analysis/.input/confirmed-vulns.txt 2>/dev/null || echo 0)
      echo "[Attack Chain] Input prepared: $INPUT_SIZE lines"

  - name: check-attack-chain-data
    type: bash
    pre_condition: "{{enableAttackChain}}"
    command: |
      echo "[Attack Chain] Checking data availability..."
      
      CONFIRMED_SIZE=$(wc -l < {{Output}}/ai-analysis/.input/confirmed-vulns.txt 2>/dev/null || echo 0)
      
      if [ "$CONFIRMED_SIZE" -eq 0 ]; then
        echo "[WARN] Insufficient data for attack chain analysis"
        echo '{"error": "no_data", "attack_chain_summary": {"total_chains": 0}, "attack_chains": [], "critical_paths": []}' > {{attackChainOutput}}
        echo "SKIP_AI=true" > {{Output}}/ai-analysis/.attack-chain-skip
        exit 0
      fi
      
      rm -f {{Output}}/ai-analysis/.attack-chain-skip 2>/dev/null || true
      echo "[Attack Chain] Proceeding with analysis"

  - name: ai-analyze-attack-chains
    type: agent
    pre_condition: '{{enableAttackChain}} && !file_exists("{{Output}}/ai-analysis/.attack-chain-skip")'
    max_iterations: 3
    timeout: 600
    on_error:
      - action: continue
    system_prompt: |
      你是一个红队专家，分析漏洞构建攻击链。
      
      输出格式：
      先用文字分析攻击链，然后用 JSON 代码块输出。
      
      ## 分析示例
      
      ### 攻击链 1: SQL注入 → 数据库泄露
      - 入口: http://api.target.com/api?id=1 (SQL Injection, confirmed)
      - 中间步骤: 提取数据库版本和用户
      - 最终目标: 获取管理员凭据
      
      ### 攻击链 2: SSTI → RCE
      - 入口: http://target.com/api/template (SSTI, confirmed)
      - 直接利用获取 shell
      
      ### 关键路径
      - API Endpoint → SQLi → Database → Admin Access
      
      ```json
      {
        "attack_chain_summary": {
          "total_chains": 2,
          "critical_chains": 1,
          "most_likely_entry_points": ["http://api.target.com/api?id=1"]
        },
        "attack_chains": [
          {
            "chain_id": "chain-1",
            "chain_name": "SQL注入→数据库泄露",
            "entry_point": {
              "vulnerability": "SQL Injection",
              "url": "http://api.target.com/api?id=1",
              "severity": "high"
            },
            "chain_steps": [
              {"step": 1, "action": "验证 SQLi", "result": "确认可利用"},
              {"step": 2, "action": "提取数据库版本", "result": "MySQL 5.7"}
            ],
            "final_objective": "获取数据库访问",
            "difficulty": "中",
            "impact": "数据泄露",
            "success_probability": 0.85
          }
        ],
        "critical_paths": [
          {"path": ["API", "SQLi", "DB", "Admin"], "total_risk": "高"}
        ]
      }
      ```
      
      重要：
      1. 攻击链必须有具体可执行的步骤
      2. 每个链评估 success_probability (0.0-1.0)
      3. 识别最可能的入口点
    query: |
      分析 {{Target}} 的漏洞，构建攻击链。
      
      数据：
      - 漏洞列表：{{Output}}/ai-analysis/.input/confirmed-vulns.txt
      - 技术栈：{{Output}}/ai-analysis/.input/tech-stack.txt
      
      请读取数据文件，分析并输出攻击链。
      
      输出格式：
      1. 文字分析
      2. JSON 代码块
    agent_tools:
      - preset: read_file
      - preset: file_exists
      - preset: bash
      - preset: save_content
    exports:
      attack_chain_json: "{{agent_content}}"

  - name: save-attack-chain-results
    type: bash
    pre_condition: "{{enableAttackChain}}"
    command: |
      mkdir -p {{Output}}/ai-analysis

      printf '%s' '{{attack_chain_json}}' > /tmp/ai_chain_raw_$$.txt

      # 提取 markdown 代码块中的 JSON
      JSON_CONTENT=$(sed -n '/```json/,/```/p' /tmp/ai_chain_raw_$$.txt | sed '1d;$d' | sed 's/^[[:space:]]*//')
      
      if [ -z "$JSON_CONTENT" ]; then
        JSON_CONTENT=$(grep -o '{.*}' /tmp/ai_chain_raw_$$.txt | head -1)
      fi
      rm -f /tmp/ai_chain_raw_$$.txt

      if [ -n "$JSON_CONTENT" ] && echo "$JSON_CONTENT" | jq empty 2>/dev/null; then
        echo "$JSON_CONTENT" > {{attackChainOutput}}
        echo "[OK] Valid JSON extracted"
      else
        # Fallback
        echo '{"error": "parse_failed", "attack_chain_summary": {"total_chains": 0}, "attack_chains": [], "critical_paths": []}' > {{attackChainOutput}}
        echo "[WARN] Using fallback"
      fi
      
      # 验证必需字段
      for field in attack_chain_summary attack_chains; do
        if ! jq -e "has(\"$field\")" {{attackChainOutput}} > /dev/null 2>&1; then
          case $field in
            attack_chain_summary) jq '.attack_chain_summary = {"total_chains": 0}' {{attackChainOutput}} > {{attackChainOutput}}.tmp && mv {{attackChainOutput}}.tmp {{attackChainOutput}} ;;
            attack_chains) jq '.attack_chains = []' {{attackChainOutput}} > {{attackChainOutput}}.tmp && mv {{attackChainOutput}}.tmp {{attackChainOutput}} ;;
          esac
        fi
      done
      
      CHAIN_COUNT=$(jq -r '.attack_chain_summary.total_chains // 0' {{attackChainOutput}} 2>/dev/null)
      echo "[RESULT] Total chains: $CHAIN_COUNT"

  - name: extract-attack-chain-data
    type: bash
    pre_condition: "{{enableAttackChain}}"
    command: |
      # 提取入口点
      jq -r '.attack_chains[].entry_point.url // empty' {{attackChainOutput}} 2>/dev/null > {{Output}}/ai-analysis/entry-points-{{TargetSpace}}.txt || true
      
      ENTRY_COUNT=$(wc -l < {{Output}}/ai-analysis/entry-points-{{TargetSpace}}.txt 2>/dev/null || echo 0)
      echo "[Attack Chain] Extracted $ENTRY_COUNT entry points"

  - name: import-attack-chain-report
    type: function
    pre_condition: '{{enableAttackChain}} && file_exists("{{attackChainOutput}}")'
    functions:
      - 'db_import_attack_chain("{{TargetSpace}}", "{{attackChainOutput}}", "{{Target}}")'

  - name: log-attack-chain-complete
    type: function
    pre_condition: "{{enableAttackChain}}"
    functions:
      - 'log_info("AI attack chain analysis completed for {{Target}}")'

# =============================================================================
# AI 动态配置应用模块
# =============================================================================
# 功能：
# - 读取智能决策生成的配置
# - 将配置转换为环境变量或参数
# - 尝试应用配置影响后续扫描
# =============================================================================

kind: module
name: ai-apply-decision
description: Apply AI decision config to influence subsequent scans

params:
  - name: decisionOutput
    default: "{{Output}}/ai-analysis/ai-decision-{{TargetSpace}}.json"
  - name: preDecisionOutput
    default: "{{Output}}/ai-analysis/pre-ai-decision-{{TargetSpace}}.json"
  - name: previousFollowupDecisionFile
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"
  - name: previous_followup_targets
    default: ""
  - name: previous_followup_priority_targets
    default: ""
  - name: previous_followup_focus_areas
    default: ""
  - name: previous_followup_manual_first_targets
    default: ""
  - name: previous_followup_high_confidence_targets
    default: ""
  - name: previous_followup_reasoning
    default: ""
  - name: previous_followup_scan_profile
    default: ""
  - name: previous_followup_severity
    default: ""
  - name: previous_followup_priority_mode
    default: ""
  - name: previous_followup_confidence_level
    default: ""
  - name: previous_followup_next_phase
    default: ""
  - name: previous_followup_reuse_sources
    default: ""
  - name: previous_followup_resume_suppressed_actions
    default: ""
  - name: previous_followup_reused_actions
    default: ""
  - name: previous_followup_skipped_duplicate_actions
    default: ""
  - name: previous_followup_manual_followup_needed
    default: ""
  - name: previous_followup_campaign_followup_recommended
    default: ""
  - name: previous_followup_queue_followup_effective
    default: ""
  - name: previous_followup_escalation_score
    default: ""
  - name: previous_followup_campaign_create_status
    default: ""
  - name: previous_followup_campaign_create_id
    default: ""
  - name: previous_followup_campaign_create_queued_runs
    default: ""
  - name: previous_followup_manual_first_targets_list
    default: ""
  - name: previous_followup_high_confidence_targets_list
    default: ""
  - name: previous_followup_combined_targets_list
    default: ""
  - name: appliedDecisionOutput
    default: "{{Output}}/ai-analysis/applied-ai-decision-{{TargetSpace}}.json"
  - name: dynamicConfigOutput
    default: "{{Output}}/ai-analysis/dynamic-config.yaml"
  - name: scanEnvOutput
    default: "{{Output}}/ai-analysis/scan-env.sh"
  - name: focusAreasOutput
    default: "{{Output}}/ai-analysis/focus-areas.txt"
  - name: rescanTargetsOutput
    default: "{{Output}}/ai-analysis/rescan-targets-from-decision.txt"
  - name: enableAiDecision
    type: bool
    default: true
    description: "Enable AI decision application"

steps:
  - name: prepare-apply-decision
    type: function
    pre_condition: "{{enableAiDecision}}"
    functions:
      - 'create_folder("{{Output}}/ai-analysis")'
      - 'log_info("Preparing applied AI decision artifacts")'

  - name: build-applied-decision
    type: bash
    pre_condition: "{{enableAiDecision}}"
    on_error:
      - action: continue
    command: |
      mkdir -p {{Output}}/ai-analysis 2>/dev/null || true

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      normalize_int() {
        value="$1"
        case "$value" in
          ''|*[!0-9]*)
            echo 0
            ;;
          *)
            echo "$value"
            ;;
        esac
      }

      normalize_bool() {
        value=$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')
        case "$value" in
          1|true|yes|y|on)
            echo true
            ;;
          *)
            echo false
            ;;
        esac
      }

      csv_or_json_to_array() {
        value="$1"
        if [ -z "$value" ]; then
          echo '[]'
        elif printf '%s' "$value" | jq -e 'type == "array"' >/dev/null 2>&1; then
          printf '%s' "$value"
        else
          printf '%s' "$value" | jq -R 'split(",") | reduce .[] as $item ([]; ($item | gsub("^\\s+|\\s+$"; "")) as $normalized | if ($normalized != "" and (index($normalized) == null)) then . + [$normalized] else . end)'
        fi
      }

      DECISION_FILE=""
      DECISION_SOURCE="defaults"
      if [ -f "{{decisionOutput}}" ] && jq empty "{{decisionOutput}}" 2>/dev/null; then
        DECISION_FILE="{{decisionOutput}}"
        DECISION_SOURCE="ai-decision"
      elif [ -f "{{preDecisionOutput}}" ] && jq empty "{{preDecisionOutput}}" 2>/dev/null; then
        DECISION_FILE="{{preDecisionOutput}}"
        DECISION_SOURCE="pre-ai-decision"
      fi

      SEVERITY="critical,high"
      THREADS=10
      RATE_LIMIT=30
      TIMEOUT="6h"
      TIMEOUT_SECONDS=21600
      WAF_BYPASS="false"
      WAF_TECH=""
      WAF_DELAY="1s"
      REASONING="No AI decision file found, using defaults"
      DECISION_INPUTS='{}'
      FOCUS_JSON='[]'
      PRIORITY_JSON='[]'
      RESCAN_JSON='[]'
      FOLLOWUP_AVAILABLE="false"
      FOLLOWUP_SOURCE_KIND="none"
      FOLLOWUP_SOURCE_FILE="{{previousFollowupDecisionFile}}"
      FOLLOWUP_TARGET_COUNT=0
      FOLLOWUP_REASONING=""
      FOLLOWUP_SCAN_PROFILE=""
      FOLLOWUP_SEVERITY=""
      FOLLOWUP_NEXT_PHASE=""
      FOLLOWUP_PRIORITY_MODE=""
      FOLLOWUP_CONFIDENCE_LEVEL=""
      FOLLOWUP_ESCALATION_SCORE=0
      FOLLOWUP_CAMPAIGN_CREATE_STATUS=""
      FOLLOWUP_CAMPAIGN_CREATE_ID=""
      FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS=0
      FOLLOWUP_REUSE_SOURCES_JSON='[]'
      FOLLOWUP_RESUME_SUPPRESSED_JSON='[]'
      FOLLOWUP_REUSED_ACTIONS_JSON='[]'
      FOLLOWUP_SKIPPED_DUPLICATES_JSON='[]'
      FOLLOWUP_MANUAL_FOLLOWUP_NEEDED=false
      FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED=false
      FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE=false
      FOLLOWUP_FOCUS_JSON='[]'
      FOLLOWUP_PRIORITY_JSON='[]'
      FOLLOWUP_RESCAN_JSON='[]'
      FOLLOWUP_MANUAL_JSON='[]'
      FOLLOWUP_HIGH_CONFIDENCE_JSON='[]'
      FOLLOWUP_COMBINED_JSON='[]'
      FOLLOWUP_FOCUS_COUNT=0
      FOLLOWUP_PRIORITY_COUNT=0
      FOLLOWUP_MANUAL_COUNT=0
      FOLLOWUP_HIGH_CONFIDENCE_COUNT=0

      if [ -n "$DECISION_FILE" ]; then
        SEVERITY=$(jq -r '.nuclei_severity // "critical,high"' "$DECISION_FILE" 2>/dev/null || echo "critical,high")
        THREADS=$(jq -r '.suggested_threads // 10' "$DECISION_FILE" 2>/dev/null || echo 10)
        RATE_LIMIT=$(jq -r '.suggested_rate_limit // 30' "$DECISION_FILE" 2>/dev/null || echo 30)
        TIMEOUT=$(jq -r '.recommended_timeout // "6h"' "$DECISION_FILE" 2>/dev/null || echo "6h")
        WAF_BYPASS=$(jq -r '.waf_bypass_needed // false' "$DECISION_FILE" 2>/dev/null || echo false)
        WAF_TECH=$(jq -r '.waf_bypass_techniques // ""' "$DECISION_FILE" 2>/dev/null || echo "")
        WAF_DELAY=$(jq -r '.waf_recommended_delay // "1s"' "$DECISION_FILE" 2>/dev/null || echo "1s")
        REASONING=$(jq -r '.reasoning // "AI-generated decision"' "$DECISION_FILE" 2>/dev/null || echo "AI-generated decision")
        DECISION_INPUTS=$(jq -c '.decision_inputs // {}' "$DECISION_FILE" 2>/dev/null || echo '{}')
        FOCUS_JSON=$(jq -c '.focus_areas // []' "$DECISION_FILE" 2>/dev/null || echo '[]')
        PRIORITY_JSON=$(jq -c '.priority_targets // []' "$DECISION_FILE" 2>/dev/null || echo '[]')
        RESCAN_JSON=$(jq -c '.rescan_targets // []' "$DECISION_FILE" 2>/dev/null || echo '[]')
      fi

      if [ -f "{{previousFollowupDecisionFile}}" ] && jq empty "{{previousFollowupDecisionFile}}" 2>/dev/null; then
        FOLLOWUP_AVAILABLE="true"
        FOLLOWUP_SOURCE_KIND="decision-file"
        FOLLOWUP_REASONING=$(jq -r '.seed_focus.reasoning // .base_decision.reasoning // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        FOLLOWUP_SCAN_PROFILE=$(jq -r '.seed_focus.scan_profile // .base_decision.profile // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        FOLLOWUP_SEVERITY=$(jq -r '.seed_focus.severity // .base_decision.severity // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        FOLLOWUP_NEXT_PHASE=$(jq -r '.seed_focus.next_phase // .execution_feedback.next_phase // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        FOLLOWUP_PRIORITY_MODE=$(jq -r '.seed_focus.priority_mode // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        FOLLOWUP_CONFIDENCE_LEVEL=$(jq -r '.seed_focus.confidence_level // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        FOLLOWUP_ESCALATION_SCORE=$(jq -r '.seed_focus.signal_scores.escalation_score // 0' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        FOLLOWUP_CAMPAIGN_CREATE_STATUS=$(jq -r '.followup_summary.campaign_create_status // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        FOLLOWUP_CAMPAIGN_CREATE_ID=$(jq -r '.followup_summary.campaign_create_id // ""' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "")
        FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.followup_summary.campaign_create_queued_runs // 0' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        FOLLOWUP_REUSE_SOURCES_JSON=$(jq -c '.seed_focus.reuse_sources // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        FOLLOWUP_RESUME_SUPPRESSED_JSON=$(jq -c '.followup_summary.resume_suppressed_actions // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        FOLLOWUP_REUSED_ACTIONS_JSON=$(jq -c '.followup_summary.reused_actions // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        FOLLOWUP_SKIPPED_DUPLICATES_JSON=$(jq -c '.followup_summary.skipped_duplicate_actions // []' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        FOLLOWUP_MANUAL_FOLLOWUP_NEEDED=$(jq -r '.seed_focus.manual_followup_needed // .execution_feedback.manual_followup_needed // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED=$(jq -r '.seed_focus.campaign_followup_recommended // .execution_feedback.campaign_followup_recommended // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE=$(jq -r '.seed_focus.queue_followup_effective // .execution_feedback.queue_followup_effective // false' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo false)
        FOLLOWUP_FOCUS_JSON=$(jq -c '((.seed_targets.focus_areas // .refined_targets.focus_areas // []) + (.seed_targets.semantic_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        FOLLOWUP_MANUAL_JSON=$(jq -c '((.seed_targets.manual_first_targets // []) + (.seed_targets.rescan_critical_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        FOLLOWUP_HIGH_CONFIDENCE_JSON=$(jq -c '((.seed_targets.high_confidence_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.rescan_high_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        FOLLOWUP_PRIORITY_JSON=$(jq -c '((.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.semantic_targets // []) + (.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_critical_targets // []) + (.seed_targets.rescan_high_targets // []) + (.seed_targets.confirmed_targets // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        FOLLOWUP_RESCAN_JSON=$(jq -c '((.seed_targets.rescan_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.semantic_targets // []) + (.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_critical_targets // []) + (.seed_targets.rescan_high_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.refined_targets.focus_areas // [])) | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '[]')
        FOLLOWUP_COMBINED_JSON="$FOLLOWUP_RESCAN_JSON"
        FOLLOWUP_TARGET_COUNT=$(jq -r '[((.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.semantic_targets // []) + (.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_critical_targets // []) + (.seed_targets.rescan_high_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.rescan_targets // []))[]?] | map(select(. != null and . != "")) | unique | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        FOLLOWUP_FOCUS_COUNT=$(jq -r '[((.seed_targets.focus_areas // .refined_targets.focus_areas // []))[]?] | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        FOLLOWUP_PRIORITY_COUNT=$(jq -r '[((.seed_targets.priority_targets // .refined_targets.priority_targets // []))[]?] | length' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo 0)
        FOLLOWUP_MANUAL_COUNT=$(printf '%s\n' "$FOLLOWUP_MANUAL_JSON" | jq -r 'length' 2>/dev/null || echo 0)
        FOLLOWUP_HIGH_CONFIDENCE_COUNT=$(printf '%s\n' "$FOLLOWUP_HIGH_CONFIDENCE_JSON" | jq -r 'length' 2>/dev/null || echo 0)

        if [ -z "$DECISION_FILE" ]; then
          DECISION_SOURCE="previous-followup"
          DECISION_FILE="{{previousFollowupDecisionFile}}"
          SEVERITY=$(jq -r '.seed_focus.severity // .base_decision.severity // "critical,high"' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "critical,high")
          FOLLOWUP_SCAN_PROFILE=$(jq -r '.seed_focus.scan_profile // .base_decision.profile // "focused"' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "focused")
          case "$FOLLOWUP_SCAN_PROFILE" in
            aggressive)
              THREADS=15
              RATE_LIMIT=50
              TIMEOUT="8h"
              ;;
            balanced)
              THREADS=12
              RATE_LIMIT=40
              TIMEOUT="6h"
              ;;
            *)
              THREADS=10
              RATE_LIMIT=30
              TIMEOUT="6h"
              ;;
          esac
          if [ "$FOLLOWUP_PRIORITY_MODE" = "manual-first" ] || [ "$FOLLOWUP_CONFIDENCE_LEVEL" = "high" ] || [ "${FOLLOWUP_ESCALATION_SCORE:-0}" -ge 12 ] 2>/dev/null; then
            [ "$THREADS" -lt 15 ] 2>/dev/null && THREADS=15
            [ "$RATE_LIMIT" -lt 50 ] 2>/dev/null && RATE_LIMIT=50
            TIMEOUT="8h"
          elif [ "$FOLLOWUP_PRIORITY_MODE" = "campaign-first" ] || [ "$FOLLOWUP_PRIORITY_MODE" = "retest-first" ] || [ "$FOLLOWUP_CONFIDENCE_LEVEL" = "medium" ] || [ "${FOLLOWUP_ESCALATION_SCORE:-0}" -ge 6 ] 2>/dev/null; then
            [ "$THREADS" -lt 12 ] 2>/dev/null && THREADS=12
            [ "$RATE_LIMIT" -lt 40 ] 2>/dev/null && RATE_LIMIT=40
          fi
          REASONING=$(jq -r '.seed_focus.reasoning // .base_decision.reasoning // "Applied previous followup decision"' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo "Applied previous followup decision")
          DECISION_INPUTS=$(jq -c '{
            previous_followup_priority_count: ([((.seed_targets.priority_targets // .refined_targets.priority_targets // []))[]?] | length),
            previous_followup_focus_count: ([((.seed_targets.focus_areas // .refined_targets.focus_areas // []))[]?] | length),
            previous_followup_targets: ([((.seed_targets.priority_targets // .refined_targets.priority_targets // []) + (.seed_targets.retest_targets // []) + (.seed_targets.semantic_targets // []) + (.seed_targets.manual_first_targets // []) + (.seed_targets.high_confidence_targets // []) + (.seed_targets.rescan_critical_targets // []) + (.seed_targets.rescan_high_targets // []) + (.seed_targets.confirmed_targets // []) + (.seed_targets.rescan_targets // []))[]?] | map(select(. != null and . != "")) | unique | length),
            previous_followup_source_kind: "decision-file",
            previous_followup_next_phase: (.seed_focus.next_phase // .execution_feedback.next_phase // ""),
            previous_followup_reasoning: (.seed_focus.reasoning // .base_decision.reasoning // ""),
            previous_followup_scan_profile: (.seed_focus.scan_profile // .base_decision.profile // ""),
            previous_followup_severity: (.seed_focus.severity // .base_decision.severity // ""),
            previous_followup_priority_mode: (.seed_focus.priority_mode // ""),
            previous_followup_confidence_level: (.seed_focus.confidence_level // ""),
            previous_followup_escalation_score: (.seed_focus.signal_scores.escalation_score // 0),
            previous_followup_campaign_create_status: (.followup_summary.campaign_create_status // ""),
            previous_followup_campaign_create_id: (.followup_summary.campaign_create_id // ""),
            previous_followup_campaign_create_queued_runs: (.followup_summary.campaign_create_queued_runs // 0),
            previous_followup_reuse_sources: (.seed_focus.reuse_sources // []),
            previous_followup_resume_suppressed_actions: (.followup_summary.resume_suppressed_actions // []),
            previous_followup_reused_actions: (.followup_summary.reused_actions // []),
            previous_followup_skipped_duplicate_actions: (.followup_summary.skipped_duplicate_actions // []),
            previous_followup_manual_followup_needed: (.seed_focus.manual_followup_needed // .execution_feedback.manual_followup_needed // false),
            previous_followup_campaign_followup_recommended: (.seed_focus.campaign_followup_recommended // .execution_feedback.campaign_followup_recommended // false),
            previous_followup_queue_followup_effective: (.seed_focus.queue_followup_effective // .execution_feedback.queue_followup_effective // false),
            previous_followup_manual_first_count: ([((.seed_targets.manual_first_targets // []))[]?] | length),
            previous_followup_high_confidence_count: ([((.seed_targets.high_confidence_targets // []))[]?] | length)
          }' "{{previousFollowupDecisionFile}}" 2>/dev/null || echo '{}')
          FOCUS_JSON="$FOLLOWUP_FOCUS_JSON"
          PRIORITY_JSON="$FOLLOWUP_PRIORITY_JSON"
          RESCAN_JSON="$FOLLOWUP_RESCAN_JSON"
        fi
      else
        FOLLOWUP_PARAM_TARGET_COUNT=$(normalize_int "{{previous_followup_targets}}")
        FOLLOWUP_PARAM_PRIORITY_COUNT=$(normalize_int "{{previous_followup_priority_targets}}")
        FOLLOWUP_PARAM_FOCUS_COUNT=$(normalize_int "{{previous_followup_focus_areas}}")
        FOLLOWUP_PARAM_MANUAL_COUNT=$(normalize_int "{{previous_followup_manual_first_targets}}")
        FOLLOWUP_PARAM_HIGH_CONFIDENCE_COUNT=$(normalize_int "{{previous_followup_high_confidence_targets}}")
        FOLLOWUP_PARAM_REASONING="{{previous_followup_reasoning}}"
        FOLLOWUP_PARAM_SCAN_PROFILE="{{previous_followup_scan_profile}}"
        FOLLOWUP_PARAM_SEVERITY="{{previous_followup_severity}}"
        FOLLOWUP_PARAM_PRIORITY_MODE="{{previous_followup_priority_mode}}"
        FOLLOWUP_PARAM_CONFIDENCE_LEVEL="{{previous_followup_confidence_level}}"
        FOLLOWUP_PARAM_NEXT_PHASE="{{previous_followup_next_phase}}"
        FOLLOWUP_PARAM_REUSE_SOURCES_JSON=$(csv_or_json_to_array "{{previous_followup_reuse_sources}}")
        FOLLOWUP_PARAM_RESUME_SUPPRESSED_JSON=$(csv_or_json_to_array "{{previous_followup_resume_suppressed_actions}}")
        FOLLOWUP_PARAM_REUSED_ACTIONS_JSON=$(csv_or_json_to_array "{{previous_followup_reused_actions}}")
        FOLLOWUP_PARAM_SKIPPED_DUPLICATES_JSON=$(csv_or_json_to_array "{{previous_followup_skipped_duplicate_actions}}")
        FOLLOWUP_PARAM_MANUAL_FOLLOWUP_NEEDED=$(normalize_bool "{{previous_followup_manual_followup_needed}}")
        FOLLOWUP_PARAM_CAMPAIGN_FOLLOWUP_RECOMMENDED=$(normalize_bool "{{previous_followup_campaign_followup_recommended}}")
        FOLLOWUP_PARAM_QUEUE_FOLLOWUP_EFFECTIVE=$(normalize_bool "{{previous_followup_queue_followup_effective}}")
        FOLLOWUP_PARAM_ESCALATION_SCORE=$(normalize_int "{{previous_followup_escalation_score}}")
        FOLLOWUP_PARAM_CAMPAIGN_CREATE_STATUS="{{previous_followup_campaign_create_status}}"
        FOLLOWUP_PARAM_CAMPAIGN_CREATE_ID="{{previous_followup_campaign_create_id}}"
        FOLLOWUP_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS=$(normalize_int "{{previous_followup_campaign_create_queued_runs}}")
        FOLLOWUP_PARAM_MANUAL_JSON=$(csv_or_json_to_array "{{previous_followup_manual_first_targets_list}}")
        FOLLOWUP_PARAM_HIGH_CONFIDENCE_JSON=$(csv_or_json_to_array "{{previous_followup_high_confidence_targets_list}}")
        FOLLOWUP_PARAM_COMBINED_JSON=$(csv_or_json_to_array "{{previous_followup_combined_targets_list}}")
        FOLLOWUP_PARAM_MANUAL_JSON_COUNT=$(printf '%s\n' "$FOLLOWUP_PARAM_MANUAL_JSON" | jq -r 'length' 2>/dev/null || echo 0)
        FOLLOWUP_PARAM_HIGH_CONFIDENCE_JSON_COUNT=$(printf '%s\n' "$FOLLOWUP_PARAM_HIGH_CONFIDENCE_JSON" | jq -r 'length' 2>/dev/null || echo 0)
        FOLLOWUP_PARAM_COMBINED_JSON_COUNT=$(printf '%s\n' "$FOLLOWUP_PARAM_COMBINED_JSON" | jq -r 'length' 2>/dev/null || echo 0)

        if [ "$FOLLOWUP_PARAM_TARGET_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$FOLLOWUP_PARAM_PRIORITY_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$FOLLOWUP_PARAM_FOCUS_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$FOLLOWUP_PARAM_MANUAL_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$FOLLOWUP_PARAM_HIGH_CONFIDENCE_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$FOLLOWUP_PARAM_MANUAL_JSON_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$FOLLOWUP_PARAM_HIGH_CONFIDENCE_JSON_COUNT" -gt 0 ] 2>/dev/null \
          || [ "$FOLLOWUP_PARAM_COMBINED_JSON_COUNT" -gt 0 ] 2>/dev/null \
          || [ -n "$FOLLOWUP_PARAM_REASONING" ] \
          || [ -n "$FOLLOWUP_PARAM_SCAN_PROFILE" ] \
          || [ -n "$FOLLOWUP_PARAM_SEVERITY" ] \
          || [ -n "$FOLLOWUP_PARAM_PRIORITY_MODE" ] \
          || [ -n "$FOLLOWUP_PARAM_CONFIDENCE_LEVEL" ] \
          || [ -n "$FOLLOWUP_PARAM_NEXT_PHASE" ] \
          || [ "$FOLLOWUP_PARAM_MANUAL_FOLLOWUP_NEEDED" = "true" ] \
          || [ "$FOLLOWUP_PARAM_CAMPAIGN_FOLLOWUP_RECOMMENDED" = "true" ] \
          || [ "$FOLLOWUP_PARAM_QUEUE_FOLLOWUP_EFFECTIVE" = "true" ] \
          || [ "$FOLLOWUP_PARAM_ESCALATION_SCORE" -gt 0 ] 2>/dev/null \
          || [ -n "$FOLLOWUP_PARAM_CAMPAIGN_CREATE_STATUS" ] \
          || [ -n "$FOLLOWUP_PARAM_CAMPAIGN_CREATE_ID" ] \
          || [ "$FOLLOWUP_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS" -gt 0 ] 2>/dev/null; then
          FOLLOWUP_AVAILABLE="true"
          FOLLOWUP_SOURCE_KIND="queue-params"
          FOLLOWUP_SOURCE_FILE="queue:previous_followup_*"
          FOLLOWUP_TARGET_COUNT="$FOLLOWUP_PARAM_TARGET_COUNT"
          FOLLOWUP_REASONING="$FOLLOWUP_PARAM_REASONING"
          FOLLOWUP_SCAN_PROFILE="$FOLLOWUP_PARAM_SCAN_PROFILE"
          FOLLOWUP_SEVERITY="$FOLLOWUP_PARAM_SEVERITY"
          FOLLOWUP_NEXT_PHASE="$FOLLOWUP_PARAM_NEXT_PHASE"
          FOLLOWUP_PRIORITY_MODE="$FOLLOWUP_PARAM_PRIORITY_MODE"
          FOLLOWUP_CONFIDENCE_LEVEL="$FOLLOWUP_PARAM_CONFIDENCE_LEVEL"
          FOLLOWUP_ESCALATION_SCORE="$FOLLOWUP_PARAM_ESCALATION_SCORE"
          FOLLOWUP_CAMPAIGN_CREATE_STATUS="$FOLLOWUP_PARAM_CAMPAIGN_CREATE_STATUS"
          FOLLOWUP_CAMPAIGN_CREATE_ID="$FOLLOWUP_PARAM_CAMPAIGN_CREATE_ID"
          FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS="$FOLLOWUP_PARAM_CAMPAIGN_CREATE_QUEUED_RUNS"
          FOLLOWUP_REUSE_SOURCES_JSON="$FOLLOWUP_PARAM_REUSE_SOURCES_JSON"
          FOLLOWUP_RESUME_SUPPRESSED_JSON="$FOLLOWUP_PARAM_RESUME_SUPPRESSED_JSON"
          FOLLOWUP_REUSED_ACTIONS_JSON="$FOLLOWUP_PARAM_REUSED_ACTIONS_JSON"
          FOLLOWUP_SKIPPED_DUPLICATES_JSON="$FOLLOWUP_PARAM_SKIPPED_DUPLICATES_JSON"
          FOLLOWUP_MANUAL_FOLLOWUP_NEEDED="$FOLLOWUP_PARAM_MANUAL_FOLLOWUP_NEEDED"
          FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED="$FOLLOWUP_PARAM_CAMPAIGN_FOLLOWUP_RECOMMENDED"
          FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE="$FOLLOWUP_PARAM_QUEUE_FOLLOWUP_EFFECTIVE"
          FOLLOWUP_FOCUS_COUNT="$FOLLOWUP_PARAM_FOCUS_COUNT"
          FOLLOWUP_PRIORITY_COUNT="$FOLLOWUP_PARAM_PRIORITY_COUNT"
          FOLLOWUP_MANUAL_COUNT="$FOLLOWUP_PARAM_MANUAL_COUNT"
          FOLLOWUP_HIGH_CONFIDENCE_COUNT="$FOLLOWUP_PARAM_HIGH_CONFIDENCE_COUNT"
          FOLLOWUP_MANUAL_JSON="$FOLLOWUP_PARAM_MANUAL_JSON"
          FOLLOWUP_HIGH_CONFIDENCE_JSON="$FOLLOWUP_PARAM_HIGH_CONFIDENCE_JSON"
          FOLLOWUP_COMBINED_JSON="$FOLLOWUP_PARAM_COMBINED_JSON"
          if [ "$FOLLOWUP_MANUAL_COUNT" -eq 0 ] 2>/dev/null; then
            FOLLOWUP_MANUAL_COUNT="$FOLLOWUP_PARAM_MANUAL_JSON_COUNT"
          fi
          if [ "$FOLLOWUP_HIGH_CONFIDENCE_COUNT" -eq 0 ] 2>/dev/null; then
            FOLLOWUP_HIGH_CONFIDENCE_COUNT="$FOLLOWUP_PARAM_HIGH_CONFIDENCE_JSON_COUNT"
          fi
          if [ "$FOLLOWUP_TARGET_COUNT" -eq 0 ] 2>/dev/null; then
            FOLLOWUP_TARGET_COUNT="$FOLLOWUP_PARAM_COMBINED_JSON_COUNT"
          fi
          if [ -z "$FOLLOWUP_COMBINED_JSON" ] || [ "$FOLLOWUP_COMBINED_JSON" = "[]" ]; then
            FOLLOWUP_COMBINED_JSON=$(jq -n \
              --argjson manual "$FOLLOWUP_MANUAL_JSON" \
              --argjson high "$FOLLOWUP_HIGH_CONFIDENCE_JSON" \
              '($manual + $high)
                | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end)')
          fi
          FOLLOWUP_FOCUS_JSON="$FOLLOWUP_COMBINED_JSON"
          FOLLOWUP_PRIORITY_JSON="$FOLLOWUP_COMBINED_JSON"
          FOLLOWUP_RESCAN_JSON="$FOLLOWUP_COMBINED_JSON"
          if [ "$FOLLOWUP_FOCUS_COUNT" -eq 0 ] 2>/dev/null; then
            FOLLOWUP_FOCUS_COUNT=$(printf '%s\n' "$FOLLOWUP_FOCUS_JSON" | jq -r 'length' 2>/dev/null || echo 0)
          fi
          if [ "$FOLLOWUP_PRIORITY_COUNT" -eq 0 ] 2>/dev/null; then
            FOLLOWUP_PRIORITY_COUNT=$(printf '%s\n' "$FOLLOWUP_PRIORITY_JSON" | jq -r 'length' 2>/dev/null || echo 0)
          fi
        fi

        if [ "$FOLLOWUP_AVAILABLE" = "true" ] && [ -z "$DECISION_FILE" ]; then
          DECISION_SOURCE="previous-followup-params"
          DECISION_FILE="queue:previous_followup_*"
          [ -n "$FOLLOWUP_SEVERITY" ] && SEVERITY="$FOLLOWUP_SEVERITY"
          [ -z "$SEVERITY" ] && SEVERITY="critical,high"
          case "${FOLLOWUP_SCAN_PROFILE:-focused}" in
            aggressive)
              THREADS=15
              RATE_LIMIT=50
              TIMEOUT="8h"
              ;;
            balanced)
              THREADS=12
              RATE_LIMIT=40
              TIMEOUT="6h"
              ;;
            *)
              THREADS=10
              RATE_LIMIT=30
              TIMEOUT="6h"
              ;;
          esac
          if [ "$FOLLOWUP_PRIORITY_MODE" = "manual-first" ] || [ "$FOLLOWUP_CONFIDENCE_LEVEL" = "high" ] || [ "${FOLLOWUP_ESCALATION_SCORE:-0}" -ge 12 ] 2>/dev/null; then
            [ "$THREADS" -lt 15 ] 2>/dev/null && THREADS=15
            [ "$RATE_LIMIT" -lt 50 ] 2>/dev/null && RATE_LIMIT=50
            TIMEOUT="8h"
          elif [ "$FOLLOWUP_PRIORITY_MODE" = "campaign-first" ] || [ "$FOLLOWUP_PRIORITY_MODE" = "retest-first" ] || [ "$FOLLOWUP_CONFIDENCE_LEVEL" = "medium" ] || [ "${FOLLOWUP_ESCALATION_SCORE:-0}" -ge 6 ] 2>/dev/null; then
            [ "$THREADS" -lt 12 ] 2>/dev/null && THREADS=12
            [ "$RATE_LIMIT" -lt 40 ] 2>/dev/null && RATE_LIMIT=40
          fi
          REASONING="${FOLLOWUP_REASONING:-Applied previous followup queue params}"
          DECISION_INPUTS=$(jq -n \
            --argjson previous_followup_priority_count "$FOLLOWUP_PRIORITY_COUNT" \
            --argjson previous_followup_focus_count "$FOLLOWUP_FOCUS_COUNT" \
            --argjson previous_followup_targets "$FOLLOWUP_TARGET_COUNT" \
            --arg previous_followup_source_kind "$FOLLOWUP_SOURCE_KIND" \
            --arg previous_followup_next_phase "$FOLLOWUP_NEXT_PHASE" \
            --arg previous_followup_reasoning "$FOLLOWUP_REASONING" \
            --arg previous_followup_scan_profile "$FOLLOWUP_SCAN_PROFILE" \
            --arg previous_followup_severity "$FOLLOWUP_SEVERITY" \
            --arg previous_followup_priority_mode "$FOLLOWUP_PRIORITY_MODE" \
            --arg previous_followup_confidence_level "$FOLLOWUP_CONFIDENCE_LEVEL" \
            --argjson previous_followup_escalation_score "$FOLLOWUP_ESCALATION_SCORE" \
            --arg previous_followup_campaign_create_status "$FOLLOWUP_CAMPAIGN_CREATE_STATUS" \
            --arg previous_followup_campaign_create_id "$FOLLOWUP_CAMPAIGN_CREATE_ID" \
            --argjson previous_followup_campaign_create_queued_runs "$FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS" \
            --argjson previous_followup_reuse_sources "$FOLLOWUP_REUSE_SOURCES_JSON" \
            --argjson previous_followup_resume_suppressed_actions "$FOLLOWUP_RESUME_SUPPRESSED_JSON" \
            --argjson previous_followup_reused_actions "$FOLLOWUP_REUSED_ACTIONS_JSON" \
            --argjson previous_followup_skipped_duplicate_actions "$FOLLOWUP_SKIPPED_DUPLICATES_JSON" \
            --argjson previous_followup_manual_followup_needed "$FOLLOWUP_MANUAL_FOLLOWUP_NEEDED" \
            --argjson previous_followup_campaign_followup_recommended "$FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED" \
            --argjson previous_followup_queue_followup_effective "$FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE" \
            --argjson previous_followup_manual_first_count "$FOLLOWUP_MANUAL_COUNT" \
            --argjson previous_followup_high_confidence_count "$FOLLOWUP_HIGH_CONFIDENCE_COUNT" \
            --argjson previous_followup_manual_first_targets_list "$FOLLOWUP_MANUAL_JSON" \
            --argjson previous_followup_high_confidence_targets_list "$FOLLOWUP_HIGH_CONFIDENCE_JSON" \
            --argjson previous_followup_combined_targets_list "$FOLLOWUP_COMBINED_JSON" \
            '{
              previous_followup_priority_count: $previous_followup_priority_count,
              previous_followup_focus_count: $previous_followup_focus_count,
              previous_followup_targets: $previous_followup_targets,
              previous_followup_source_kind: $previous_followup_source_kind,
              previous_followup_next_phase: $previous_followup_next_phase,
              previous_followup_reasoning: $previous_followup_reasoning,
              previous_followup_scan_profile: $previous_followup_scan_profile,
              previous_followup_severity: $previous_followup_severity,
              previous_followup_priority_mode: $previous_followup_priority_mode,
              previous_followup_confidence_level: $previous_followup_confidence_level,
              previous_followup_escalation_score: $previous_followup_escalation_score,
              previous_followup_campaign_create_status: $previous_followup_campaign_create_status,
              previous_followup_campaign_create_id: $previous_followup_campaign_create_id,
              previous_followup_campaign_create_queued_runs: $previous_followup_campaign_create_queued_runs,
              previous_followup_reuse_sources: $previous_followup_reuse_sources,
              previous_followup_resume_suppressed_actions: $previous_followup_resume_suppressed_actions,
              previous_followup_reused_actions: $previous_followup_reused_actions,
              previous_followup_skipped_duplicate_actions: $previous_followup_skipped_duplicate_actions,
              previous_followup_manual_followup_needed: $previous_followup_manual_followup_needed,
              previous_followup_campaign_followup_recommended: $previous_followup_campaign_followup_recommended,
              previous_followup_queue_followup_effective: $previous_followup_queue_followup_effective,
              previous_followup_manual_first_count: $previous_followup_manual_first_count,
              previous_followup_high_confidence_count: $previous_followup_high_confidence_count,
              previous_followup_manual_first_targets_list: $previous_followup_manual_first_targets_list,
              previous_followup_high_confidence_targets_list: $previous_followup_high_confidence_targets_list,
              previous_followup_combined_targets_list: $previous_followup_combined_targets_list
            }')
        fi
      fi

      case "$TIMEOUT" in
        *h|*H)
          TIMEOUT_NUM=$(printf '%s' "$TIMEOUT" | tr -dc '0-9')
          [ -n "$TIMEOUT_NUM" ] && TIMEOUT_SECONDS=$((TIMEOUT_NUM * 3600))
          ;;
        *m|*M)
          TIMEOUT_NUM=$(printf '%s' "$TIMEOUT" | tr -dc '0-9')
          [ -n "$TIMEOUT_NUM" ] && TIMEOUT_SECONDS=$((TIMEOUT_NUM * 60))
          ;;
        *s|*S)
          TIMEOUT_NUM=$(printf '%s' "$TIMEOUT" | tr -dc '0-9')
          [ -n "$TIMEOUT_NUM" ] && TIMEOUT_SECONDS=$TIMEOUT_NUM
          ;;
        *)
          TIMEOUT_NUM=$(printf '%s' "$TIMEOUT" | tr -dc '0-9')
          [ -n "$TIMEOUT_NUM" ] && TIMEOUT_SECONDS=$TIMEOUT_NUM
          ;;
      esac

      jq -n \
        --argjson focus "$FOCUS_JSON" \
        --argjson priority "$PRIORITY_JSON" \
        --argjson rescan "$RESCAN_JSON" \
        --argjson followup_focus "$FOLLOWUP_FOCUS_JSON" \
        --argjson followup_priority "$FOLLOWUP_PRIORITY_JSON" \
        --argjson followup_rescan "$FOLLOWUP_RESCAN_JSON" \
        --argjson followup_manual "$FOLLOWUP_MANUAL_JSON" \
        --argjson followup_high_confidence "$FOLLOWUP_HIGH_CONFIDENCE_JSON" \
        '
          def clean:
            reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end);
          {
            focus_areas: ($focus + $followup_focus + $followup_manual + $followup_high_confidence | clean),
            priority_targets: ($priority + $focus + $followup_priority + $followup_focus + $followup_manual + $followup_high_confidence | clean),
            rescan_targets: ($rescan + $priority + $focus + $followup_rescan + $followup_priority + $followup_focus + $followup_manual + $followup_high_confidence | clean)
          }
        ' > "{{Output}}/ai-analysis/.applied-decision-lists-{{TargetSpace}}.json"

      FOCUS_NORMALIZED=$(jq -c '.focus_areas' "{{Output}}/ai-analysis/.applied-decision-lists-{{TargetSpace}}.json" 2>/dev/null || echo '[]')
      PRIORITY_NORMALIZED=$(jq -c '.priority_targets' "{{Output}}/ai-analysis/.applied-decision-lists-{{TargetSpace}}.json" 2>/dev/null || echo '[]')
      RESCAN_NORMALIZED=$(jq -c '.rescan_targets' "{{Output}}/ai-analysis/.applied-decision-lists-{{TargetSpace}}.json" 2>/dev/null || echo '[]')
      FOCUS_COUNT=$(jq -r '.focus_areas | length' "{{Output}}/ai-analysis/.applied-decision-lists-{{TargetSpace}}.json" 2>/dev/null || echo 0)
      PRIORITY_COUNT=$(jq -r '.priority_targets | length' "{{Output}}/ai-analysis/.applied-decision-lists-{{TargetSpace}}.json" 2>/dev/null || echo 0)
      RESCAN_COUNT=$(jq -r '.rescan_targets | length' "{{Output}}/ai-analysis/.applied-decision-lists-{{TargetSpace}}.json" 2>/dev/null || echo 0)

      SCAN_PROFILE="focused"
      case "$SEVERITY" in
        *medium*|*low*|*info*)
          SCAN_PROFILE="aggressive"
          ;;
      esac
      if [ "$SCAN_PROFILE" = "focused" ] && [ "$THREADS" -ge 12 ] 2>/dev/null; then
        SCAN_PROFILE="balanced"
      fi
      if [ "$THREADS" -ge 15 ] 2>/dev/null || [ "$RATE_LIMIT" -ge 50 ] 2>/dev/null; then
        SCAN_PROFILE="aggressive"
      fi

      if [ "$FOLLOWUP_AVAILABLE" = "true" ] && { [ "$FOLLOWUP_TARGET_COUNT" -gt 0 ] 2>/dev/null || [ "$FOLLOWUP_FOCUS_COUNT" -gt 0 ] 2>/dev/null || [ "$FOLLOWUP_PRIORITY_COUNT" -gt 0 ] 2>/dev/null; }; then
        REASONING="$REASONING + previous followup targets=$FOLLOWUP_TARGET_COUNT focus=$FOLLOWUP_FOCUS_COUNT priority=$FOLLOWUP_PRIORITY_COUNT"
      fi
      if [ "$FOLLOWUP_AVAILABLE" = "true" ] && [ -n "$FOLLOWUP_REASONING" ]; then
        REASONING="$REASONING + followup_reasoning=$FOLLOWUP_REASONING"
      fi
      if [ "$FOLLOWUP_AVAILABLE" = "true" ] && [ -n "$FOLLOWUP_SCAN_PROFILE" ]; then
        REASONING="$REASONING + followup_scan_profile=$FOLLOWUP_SCAN_PROFILE"
      fi
      if [ "$FOLLOWUP_AVAILABLE" = "true" ] && [ -n "$FOLLOWUP_SEVERITY" ]; then
        REASONING="$REASONING + followup_severity=$FOLLOWUP_SEVERITY"
      fi
      if [ "$FOLLOWUP_AVAILABLE" = "true" ] && [ -n "$FOLLOWUP_NEXT_PHASE" ]; then
        REASONING="$REASONING + previous followup next_phase=$FOLLOWUP_NEXT_PHASE"
      fi
      if [ "$FOLLOWUP_AVAILABLE" = "true" ] && { [ -n "$FOLLOWUP_PRIORITY_MODE" ] || [ -n "$FOLLOWUP_CONFIDENCE_LEVEL" ]; }; then
        REASONING="$REASONING + followup priority_mode=$FOLLOWUP_PRIORITY_MODE confidence=$FOLLOWUP_CONFIDENCE_LEVEL escalation=$FOLLOWUP_ESCALATION_SCORE"
      fi
      if [ "$FOLLOWUP_AVAILABLE" = "true" ] && [ -n "$FOLLOWUP_CAMPAIGN_CREATE_STATUS" ]; then
        REASONING="$REASONING + campaign_create=$FOLLOWUP_CAMPAIGN_CREATE_STATUS campaign_id=$FOLLOWUP_CAMPAIGN_CREATE_ID queued_runs=$FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS"
      fi
      FOLLOWUP_REUSE_SOURCES=$(printf '%s\n' "$FOLLOWUP_REUSE_SOURCES_JSON" | jq -r 'join(",")' 2>/dev/null || echo "")
      if [ "$FOLLOWUP_AVAILABLE" = "true" ] && [ -n "$FOLLOWUP_REUSE_SOURCES" ]; then
        REASONING="$REASONING + reuse_sources=$FOLLOWUP_REUSE_SOURCES"
      fi
      if [ "$FOLLOWUP_AVAILABLE" = "true" ] && { [ "$FOLLOWUP_MANUAL_FOLLOWUP_NEEDED" = "true" ] || [ "$FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED" = "true" ] || [ "$FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE" = "true" ]; }; then
        REASONING="$REASONING + manual_followup=$FOLLOWUP_MANUAL_FOLLOWUP_NEEDED campaign_followup=$FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED queue_effective=$FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE"
      fi

      DECISION_INPUTS_MERGED=$(jq -n \
        --argjson current "$DECISION_INPUTS" \
        --argjson followup_available "$FOLLOWUP_AVAILABLE" \
        --arg followup_source_kind "$FOLLOWUP_SOURCE_KIND" \
        --argjson followup_target_count "$FOLLOWUP_TARGET_COUNT" \
        --argjson followup_focus_count "$FOLLOWUP_FOCUS_COUNT" \
        --argjson followup_priority_count "$FOLLOWUP_PRIORITY_COUNT" \
        --argjson followup_manual_count "$FOLLOWUP_MANUAL_COUNT" \
        --argjson followup_high_confidence_count "$FOLLOWUP_HIGH_CONFIDENCE_COUNT" \
        --arg followup_next_phase "$FOLLOWUP_NEXT_PHASE" \
        --arg followup_reasoning "$FOLLOWUP_REASONING" \
        --arg followup_scan_profile "$FOLLOWUP_SCAN_PROFILE" \
        --arg followup_severity "$FOLLOWUP_SEVERITY" \
        --arg followup_priority_mode "$FOLLOWUP_PRIORITY_MODE" \
        --arg followup_confidence_level "$FOLLOWUP_CONFIDENCE_LEVEL" \
        --argjson followup_escalation_score "$FOLLOWUP_ESCALATION_SCORE" \
        --arg followup_campaign_create_status "$FOLLOWUP_CAMPAIGN_CREATE_STATUS" \
        --arg followup_campaign_create_id "$FOLLOWUP_CAMPAIGN_CREATE_ID" \
        --argjson followup_campaign_create_queued_runs "$FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS" \
        --argjson followup_reuse_sources "$FOLLOWUP_REUSE_SOURCES_JSON" \
        --argjson followup_resume_suppressed_actions "$FOLLOWUP_RESUME_SUPPRESSED_JSON" \
        --argjson followup_reused_actions "$FOLLOWUP_REUSED_ACTIONS_JSON" \
        --argjson followup_skipped_duplicate_actions "$FOLLOWUP_SKIPPED_DUPLICATES_JSON" \
        --argjson followup_manual_followup_needed "$FOLLOWUP_MANUAL_FOLLOWUP_NEEDED" \
        --argjson followup_campaign_followup_recommended "$FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED" \
        --argjson followup_queue_followup_effective "$FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE" \
        --argjson followup_manual_first_targets_list "$FOLLOWUP_MANUAL_JSON" \
        --argjson followup_high_confidence_targets_list "$FOLLOWUP_HIGH_CONFIDENCE_JSON" \
        --argjson followup_combined_targets_list "$FOLLOWUP_COMBINED_JSON" \
        '($current // {}) + {
          followup_available: $followup_available,
          followup_source_kind: $followup_source_kind,
          followup_target_count: $followup_target_count,
          followup_focus_count: $followup_focus_count,
          followup_priority_count: $followup_priority_count,
          followup_manual_count: $followup_manual_count,
          followup_high_confidence_count: $followup_high_confidence_count,
          followup_next_phase: $followup_next_phase,
          followup_reasoning: $followup_reasoning,
          followup_scan_profile: $followup_scan_profile,
          followup_severity: $followup_severity,
          followup_priority_mode: $followup_priority_mode,
          followup_confidence_level: $followup_confidence_level,
          followup_escalation_score: $followup_escalation_score,
          followup_campaign_create_status: $followup_campaign_create_status,
          followup_campaign_create_id: $followup_campaign_create_id,
          followup_campaign_create_queued_runs: $followup_campaign_create_queued_runs,
          followup_reuse_sources: $followup_reuse_sources,
          followup_resume_suppressed_actions: $followup_resume_suppressed_actions,
          followup_reused_actions: $followup_reused_actions,
          followup_skipped_duplicate_actions: $followup_skipped_duplicate_actions,
          followup_manual_followup_needed: $followup_manual_followup_needed,
          followup_campaign_followup_recommended: $followup_campaign_followup_recommended,
          followup_queue_followup_effective: $followup_queue_followup_effective,
          followup_manual_first_targets_list: $followup_manual_first_targets_list,
          followup_high_confidence_targets_list: $followup_high_confidence_targets_list,
          followup_combined_targets_list: $followup_combined_targets_list
        }')

      jq -n \
        --arg generated_at "$(date -Iseconds)" \
        --arg source_file "$DECISION_FILE" \
        --arg source_kind "$DECISION_SOURCE" \
        --arg severity "$SEVERITY" \
        --argjson threads "$THREADS" \
        --argjson rate_limit "$RATE_LIMIT" \
        --arg timeout "$TIMEOUT" \
        --argjson timeout_seconds "$TIMEOUT_SECONDS" \
        --arg scan_profile "$SCAN_PROFILE" \
        --argjson waf_bypass "$WAF_BYPASS" \
        --arg waf_techniques "$WAF_TECH" \
        --arg waf_delay "$WAF_DELAY" \
        --argjson focus_areas "$FOCUS_NORMALIZED" \
        --argjson priority_targets "$PRIORITY_NORMALIZED" \
        --argjson rescan_targets "$RESCAN_NORMALIZED" \
        --argjson decision_inputs "$DECISION_INPUTS_MERGED" \
        --argjson followup_available "$FOLLOWUP_AVAILABLE" \
        --arg followup_file "$FOLLOWUP_SOURCE_FILE" \
        --arg followup_source_kind "$FOLLOWUP_SOURCE_KIND" \
        --arg reasoning "$REASONING" \
        '{
          generated_at: $generated_at,
          source: {
            file: $source_file,
            kind: $source_kind,
            followup_file: $followup_file,
            followup_source_kind: $followup_source_kind,
            followup_used: $followup_available
          },
          scan: {
            profile: $scan_profile,
            severity: $severity,
            threads: $threads,
            rate_limit: $rate_limit,
            timeout: $timeout,
            timeout_seconds: $timeout_seconds
          },
          waf: {
            bypass_needed: $waf_bypass,
            techniques: $waf_techniques,
            recommended_delay: $waf_delay
          },
          targets: {
            focus_areas: $focus_areas,
            priority_targets: $priority_targets,
            rescan_targets: $rescan_targets
          },
          directives: {
            use_ai_guided_nuclei: true,
            use_focus_targets: (($focus_areas | length) > 0),
            use_rescan_targets: (($rescan_targets | length) > 0),
            enable_manual_followup: (($priority_targets | length) > 0)
          },
          decision_inputs: $decision_inputs,
          reasoning: $reasoning
        }' > "{{appliedDecisionOutput}}"

      jq -r '.targets.focus_areas[]?' "{{appliedDecisionOutput}}" 2>/dev/null > "{{focusAreasOutput}}" || true
      jq -r '.targets.rescan_targets[]?' "{{appliedDecisionOutput}}" 2>/dev/null > "{{rescanTargetsOutput}}" || true

      {
        printf '# Applied AI Decision Configuration\n'
        printf 'source_kind: %s\n' "$DECISION_SOURCE"
        printf 'scan_profile: %s\n' "$SCAN_PROFILE"
        printf 'nuclei_severity: %s\n' "$(printf '%s' "$SEVERITY" | sed 's/["\\]/\\&/g')"
        printf 'nuclei_threads: %s\n' "$THREADS"
        printf 'nuclei_rate_limit: %s\n' "$RATE_LIMIT"
        printf 'nuclei_timeout: %s\n' "$(printf '%s' "$TIMEOUT" | sed 's/["\\]/\\&/g')"
        printf 'nuclei_timeout_seconds: %s\n' "$TIMEOUT_SECONDS"
        printf 'waf_bypass_needed: %s\n' "$WAF_BYPASS"
        printf 'waf_bypass_techniques: %s\n' "$(printf '%s' "$WAF_TECH" | sed 's/["\\]/\\&/g')"
        printf 'waf_recommended_delay: %s\n' "$(printf '%s' "$WAF_DELAY" | sed 's/["\\]/\\&/g')"
        printf 'focus_area_count: %s\n' "$(count_lines "{{focusAreasOutput}}")"
        printf 'priority_target_count: %s\n' "$PRIORITY_COUNT"
        printf 'rescan_target_count: %s\n' "$(count_lines "{{rescanTargetsOutput}}")"
        printf 'followup_used: %s\n' "$FOLLOWUP_AVAILABLE"
        printf 'followup_source_kind: %s\n' "$(printf '%s' "$FOLLOWUP_SOURCE_KIND" | sed 's/["\\]/\\&/g')"
        printf 'followup_target_count: %s\n' "$FOLLOWUP_TARGET_COUNT"
        printf 'followup_next_phase: %s\n' "$(printf '%s' "$FOLLOWUP_NEXT_PHASE" | sed 's/["\\]/\\&/g')"
        printf 'followup_scan_profile: %s\n' "$(printf '%s' "$FOLLOWUP_SCAN_PROFILE" | sed 's/["\\]/\\&/g')"
        printf 'followup_severity: %s\n' "$(printf '%s' "$FOLLOWUP_SEVERITY" | sed 's/["\\]/\\&/g')"
        printf 'followup_priority_mode: %s\n' "$(printf '%s' "$FOLLOWUP_PRIORITY_MODE" | sed 's/["\\]/\\&/g')"
        printf 'followup_confidence_level: %s\n' "$(printf '%s' "$FOLLOWUP_CONFIDENCE_LEVEL" | sed 's/["\\]/\\&/g')"
        printf 'followup_campaign_create_status: %s\n' "$(printf '%s' "$FOLLOWUP_CAMPAIGN_CREATE_STATUS" | sed 's/["\\]/\\&/g')"
        printf 'followup_campaign_create_id: %s\n' "$(printf '%s' "$FOLLOWUP_CAMPAIGN_CREATE_ID" | sed 's/["\\]/\\&/g')"
        printf 'followup_campaign_create_queued_runs: %s\n' "$FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS"
        printf 'followup_reuse_sources: %s\n' "$(printf '%s' "$FOLLOWUP_REUSE_SOURCES" | sed 's/["\\]/\\&/g')"
        printf 'followup_manual_followup_needed: %s\n' "$FOLLOWUP_MANUAL_FOLLOWUP_NEEDED"
        printf 'followup_campaign_followup_recommended: %s\n' "$FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED"
        printf 'followup_queue_followup_effective: %s\n' "$FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE"
      } > "{{dynamicConfigOutput}}"

      {
        printf '# AI Decision Scan Environment Variables\n'
        printf '# Generated by ai-apply-decision module\n'
        printf 'export NUCLEI_SEVERITY=%s\n' "$(printf '%s' "$SEVERITY" | sed 's/["\\]/\\&/g')"
        printf 'export NUCLEI_THREADS=%s\n' "$THREADS"
        printf 'export NUCLEI_RATE_LIMIT=%s\n' "$RATE_LIMIT"
        printf 'export NUCLEI_TIMEOUT=%s\n' "$(printf '%s' "$TIMEOUT" | sed 's/["\\]/\\&/g')"
        printf 'export NUCLEI_TIMEOUT_SECONDS=%s\n' "$TIMEOUT_SECONDS"
        printf 'export AI_SCAN_PROFILE=%s\n' "$(printf '%s' "$SCAN_PROFILE" | sed 's/["\\]/\\&/g')"
        printf 'export AI_DECISION_SOURCE=%s\n' "$(printf '%s' "$DECISION_SOURCE" | sed 's/["\\]/\\&/g')"
        printf 'export AI_FOCUS_AREAS_FILE=%s\n' "$(printf '%s' "{{focusAreasOutput}}" | sed 's/["\\]/\\&/g')"
        printf 'export AI_RESCAN_TARGETS_FILE=%s\n' "$(printf '%s' "{{rescanTargetsOutput}}" | sed 's/["\\]/\\&/g')"
        printf 'export AI_FOLLOWUP_SOURCE_KIND=%s\n' "$(printf '%s' "$FOLLOWUP_SOURCE_KIND" | sed 's/["\\]/\\&/g')"
        printf 'export AI_FOLLOWUP_TARGET_COUNT=%s\n' "$FOLLOWUP_TARGET_COUNT"
        printf 'export AI_FOLLOWUP_SCAN_PROFILE=%s\n' "$(printf '%s' "$FOLLOWUP_SCAN_PROFILE" | sed 's/["\\]/\\&/g')"
        printf 'export AI_FOLLOWUP_SEVERITY=%s\n' "$(printf '%s' "$FOLLOWUP_SEVERITY" | sed 's/["\\]/\\&/g')"
        printf 'export AI_FOLLOWUP_PRIORITY_MODE=%s\n' "$(printf '%s' "$FOLLOWUP_PRIORITY_MODE" | sed 's/["\\]/\\&/g')"
        printf 'export AI_FOLLOWUP_CONFIDENCE_LEVEL=%s\n' "$(printf '%s' "$FOLLOWUP_CONFIDENCE_LEVEL" | sed 's/["\\]/\\&/g')"
        printf 'export AI_FOLLOWUP_CAMPAIGN_CREATE_STATUS=%s\n' "$(printf '%s' "$FOLLOWUP_CAMPAIGN_CREATE_STATUS" | sed 's/["\\]/\\&/g')"
        printf 'export AI_FOLLOWUP_CAMPAIGN_ID=%s\n' "$(printf '%s' "$FOLLOWUP_CAMPAIGN_CREATE_ID" | sed 's/["\\]/\\&/g')"
        printf 'export AI_FOLLOWUP_CAMPAIGN_QUEUED_RUNS=%s\n' "$FOLLOWUP_CAMPAIGN_CREATE_QUEUED_RUNS"
        printf 'export AI_FOLLOWUP_REUSE_SOURCES=%s\n' "$(printf '%s' "$FOLLOWUP_REUSE_SOURCES" | sed 's/["\\]/\\&/g')"
        printf 'export AI_FOLLOWUP_MANUAL_NEEDED=%s\n' "$FOLLOWUP_MANUAL_FOLLOWUP_NEEDED"
        printf 'export AI_FOLLOWUP_CAMPAIGN_RECOMMENDED=%s\n' "$FOLLOWUP_CAMPAIGN_FOLLOWUP_RECOMMENDED"
        printf 'export AI_FOLLOWUP_QUEUE_EFFECTIVE=%s\n' "$FOLLOWUP_QUEUE_FOLLOWUP_EFFECTIVE"
      } > "{{scanEnvOutput}}"

      rm -f "{{Output}}/ai-analysis/.applied-decision-lists-{{TargetSpace}}.json" 2>/dev/null || true

      echo "[Apply Decision] Applied decision saved to {{appliedDecisionOutput}}"
      echo "[Apply Decision] Dynamic config saved to {{dynamicConfigOutput}}"
      echo "[Apply Decision] Config applied: profile=$SCAN_PROFILE severity=$SEVERITY threads=$THREADS rate=$RATE_LIMIT timeout=$TIMEOUT ($TIMEOUT_SECONDS s)"

  - name: ensure-applied-decision-fallback
    type: bash
    pre_condition: "{{enableAiDecision}}"
    on_error:
      - action: continue
    command: |
      mkdir -p {{Output}}/ai-analysis

      [ -f "{{focusAreasOutput}}" ] || : > "{{focusAreasOutput}}"
      [ -f "{{rescanTargetsOutput}}" ] || : > "{{rescanTargetsOutput}}"

      if [ ! -f "{{appliedDecisionOutput}}" ] || ! jq empty "{{appliedDecisionOutput}}" >/dev/null 2>&1; then
        jq -n           --arg generated_at "$(date -Iseconds)"           '{
            generated_at: $generated_at,
            source: {
              file: "",
              kind: "fallback-defaults",
              followup_file: "",
              followup_source_kind: "none",
              followup_used: false
            },
            scan: {
              profile: "focused",
              severity: "critical,high",
              threads: 10,
              rate_limit: 30,
              timeout: "6h",
              timeout_seconds: 21600
            },
            waf: {
              bypass_needed: false,
              techniques: "",
              recommended_delay: "1s"
            },
            targets: {
              focus_areas: [],
              priority_targets: [],
              rescan_targets: []
            },
            directives: {
              use_ai_guided_nuclei: true,
              use_focus_targets: false,
              use_rescan_targets: false,
              enable_manual_followup: false
            },
            decision_inputs: {},
            reasoning: "apply-decision-fallback-defaults"
          }' > "{{appliedDecisionOutput}}"
      fi

      if [ ! -f "{{dynamicConfigOutput}}" ] || [ ! -s "{{dynamicConfigOutput}}" ]; then
        cat > "{{dynamicConfigOutput}}" << 'EOF'
# Applied AI Decision Configuration
source_kind: fallback-defaults
scan_profile: focused
nuclei_severity: critical,high
nuclei_threads: 10
nuclei_rate_limit: 30
nuclei_timeout: 6h
nuclei_timeout_seconds: 21600
waf_bypass_needed: false
waf_bypass_techniques: ""
waf_recommended_delay: 1s
focus_area_count: 0
priority_target_count: 0
rescan_target_count: 0
followup_used: false
followup_source_kind: none
followup_target_count: 0
followup_next_phase: ""
followup_scan_profile: ""
followup_severity: ""
followup_priority_mode: ""
followup_confidence_level: ""
followup_campaign_create_status: ""
followup_campaign_create_id: ""
followup_campaign_create_queued_runs: 0
followup_reuse_sources: ""
followup_manual_followup_needed: false
followup_campaign_followup_recommended: false
followup_queue_followup_effective: false
EOF
      fi

      if [ ! -f "{{scanEnvOutput}}" ] || [ ! -s "{{scanEnvOutput}}" ]; then
        cat > "{{scanEnvOutput}}" << 'EOF'
# AI Decision Scan Environment Variables
# Generated by ai-apply-decision fallback
export NUCLEI_SEVERITY=critical,high
export NUCLEI_THREADS=10
export NUCLEI_RATE_LIMIT=30
export NUCLEI_TIMEOUT=6h
export NUCLEI_TIMEOUT_SECONDS=21600
export AI_SCAN_PROFILE=focused
export AI_DECISION_SOURCE=fallback-defaults
export AI_FOCUS_AREAS_FILE={{focusAreasOutput}}
export AI_RESCAN_TARGETS_FILE={{rescanTargetsOutput}}
export AI_FOLLOWUP_SOURCE_KIND=none
export AI_FOLLOWUP_TARGET_COUNT=0
export AI_FOLLOWUP_SCAN_PROFILE=
export AI_FOLLOWUP_SEVERITY=
export AI_FOLLOWUP_PRIORITY_MODE=
export AI_FOLLOWUP_CONFIDENCE_LEVEL=
export AI_FOLLOWUP_CAMPAIGN_CREATE_STATUS=
export AI_FOLLOWUP_CAMPAIGN_ID=
export AI_FOLLOWUP_CAMPAIGN_QUEUED_RUNS=0
export AI_FOLLOWUP_REUSE_SOURCES=
export AI_FOLLOWUP_MANUAL_NEEDED=false
export AI_FOLLOWUP_CAMPAIGN_RECOMMENDED=false
export AI_FOLLOWUP_QUEUE_EFFECTIVE=false
EOF
      fi

  - name: log-application-complete
    type: function
    pre_condition: "{{enableAiDecision}}"
    functions:
      - 'log_info("AI decision configuration applied")'

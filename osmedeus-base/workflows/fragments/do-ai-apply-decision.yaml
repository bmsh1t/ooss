# =============================================================================
# AI 动态配置应用模块
# =============================================================================
# 功能：
# - 读取智能决策生成的配置
# - 将配置转换为环境变量或参数
# - 尝试应用配置影响后续扫描
# =============================================================================

kind: module
name: ai-apply-decision
description: Apply AI decision config to influence subsequent scans

params:
  - name: decisionOutput
    default: "{{Output}}/ai-analysis/ai-decision-{{TargetSpace}}.json"
  - name: dynamicConfigOutput
    default: "{{Output}}/ai-analysis/dynamic-config.yaml"
  - name: enableAiDecision
    type: bool
    default: true
    description: "Enable AI decision application"

steps:
  - name: check-decision-exists
    type: bash
    pre_condition: "{{enableAiDecision}}"
    command: |
      if [ -f "{{decisionOutput}}" ]; then
        echo "[Apply Decision] Found decision config"
        cat {{decisionOutput}}
      else
        echo "[Apply Decision] No decision config found, using defaults"
      fi

  - name: extract-decision-vars
    type: function
    pre_condition: "{{enableAiDecision}}"
    functions:
      - 'log_info("Extracting decision variables for scan optimization")'

  - name: create-scan-directives
    type: bash
    pre_condition: "{{enableAiDecision}}"
    command: |
      mkdir -p {{Output}}/ai-analysis 2>/dev/null || true
      
      # 创建扫描指令文件，供后续模块参考
      if [ -f "{{decisionOutput}}" ]; then
        # 提取关键决策
        SEVERITY=$(cat {{decisionOutput}} | jq -r '.nuclei_severity // "critical,high"' 2>/dev/null)
        THREADS=$(cat {{decisionOutput}} | jq -r '.suggested_threads // 10' 2>/dev/null)
        RATE_LIMIT=$(cat {{decisionOutput}} | jq -r '.suggested_rate_limit // 30' 2>/dev/null)
        TIMEOUT=$(cat {{decisionOutput}} | jq -r '.recommended_timeout // "6h"' 2>/dev/null)
        
        # 创建环境变量文件
        {
          printf '# AI Decision Scan Environment Variables\n'
          printf '# Generated by ai-apply-decision module\n'
          printf 'export NUCLEI_SEVERITY=%s\n' "$(printf '%s' "$SEVERITY" | sed 's/["\\]/\\&/g')"
          printf 'export NUCLEI_THREADS=%s\n' "$THREADS"
          printf 'export NUCLEI_RATE_LIMIT=%s\n' "$RATE_LIMIT"
          printf 'export NUCLEI_TIMEOUT=%s\n' "$(printf '%s' "$TIMEOUT" | sed 's/["\\]/\\&/g')"
        } > {{Output}}/ai-analysis/scan-env.sh

        # 创建优先级URL列表
        jq -r '.focus_areas[]' "{{decisionOutput}}" 2>/dev/null > {{Output}}/ai-analysis/focus-areas.txt || true
        jq -r '.rescan_targets[]' "{{decisionOutput}}" 2>/dev/null > {{Output}}/ai-analysis/rescan-targets-from-decision.txt || true

        echo "[Apply Decision] Config applied: SEVERITY=$SEVERITY THREADS=$THREADS"
      else
        # 默认配置
        {
          printf '# Default Scan Environment Variables\n'
          printf 'export NUCLEI_SEVERITY="critical,high"\n'
          printf 'export NUCLEI_THREADS=10\n'
          printf 'export NUCLEI_RATE_LIMIT=30\n'
          printf 'export NUCLEI_TIMEOUT="6h"\n'
        } > {{Output}}/ai-analysis/scan-env.sh
        
        echo "[Apply Decision] Using default config"
      fi
      
      echo "[Apply Decision] Environment configured"

  - name: log-application-complete
    type: function
    pre_condition: "{{enableAiDecision}}"
    functions:
      - 'log_info("AI decision configuration applied")'

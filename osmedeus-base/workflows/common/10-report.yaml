# =============================================================================
# Module Workflow: Final Report Generation
# =============================================================================
# 聚合所有扫描结果，生成最终报告
# =============================================================================

kind: module
name: generate-final-report
description: Aggregate all scan results and generate final report
tags: report, summary, aggregation

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  # 输入文件 - 资产
  - name: subdomainFile
    default: "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"
  - name: resolvedFile
    default: "{{Output}}/probing/resolved-{{TargetSpace}}.txt"

  # 输入文件 - 指纹和爬取
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"
  - name: spiderFile
    default: "{{Output}}/links/links-{{TargetSpace}}.txt"

  # 输入文件 - 内容分析
  - name: jsSecretsFile
    default: "{{Output}}/content-analysis/js-secrets-{{TargetSpace}}.txt"
  - name: jsEndpointsFile
    default: "{{Output}}/content-analysis/js-endpoints-{{TargetSpace}}.txt"
  - name: websocketMisconfigFile
    default: "{{Output}}/content-analysis/ws-misconfig-{{TargetSpace}}.txt"
  - name: graphqlEndpointsFile
    default: "{{Output}}/content-analysis/graphql-endpoints-{{TargetSpace}}.txt"
  - name: gfDir
    default: "{{Output}}/gf"
  - name: paramsFile
    default: "{{Output}}/content-analysis/params-{{TargetSpace}}.json"
  - name: dictKeysFile
    default: "{{Output}}/content-analysis/dict-keys-{{TargetSpace}}.txt"

  # 输入文件 - 漏洞扫描
  - name: nucleiFile
    default: "{{Output}}/vulnscan/nuclei-jsonl-{{TargetSpace}}.txt"
  - name: nucleiCleanFile
    default: "{{Output}}/vulnscan/clean-jsonl-{{TargetSpace}}.txt"
  - name: nucleiCriticalFile
    default: "{{Output}}/vulnscan/nuclei-critical-{{TargetSpace}}.txt"
  - name: nucleiHighFile
    default: "{{Output}}/vulnscan/nuclei-high-{{TargetSpace}}.txt"
  - name: ssrfCallbackFile
    default: "{{Output}}/vuln-scan-suite/ssrf-callback-{{TargetSpace}}.txt"
  - name: sstiFile
    default: "{{Output}}/vuln-scan-suite/ssti-{{TargetSpace}}.txt"
  - name: sqliFile
    default: "{{Output}}/vuln-scan-suite/sqli-{{TargetSpace}}.txt"
  - name: lfiFile
    default: "{{Output}}/vuln-scan-suite/lfi-{{TargetSpace}}.txt"
  - name: secretFile
    default: "{{Output}}/vuln-scan-suite/secrets-{{TargetSpace}}.txt"
  - name: takeoverFile
    default: "{{Output}}/vuln-scan-suite/takeover-{{TargetSpace}}.txt"

  # 输入文件 - OSINT
  - name: osintEmailsFile
    default: "{{Output}}/osint/emails-{{TargetSpace}}.txt"
  - name: osintReposFile
    default: "{{Output}}/osint/github-company-secrets-{{TargetSpace}}.json"
  - name: osintCloudFile
    default: "{{Output}}/osint/cloud-{{TargetSpace}}.txt"

  # 输入文件 - AI 分析闭环
  - name: aiDecisionFile
    default: "{{Output}}/ai-analysis/ai-decision-{{TargetSpace}}.json"
  - name: vulnValidationFile
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: attackChainFile
    default: "{{Output}}/ai-analysis/attack-chain-{{TargetSpace}}.json"
  - name: pathPlanningFile
    default: "{{Output}}/ai-analysis/path-planning-{{TargetSpace}}.json"
  - name: semanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-decision-followup-{{TargetSpace}}.json"
  - name: fallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-post-vuln-{{TargetSpace}}.json"
  - name: secondFallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-early-{{TargetSpace}}.json"
  - name: thirdFallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-results-{{TargetSpace}}.json"
  - name: retestPlanFile
    default: "{{Output}}/ai-analysis/retest-plan-{{TargetSpace}}.json"
  - name: operatorQueueFile
    default: "{{Output}}/ai-analysis/operator-queue-{{TargetSpace}}.json"
  - name: campaignHandoffFile
    default: "{{Output}}/ai-analysis/campaign-handoff-{{TargetSpace}}.json"
  - name: campaignCreateFile
    default: "{{Output}}/ai-analysis/campaign-create-{{TargetSpace}}.json"
  - name: retestQueueSummaryFile
    default: "{{Output}}/ai-analysis/retest-queue-summary-{{TargetSpace}}.json"
  - name: rescanSummaryFile
    default: "{{Output}}/ai-analysis/rescan-summary-{{TargetSpace}}.md"
  - name: rescanFindingsFile
    default: "{{Output}}/vulnscan/nuclei-rescan-{{TargetSpace}}.jsonl"
  - name: appliedDecisionFile
    default: "{{Output}}/ai-analysis/applied-ai-decision-{{TargetSpace}}.json"
  - name: followupDecisionFile
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"
  - name: confirmedUrlsFile
    default: "{{Output}}/ai-analysis/confirmed-urls-{{TargetSpace}}.txt"
  - name: entryPointsFile
    default: "{{Output}}/ai-analysis/entry-points-{{TargetSpace}}.txt"
  - name: bestPathTargetsFile
    default: "{{Output}}/ai-analysis/best-path-targets-{{TargetSpace}}.txt"
  - name: semanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-{{TargetSpace}}.txt"
  - name: fallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"
  - name: secondFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
  - name: thirdFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-early-{{TargetSpace}}.txt"
  - name: retestTargetsFile
    default: "{{Output}}/ai-analysis/retest-targets-{{TargetSpace}}.txt"
  - name: operatorQueueTargetsFile
    default: "{{Output}}/ai-analysis/operator-queue-targets-{{TargetSpace}}.txt"
  - name: campaignTargetsFile
    default: "{{Output}}/ai-analysis/campaign-targets-{{TargetSpace}}.txt"

  # LLM 报告生成配置
  - name: enableLlmReport
    type: bool
    default: true
    description: "Enable LLM-powered report generation and analysis"
  - name: llmExecutiveSummary
    default: "{{Output}}/report/llm-executive-summary-{{TargetSpace}}.md"
    description: "LLM-generated executive summary"
  - name: llmRiskAssessment
    default: "{{Output}}/report/llm-risk-assessment-{{TargetSpace}}.md"
    description: "LLM-generated risk assessment"
  - name: llmRecommendations
    default: "{{Output}}/report/llm-recommendations-{{TargetSpace}}.md"
    description: "LLM-generated remediation recommendations"
  - name: enableLlmAttackSurface
    type: bool
    default: true
    description: "Enable LLM-powered attack surface analysis"
  - name: llmAttackSurfaceReport
    default: "{{Output}}/report/llm-attack-surface-{{TargetSpace}}.md"
    description: "LLM attack surface analysis report"

  # 输出文件
  - name: reportDir
    default: "{{Output}}/report"
  - name: summaryFile
    default: "{{Output}}/report/executive-summary-{{TargetSpace}}.md"
  - name: fullReportFile
    default: "{{Output}}/report/full-report-{{TargetSpace}}.md"
  - name: jsonStatsFile
    default: "{{Output}}/report/statistics-{{TargetSpace}}.json"
  - name: assetsSummaryFile
    default: "{{Output}}/report/assets-summary-{{TargetSpace}}.md"

# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  commands:
    - jq
  variables:
    - name: Target
      type: string
      required: true

# -----------------------------------------------------------------------------
# REPORTS SECTION
# -----------------------------------------------------------------------------
reports:
  - name: executive-summary
    path: "{{summaryFile}}"
    type: markdown
    description: Executive summary for stakeholders

  - name: full-report
    path: "{{fullReportFile}}"
    type: markdown
    description: Detailed technical report

  - name: statistics
    path: "{{jsonStatsFile}}"
    type: json
    description: Statistical data in JSON format

# -----------------------------------------------------------------------------
# STEPS SECTION
# -----------------------------------------------------------------------------
steps:
  - name: create-output-folder
    type: function
    log: "Creating report folder"
    functions:
      - 'create_folder("{{reportDir}}")'

  # ---------------------------------------------------------------------------
  # 收集统计数据
  # ---------------------------------------------------------------------------
  - name: collect-statistics
    type: bash
    log: "Collecting scan statistics"
    command: |
      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      count_severity_matches() {
        file="$1"
        severity="$2"
        if [ -f "$file" ] && [ -s "$file" ]; then
          jq -r --arg severity "$severity" 'select(.info.severity == $severity) | 1' "$file" 2>/dev/null | wc -l | tr -d ' '
        else
          echo 0
        fi
      }

      ACTIVE_SEMANTIC_PRIORITY_FILE="{{semanticPriorityTargetsFile}}"
      for candidate in "{{semanticPriorityTargetsFile}}" "{{fallbackSemanticPriorityTargetsFile}}" "{{secondFallbackSemanticPriorityTargetsFile}}" "{{thirdFallbackSemanticPriorityTargetsFile}}"; do
        [ -n "$candidate" ] || continue
        if text_has_lines "$candidate"; then
          ACTIVE_SEMANTIC_PRIORITY_FILE="$candidate"
          break
        fi
      done

      ACTIVE_SEMANTIC_SEARCH_FILE="{{semanticSearchFile}}"
      for candidate in "{{semanticSearchFile}}" "{{fallbackSemanticSearchFile}}" "{{secondFallbackSemanticSearchFile}}" "{{thirdFallbackSemanticSearchFile}}"; do
        [ -n "$candidate" ] || continue
        if [ -f "$candidate" ] && jq empty "$candidate" >/dev/null 2>&1; then
          ACTIVE_SEMANTIC_SEARCH_FILE="$candidate"
          break
        fi
      done

      # 资产统计
      SUBDOMAINS=$(count_lines "{{subdomainFile}}")
      RESOLVED=$(count_lines "{{resolvedFile}}")
      URLS=$(count_lines "{{httpFile}}")
      
      # 内容分析
      JS_ENDPOINTS=$(count_lines "{{jsEndpointsFile}}")
      WS_MISCONFIG=$(count_lines "{{websocketMisconfigFile}}")
      GRAPHQL=$(count_lines "{{graphqlEndpointsFile}}")
      
      # OSINT
      EMAILS=$(count_lines "{{osintEmailsFile}}")
      CLOUD_ASSETS=$(count_lines "{{osintCloudFile}}")
      
      # 漏洞统计
      CRITICAL=$(count_lines "{{nucleiCriticalFile}}")
      HIGH=$(count_lines "{{nucleiHighFile}}")
      TOTAL_VULNS=$(count_lines "{{nucleiFile}}")
      SECRETS=$(count_lines "{{secretFile}}")
      TAKEOVERS=$(count_lines "{{takeoverFile}}")

      # AI 闭环统计
      AI_CONFIRMED=$(jq -r '(.confirmed_real // .validation_summary.confirmed_real // 0)' {{vulnValidationFile}} 2>/dev/null || echo 0)
      ATTACK_CHAINS=$(jq -r '.attack_chain_summary.total_chains // 0' {{attackChainFile}} 2>/dev/null || echo 0)
      PATH_PHASES=$(jq -r '.plan_summary.total_phases // 0' {{pathPlanningFile}} 2>/dev/null || echo 0)
      RETEST_TARGETS=$(count_lines "{{retestTargetsFile}}")
      OPERATOR_TARGETS=$(count_lines "{{operatorQueueTargetsFile}}")
      CAMPAIGN_TARGETS=$(count_lines "{{campaignTargetsFile}}")
      CONFIRMED_URLS=$(count_lines "{{confirmedUrlsFile}}")
      ENTRY_POINTS=$(count_lines "{{entryPointsFile}}")
      BEST_PATH_TARGETS=$(count_lines "{{bestPathTargetsFile}}")
      SEMANTIC_PRIORITY_TARGETS=$(count_lines "$ACTIVE_SEMANTIC_PRIORITY_FILE")
      OPERATOR_TASKS=$(jq -r '.summary.total_tasks // 0' {{operatorQueueFile}} 2>/dev/null || echo 0)
      RETEST_QUEUED=$(jq -r '.queued_targets // 0' {{retestQueueSummaryFile}} 2>/dev/null || echo 0)
      CAMPAIGN_READY=$(jq -r '.handoff_ready // false' {{campaignHandoffFile}} 2>/dev/null || echo false)
      CAMPAIGN_CREATE_STATUS=$(jq -r '.status // "not_requested"' {{campaignCreateFile}} 2>/dev/null || echo not_requested)
      CAMPAIGN_CREATE_ID=$(jq -r '.campaign_id // ""' {{campaignCreateFile}} 2>/dev/null || echo "")
      CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.queued_runs // 0' {{campaignCreateFile}} 2>/dev/null || echo 0)
      SEMANTIC_RESULTS=$(jq -r '.total_results // 0' "$ACTIVE_SEMANTIC_SEARCH_FILE" 2>/dev/null || echo 0)
      RESCAN_TOTAL=$(count_lines "{{rescanFindingsFile}}")
      RESCAN_CRITICAL=$(count_severity_matches "{{rescanFindingsFile}}" "critical")
      RESCAN_HIGH=$(count_severity_matches "{{rescanFindingsFile}}" "high")
      FOLLOWUP_NEXT_PHASE=$(jq -r '.execution_feedback.next_phase // "not_generated"' {{followupDecisionFile}} 2>/dev/null || echo not_generated)
      FOLLOWUP_PRIORITY_MODE=$(jq -r '.seed_focus.priority_mode // "not_generated"' {{followupDecisionFile}} 2>/dev/null || echo not_generated)
      FOLLOWUP_CONFIDENCE_LEVEL=$(jq -r '.seed_focus.confidence_level // "not_generated"' {{followupDecisionFile}} 2>/dev/null || echo not_generated)
      FOLLOWUP_MANUAL_FIRST=$(jq -r '[.seed_targets.manual_first_targets[]?] | length' {{followupDecisionFile}} 2>/dev/null || echo 0)
      FOLLOWUP_HIGH_CONFIDENCE=$(jq -r '[.seed_targets.high_confidence_targets[]?] | length' {{followupDecisionFile}} 2>/dev/null || echo 0)
      FOLLOWUP_ESCALATION_SCORE=$(jq -r '.seed_focus.signal_scores.escalation_score // 0' {{followupDecisionFile}} 2>/dev/null || echo 0)
      FOLLOWUP_REUSE_SOURCES=$(jq -c '.seed_focus.reuse_sources // []' {{followupDecisionFile}} 2>/dev/null || echo '[]')
      FOLLOWUP_NEXT_ACTIONS=$(jq -c '.next_actions // []' {{followupDecisionFile}} 2>/dev/null || echo '[]')
      FOLLOWUP_MANUAL_NEEDED=$(jq -r '.seed_focus.manual_followup_needed // .execution_feedback.manual_followup_needed // false' {{followupDecisionFile}} 2>/dev/null || echo false)
      FOLLOWUP_CAMPAIGN_RECOMMENDED=$(jq -r '.seed_focus.campaign_followup_recommended // .execution_feedback.campaign_followup_recommended // false' {{followupDecisionFile}} 2>/dev/null || echo false)
      FOLLOWUP_QUEUE_EFFECTIVE=$(jq -r '.seed_focus.queue_followup_effective // .execution_feedback.queue_followup_effective // false' {{followupDecisionFile}} 2>/dev/null || echo false)
      
      # 生成 JSON
      cat > {{jsonStatsFile}} << EOF
      {
        "target": "{{Target}}",
        "scan_date": "$(date -Iseconds)",
        "statistics": {
          "assets": {"subdomains": $SUBDOMAINS, "resolved": $RESOLVED, "urls": $URLS},
          "content": {"js_endpoints": $JS_ENDPOINTS, "ws_misconfig": $WS_MISCONFIG, "graphql": $GRAPHQL},
          "osint": {"emails": $EMAILS, "cloud_assets": $CLOUD_ASSETS},
          "vulnerabilities": {"total": $TOTAL_VULNS, "critical": $CRITICAL, "high": $HIGH},
          "secrets": $SECRETS,
          "takeovers": $TAKEOVERS,
          "ai": {
            "confirmed_findings": $AI_CONFIRMED,
            "confirmed_urls": $CONFIRMED_URLS,
            "entry_points": $ENTRY_POINTS,
            "best_path_targets": $BEST_PATH_TARGETS,
            "semantic_priority_targets": $SEMANTIC_PRIORITY_TARGETS,
            "semantic_priority_targets_file": "$ACTIVE_SEMANTIC_PRIORITY_FILE",
            "semantic_results": $SEMANTIC_RESULTS,
            "semantic_results_file": "$ACTIVE_SEMANTIC_SEARCH_FILE",
            "attack_chains": $ATTACK_CHAINS,
            "path_phases": $PATH_PHASES,
            "retest_targets": $RETEST_TARGETS,
            "operator_targets": $OPERATOR_TARGETS,
            "operator_tasks": $OPERATOR_TASKS,
            "campaign_targets": $CAMPAIGN_TARGETS,
            "retest_queued_targets": $RETEST_QUEUED,
            "targeted_rescan_findings": $RESCAN_TOTAL,
            "targeted_rescan_critical": $RESCAN_CRITICAL,
            "targeted_rescan_high": $RESCAN_HIGH,
            "followup_next_phase": "$FOLLOWUP_NEXT_PHASE",
            "priority_mode": "$FOLLOWUP_PRIORITY_MODE",
            "confidence_level": "$FOLLOWUP_CONFIDENCE_LEVEL",
            "manual_first_targets": $FOLLOWUP_MANUAL_FIRST,
            "high_confidence_targets": $FOLLOWUP_HIGH_CONFIDENCE,
            "escalation_score": $FOLLOWUP_ESCALATION_SCORE,
            "reuse_sources": $FOLLOWUP_REUSE_SOURCES,
            "next_actions": $FOLLOWUP_NEXT_ACTIONS,
            "manual_followup_needed": $FOLLOWUP_MANUAL_NEEDED,
            "campaign_followup_recommended": $FOLLOWUP_CAMPAIGN_RECOMMENDED,
            "queue_followup_effective": $FOLLOWUP_QUEUE_EFFECTIVE,
            "campaign_ready": $CAMPAIGN_READY,
            "campaign_create_status": "$CAMPAIGN_CREATE_STATUS",
            "campaign_create_id": "$CAMPAIGN_CREATE_ID",
            "campaign_create_queued_runs": $CAMPAIGN_CREATE_QUEUED_RUNS
          }
        }
      }
      EOF
      
      echo "[STATS] Subdomains: $SUBDOMAINS, URLs: $URLS"
      echo "[STATS] Critical: $CRITICAL, High: $HIGH, Total: $TOTAL_VULNS"
      echo "[STATS] AI: confirmed=$AI_CONFIRMED chains=$ATTACK_CHAINS retest=$RETEST_TARGETS operator_tasks=$OPERATOR_TASKS campaign=$CAMPAIGN_TARGETS priority_mode=$FOLLOWUP_PRIORITY_MODE confidence=$FOLLOWUP_CONFIDENCE_LEVEL escalation=$FOLLOWUP_ESCALATION_SCORE"

  - name: generate-assets-summary
    type: bash
    log: "Generating prioritized target pack summary"
    command: |
      mkdir -p {{reportDir}}

      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      ACTIVE_SEMANTIC_PRIORITY_FILE="{{semanticPriorityTargetsFile}}"
      for candidate in "{{semanticPriorityTargetsFile}}" "{{fallbackSemanticPriorityTargetsFile}}" "{{secondFallbackSemanticPriorityTargetsFile}}" "{{thirdFallbackSemanticPriorityTargetsFile}}"; do
        [ -n "$candidate" ] || continue
        if text_has_lines "$candidate"; then
          ACTIVE_SEMANTIC_PRIORITY_FILE="$candidate"
          break
        fi
      done

      {
        echo "# Prioritized Target Pack - {{Target}}"
        echo ""
        echo "Generated: $(date '+%Y-%m-%d %H:%M:%S')"
        echo ""
        echo "## Confirmed URLs"
        if [ -f "{{confirmedUrlsFile}}" ] && [ -s "{{confirmedUrlsFile}}" ]; then
          head -50 "{{confirmedUrlsFile}}" | sed 's/^/- /'
        else
          echo "- none"
        fi
        echo ""
        echo "## Attack-Chain Entry Points"
        if [ -f "{{entryPointsFile}}" ] && [ -s "{{entryPointsFile}}" ]; then
          head -50 "{{entryPointsFile}}" | sed 's/^/- /'
        else
          echo "- none"
        fi
        echo ""
        echo "## Best Path Targets"
        if [ -f "{{bestPathTargetsFile}}" ] && [ -s "{{bestPathTargetsFile}}" ]; then
          head -50 "{{bestPathTargetsFile}}" | sed 's/^/- /'
        else
          echo "- none"
        fi
        echo ""
        echo "## Semantic Priority Targets"
        if text_has_lines "$ACTIVE_SEMANTIC_PRIORITY_FILE"; then
          head -50 "$ACTIVE_SEMANTIC_PRIORITY_FILE" | sed 's/^/- /'
        else
          echo "- none"
        fi
        echo ""
        echo "## Manual-First Targets"
        if [ -f "{{followupDecisionFile}}" ] && jq -e '((.seed_targets.manual_first_targets // []) | length) > 0' "{{followupDecisionFile}}" >/dev/null 2>&1; then
          jq -r '.seed_targets.manual_first_targets[]? | "- \(.)"' "{{followupDecisionFile}}" 2>/dev/null | head -50
        else
          echo "- none"
        fi
        echo ""
        echo "## High-Confidence Targets"
        if [ -f "{{followupDecisionFile}}" ] && jq -e '((.seed_targets.high_confidence_targets // []) | length) > 0' "{{followupDecisionFile}}" >/dev/null 2>&1; then
          jq -r '.seed_targets.high_confidence_targets[]? | "- \(.)"' "{{followupDecisionFile}}" 2>/dev/null | head -50
        else
          echo "- none"
        fi
        echo ""
        echo "## Retest Targets"
        if [ -f "{{retestTargetsFile}}" ] && [ -s "{{retestTargetsFile}}" ]; then
          head -50 "{{retestTargetsFile}}" | sed 's/^/- /'
        else
          echo "- none"
        fi
        echo ""
        echo "## Operator Queue Targets"
        if [ -f "{{operatorQueueTargetsFile}}" ] && [ -s "{{operatorQueueTargetsFile}}" ]; then
          head -50 "{{operatorQueueTargetsFile}}" | sed 's/^/- /'
        else
          echo "- none"
        fi
        echo ""
        echo "## Campaign Targets"
        if [ -f "{{campaignTargetsFile}}" ] && [ -s "{{campaignTargetsFile}}" ]; then
          head -50 "{{campaignTargetsFile}}" | sed 's/^/- /'
        else
          echo "- none"
        fi
      } > {{assetsSummaryFile}}

  # ---------------------------------------------------------------------------
  # 生成执行摘要
  # ---------------------------------------------------------------------------
  - name: generate-executive-summary
    type: bash
    log: "Generating executive summary"
    command: |
      SUBDOMAINS=$(jq -r '.statistics.assets.subdomains' {{jsonStatsFile}} 2>/dev/null || echo 0)
      URLS=$(jq -r '.statistics.assets.urls' {{jsonStatsFile}} 2>/dev/null || echo 0)
      CRITICAL=$(jq -r '.statistics.vulnerabilities.critical' {{jsonStatsFile}} 2>/dev/null || echo 0)
      HIGH=$(jq -r '.statistics.vulnerabilities.high' {{jsonStatsFile}} 2>/dev/null || echo 0)
      TOTAL_VULNS=$(jq -r '.statistics.vulnerabilities.total' {{jsonStatsFile}} 2>/dev/null || echo 0)
      SECRETS=$(jq -r '.statistics.secrets' {{jsonStatsFile}} 2>/dev/null || echo 0)
      TAKEOVERS=$(jq -r '.statistics.takeovers' {{jsonStatsFile}} 2>/dev/null || echo 0)
      AI_CONFIRMED=$(jq -r '.statistics.ai.confirmed_findings // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      ATTACK_CHAINS=$(jq -r '.statistics.ai.attack_chains // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      SEMANTIC_PRIORITY_TARGETS=$(jq -r '.statistics.ai.semantic_priority_targets // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      RETEST_TARGETS=$(jq -r '.statistics.ai.retest_targets // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      OPERATOR_TASKS=$(jq -r '.statistics.ai.operator_tasks // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      CAMPAIGN_TARGETS=$(jq -r '.statistics.ai.campaign_targets // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      CAMPAIGN_READY=$(jq -r '.statistics.ai.campaign_ready // false' {{jsonStatsFile}} 2>/dev/null || echo false)
      CAMPAIGN_CREATE_STATUS=$(jq -r '.statistics.ai.campaign_create_status // "not_requested"' {{jsonStatsFile}} 2>/dev/null || echo not_requested)
      CAMPAIGN_CREATE_ID=$(jq -r '.statistics.ai.campaign_create_id // ""' {{jsonStatsFile}} 2>/dev/null || echo "")
      CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.statistics.ai.campaign_create_queued_runs // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      RESCAN_TOTAL=$(jq -r '.statistics.ai.targeted_rescan_findings // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      FOLLOWUP_NEXT_PHASE=$(jq -r '.statistics.ai.followup_next_phase // "not_generated"' {{jsonStatsFile}} 2>/dev/null || echo not_generated)
      FOLLOWUP_PRIORITY_MODE=$(jq -r '.statistics.ai.priority_mode // "not_generated"' {{jsonStatsFile}} 2>/dev/null || echo not_generated)
      FOLLOWUP_CONFIDENCE_LEVEL=$(jq -r '.statistics.ai.confidence_level // "not_generated"' {{jsonStatsFile}} 2>/dev/null || echo not_generated)
      FOLLOWUP_MANUAL_FIRST=$(jq -r '.statistics.ai.manual_first_targets // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      FOLLOWUP_HIGH_CONFIDENCE=$(jq -r '.statistics.ai.high_confidence_targets // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      FOLLOWUP_ESCALATION_SCORE=$(jq -r '.statistics.ai.escalation_score // 0' {{jsonStatsFile}} 2>/dev/null || echo 0)
      FOLLOWUP_REUSE_SOURCES=$(jq -r '(.statistics.ai.reuse_sources // []) | join(", ")' {{jsonStatsFile}} 2>/dev/null || echo "")
      FOLLOWUP_MANUAL_NEEDED=$(jq -r '.statistics.ai.manual_followup_needed // false' {{jsonStatsFile}} 2>/dev/null || echo false)
      FOLLOWUP_CAMPAIGN_RECOMMENDED=$(jq -r '.statistics.ai.campaign_followup_recommended // false' {{jsonStatsFile}} 2>/dev/null || echo false)
      FOLLOWUP_QUEUE_EFFECTIVE=$(jq -r '.statistics.ai.queue_followup_effective // false' {{jsonStatsFile}} 2>/dev/null || echo false)
      
      # 风险等级
      [ "$CRITICAL" -gt 0 ] && RISK_LEVEL="🔴 CRITICAL" && RISK_ACTION="立即修复关键漏洞"
      [ "$CRITICAL" -eq 0 ] && [ "$HIGH" -gt 0 ] && RISK_LEVEL="🟠 HIGH" && RISK_ACTION="尽快修复高危漏洞"
      [ "$CRITICAL" -eq 0 ] && [ "$HIGH" -eq 0 ] && [ "$TOTAL_VULNS" -gt 0 ] && RISK_LEVEL="🟡 MEDIUM" && RISK_ACTION="计划修复中等漏洞"
      [ "$TOTAL_VULNS" -eq 0 ] && RISK_LEVEL="🟢 LOW" && RISK_ACTION="继续保持监控"

      {
        echo "# 执行摘要 - {{Target}}"
        echo ""
        echo "**扫描日期**: $(date '+%Y-%m-%d %H:%M:%S')"
        echo "**风险等级**: $RISK_LEVEL"
        echo ""
        echo "---"
        echo ""
        echo "## 资产概览"
        echo ""
        echo "| 类别 | 数量 |"
        echo "|------|------|"
        echo "| 🎯 子域名 | $SUBDOMAINS |"
        echo "| 🌐 HTTP 端点 | $URLS |"
        echo ""
        echo "## 漏洞发现"
        echo ""
        echo "| 严重程度 | 数量 |"
        echo "|----------|------|"
        echo "| 🔴 关键 (Critical) | $CRITICAL |"
        echo "| 🟠 高危 (High) | $HIGH |"
        echo "| 📊 总计 | $TOTAL_VULNS |"
        echo ""
        echo "## 其他发现"
        echo ""
        echo "| 类别 | 数量 |"
        echo "|------|------|"
        echo "| 🔑 敏感信息泄露 | $SECRETS |"
        echo "| ⚠️ 子域名接管风险 | $TAKEOVERS |"
        echo ""
        echo "## AI 实战闭环"
        echo ""
        echo "| 类别 | 数量/状态 |"
        echo "|------|-----------|"
        echo "| ✅ AI确认漏洞 | $AI_CONFIRMED |"
        echo "| ⛓️ 攻击链 | $ATTACK_CHAINS |"
        echo "| 🧠 语义优先目标 | $SEMANTIC_PRIORITY_TARGETS |"
        echo "| 🔁 复测目标 | $RETEST_TARGETS |"
        echo "| 👨‍💻 操作员任务 | $OPERATOR_TASKS |"
        echo "| 🎯 Campaign 目标 | $CAMPAIGN_TARGETS |"
        echo "| 🔍 定向复扫新增 | $RESCAN_TOTAL |"
        echo "| 🧭 下一阶段 | $FOLLOWUP_NEXT_PHASE |"
        echo "| 🎛️ Seed 优先模式 | $FOLLOWUP_PRIORITY_MODE |"
        echo "| 📈 Seed 置信度 | $FOLLOWUP_CONFIDENCE_LEVEL |"
        echo "| 🔥 Manual-first 目标 | $FOLLOWUP_MANUAL_FIRST |"
        echo "| ✅ High-confidence 目标 | $FOLLOWUP_HIGH_CONFIDENCE |"
        echo "| 📐 Escalation Score | $FOLLOWUP_ESCALATION_SCORE |"
        echo "| 🔄 Reuse Sources | ${FOLLOWUP_REUSE_SOURCES:-none} |"
        echo "| 🚦 Campaign Ready | $CAMPAIGN_READY |"
        echo "| 🚀 Campaign Create | $CAMPAIGN_CREATE_STATUS |"
        echo "| 🆔 Campaign ID | ${CAMPAIGN_CREATE_ID:-none} |"
        echo "| 🧵 Campaign Queued Runs | $CAMPAIGN_CREATE_QUEUED_RUNS |"
        echo ""
        echo "---"
        echo ""
        echo "## 建议行动"
        echo ""
        echo "$RISK_ACTION"

        if [ "$AI_CONFIRMED" -gt 0 ] || [ "$OPERATOR_TASKS" -gt 0 ] || [ "$CAMPAIGN_TARGETS" -gt 0 ]; then
          echo ""
          echo "### 实战优先动作"
          [ "$RESCAN_TOTAL" -gt 0 ] && echo "- 复查 targeted rescan 新增命中，这些结果已经并回主漏洞结果，应优先补截图、响应包和复现步骤。"
          [ "$RETEST_TARGETS" -gt 0 ] && echo "- 优先对 AI 选出的复测目标补证据和补 payload。"
          [ "$OPERATOR_TASKS" -gt 0 ] && echo "- 先执行 operator queue 里的 P1/P2 任务，验证鉴权、业务逻辑、提权和横向可能性。"
          [ "$CAMPAIGN_TARGETS" -gt 0 ] && echo "- 将 campaign targets 作为后续深扫或人工接管目标包。"
          { [ "$FOLLOWUP_PRIORITY_MODE" = "manual-first" ] || [ "$FOLLOWUP_MANUAL_NEEDED" = "true" ]; } && echo "- 当前 followup 判断偏 manual-first，应优先围绕 manual-first/high-confidence 目标做人审与利用链验证。"
          [ "$FOLLOWUP_QUEUE_EFFECTIVE" = "true" ] && echo "- retest queue 已经生效，后续结果需要继续回灌 followup decision 和知识库。"
          [ "$FOLLOWUP_CAMPAIGN_RECOMMENDED" = "true" ] && echo "- 当前满足 campaign follow-up 条件，可将 priority targets 打包给深扫或批量推进链路。"
          [ "$CAMPAIGN_CREATE_QUEUED_RUNS" -gt 0 ] && echo "- campaign 已创建并排队 $CAMPAIGN_CREATE_QUEUED_RUNS 个 run，后续应优先追踪 campaign 结果并回灌知识库。"
          [ -n "$FOLLOWUP_REUSE_SOURCES" ] && echo "- 本轮 followup 复用了这些来源: $FOLLOWUP_REUSE_SOURCES。复测时优先确认这些来源是否仍然有效。"
        fi

        echo ""
        echo "---"
        echo ""
        echo "*本报告由 Osmedeus 自动生成*"
      } > {{summaryFile}}

  # ---------------------------------------------------------------------------
  # 生成完整技术报告
  # ---------------------------------------------------------------------------
  - name: generate-full-report
    type: bash
    log: "Generating full technical report"
    command: |
      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      ACTIVE_SEMANTIC_PRIORITY_FILE="{{semanticPriorityTargetsFile}}"
      for candidate in "{{semanticPriorityTargetsFile}}" "{{fallbackSemanticPriorityTargetsFile}}" "{{secondFallbackSemanticPriorityTargetsFile}}" "{{thirdFallbackSemanticPriorityTargetsFile}}"; do
        [ -n "$candidate" ] || continue
        if text_has_lines "$candidate"; then
          ACTIVE_SEMANTIC_PRIORITY_FILE="$candidate"
          break
        fi
      done

      ACTIVE_SEMANTIC_SEARCH_FILE="{{semanticSearchFile}}"
      for candidate in "{{semanticSearchFile}}" "{{fallbackSemanticSearchFile}}" "{{secondFallbackSemanticSearchFile}}" "{{thirdFallbackSemanticSearchFile}}"; do
        [ -n "$candidate" ] || continue
        if [ -f "$candidate" ] && jq empty "$candidate" >/dev/null 2>&1; then
          ACTIVE_SEMANTIC_SEARCH_FILE="$candidate"
          break
        fi
      done

      cat {{summaryFile}} > {{fullReportFile}} 2>/dev/null || true
      
      echo -e "\n---\n\n## 详细发现\n" >> {{fullReportFile}}
      
      # 关键漏洞
      if [ -f "{{nucleiCriticalFile}}" ] && [ -s "{{nucleiCriticalFile}}" ]; then
        echo -e "\n### 🔴 关键漏洞\n" >> {{fullReportFile}}
        jq -r '"- **\(.template-id)**: \(.info.name) at \(.matched-at)"' {{nucleiCriticalFile}} 2>/dev/null | head -50 >> {{fullReportFile}} || true
      fi
      
      # 高危漏洞
      if [ -f "{{nucleiHighFile}}" ] && [ -s "{{nucleiHighFile}}" ]; then
        echo -e "\n### 🟠 高危漏洞\n" >> {{fullReportFile}}
        jq -r '"- **\(.template-id)**: \(.info.name) at \(.matched-at)"' {{nucleiHighFile}} 2>/dev/null | head -50 >> {{fullReportFile}} || true
      fi
      
      # 敏感信息
      if [ -f "{{secretFile}}" ] && [ -s "{{secretFile}}" ]; then
        echo -e "\n### 🔑 敏感信息泄露\n\`\`\`" >> {{fullReportFile}}
        head -20 {{secretFile}} >> {{fullReportFile}} 2>/dev/null || true
        echo -e "\`\`\`" >> {{fullReportFile}}
      fi
      
      # 子域名接管
      if [ -f "{{takeoverFile}}" ] && [ -s "{{takeoverFile}}" ]; then
        echo -e "\n### ⚠️ 子域名接管风险\n\`\`\`" >> {{fullReportFile}}
        cat {{takeoverFile}} >> {{fullReportFile}} 2>/dev/null || true
        echo -e "\`\`\`" >> {{fullReportFile}}
      fi
      
      # WebSocket 错误配置
      if [ -f "{{websocketMisconfigFile}}" ] && [ -s "{{websocketMisconfigFile}}" ]; then
        echo -e "\n### 🌐 WebSocket Origin 错误配置\n\`\`\`" >> {{fullReportFile}}
        cat {{websocketMisconfigFile}} >> {{fullReportFile}} 2>/dev/null || true
        echo -e "\`\`\`" >> {{fullReportFile}}
      fi
      
      # GraphQL 端点
      if [ -f "{{graphqlEndpointsFile}}" ] && [ -s "{{graphqlEndpointsFile}}" ]; then
        echo -e "\n### 📊 GraphQL 端点\n\`\`\`" >> {{fullReportFile}}
        cat {{graphqlEndpointsFile}} >> {{fullReportFile}} 2>/dev/null || true
        echo -e "\`\`\`" >> {{fullReportFile}}
      fi

      echo -e "\n### 🎯 Prioritized Target Pack\n" >> {{fullReportFile}}
      cat {{assetsSummaryFile}} >> {{fullReportFile}} 2>/dev/null || true

      if [ -f "{{vulnValidationFile}}" ] && jq empty "{{vulnValidationFile}}" 2>/dev/null; then
        echo -e "\n### ✅ AI 验证摘要\n" >> {{fullReportFile}}
        jq -r '
          [
            "- Confirmed findings: " + ((.confirmed_real // .validation_summary.confirmed_real // 0) | tostring),
            "- False positives: " + ((.false_positives // .validation_summary.false_positives // 0) | tostring),
            "- Risk level: " + (.risk_level // .validation_summary.risk_level // "unknown")
          ] | .[]
        ' {{vulnValidationFile}} 2>/dev/null >> {{fullReportFile}} || true
      fi

      if [ -f "{{attackChainFile}}" ] && jq empty "{{attackChainFile}}" 2>/dev/null; then
        echo -e "\n### ⛓️ Attack Chain 摘要\n" >> {{fullReportFile}}
        jq -r '
          .attack_chains[]? |
          "- " + (.chain_name // .final_objective // "attack-chain") +
          " :: " + (.entry_point.url // "unknown") +
          " :: impact=" + (.impact // "unknown") +
          " :: success=" + ((.success_probability // "unknown") | tostring)
        ' {{attackChainFile}} 2>/dev/null | head -20 >> {{fullReportFile}} || true
      fi

      if [ -f "{{pathPlanningFile}}" ] && jq empty "{{pathPlanningFile}}" 2>/dev/null; then
        echo -e "\n### 🗺️ Path Planning 摘要\n" >> {{fullReportFile}}
        jq -r '
          .execution_phases[]? |
          "- Phase " + ((.phase // 0) | tostring) +
          ": " + (.phase_name // "phase") +
          " :: " + (.success_criteria // "n/a")
        ' {{pathPlanningFile}} 2>/dev/null >> {{fullReportFile}} || true
      fi

      if [ -f "{{retestPlanFile}}" ] && jq empty "{{retestPlanFile}}" 2>/dev/null; then
        echo -e "\n### 🔁 Retest Plan 摘要\n" >> {{fullReportFile}}
        jq -r '
          .targets[]? |
          "- [" + (.priority // "P2") + "] " + (.target // "unknown") + " :: " + (.reason // "n/a")
        ' {{retestPlanFile}} 2>/dev/null | head -20 >> {{fullReportFile}} || true
      fi

      if [ -f "{{operatorQueueFile}}" ] && jq empty "{{operatorQueueFile}}" 2>/dev/null; then
        echo -e "\n### 👨‍💻 Operator Queue 摘要\n" >> {{fullReportFile}}
        jq -r '
          .tasks[]? |
          "- [" + (.priority // "P2") + "] " + (.title // "task") + " :: " + (.target // "unknown") + " :: " + (.reason // "n/a")
        ' {{operatorQueueFile}} 2>/dev/null | head -20 >> {{fullReportFile}} || true
      fi

      if [ -f "{{campaignHandoffFile}}" ] && jq empty "{{campaignHandoffFile}}" 2>/dev/null; then
        echo -e "\n### 🚀 Campaign Handoff 摘要\n" >> {{fullReportFile}}
        jq -r '
          [
            "- Handoff ready: " + ((.handoff_ready // false) | tostring),
            "- Recommended flow: " + (.campaign_profile.recommended_flow // "web-analysis"),
            "- Campaign targets: " + ((.counts.campaign_targets // 0) | tostring),
            "- Previous priority mode: " + (.campaign_profile.previous_priority_mode // "n/a"),
            "- Previous confidence level: " + (.campaign_profile.previous_confidence_level // "n/a")
          ] | .[]
        ' {{campaignHandoffFile}} 2>/dev/null >> {{fullReportFile}} || true
      fi

      if [ -f "{{followupDecisionFile}}" ] && jq empty "{{followupDecisionFile}}" 2>/dev/null; then
        echo -e "\n### 🧭 Post-Followup Decision 摘要\n" >> {{fullReportFile}}
        jq -r '
          [
            "- Next phase: " + (.execution_feedback.next_phase // "not_generated"),
            "- Priority mode: " + (.seed_focus.priority_mode // "not_generated"),
            "- Confidence level: " + (.seed_focus.confidence_level // "not_generated"),
            "- Escalation score: " + ((.seed_focus.signal_scores.escalation_score // 0) | tostring),
            "- Manual-first targets: " + (((.seed_targets.manual_first_targets // []) | length) | tostring),
            "- High-confidence targets: " + (((.seed_targets.high_confidence_targets // []) | length) | tostring),
            "- Reuse sources: " + ((.seed_focus.reuse_sources // []) | join(", ")),
            "- Manual follow-up needed: " + ((.execution_feedback.manual_followup_needed // false) | tostring),
            "- Campaign follow-up recommended: " + ((.execution_feedback.campaign_followup_recommended // false) | tostring),
            "- Queue follow-up effective: " + ((.execution_feedback.queue_followup_effective // false) | tostring)
          ] + [(.next_actions[]? | "- next-action: " + .)] | .[]
        ' {{followupDecisionFile}} 2>/dev/null >> {{fullReportFile}} || true
      fi

      if [ -f "{{campaignCreateFile}}" ] && jq empty "{{campaignCreateFile}}" 2>/dev/null; then
        echo -e "\n### 🚀 Campaign Create Result\n" >> {{fullReportFile}}
        jq -r '
          [
            "- Status: " + (.status // "unknown"),
            "- Campaign ID: " + (.campaign_id // ""),
            "- Queued runs: " + ((.queued_runs // 0) | tostring),
            "- Workflow: " + (.workflow // "unknown"),
            "- Priority: " + (.priority // "unknown"),
            "- Priority mode: " + (.campaign_priority_mode // ""),
            "- Confidence level: " + (.campaign_confidence_level // ""),
            "- Follow-up next phase: " + (.campaign_followup_next_phase // "")
          ] | .[]
        ' {{campaignCreateFile}} 2>/dev/null >> {{fullReportFile}} || true
      fi

      if [ -f "{{rescanSummaryFile}}" ] && [ -s "{{rescanSummaryFile}}" ]; then
        echo -e "\n### 🔍 Targeted Rescan 摘要\n" >> {{fullReportFile}}
        head -40 {{rescanSummaryFile}} >> {{fullReportFile}} 2>/dev/null || true
      fi

      echo -e "\n### 📁 AI Artifacts\n" >> {{fullReportFile}}
      {
        echo "- AI decision: {{aiDecisionFile}}"
        echo "- Applied AI decision: {{appliedDecisionFile}}"
        echo "- Validation: {{vulnValidationFile}}"
        echo "- Attack chain: {{attackChainFile}}"
        echo "- Path planning: {{pathPlanningFile}}"
        echo "- Retest plan: {{retestPlanFile}}"
        echo "- Operator queue: {{operatorQueueFile}}"
        echo "- Campaign handoff: {{campaignHandoffFile}}"
        echo "- Campaign create: {{campaignCreateFile}}"
        echo "- Follow-up decision: {{followupDecisionFile}}"
        echo "- Retest queue summary: {{retestQueueSummaryFile}}"
        echo "- Prioritized target pack: {{assetsSummaryFile}}"
        echo "- Semantic search: $ACTIVE_SEMANTIC_SEARCH_FILE"
        echo "- Semantic priority targets: $ACTIVE_SEMANTIC_PRIORITY_FILE"
      } >> {{fullReportFile}}
      
      echo -e "\n---\n\n*报告生成时间: $(date '+%Y-%m-%d %H:%M:%S')*" >> {{fullReportFile}}

  # ---------------------------------------------------------------------------
  # LLM Executive Summary Generation
  # ---------------------------------------------------------------------------
  - name: llm-executive-summary
    type: llm
    pre_condition: '{{enableLlmReport}} && file_exists("{{jsonStatsFile}}")'
    log: "Generating executive summary with LLM"
    timeout: 300
    on_error:
      - action: continue
    messages:
      - role: system
        content: |
          You are a senior security consultant. Generate an executive summary for a security assessment.
          Focus on business impact, not technical details.
          Include:
          1. Overall risk level (Critical/High/Medium/Low)
          2. Key findings summary
          3. Business impact assessment
          4. Recommended actions
          
          Format in plain text, keep it concise for C-level executives. Do NOT use any template syntax like {{variable}} in your response.
      - role: user
        content: |
          Generate an executive summary for security assessment of {{Target}}.
          
          ## Scan Statistics
          {{readFile("{{jsonStatsFile}}")}}
          
          ## Critical Vulnerabilities
          {{readFile("{{nucleiCriticalFile}}")}}
          
          ## High Vulnerabilities
          {{readFile("{{nucleiHighFile}}")}}

          ## AI Confirmed Findings and Retest/Campaign Context
          {{readFile("{{vulnValidationFile}}")}}
          {{readFile("{{retestPlanFile}}")}}
          {{readFile("{{campaignHandoffFile}}")}}
    exports:
      executive_summary: "{{llm_executive_summary_content}}"

  - name: save-llm-executive-summary
    type: bash
    pre_condition: "{{enableLlmReport}}"
    log: "Saving LLM executive summary"
    command: |
      mkdir -p {{reportDir}} 2>/dev/null || true
      echo "# Executive Summary - {{Target}}" > {{llmExecutiveSummary}}
      echo "" >> {{llmExecutiveSummary}}
      echo "{{executive_summary}}" >> {{llmExecutiveSummary}}
    on_error:
      - action: continue

  - name: llm-risk-assessment
    type: llm
    pre_condition: '{{enableLlmReport}} && file_exists("{{nucleiFile}}")'
    log: "Generating risk assessment with LLM"
    timeout: 300
    on_error:
      - action: continue
    messages:
      - role: system
        content: |
          You are a security risk analyst. Generate a detailed risk assessment.
          Include:
          1. Vulnerability breakdown by severity
          2. Attack surface analysis
          3. Threat modeling insights
          4. Risk scoring (CVSS context)
          
          Format in plain text with clear sections. Do NOT use any template syntax like {{variable}} in your response.
      - role: user
        content: |
          Generate risk assessment for {{Target}}:
          
          ## Vulnerability scan results
          {{readFile("{{nucleiFile}}")}}
          
          ## Fingerprint data
          {{readFile("{{fingerprintFile}}")}}

          ## Attack chain and path planning
          {{readFile("{{attackChainFile}}")}}
          {{readFile("{{pathPlanningFile}}")}}
    exports:
      risk_assessment: "{{llm_risk_assessment_content}}"

  - name: save-llm-risk-assessment
    type: bash
    pre_condition: "{{enableLlmReport}}"
    log: "Saving LLM risk assessment"
    command: |
      mkdir -p {{reportDir}} 2>/dev/null || true
      echo "# Risk Assessment - {{Target}}" > {{llmRiskAssessment}}
      echo "" >> {{llmRiskAssessment}}
      echo "{{risk_assessment}}" >> {{llmRiskAssessment}}
    on_error:
      - action: continue

  - name: llm-recommendations
    type: llm
    pre_condition: '{{enableLlmReport}} && file_exists("{{nucleiFile}}")'
    log: "Generating remediation recommendations with LLM"
    timeout: 300
    on_error:
      - action: continue
    messages:
      - role: system
        content: |
          You are a security consultant. Generate actionable remediation recommendations.
          Prioritize by:
          1. Critical vulnerabilities requiring immediate action
          2. Quick wins that can be implemented quickly
          3. Long-term security improvements
          
          Include specific steps and code examples where applicable.
          Output in plain text only. Do NOT use any template syntax like {{variable}} in your response.
      - role: user
        content: |
          Generate remediation recommendations for {{Target}}:
          
          ## Vulnerabilities
          {{readFile("{{nucleiFile}}")}}
          
          ## Secrets found
          {{readFile("{{secretFile}}")}}
          
          ## Misconfigurations
          {{readFile("{{websocketMisconfigFile}}")}}

          ## Operator queue and campaign handoff
          {{readFile("{{operatorQueueFile}}")}}
          {{readFile("{{campaignHandoffFile}}")}}
    exports:
      recommendations: "{{llm_recommendations_content}}"

  - name: save-llm-recommendations
    type: bash
    pre_condition: "{{enableLlmReport}}"
    log: "Saving LLM recommendations"
    command: |
      mkdir -p {{reportDir}} 2>/dev/null || true
      echo "# Remediation Recommendations - {{Target}}" > {{llmRecommendations}}
      echo "" >> {{llmRecommendations}}
      echo "{{recommendations}}" >> {{llmRecommendations}}
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 4: LLM Attack Surface Analysis (P2)
  # ===========================================================================
  - name: llm-attack-surface-analysis
    type: llm
    pre_condition: '{{enableLlmAttackSurface}} && (file_exists("{{nucleiFile}}") || file_exists("{{fingerprintFile}}"))'
    log: "Generating attack surface analysis with LLM"
    timeout: 300
    on_error:
      - action: continue
    messages:
      - role: system
        content: |
          Role: Senior penetration tester conducting authorized security assessments. You are methodical, evidence-driven, and never speculate beyond what you can verify.
          
          Create a comprehensive security surface analysis:
          
          1. **Asset Correlation**: Map relationships between discovered assets
             - Subdomains to IP addresses
             - Services to technologies
             - Credentials to systems
             - Vulnerabilities to risk areas
          
          2. **Risk Path Analysis**: Identify potential security risk areas
             - External exposure points
             - Privilege escalation risks
             - Lateral movement risks
             - Data exposure routes
          
          3. **Critical Asset Identification**: High-value security targets
             - Authentication systems
             - Database servers
             - Administrative interfaces
             - Internal tool exposure
          
          4. **Risk Scoring**: Calculate overall risk score
             - Exposure level (Public/Internal)
             - Vulnerability severity
             - Business impact
             - Likelihood
          
          5. **Security Graph**: Visual representation of security surface
             - Entry points
             - Choke points
             - Target assets
          
          Provide actionable recommendations for security improvement.
          Format in Markdown with structured sections.
      - role: user
        content: |
          Generate security surface analysis for {{Target}}:
          
          ## Subdomains
          {{readFile("{{subdomainFile}}")}}
          
          ## HTTP services
          {{readFile("{{httpFile}}")}}
          
          ## Technologies detected
          {{readFile("{{fingerprintFile}}")}}
          
          ## Vulnerabilities
          {{readFile("{{nucleiFile}}")}}
          
          ## Secrets/credentials
          {{readFile("{{secretFile}}")}}

          ## AI target packs
          {{readFile("{{assetsSummaryFile}}")}}
          {{readFile("{{attackChainFile}}")}}
          
          Provide a comprehensive security surface analysis with risk areas.
    exports:
      attack_surface: "{{llm_attack_surface_analysis_content}}"

  - name: save-llm-attack-surface-report
    type: bash
    pre_condition: "{{enableLlmAttackSurface}}"
    log: "Saving LLM attack surface analysis report"
    command: |
      mkdir -p {{reportDir}} 2>/dev/null || true
      echo "# Attack Surface Analysis - {{Target}}" > {{llmAttackSurfaceReport}}
      echo "" >> {{llmAttackSurfaceReport}}
      echo "**Generated:** $(date)" >> {{llmAttackSurfaceReport}}
      echo "" >> {{llmAttackSurfaceReport}}
      echo "{{attack_surface}}" >> {{llmAttackSurfaceReport}}
    on_error:
      - action: continue

  # ---------------------------------------------------------------------------
  # 发送报告通知
  # ---------------------------------------------------------------------------
  - name: send-report-notification
    type: function
    log: "Sending report notification"
    pre_condition: 'file_exists("{{summaryFile}}")'
    functions:
      - 'send_telegram_file("{{summaryFile}}", "Security Scan Report - {{Target}}")'
    on_error:
      - action: continue

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  - name: report-generation-summary
    type: function
    log: "Report generation complete"
    functions:
      - 'db_total_assets("{{fullReportFile}}")'

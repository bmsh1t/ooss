# =============================================================================
# Module Workflow: Incremental Check
# =============================================================================
# 功能: 检测资产变化，实现快速重扫优化
# =============================================================================

kind: module
name: incremental-check
description: Check for asset changes before running downstream scans
tags: incremental, diff, optimization, rescan

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  - name: subdomainFile
    default: "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"
  - name: resolvedFile
    default: "{{Output}}/probing/resolved-{{TargetSpace}}.txt"
  - name: incrementalDir
    default: "{{Output}}/.incremental"
  - name: backupDir
    default: "{{Output}}/backup"
  - name: incrementalThreshold
    default: 0

  # 输出文件
  - name: newSubdomainsFile
    default: "{{incrementalDir}}/new-subdomains.txt"
  - name: newHttpFile
    default: "{{incrementalDir}}/new-http.txt"
  - name: incrementalReportFile
    default: "{{incrementalDir}}/incremental-report.txt"

# -----------------------------------------------------------------------------
# REPORTS SECTION
# -----------------------------------------------------------------------------
reports:
  - name: new-subdomains
    path: "{{newSubdomainsFile}}"
    type: text
    description: New subdomains found since last scan

  - name: incremental-report
    path: "{{incrementalReportFile}}"
    type: text
    description: Incremental scan summary report

# -----------------------------------------------------------------------------
# STEPS SECTION
# -----------------------------------------------------------------------------
steps:
  - name: create-folders
    type: function
    log: "Creating incremental directories"
    functions:
      - 'create_folder("{{incrementalDir}}")'
      - 'create_folder("{{incrementalDir}}/previous")'
      - 'create_folder("{{backupDir}}")'

  # ===========================================================================
  # Check Subdomain Changes (优化: 支持 backupDir)
  # ===========================================================================
  - name: check-subdomain-changes
    type: bash
    log: "Checking subdomain changes"
    command: |
      SUBDOMAIN_BACKUP="{{backupDir}}/subdomain-{{TargetSpace}}.txt"
      SUBDOMAIN_BACKUP_SORTED="{{incrementalDir}}/.subdomain-backup-sorted-{{TargetSpace}}.txt"
      SUBDOMAIN_CURRENT_SORTED="{{incrementalDir}}/.subdomain-current-sorted-{{TargetSpace}}.txt"

      : > "{{newSubdomainsFile}}"
      if [ -s "$SUBDOMAIN_BACKUP" ]; then
        sort -u "$SUBDOMAIN_BACKUP" > "$SUBDOMAIN_BACKUP_SORTED" 2>/dev/null || true
        sort -u "{{subdomainFile}}" > "$SUBDOMAIN_CURRENT_SORTED" 2>/dev/null || true

        if [ -s "$SUBDOMAIN_CURRENT_SORTED" ]; then
          comm -13 "$SUBDOMAIN_BACKUP_SORTED" "$SUBDOMAIN_CURRENT_SORTED" > "{{newSubdomainsFile}}" 2>/dev/null || cp "{{subdomainFile}}" "{{newSubdomainsFile}}" 2>/dev/null || true
        else
          cp "{{subdomainFile}}" "{{newSubdomainsFile}}" 2>/dev/null || true
        fi
      else
        cp "{{subdomainFile}}" "{{newSubdomainsFile}}" 2>/dev/null || true
      fi

      sort -u "{{newSubdomainsFile}}" -o "{{newSubdomainsFile}}" 2>/dev/null || true
      cp "{{subdomainFile}}" "$SUBDOMAIN_BACKUP" 2>/dev/null || true
      rm -f "$SUBDOMAIN_BACKUP_SORTED" "$SUBDOMAIN_CURRENT_SORTED" 2>/dev/null || true
    on_error:
      - action: continue

  # ===========================================================================
  # Check HTTP Endpoint Changes
  # ===========================================================================
  - name: check-http-changes
    type: bash
    log: "Checking HTTP endpoint changes"
    command: |
      PREVIOUS_HTTP_FILE="{{incrementalDir}}/previous/http.txt"
      PREVIOUS_HTTP_SORTED="{{incrementalDir}}/.previous-http-sorted-{{TargetSpace}}.txt"
      CURRENT_HTTP_SORTED="{{incrementalDir}}/.current-http-sorted-{{TargetSpace}}.txt"

      : > "{{newHttpFile}}"
      if [ -s "$PREVIOUS_HTTP_FILE" ]; then
        sort -u "$PREVIOUS_HTTP_FILE" > "$PREVIOUS_HTTP_SORTED" 2>/dev/null || true
        sort -u "{{httpFile}}" > "$CURRENT_HTTP_SORTED" 2>/dev/null || true

        if [ -s "$CURRENT_HTTP_SORTED" ]; then
          comm -13 "$PREVIOUS_HTTP_SORTED" "$CURRENT_HTTP_SORTED" > "{{newHttpFile}}" 2>/dev/null || cp "{{httpFile}}" "{{newHttpFile}}" 2>/dev/null || true
        else
          cp "{{httpFile}}" "{{newHttpFile}}" 2>/dev/null || true
        fi
      else
        cp "{{httpFile}}" "{{newHttpFile}}" 2>/dev/null || true
      fi

      sort -u "{{newHttpFile}}" -o "{{newHttpFile}}" 2>/dev/null || true
      rm -f "$PREVIOUS_HTTP_SORTED" "$CURRENT_HTTP_SORTED" 2>/dev/null || true
    on_error:
      - action: continue

  # ===========================================================================
  # Generate Incremental Report
  # ===========================================================================
  - name: generate-report
    type: bash
    log: "Generating incremental report"
    command: |
      echo "================================================" > {{incrementalReportFile}}
      echo "Incremental Scan Report - {{Target}}" >> {{incrementalReportFile}}
      echo "Date: $(date +%Y-%m-%d_%H:%M:%S)" >> {{incrementalReportFile}}
      new_subs=$(wc -l < {{newSubdomainsFile}} 2>/dev/null || echo 0)
      new_http=$(wc -l < {{newHttpFile}} 2>/dev/null || echo 0)
      echo "New Subdomains: $new_subs" >> {{incrementalReportFile}}
      echo "New HTTP: $new_http" >> {{incrementalReportFile}}
      echo "================================================" >> {{incrementalReportFile}}

  # ===========================================================================
  # Save Current State for Next Run
  # ===========================================================================
  - name: save-current-state
    type: function
    log: "Saving current state"
    functions:
      - 'exec_cmd("cp {{subdomainFile}} {{incrementalDir}}/previous/subdomains.txt 2>/dev/null")'
      - 'exec_cmd("cp {{httpFile}} {{incrementalDir}}/previous/http.txt 2>/dev/null")'
      - 'exec_cmd("cp {{resolvedFile}} {{incrementalDir}}/previous/resolved.txt 2>/dev/null")'
    on_error:
      - action: continue

  # ===========================================================================
  # Summary
  # ===========================================================================
  - name: summary
    type: bash
    log: "Incremental check summary"
    command: |
      new_subs=$(wc -l < "{{newSubdomainsFile}}" 2>/dev/null || echo 0)
      new_http=$(wc -l < "{{newHttpFile}}" 2>/dev/null || echo 0)
      echo "Incremental check summary complete for {{Target}}"
      echo "New subdomains detected: $new_subs"
      echo "New HTTP endpoints detected: $new_http"

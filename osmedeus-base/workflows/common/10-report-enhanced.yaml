# Enhanced Report Module
kind: module
name: generate-final-report-enhanced
description: Enhanced report with Mermaid visualization and SQLite vulnerability management
tags: report, visualization

params:
  - name: subdomainFile
    default: "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"
  - name: fingerprintFile
    default: "{{Output}}/fingerprint/http-fingerprint-{{TargetSpace}}.jsonl"
  - name: nucleiFile
    default: "{{Output}}/vulnscan/nuclei-jsonl-{{TargetSpace}}.txt"
  - name: nucleiCriticalFile
    default: "{{Output}}/vulnscan/nuclei-critical-{{TargetSpace}}.txt"
  - name: nucleiHighFile
    default: "{{Output}}/vulnscan/nuclei-high-{{TargetSpace}}.txt"
  - name: vulnValidationFile
    default: "{{Output}}/ai-analysis/vuln-validation-{{TargetSpace}}.json"
  - name: attackChainFile
    default: "{{Output}}/ai-analysis/attack-chain-{{TargetSpace}}.json"
  - name: appliedDecisionFile
    default: "{{Output}}/ai-analysis/applied-ai-decision-{{TargetSpace}}.json"
  - name: followupDecisionFile
    default: "{{Output}}/ai-analysis/followup-decision-{{TargetSpace}}.json"
  - name: semanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-decision-followup-{{TargetSpace}}.json"
  - name: fallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-post-vuln-{{TargetSpace}}.json"
  - name: secondFallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-early-{{TargetSpace}}.json"
  - name: thirdFallbackSemanticSearchFile
    default: "{{Output}}/ai-analysis/semantic-search-results-{{TargetSpace}}.json"
  - name: retestPlanFile
    default: "{{Output}}/ai-analysis/retest-plan-{{TargetSpace}}.json"
  - name: operatorQueueFile
    default: "{{Output}}/ai-analysis/operator-queue-{{TargetSpace}}.json"
  - name: campaignHandoffFile
    default: "{{Output}}/ai-analysis/campaign-handoff-{{TargetSpace}}.json"
  - name: campaignCreateFile
    default: "{{Output}}/ai-analysis/campaign-create-{{TargetSpace}}.json"
  - name: retestQueueSummaryFile
    default: "{{Output}}/ai-analysis/retest-queue-summary-{{TargetSpace}}.json"
  - name: semanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-{{TargetSpace}}.txt"
  - name: fallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-decision-followup-{{TargetSpace}}.txt"
  - name: secondFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-post-vuln-{{TargetSpace}}.txt"
  - name: thirdFallbackSemanticPriorityTargetsFile
    default: "{{Output}}/ai-analysis/semantic-priority-targets-early-{{TargetSpace}}.txt"
  - name: reportDir
    default: "{{Output}}/report"
  - name: vulnDbFile
    default: "{{Output}}/report/vuln.db"
  - name: enhancedSummaryFile
    default: "{{Output}}/report/enhanced-summary-{{TargetSpace}}.md"

dependencies:
  commands:
    - jq
    - sqlite3
  variables:
    - name: Target
      type: string
      required: true

reports:
  - name: enhanced-summary
    path: "{{enhancedSummaryFile}}"
    type: markdown
    description: Enhanced summary with AI follow-up posture and operational status

steps:
  - name: prepare-report
    type: function
    functions:
      - 'create_folder("{{reportDir}}")'
      - 'log_info("Generating enhanced report for {{Target}}")'

  - name: init-vuln-db
    type: bash
    command: |
      mkdir -p {{reportDir}}
      sqlite3 {{vulnDbFile}} "CREATE TABLE IF NOT EXISTS vulns (id INTEGER PRIMARY KEY, cve_id TEXT, title TEXT, severity TEXT, url TEXT, host TEXT, matched_at TEXT);"
      sqlite3 {{vulnDbFile}} "CREATE INDEX IF NOT EXISTS idx_sev ON vulns(severity);"
      echo "[DB] Database initialized"

  - name: import-vulns
    type: bash
    command: |
      COUNT=0
      if [ -f "{{nucleiFile}}" ] && [ -s "{{nucleiFile}}" ]; then
        while IFS= read -r line; do
          CVE=$(echo "$line" | jq -r '.info.cve_id // "N/A"' 2>/dev/null)
          TITLE=$(echo "$line" | jq -r '.info.title // "Unknown"' 2>/dev/null | sed "s/'/''/g")
          SEV=$(echo "$line" | jq -r '.info.severity // "info"' 2>/dev/null | tr '[:upper:]' '[:lower:]')
          URL=$(echo "$line" | jq -r '.matched_at // "N/A"' 2>/dev/null | sed "s/'/''/g")
          sqlite3 {{vulnDbFile}} "INSERT INTO vulns (cve_id, title, severity, url) VALUES ('$CVE', '$TITLE', '$SEV', '$URL');"
          COUNT=$((COUNT + 1))
        done < "{{nucleiFile}}"
      fi
      echo "[DB] Imported $COUNT vulns"

  - name: deduplicate
    type: bash
    command: |
      sqlite3 {{vulnDbFile}} "DELETE FROM vulns WHERE id NOT IN (SELECT MIN(id) FROM vulns GROUP BY url, title);"
      TOTAL=$(sqlite3 {{vulnDbFile}} "SELECT COUNT(*) FROM vulns;")
      echo "[DB] Unique vulns: $TOTAL"

  - name: stats
    type: bash
    command: |
      echo "=== Vulnerability Stats ==="
      sqlite3 {{vulnDbFile}} "SELECT upper(severity), COUNT(*) FROM vulns GROUP BY severity;"
      echo "============================"

  - name: export-csv
    type: bash
    command: |
      sqlite3 {{vulnDbFile}} -header -csv "SELECT cve_id, severity, title, url FROM vulns;" > "{{reportDir}}/vulns-{{TargetSpace}}.csv"
      echo "[CSV] Exported to {{reportDir}}/vulns-{{TargetSpace}}.csv"

  - name: mermaid-distribution
    type: bash
    command: |
      CRITICAL=$(sqlite3 {{vulnDbFile}} "SELECT COUNT(*) FROM vulns WHERE severity='critical';")
      HIGH=$(sqlite3 {{vulnDbFile}} "SELECT COUNT(*) FROM vulns WHERE severity='high';")
      MEDIUM=$(sqlite3 {{vulnDbFile}} "SELECT COUNT(*) FROM vulns WHERE severity='medium';")
      LOW=$(sqlite3 {{vulnDbFile}} "SELECT COUNT(*) FROM vulns WHERE severity IN ('low','info');")
      echo "pie title Vuln Distribution" > "{{reportDir}}/vuln-dist.mmd"
      [ "$CRITICAL" -gt 0 ] && echo "  \"Critical ($CRITICAL)\" : $CRITICAL" >> "{{reportDir}}/vuln-dist.mmd"
      [ "$HIGH" -gt 0 ] && echo "  \"High ($HIGH)\" : $HIGH" >> "{{reportDir}}/vuln-dist.mmd"
      [ "$MEDIUM" -gt 0 ] && echo "  \"Medium ($MEDIUM)\" : $MEDIUM" >> "{{reportDir}}/vuln-dist.mmd"
      [ "$LOW" -gt 0 ] && echo "  \"Low ($LOW)\" : $LOW" >> "{{reportDir}}/vuln-dist.mmd"
      echo "[Mermaid] Distribution chart done"

  - name: mermaid-topology
    type: bash
    command: |
      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      SUBS=$(count_lines "{{subdomainFile}}")
      HTTP=$(count_lines "{{httpFile}}")
      echo "graph TB" > "{{reportDir}}/topology.mmd"
      echo "  subgraph \"{{Target}}\"" >> "{{reportDir}}/topology.mmd"
      echo "    A[Subdomains: $SUBS]" >> "{{reportDir}}/topology.mmd"
      echo "    B[HTTP: $HTTP]" >> "{{reportDir}}/topology.mmd"
      echo "  end" >> "{{reportDir}}/topology.mmd"
      echo "  A --> B" >> "{{reportDir}}/topology.mmd"
      echo "[Mermaid] Topology done"

  - name: write-enhanced-summary
    type: bash
    command: |
      text_has_lines() {
        file="$1"
        [ -f "$file" ] || return 1
        awk 'NF { found=1; exit } END { exit(found ? 0 : 1) }' "$file" >/dev/null 2>&1
      }

      semantic_hits() {
        file="$1"
        [ -f "$file" ] || return 1
        jq empty "$file" >/dev/null 2>&1 || return 1
        hits=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$file" 2>/dev/null || echo 0)
        [ "${hits:-0}" -gt 0 ] 2>/dev/null
      }

      valid_json_file() {
        file="$1"
        [ -f "$file" ] || return 1
        jq empty "$file" >/dev/null 2>&1
      }

      count_retest_targets() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          jq -r 'if has("targets") or has("automation_queue") then [((.targets[]? | if type == "object" then .target else . end)), ((.automation_queue[]? | if type == "object" then .target else . end))] | reduce .[] as $item ([]; if ($item != null and $item != "" and (index($item) == null)) then . + [$item] else . end) | length else (.summary.total_targets // 0) end' "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      count_operator_tasks() {
        file="$1"
        if [ -f "$file" ] && jq empty "$file" >/dev/null 2>&1; then
          jq -r 'if has("tasks") then ([.tasks[]?] | length) else (.summary.total_tasks // 0) end' "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      count_lines() {
        file="$1"
        if [ -f "$file" ]; then
          wc -l < "$file" 2>/dev/null || echo 0
        else
          echo 0
        fi
      }

      ACTIVE_SEMANTIC_PRIORITY_FILE="{{semanticPriorityTargetsFile}}"
      for candidate in "{{semanticPriorityTargetsFile}}" "{{fallbackSemanticPriorityTargetsFile}}" "{{secondFallbackSemanticPriorityTargetsFile}}" "{{thirdFallbackSemanticPriorityTargetsFile}}"; do
        [ -n "$candidate" ] || continue
        if text_has_lines "$candidate"; then
          ACTIVE_SEMANTIC_PRIORITY_FILE="$candidate"
          break
        fi
      done

      ACTIVE_SEMANTIC_SEARCH_FILE=""
      for candidate in "{{semanticSearchFile}}" "{{fallbackSemanticSearchFile}}" "{{secondFallbackSemanticSearchFile}}" "{{thirdFallbackSemanticSearchFile}}"; do
        [ -n "$candidate" ] || continue
        if semantic_hits "$candidate"; then
          ACTIVE_SEMANTIC_SEARCH_FILE="$candidate"
          break
        fi
      done
      if [ -z "$ACTIVE_SEMANTIC_SEARCH_FILE" ]; then
        for candidate in "{{semanticSearchFile}}" "{{fallbackSemanticSearchFile}}" "{{secondFallbackSemanticSearchFile}}" "{{thirdFallbackSemanticSearchFile}}"; do
          [ -n "$candidate" ] || continue
          if valid_json_file "$candidate"; then
            ACTIVE_SEMANTIC_SEARCH_FILE="$candidate"
            break
          fi
        done
      fi
      if [ -z "$ACTIVE_SEMANTIC_SEARCH_FILE" ]; then
        ACTIVE_SEMANTIC_SEARCH_FILE="{{semanticSearchFile}}"
      fi

      TOTAL=$(sqlite3 {{vulnDbFile}} "SELECT COUNT(*) FROM vulns;" 2>/dev/null || echo 0)
      CRITICAL=$(sqlite3 {{vulnDbFile}} "SELECT COUNT(*) FROM vulns WHERE severity='critical';" 2>/dev/null || echo 0)
      HIGH=$(sqlite3 {{vulnDbFile}} "SELECT COUNT(*) FROM vulns WHERE severity='high';" 2>/dev/null || echo 0)
      FOLLOWUP_PHASE=$(jq -r '.execution_feedback.next_phase // .seed_focus.next_phase // "not_generated"' "{{followupDecisionFile}}" 2>/dev/null || echo not_generated)
      FOLLOWUP_PRIORITY_MODE=$(jq -r '.seed_focus.priority_mode // "not_generated"' "{{followupDecisionFile}}" 2>/dev/null || echo not_generated)
      FOLLOWUP_CONFIDENCE_LEVEL=$(jq -r '.seed_focus.confidence_level // "not_generated"' "{{followupDecisionFile}}" 2>/dev/null || echo not_generated)
      FOLLOWUP_ESCALATION_SCORE=$(jq -r '.seed_focus.signal_scores.escalation_score // 0' "{{followupDecisionFile}}" 2>/dev/null || echo 0)
      FOLLOWUP_MANUAL_FIRST=$(jq -r '[.seed_targets.manual_first_targets[]?] | length' "{{followupDecisionFile}}" 2>/dev/null || echo 0)
      FOLLOWUP_HIGH_CONFIDENCE=$(jq -r '[.seed_targets.high_confidence_targets[]?] | length' "{{followupDecisionFile}}" 2>/dev/null || echo 0)
      FOLLOWUP_REUSE_SOURCES=$(jq -r '(.seed_focus.reuse_sources // []) | join(", ")' "{{followupDecisionFile}}" 2>/dev/null || echo "")
      FOLLOWUP_MANUAL_NEEDED=$(jq -r '.seed_focus.manual_followup_needed // .execution_feedback.manual_followup_needed // false' "{{followupDecisionFile}}" 2>/dev/null || echo false)
      FOLLOWUP_CAMPAIGN_RECOMMENDED=$(jq -r '.seed_focus.campaign_followup_recommended // .execution_feedback.campaign_followup_recommended // false' "{{followupDecisionFile}}" 2>/dev/null || echo false)
      FOLLOWUP_QUEUE_EFFECTIVE=$(jq -r '.seed_focus.queue_followup_effective // .execution_feedback.queue_followup_effective // false' "{{followupDecisionFile}}" 2>/dev/null || echo false)
      FOLLOWUP_NEXT_ACTIONS=$(jq -r '(.next_actions // []) | join(" | ")' "{{followupDecisionFile}}" 2>/dev/null || echo "")
      RETEST_TARGETS=$(count_retest_targets "{{retestPlanFile}}")
      OPERATOR_TASKS=$(count_operator_tasks "{{operatorQueueFile}}")
      CAMPAIGN_READY=$(jq -r '.handoff_ready // false' "{{campaignHandoffFile}}" 2>/dev/null || echo false)
      CAMPAIGN_TARGETS=$(jq -r '.counts.campaign_targets // 0' "{{campaignHandoffFile}}" 2>/dev/null || echo 0)
      CAMPAIGN_CREATE_STATUS=$(jq -r '.status // "not_requested"' "{{campaignCreateFile}}" 2>/dev/null || echo not_requested)
      CAMPAIGN_CREATE_ID=$(jq -r '.campaign_id // ""' "{{campaignCreateFile}}" 2>/dev/null || echo "")
      CAMPAIGN_CREATE_QUEUED_RUNS=$(jq -r '.queued_runs // 0' "{{campaignCreateFile}}" 2>/dev/null || echo 0)
      RETEST_QUEUE_STATUS=$(jq -r '.status // "not_requested"' "{{retestQueueSummaryFile}}" 2>/dev/null || echo not_requested)
      RETEST_QUEUED_TARGETS=$(jq -r '.queued_targets // 0' "{{retestQueueSummaryFile}}" 2>/dev/null || echo 0)
      SEMANTIC_RESULTS=$(jq -r '.total_results // ([.results[]?] | length) // 0' "$ACTIVE_SEMANTIC_SEARCH_FILE" 2>/dev/null || echo 0)
      SEMANTIC_PRIORITY_TARGETS=$(count_lines "$ACTIVE_SEMANTIC_PRIORITY_FILE")

      {
        echo "# Enhanced Report Summary"
        echo ""
        echo "- Target: {{Target}}"
        echo "- Total vulnerabilities: $TOTAL"
        echo "- Critical: $CRITICAL"
        echo "- High: $HIGH"
        echo "- Semantic search results: $SEMANTIC_RESULTS"
        echo "- Semantic search file: $ACTIVE_SEMANTIC_SEARCH_FILE"
        echo "- Semantic priority targets: $SEMANTIC_PRIORITY_TARGETS"
        echo "- Semantic priority file: $ACTIVE_SEMANTIC_PRIORITY_FILE"
        echo ""
        echo "## AI Follow-Up Posture"
        echo "- Next follow-up phase: $FOLLOWUP_PHASE"
        echo "- Priority mode: $FOLLOWUP_PRIORITY_MODE"
        echo "- Confidence level: $FOLLOWUP_CONFIDENCE_LEVEL"
        echo "- Escalation score: $FOLLOWUP_ESCALATION_SCORE"
        echo "- Manual-first seed targets: $FOLLOWUP_MANUAL_FIRST"
        echo "- High-confidence seed targets: $FOLLOWUP_HIGH_CONFIDENCE"
        echo "- Manual follow-up needed: $FOLLOWUP_MANUAL_NEEDED"
        echo "- Campaign follow-up recommended: $FOLLOWUP_CAMPAIGN_RECOMMENDED"
        echo "- Retest queue effective: $FOLLOWUP_QUEUE_EFFECTIVE"
        echo "- Reuse sources: ${FOLLOWUP_REUSE_SOURCES:-none}"
        echo "- Next actions: ${FOLLOWUP_NEXT_ACTIONS:-none}"
        echo ""
        echo "## Operational Status"
        echo "- Retest planned targets: $RETEST_TARGETS"
        echo "- Operator tasks: $OPERATOR_TASKS"
        echo "- Campaign ready: $CAMPAIGN_READY"
        echo "- Campaign targets: $CAMPAIGN_TARGETS"
        echo "- Campaign create: $CAMPAIGN_CREATE_STATUS"
        echo "- Campaign ID: ${CAMPAIGN_CREATE_ID:-n/a}"
        echo "- Campaign queued runs: $CAMPAIGN_CREATE_QUEUED_RUNS"
        echo "- Retest queue: $RETEST_QUEUE_STATUS"
        echo "- Retest queued targets: $RETEST_QUEUED_TARGETS"
        echo ""
        echo "## Artifacts"
        echo "- CSV: {{reportDir}}/vulns-{{TargetSpace}}.csv"
        echo "- Vulnerability DB: {{vulnDbFile}}"
        echo "- Mermaid distribution: {{reportDir}}/vuln-dist.mmd"
        echo "- Mermaid topology: {{reportDir}}/topology.mmd"
        echo "- Applied AI decision: {{appliedDecisionFile}}"
        echo "- Follow-up decision: {{followupDecisionFile}}"
        echo "- Campaign handoff: {{campaignHandoffFile}}"
        echo "- Campaign create: {{campaignCreateFile}}"
        echo "- Retest queue summary: {{retestQueueSummaryFile}}"
        echo "- Semantic search: $ACTIVE_SEMANTIC_SEARCH_FILE"
      } > "{{enhancedSummaryFile}}"

  - name: log-complete
    type: function
    functions:
      - 'log_info("Enhanced report completed")'

  #   type: bash
  #   log: "Fetching HTTP responses and scanning for secrets with trufflehog"
  #   commands:
  #     - "sort -u {{linkFile}} -o {{linkFile}}"
  #     - "cat {{linkFile}} | httpx -silent -nf -no-color -title -t {{httpThreads}} -H '{{defaultUA}}' --store-response-dir {{httpResponse}}"

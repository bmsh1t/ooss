kind: module
name: test-iflow

steps:
  - name: check-iflow-installed
    type: bash
    command: |
      if command -v iflow >/dev/null 2>&1; then
        echo "iflow found: $(which iflow)"
      else
        echo "iflow NOT FOUND"
      fi

  - name: test-iflow-acp
    type: agent-acp
    agent: "iflow"
    max_iterations: 1
    timeout: "3m"
    cwd: "/tmp"
    allowed_paths: ["/tmp", "/root"]
    messages:
      - role: user
        content: "What is 1 + 1?"
    exports:
      result: "{{acp_output}}"
